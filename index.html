    { level: "intermediate", name: "Barfiks", nameEn: "Pull-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Sırt ve çekme gücünü geliştirir. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time. Develops back and pulling strength. Log your reps and race yourself.", equip: ["pullup"], rest: 60, met: 7, hedefKas: "Sırt, Kol" },
    { level: "intermediate", name: "Dips", nameEn: "Dips", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Triceps ve göğüs — cross'un motoru. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time. Triceps and chest — the engine of the cross. Log your reps and race yourself.", equip: ["dips"], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "Dambıl omuz pres", nameEn: "Dumbbell shoulder press", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Guard'ı yukarıda tutma gücü. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time. The strength to keep your guard up. Log your reps and race yourself.", equip: ["dumbbell"], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "Plaka önden pres (yumruk taklidi)", nameEn: "Plate front press", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca plakayı öne it — yumruğu taklit eden maksimum tekrar. Tekrarı not al, kendinle yarış.", descEn: "Press the plate forward the whole time — max reps mimicking the punch. Log your reps and race yourself.", equip: ["plate"], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "Bulgar split squat", nameEn: "Bulgarian split squat", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca her bacağa dönüşümlü maksimum tekrar. Tek bacak güç ve denge. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time, alternating each leg. Single-leg strength and balance. Log your reps and race yourself.", equip: [], rest: 60, met: 7, hedefKas: "Bacak, Kalça" },
    { level: "intermediate", name: "Mountain climber", nameEn: "Mountain climbers", sets: "4x30 sn", duration: "30 sn", desc: "Süre boyunca hızlı tempoda dizleri göğse çek. Core ve kondisyon. Tekrarı not al, kendinle yarış.", descEn: "Drive the knees to the chest at fast tempo the whole time. Core and conditioning. Log your reps and race yourself.", equip: [], rest: 30, met: 7, hedefKas: "Core (Karın)" },
    { level: "intermediate", name: "Russian twist (dambıl)", nameEn: "Russian twist (DB)", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca gövdeni iki yana döndür. Dönüş gücü — kroşenin kaynağı. Tekrarı not al, kendinle yarış.", descEn: "Rotate your trunk side to side the whole time. Rotational power — the source of the hook. Log your reps and race yourself.", equip: ["dumbbell"], rest: 60, met: 7, hedefKas: "Yan Karın (Oblik)" },
    { level: "intermediate", name: "Pike şınav (omuz)", nameEn: "Pike push-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Omuz gücü ve üst yumruk dayanağı. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time. Shoulder strength and upper-punch support. Log your reps and race yourself.", equip: [], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "Patlayıcı squat (jump squat)", nameEn: "Jump squats", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca patlayıcı sıçramalarla maksimum tekrar. Bacak patlayıcılığı. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time with explosive jumps. Leg explosiveness. Log your reps and race yourself.", equip: [], rest: 60, met: 9.5, hedefKas: "Bacak, Kalça" },
    { level: "intermediate", name: "Diamond şınav (triceps)", nameEn: "Diamond push-ups", sets: "MAKS", duration: "7 dk", desc: "Eller elmas şeklinde; süre boyunca maksimum tekrar. Triceps ve cross gücü. Tekrarı not al, kendinle yarış.", descEn: "Hands in a diamond shape; max reps the whole time. Triceps and cross power. Log your reps and race yourself.", equip: [], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "V-up (karın)", nameEn: "V-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Tüm karın zincirini çalıştırır. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time. Works the entire abdominal chain. Log your reps and race yourself.", equip: [], rest: 60, met: 7, hedefKas: "Core (Karın)" },
    { level: "intermediate", name: "Hollow hold (core)", nameEn: "Hollow hold", sets: "3x30 sn", duration: "30 sn", desc: "Core'u kasarak hollow pozisyonunu koru. Vuruşta güç aktarımının temeli.", descEn: "Hold the hollow position with a tight core. The foundation of power transfer in the punch.", equip: [], rest: 30, met: 4.5, hedefKas: "Core (Karın)" },
    { level: "intermediate", name: "Tırmanıcı şınav (spider)", nameEn: "Spider-man push-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca dizini dirseğine çekerek maksimum tekrar. Core ve göğüs. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time, drawing the knee to the elbow. Core and chest. Log your reps and race yourself.", equip: [], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Patlayıcı alkışlı şınav (clap)", nameEn: "Explosive clap push-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca yerden patlayıp el çırparak maksimum kaliteli tekrar. Sayıya değil patlayıcılığa odaklan. Tekrarı not al, kendinle yarış.", descEn: "Max quality reps the whole time, exploding off the ground and clapping. Focus on explosiveness, not the count. Log your reps and race yourself.", equip: [], rest: 60, met: 10, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "30 sn maks şınav sprinti", nameEn: "30s max push-up sprint", sets: "4x30 sn", duration: "30 sn", desc: "Süre boyunca temiz formda mümkün olan en çok şınavı çek. Kısa ve maksimum efor.", descEn: "Do as many clean-form push-ups as possible the whole time. Short, maximum effort.", equip: [], rest: 10, met: 10, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Dips — yorulana kadar", nameEn: "Dips — to failure", sets: "MAKS", duration: "5 dk", desc: "Süre boyunca yorulana dek devam et. Triceps ve göğüs eşiğini zorlar.", descEn: "Continue until exhaustion the whole time. Pushes the triceps and chest threshold.", equip: ["dips"], rest: 60, met: 7.5, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Barfiks — patlayıcı", nameEn: "Explosive pull-ups", sets: "MAKS", duration: "5 dk", desc: "Süre boyunca patlayıcı şekilde yukarı çekil. Çekme gücü ve patlayıcılık.", descEn: "Pull up explosively the whole time. Pulling power and explosiveness.", equip: ["pullup"], rest: 60, met: 10, hedefKas: "Sırt, Kol" },
    { level: "pro", name: "Barbell deadlift", nameEn: "Barbell deadlift", sets: "MAKS", duration: "5 dk", desc: "Ağır yükle, az ve kontrollü tekrar. Posterior zincir (sırt-kalça-bacak) gücü.", descEn: "Heavy load, few controlled reps. Posterior-chain (back-hip-leg) strength.", equip: ["barbell"], rest: 60, met: 7.5, hedefKas: "Sırt, Kol" },
    { level: "pro", name: "Plaka patlayıcı punch press", nameEn: "Plate explosive punch press", sets: "MAKS", duration: "5 dk", desc: "Plakayı öne fırlatır gibi patlayıcı şekilde it. Süre boyunca maksimum tekrar.", descEn: "Press the plate explosively as if throwing it forward. Max reps the whole time.", equip: ["plate"], rest: 60, met: 10, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Burpee patlaması (40 sn)", nameEn: "Burpee blast (40s)", sets: "4x1 dk", duration: "1 dk", desc: "Süre boyunca durmadan burpee. Tüm vücut anaerobik patlaması.", descEn: "Nonstop burpees the whole time. Full-body anaerobic blast.", equip: [], rest: 30, met: 10, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Dambıl clean & press", nameEn: "Dumbbell clean & press", sets: "MAKS", duration: "5 dk", desc: "Süre boyunca patlayıcı şekilde yerden omuza, omuzdan yukarı. Tüm vücut güç.", descEn: "Explosively from floor to shoulder to overhead the whole time. Full-body power.", equip: ["dumbbell"], rest: 60, met: 7.5, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Muscle-up (patlayıcı)", nameEn: "Explosive muscle-up", sets: "MAKS", duration: "5 dk", desc: "Çekiş ve itişi tek harekette birleştir. Üst beden gücünün zirvesi.", descEn: "Combine pull and push in one move. The peak of upper-body strength.", equip: ["pullup"], rest: 60, met: 10, hedefKas: "Sırt, Kol" },
    { level: "pro", name: "Plaka slam", nameEn: "Plate slam", sets: "MAKS", duration: "5 dk", desc: "Plakayı tüm gücünle yere indir. Nakavt patlayıcılığı geliştirir.", descEn: "Drive the plate into the ground with all your power. Develops knockout explosiveness.", equip: ["plate"], rest: 60, met: 7.5, hedefKas: "Core, Sırt, Kalça" },
    { level: "pro", name: "Tek kol şınav (arşe)", nameEn: "Archer push-ups", sets: "MAKS", duration: "5 dk", desc: "Tek kola yük binecek şekilde süre boyunca tekrar. Maksimum üst beden gücü.", descEn: "Reps the whole time with the load on one arm. Maximum upper-body strength.", equip: [], rest: 60, met: 7.5, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Pistol squat (tek bacak)", nameEn: "Pistol squats", sets: "MAKS", duration: "5 dk", desc: "Tek bacak üstünde kontrollü çök ve kalk. Bacak gücü ve dengenin zirvesi.", descEn: "Lower and rise under control on one leg. The peak of leg strength and balance.", equip: [], rest: 60, met: 7.5, hedefKas: "Bacak, Kalça" },
    { level: "pro", name: "Patlayıcı burpee + sıçrama", nameEn: "Explosive burpee + jump", sets: "MAKS", duration: "5 dk", desc: "Süre boyunca patlayıcı burpee ve sıçrama. Tüm vücut patlayıcı güç.", descEn: "Explosive burpees and jumps the whole time. Full-body explosive power.", equip: [], rest: 60, met: 10, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Handstand şınav (duvar)", nameEn: "Wall handstand push-ups", sets: "MAKS", duration: "5 dk", desc: "Duvara yaslı amuda kalkıp süre boyunca maksimum tekrar. Omuz gücü zirvesi.", descEn: "Kick up to a wall handstand and do max reps the whole time. Peak shoulder strength.", equip: [], rest: 60, met: 7.5, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Squat+Şınav kombosu", nameEn: "Squat + push-up combo", sets: "MAKS", duration: "10 dk", desc: "Süre bitene kadar dinlenmeden, 1 set = 20 squat + 20 şınav olacak şekilde devam et.", descEn: "Until time is up, do 20 squats + 20 push-ups as one set, without resting.", equip: [], rest: 60, met: 7.5, hedefKas: "Core (Karın)" },
    { level: "pro", name: "Plyo şınav (sıçramalı)", nameEn: "Plyometric push-ups", sets: "MAKS", duration: "5 dk", desc: "Süre boyunca yerden patlayarak maksimum tekrar. Yumruk hızı ve gücü.", descEn: "Max reps the whole time, exploding off the ground. Punch speed and power.", equip: [], rest: 60, met: 10, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "pro", name: "Tek bacak köprü patlaması", nameEn: "Single-leg hip thrust", sets: "MAKS", duration: "5 dk", desc: "Her bacağa dönüşümlü patlayıcı köprü. Vuruşun tabanı olan kalça gücü.", descEn: "Explosive bridge alternating each leg. Hip strength, the base of the punch.", equip: [], rest: 60, met: 10, hedefKas: "Kalça, Bel" },
    { level: "beginner", name: "Squat + 1-2 (çök-vur)", nameEn: "Squat + 1-2", sets: "MAKS", duration: "8 dk", desc: "Süre boyunca: 1 squat'a in, kalkarken 1-2 (jab-cross) at. Durmadan, kendi ritminde.", descEn: "The whole time: drop into a squat, throw a 1-2 (jab-cross) as you rise. Nonstop, at your own rhythm.", equip: [], rest: 60, met: 8.5, hedefKas: "Bacak, Omuz, Core" },
    { level: "beginner", name: "Yüksek diz + yumruk", nameEn: "High knees + punches", sets: "MAKS", duration: "6 dk", desc: "Yerinde yüksek diz çekerken her adımda bir düz yumruk. Kondisyon ve koordinasyon.", descEn: "High knees in place with a straight punch on each step. Conditioning and coordination.", equip: [], rest: 45, met: 9, hedefKas: "Bacak, Omuz, Core" },
    { level: "beginner", name: "Wall sit (duvar oturuşu)", nameEn: "Wall sit", sets: "MAKS", duration: "5 dk", desc: "Sırtın duvarda, dizler 90°; pozisyonu süre boyunca koru. İzometrik bacak gücü.", descEn: "Back on the wall, knees at 90°; hold the position the whole time. Isometric leg strength.", equip: [], rest: 45, met: 5, hedefKas: "Bacak, Kalça" },
    { level: "intermediate", name: "Burpee + 1-2 (kalk-vur)", nameEn: "Burpee + 1-2", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca: bir burpee yap, ayağa kalkınca patlayıcı 1-2 at. Tüm vücut + yumruk gücü.", descEn: "The whole time: do a burpee, then explode a 1-2 when you stand. Full body + punching power.", equip: [], rest: 60, met: 10, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Lunge + cross (adım-vur)", nameEn: "Lunge + cross", sets: "MAKS", duration: "7 dk", desc: "Her öne hamlede aynı tarafın cross'unu at; dönüşümlü bacak. Bacak gücü + güç aktarımı.", descEn: "Throw the same-side cross on each forward lunge; alternate legs. Leg strength + power transfer.", equip: [], rest: 60, met: 8, hedefKas: "Bacak, Omuz, Core" },
    { level: "intermediate", name: "Plank + omuz dokunuş", nameEn: "Plank shoulder taps", sets: "MAKS", duration: "5 dk", desc: "Plank pozisyonunda dönüşümlü olarak karşı omza dokun; kalçanı sabit tut. Core stabilite.", descEn: "In a plank, tap the opposite shoulder alternately; keep hips still. Core stability.", equip: [], rest: 45, met: 6, hedefKas: "Core (Karın), Omuz" },
    { level: "pro", name: "Squat sıçrama + 1-2", nameEn: "Jump squat + 1-2", sets: "MAKS", duration: "6 dk", desc: "Süre boyunca: patlayıcı squat sıçraması, inişte 1-2. Patlayıcı bacak + yumruk.", descEn: "The whole time: explosive jump squat, 1-2 on landing. Explosive legs + punch.", equip: [], rest: 60, met: 10, hedefKas: "Bacak, Omuz, Core" },
    { level: "pro", name: "Burpee + sıçrama + 1-2-3", nameEn: "Burpee + jump + 1-2-3", sets: "MAKS", duration: "6 dk", desc: "Süre boyunca: burpee, sıçrama, ardından patlayıcı 1-2-3. Maksimum kondisyon ve güç.", descEn: "The whole time: burpee, jump, then explosive 1-2-3. Maximum conditioning and power.", equip: [], rest: 60, met: 10.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Sumo squat (geniş duruş)", nameEn: "Sumo squat", sets: "MAKS", duration: "6 dk", desc: "Ayaklar geniş, parmak uçları dışa; derin çök ve kalk. İç bacak ve kalça gücü.", descEn: "Feet wide, toes out; squat deep and rise. Inner-thigh and glute strength.", equip: [], rest: 60, met: 7, hedefKas: "Bacak, Kalça" },
    { level: "beginner", name: "İzometrik squat tutuş", nameEn: "Isometric squat hold", sets: "MAKS", duration: "5 dk", desc: "Squat pozisyonunun en altına in (uyluklar yere paralel gibi) ve orada hiç hareket etmeden sabit kal; bacaklarının yanmasına izin ver. Süre boyunca pozisyonu koru. Amaç: bacak dayanıklılığı.", descEn: "Lower to the bottom of a squat (thighs roughly parallel to the floor) and hold completely still; let your legs burn. Keep the position the whole time. Goal: leg endurance.", equip: [], rest: 45, met: 5.5, hedefKas: "Bacak, Kalça" },
    { level: "beginner", name: "Yürüyen lunge", nameEn: "Walking lunge", sets: "MAKS", duration: "6 dk", desc: "Bir adım öne at, öndeki dizini 90°'ye kadar bük (arka diz yere yaklaşsın), sonra kalkıp diğer bacakla öne adımla. İleri 'yürüyerek' tekrarla. Amaç: bacak gücü ve denge.", descEn: "Step forward, bend your front knee to 90° (back knee nearing the floor), then rise and step forward with the other leg. Repeat, 'walking' forward. Goal: leg strength and balance.", equip: [], rest: 55, met: 6.5, hedefKas: "Bacak, Kalça" },
    { level: "beginner", name: "Sırt esnetme + superman", nameEn: "Back extension + superman", sets: "MAKS", duration: "5 dk", desc: "Yüzüstü yat, kollarını öne uzat; aynı anda kollarını ve bacaklarını yerden kaldırıp 1-2 saniye tut, sonra indir. Uçan superman gibi. Amaç: bel ve sırt kaslarını güçlendirip duruşu düzeltmek.", descEn: "Lie face down, arms extended forward; lift your arms and legs off the floor at once, hold 1-2 seconds, then lower. Like a flying superman. Goal: strengthen the lower back and fix posture.", equip: [], rest: 50, met: 5, hedefKas: "Bel, Sırt" },
    { level: "beginner", name: "Dambıl yan kaldırış", nameEn: "Dumbbell lateral raise", sets: "MAKS", duration: "5 dk", desc: "Elinde hafif dambıllarla dik dur; kollarını yana doğru omuz hizasına kadar kaldır, sonra kontrollü indir. Amaç: omuz dayanıklılığı — guard'ı uzun süre yukarıda tutma gücü.", descEn: "Stand tall with light dumbbells; raise your arms out to the sides up to shoulder height, then lower under control. Goal: shoulder endurance — the strength to hold your guard up for a long time.", equip: ["dumbbell"], rest: 50, met: 5, hedefKas: "Omuz" },
    { level: "intermediate", name: "Şınav + omuz dokunuş", nameEn: "Push-up + shoulder tap", sets: "MAKS", duration: "6 dk", desc: "Bir şınav yap; yukarı kalktığında bir elinle karşı omzuna dokun, sonra tekrar şınav ve diğer omuz. Kalçanı sabit tut, sallanma. Amaç: göğüs gücü + karın (core) stabilitesi birlikte.", descEn: "Do a push-up; at the top, tap the opposite shoulder with one hand, then another push-up and the other shoulder. Keep your hips still, don't rock. Goal: chest strength + core stability together.", equip: [], rest: 55, met: 7, hedefKas: "Göğüs, Core" },
    { level: "intermediate", name: "Squat + omuz pres (thruster)", nameEn: "Squat + press (thruster)", sets: "MAKS", duration: "6 dk", desc: "Elinde dambıllarla squat'a in; kalkarken o ivmeyle dambılları baş üstüne it. İniş-kalkış-pres tek akıcı hareket olsun. Amaç: bacaktan omuza tüm vücut güç zincirini çalıştırmak.", descEn: "Squat down holding dumbbells; as you rise, use that momentum to press them overhead. Down-up-press as one fluid move. Goal: work the full-body power chain from legs to shoulders.", equip: ["dumbbell"], rest: 55, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Renegade row (dambıl)", nameEn: "Renegade row", sets: "MAKS", duration: "6 dk", desc: "İki dambılı tutarak şınav (plank) pozisyonuna geç; sırayla bir dambılı göğsüne doğru çek, indir, diğerini çek. Kalçanı dönmeden sabit tut. Amaç: sırt gücü + gövde stabilitesi.", descEn: "Get into a push-up (plank) position holding two dumbbells; row one dumbbell to your chest, lower, then the other. Keep your hips from rotating. Goal: back strength + trunk stability.", equip: ["dumbbell"], rest: 55, met: 7, hedefKas: "Sırt, Core" },
    { level: "intermediate", name: "Kalça itişi (hip thrust)", nameEn: "Hip thrust", sets: "MAKS", duration: "6 dk", desc: "Sırt üstü yat, dizler bükülü, ayaklar yerde; kalçanı patlayıcı şekilde yukarı it ve tepede kalçanı sık, sonra indir. Amaç: yumruğun gücünün geldiği kalça-popo kaslarını güçlendirmek.", descEn: "Lie on your back, knees bent, feet flat; drive your hips up explosively and squeeze at the top, then lower. Goal: strengthen the hip/glute muscles where punching power comes from.", equip: [], rest: 55, met: 7, hedefKas: "Kalça, Bel" },
    { level: "intermediate", name: "Box jump (sıçra-çık)", nameEn: "Box jump", sets: "MAKS", duration: "5 dk", desc: "Önüne sağlam ve alçak bir yükseklik koy (basamak gibi); iki ayakla patlayıcı sıçrayıp üstüne çık, yumuşak ve kontrollü in. Amaç: bacak patlayıcılığı. (Sağlam zemin şart)", descEn: "Place a sturdy low platform in front of you (like a step); explode up onto it with both feet, land soft and controlled. Goal: leg explosiveness. (Needs a solid surface)", equip: [], rest: 55, met: 8, hedefKas: "Bacak, Kalça" },
    { level: "pro", name: "Tek kol dambıl snatch", nameEn: "Single-arm DB snatch", sets: "MAKS", duration: "5 dk", desc: "Bir dambılı yerden tek hareketle, kolunu düz tutarak baş üstüne kadar savur (kalça gücüyle). Kontrollü indir, kolları değiştir. Amaç: tüm vücut patlayıcı gücü. (İleri seviye)", descEn: "Swing a dumbbell from the floor to overhead in one motion with a straight arm (using hip power). Lower under control, switch arms. Goal: full-body explosive power. (Advanced)", equip: ["dumbbell"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Patlayıcı çekiş (explosive row)", nameEn: "Explosive row", sets: "MAKS", duration: "5 dk", desc: "Eğil, dambılı/ağırlığı patlayıcı şekilde karnına doğru hızlıca çek, sonra yavaş indir. Amaç: clinch'te (yakın tutuşta) işe yarayan çekme gücünü geliştirmek.", descEn: "Bend over, pull the dumbbell/weight explosively and fast toward your stomach, then lower slowly. Goal: develop the pulling strength used in the clinch.", equip: ["dumbbell"], rest: 60, met: 8, hedefKas: "Sırt, Kol" },
    { level: "pro", name: "Turkish get-up", nameEn: "Turkish get-up", sets: "MAKS", duration: "6 dk", desc: "Sırt üstü yat, bir kolunu ağırlıkla yukarı uzat; gözünü ağırlıkta tutarak adım adım ayağa kalk, sonra aynı yoldan geri yat. Yavaş ve kontrollü. Amaç: tüm vücut stabilite ve koordinasyon. (İleri)", descEn: "Lie on your back, one arm holding a weight up; keeping your eyes on the weight, rise to standing step by step, then reverse back down. Slow and controlled. Goal: full-body stability and coordination. (Advanced)", equip: ["dumbbell"], rest: 60, met: 7.5, hedefKas: "Tüm Vücut" },
  ],
  defense: [
    { level: "beginner", name: "Guard pozisyonu pratiği", nameEn: "Guard position drill", sets: "3x2 dk", duration: "2 dk", desc: "Eller çene hizasında, dirsekler içeride. Savunmanın temel duruşu.", descEn: "Hands at chin level, elbows inside. The base defensive stance.", equip: [], rest: 45, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "beginner", name: "Temel blok (kol bloğu)", nameEn: "Basic block", sets: "3x2 dk", duration: "2 dk", desc: "Gelen hayali vuruşu kolunla karşıla ve emici şekilde blokla.", descEn: "Meet the incoming imaginary punch with your arm and block absorptively.", equip: [], rest: 45, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "beginner", name: "Geri çekilme (lean back)", nameEn: "Lean back", sets: "3x2 dk", duration: "2 dk", desc: "Beli geriye yatırarak vuruşu menzil dışında bırak.", descEn: "Lean the torso back to leave the punch out of range.", equip: [], rest: 45, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "beginner", name: "Parry (eldivenle saptırma)", nameEn: "Parry", sets: "3x2 dk", duration: "2 dk", desc: "Gelen jab'i eldiveninle hafifçe yana saptır.", descEn: "Deflect the incoming jab slightly aside with your glove.", equip: [], rest: 45, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "beginner", name: "Temel slip (sağ-sol)", nameEn: "Basic slip (R-L)", sets: "3x2 dk", duration: "2 dk", desc: "Bel ve dizden hafifçe kay, üst bedeni dik tutarak vuruştan sıyrıl.", descEn: "Slip slightly from the waist and knees, keeping the upper body upright as you escape the punch.", equip: [], rest: 45, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "intermediate", name: "Slip + kontra (sağ-sol)", nameEn: "Slip + counter (R-L)", sets: "3x3 dk", duration: "3 dk", desc: "Vuruştan slip ile sıyrıl, hemen ardından kontra at.", descEn: "Escape the punch with a slip, then counter immediately.", equip: [], rest: 60, met: 10, hedefKas: "Core, Bacak (denge)" },
    { level: "intermediate", name: "Eğil + kontra kroşe (duck)", nameEn: "Duck + counter hook", sets: "3x3 dk", duration: "3 dk", desc: "Vuruşun altına eğil, çıkarken kroşe ile cevap ver.", descEn: "Duck under the punch and answer with a hook on the way up.", equip: [], rest: 45, met: 5.5, hedefKas: "Core, Bacak (denge)" },
    { level: "intermediate", name: "Catch + cross (yakala-vur)", nameEn: "Catch + cross", sets: "3x3 dk", duration: "3 dk", desc: "Jab'i eldivenle yakala, aynı anda cross gönder.", descEn: "Catch the jab with the glove and send a cross at the same time.", equip: [], rest: 60, met: 5.5, hedefKas: "Core, Bacak (denge)" },
    { level: "intermediate", name: "Roll under (kavis)", nameEn: "Roll under (weave)", sets: "3x3 dk", duration: "3 dk", desc: "Kroşenin altından geniş bir kavis çizerek geç.", descEn: "Pass under the hook tracing a wide weave.", equip: [], rest: 45, met: 5.5, hedefKas: "Core, Bacak (denge)" },
    { level: "intermediate", name: "Blok-parry-kontra zinciri", nameEn: "Block-parry-counter chain", sets: "3x3 dk", duration: "3 dk", desc: "Blokla, saptır, kontra at — üç aşamalı tepki zinciri.", descEn: "Block, deflect, counter — a three-stage reaction chain.", equip: [], rest: 60, met: 4, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Philly shell omuz roll", nameEn: "Philly shell shoulder roll", sets: "3x3 dk", duration: "3 dk", desc: "Philly shell guardında kal, omuz roll ile blokla ve hayali yumruklardan sıyrıl.", descEn: "Stay in the Philly shell guard, block with the shoulder roll and escape imaginary punches.", equip: [], rest: 45, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Çoklu slip-roll zinciri", nameEn: "Multi slip-roll chain", sets: "3x3 dk", duration: "3 dk", desc: "Durmadan sağa-sola slip ve roll yaparak savunmada akıcılık kur.", descEn: "Slip and roll side to side nonstop to build defensive fluidity.", equip: [], rest: 30, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Refleks tepki drili", nameEn: "Reflex reaction drill", sets: "3x3 dk", duration: "3 dk", desc: "⚠️ Sesli antrenörü aç! Sinyale göre yumruktan kaçıp kontra at. Antrenör 'boks' dedikçe tepki ver.", descEn: "⚠️ Turn on the voice coach! React to the signal by dodging the punch and countering. React each time the coach says 'box'.", equip: [], rest: 60, met: 6, hedefKas: "Core, Bacak (denge)", reflexCue: true },
    { level: "pro", name: "Köşe savunması + çıkış", nameEn: "Corner defense + escape", sets: "3x3 dk", duration: "3 dk", desc: "Köşede baskı altında soğukkanlılıkla savun ve güvenle çık. Side Step hook hayal gücüne kalmıs.", descEn: "Defend calmly under pressure in the corner and exit safely. Side-step hook is up to your imagination.", equip: [], rest: 30, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Catch & shoot (yakala-fırlat)", nameEn: "Catch & shoot", sets: "3x3 dk", duration: "3 dk", desc: "Jab'i eldivenle yakala, aynı anda cross fırlat.", descEn: "Catch the jab with the glove and fire a cross at the same time.", equip: [], rest: 30, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Çift kavis (double weave)", nameEn: "Double weave", sets: "3x3 dk", duration: "3 dk", desc: "İki ardışık kavisle kombinasyonun altından geç, çık ve vur.", descEn: "Pass under the combination with two successive weaves, exit and strike.", equip: [], rest: 45, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Sırt-ipte savunma (ropes defense)", nameEn: "On-the-ropes defense", sets: "3x3 dk", duration: "3 dk", desc: "İplere yaslanıp blok ve roll ile hayatta kal, sonra patla. Ali'nin rope-a-dope taktiği.", descEn: "Lean on the ropes, survive with blocks and rolls, then explode. Ali's rope-a-dope tactic.", equip: [], rest: 45, met: 6, hedefKas: "Core, Bacak (denge)" },
    { level: "pro", name: "Kompakt high-guard baskı savunması", nameEn: "Compact high-guard under pressure", sets: "3x3 dk", duration: "3 dk", desc: "Yoğun baskı altında guard'ı sıkı tut, aralardan kontra çıkar.", descEn: "Keep a tight guard under heavy pressure and counter through the gaps.", equip: [], rest: 60, met: 4.5, hedefKas: "Core, Bacak (denge)" },
    { level: "beginner", name: "Çift parry (sağ-sol saptırma)", nameEn: "Double parry", sets: "3x2 dk", duration: "2 dk", desc: "Gelen yumruğu eldivenle hafifçe yana saptır; sağ ve sol elle dönüşümlü. Küçük, ekonomik hareket.", descEn: "Deflect the incoming punch lightly with the glove; alternate right and left hand. Small, economical motion.", equip: [], rest: 45, met: 5, hedefKas: "Omuz, Core" },
    { level: "intermediate", name: "Slip + kroşe kontra", nameEn: "Slip + hook counter", sets: "3x3 dk", duration: "3 dk", desc: "Yumruğu başınla yana geçir, hemen aynı tarafın kroşesiyle karşılık ver. Her iki yan.", descEn: "Slip the punch with your head, immediately counter with the same-side hook. Both sides.", equip: [], rest: 45, met: 7, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Pull counter (geri çekil-vur)", nameEn: "Pull counter", sets: "3x3 dk", duration: "3 dk", desc: "Yumruğu geriye çekilerek boşa düşür, dengeyi öne taşıyıp cross ile karşılık ver. Zamanlama ustalığı.", descEn: "Make the punch miss by pulling back, shift forward and counter with a cross. Timing mastery.", equip: [], rest: 60, met: 8, hedefKas: "Core, Bacak" },
    { level: "beginner", name: "Yüksek guard tutuş", nameEn: "High guard hold", sets: "3x2 dk", duration: "2 dk", desc: "Eldivenlerini şakaklarına yapıştır, dirseklerini birbirine yaklaştırıp gövdeni kapat; bu pozisyonda kalarak hayali yumrukları kollarınla emici şekilde karşıla. Amaç: temel kapalı koruma (kalkan).", descEn: "Glue your gloves to your temples, bring your elbows together to close your torso; stay in this position and absorb imaginary punches with your arms. Goal: the basic closed guard (shield).", equip: [], rest: 40, met: 5, hedefKas: "Omuz, Kol" },
    { level: "beginner", name: "Tek slip (sağ)", nameEn: "Single slip (right)", sets: "3x2 dk", duration: "2 dk", desc: "Hayali bir düz yumruk gelirken sadece başını ve gövdeni hafifçe sağa kaydır ki yumruk omzunun yanından geçsin; dizini hafif bük, gözünü öne tut. Amaç: yumruktan baş hareketiyle kaçınmayı öğrenmek.", descEn: "As an imaginary straight punch comes, shift only your head and torso slightly to the right so it passes by your shoulder; bend slightly at the knee, eyes forward. Goal: learn to evade a punch with head movement.", equip: [], rest: 40, met: 5, hedefKas: "Core, Bacak" },
    { level: "beginner", name: "Geri yaslan (lean back)", nameEn: "Lean back", sets: "3x2 dk", duration: "2 dk", desc: "Ayakların yerinde kalsın, sadece belinden yukarısını hafifçe geriye yaslayarak yüzünü yumruğun menzilinden çıkar; sonra hemen dik pozisyona dön. Amaç: hızlı bir geri kaçınma. (Fazla yaslanıp dengeni kaybetme)", descEn: "Keep your feet planted, lean only your upper body back slightly to take your face out of punch range; then return upright immediately. Goal: a quick backward evasion. (Don't over-lean and lose balance)", equip: [], rest: 35, met: 4.5, hedefKas: "Core" },
    { level: "intermediate", name: "Catch + 1-2 kontra", nameEn: "Catch + 1-2 counter", sets: "3x3 dk", duration: "3 dk", desc: "Gelen jab'ı arka elinin eldiveniyle yakala (durdur), tam o anda kendi 1-2'ni (jab-cross) patlat. Amaç: savunmayı hücuma çeviren 'yakala ve vur' refleksini geliştirmek.", descEn: "Catch (stop) the incoming jab with your rear glove, and at that exact moment fire your own 1-2 (jab-cross). Goal: develop the 'catch and hit' reflex that turns defense into offense.", equip: [], rest: 45, met: 7, hedefKas: "Omuz, Core" },
    { level: "intermediate", name: "Roll + sol kroşe", nameEn: "Roll + left hook", sets: "3x3 dk", duration: "3 dk", desc: "Gelen kroşenin altından dizlerini bükerek U çizer gibi kay (roll), öbür taraftan çıkarken sol kroşenle karşılık ver. Amaç: yandan gelen yumruğu kavisle geçip kontra atmak.", descEn: "Roll under the incoming hook bending your knees in a U shape, and counter with a left hook as you come up the other side. Goal: slip a hook with a roll and counter.", equip: [], rest: 45, met: 7, hedefKas: "Core, Bacak" },
    { level: "intermediate", name: "Çift parry + çıkış", nameEn: "Double parry + exit", sets: "3x3 dk", duration: "3 dk", desc: "Gelen iki yumruğu sırayla eldivenlerinle hafifçe yana saptır (parry), sonra bir yan adımla açıya kayıp güvene çık. Amaç: peş peşe gelen vuruşları savıp pozisyon değiştirmek.", descEn: "Deflect two incoming punches in turn with light glove parries, then slide out to an angle with a side step. Goal: parry consecutive punches and reposition.", equip: [], rest: 45, met: 6.5, hedefKas: "Omuz, Bacak" },
    { level: "pro", name: "Shoulder roll kontra", nameEn: "Shoulder roll counter", sets: "3x3 dk", duration: "3 dk", desc: "Öndeki omzunu hafif kaldırıp çeneni omzuna yaslayarak gelen yumruğu omzundan kaydır; aynı anda arka elinle cross ile karşılık ver. Amaç: Mayweather'ın 'omuz savunması' tekniği. (İleri)", descEn: "Raise your lead shoulder slightly and tuck your chin behind it to slide the punch off your shoulder; counter at the same time with a rear cross. Goal: Mayweather's 'shoulder roll' defense. (Advanced)", equip: [], rest: 60, met: 8, hedefKas: "Omuz, Core" },
    { level: "pro", name: "Refleks slip zinciri", nameEn: "Reflex slip chain", sets: "4x40 sn", duration: "40 sn", desc: "Peş peşe gelen hayali yumrukları durmadan sağa-sola slip ederek ve roll yaparak geç; hiç durma, akışı koru. Amaç: savunma dayanıklılığı ve refleks geliştirmek.", descEn: "Evade a continuous stream of imaginary punches with nonstop slips left-right and rolls; never stop, keep the flow. Goal: build defensive endurance and reflexes.", equip: [], rest: 30, met: 8, hedefKas: "Core, Bacak" },
  ],

    { level: "pro", name: "Tabata protokolü (burpee, jump squat, yumruklu şınav)", nameEn: "Tabata protocol (burpee, jump squat, punch push-up)", sets: "9x", duration: "30 sn", desc: "30 saniye maksimum efor, 15 saniye dinlenme döngüsü. Bu 3 hareket sırayla yapılmalı yumruklu şınavdan sonra tekrar burpee geçilmeli.", descEn: "20s max effort, 10s rest cycle. These 3 moves are done in order — after the punch push-up, go back to the burpee.", equip: [], rest: 15, met: 12, hedefKas: "Tüm Vücut" },

    { level: "pro", name: "İp + gölge süper set", nameEn: "Rope + shadow superset", sets: "6x2 dk", duration: "2 dk", desc: "1 dakika ip, 1 dakika gölge şeklinde süper set. Yüksek tempo kardiyo.", descEn: "1 minute rope, 1 minute shadow as a superset. High-tempo cardio.", equip: ["rope"], rest: 15, met: 12, hedefKas: "Tüm Vücut, Kalp-Damar" },

    { level: "pro", name: "High Knees (Diz Çekme)", nameEn: "High knees", sets: "4x3 dk", duration: "3 dk", desc: ": Olduğunuz yerde koşar gibi dizlerinizi seri ve yüksek bir şekilde göğüs hizanıza kadar çekin. (Hız ve dayanıklılık)", descEn: "Running in place, drive your knees up to chest level rapidly and high. (Speed and endurance.)", equip: [], rest: 60, met: 9.5, hedefKas: "Tüm Vücut, Kalp-Damar" },
    { level: "pro", name: "Çift HIIT bloğu (zirve kapasite)", nameEn: "Double HIIT block", sets: "2 set", duration: "8 dk", desc: "İki ardışık tabata bloğu, minimum dinlenme. VO2 max zirvesi. 10 burpee arkasına 10 tekrar 1-2-3 kombinasyonu döngü halinde durmak yok.", descEn: "Two back-to-back tabata blocks, minimal rest. VO2 max peak. 10 burpees followed by 10 reps of a 1-2-3 combo in a loop — no stopping.", equip: [], rest: 60, met: 12, hedefKas: "Tüm Vücut" },
    { level: "beginner", name: "Yerinde koşu (ısınma tempo)", nameEn: "Jog in place (warm tempo)", sets: "MAKS", duration: "5 dk", desc: "Rahat tempoda yerinde koşu; nabzı yavaşça yükselt. Isınma ve hafif kondisyon.", descEn: "Easy in-place jog; gradually raise the heart rate. Warm-up and light conditioning.", equip: [], rest: 30, met: 7, hedefKas: "Bacak, Baldır" },

    { level: "pro", name: "Sprint + shadow süper set", nameEn: "Sprint + shadow super set", sets: "5x1 dk", duration: "1 dk", desc: "30 sn yerinde sprint + 30 sn maksimum gölge boksu; durmadan. Zirve kondisyon.", descEn: "30s in-place sprint + 30s max shadow boxing; nonstop. Peak conditioning.", equip: [], rest: 30, met: 11, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Burpee piramidi", nameEn: "Burpee pyramid", sets: "MAKS", duration: "6 dk", desc: "1-2-3... artan sonra azalan tekrarla burpee piramidi; durmadan. Anaerobik dayanıklılık.", descEn: "Burpee pyramid with rising then falling reps (1-2-3...); nonstop. Anaerobic endurance.", equip: [], rest: 40, met: 10.5, hedefKas: "Tüm Vücut" },
    { level: "beginner", name: "Yerinde yürüyüş (toparlanma)", nameEn: "In-place walk (recovery)", sets: "MAKS", duration: "4 dk", desc: "Yerinde rahat rahat yürü ve derin nefes al-ver; nabzını yavaşça düşür. Zorlanmadan, dinlenir gibi. Amaç: yoğun setlerden sonra aktif toparlanma.", descEn: "Walk easily in place and breathe deeply; slowly bring your heart rate down. No strain, like resting. Goal: active recovery after intense sets.", equip: [], rest: 30, met: 4, hedefKas: "Bacak" },
    { level: "beginner", name: "Diz çekme (yavaş tempo)", nameEn: "Knee raises (slow)", sets: "4x30 sn", duration: "30 sn", desc: "Yerinde dur; sırayla dizlerini karın hizasına kadar kontrollü şekilde çek, karnını sıkı tut. Hızdan çok forma odaklan. Amaç: hafif kondisyon ve karın çalışması.", descEn: "Stand in place; raise your knees to stomach height alternately and controlled, keep your core tight. Focus on form over speed. Goal: light conditioning and core work.", equip: [], rest: 25, met: 6.5, hedefKas: "Bacak, Core" },
    { level: "beginner", name: "Topuk-kalça (butt kicks)", nameEn: "Butt kicks", sets: "4x30 sn", duration: "30 sn", desc: "Yerinde koşar gibi yap ama topuklarını arkada kalçana değdir; kollarını da koşar gibi salla. Amaç: bacak ısınması ve tempo yükseltme.", descEn: "Jog in place but kick your heels back to touch your glutes; swing your arms as if running. Goal: leg warm-up and raising your tempo.", equip: [], rest: 25, met: 7, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Gölge + sprint piramidi", nameEn: "Shadow + sprint pyramid", sets: "5x1 dk", duration: "1 dk", desc: "Sırayla 30 sn gölge boksu yap, 30 sn yerinde sprint (hızlı koşu) yap; her turda biraz daha hızlan. Amaç: boks ve kondisyonu birleştiren yüksek tempo.", descEn: "Alternate 30s of shadow boxing and 30s of in-place sprint (fast run); speed up a bit each round. Goal: high tempo combining boxing and conditioning.", equip: [], rest: 30, met: 10, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Squat sıçrama interval", nameEn: "Jump squat interval", sets: "4x40 sn", duration: "40 sn", desc: "40 saniye boyunca aralıksız patlayıcı squat sıçraması yap (çök ve zıpla), sonra kısa dinlen. Yumuşak in. Amaç: bacak kondisyonu ve patlayıcılık.", descEn: "Do explosive jump squats nonstop for 40 seconds (squat and jump), then brief rest. Land soft. Goal: leg conditioning and explosiveness.", equip: [], rest: 25, met: 9.5, hedefKas: "Bacak, Kalça" },
    { level: "intermediate", name: "Plank-to-push interval", nameEn: "Plank-to-push interval", sets: "4x40 sn", duration: "40 sn", desc: "40 saniye boyunca dirsek plank ile şınav arasında gidip gel: dirsek üstü dur, sonra avuç üstüne kalk, tekrar dirseğe in. Amaç: karın (core) ve üst beden kondisyonu birlikte.", descEn: "For 40 seconds, move between an elbow plank and a push-up: hold on elbows, push up onto your palms, lower back to elbows. Goal: core and upper-body conditioning together.", equip: [], rest: 25, met: 8, hedefKas: "Core, Göğüs" },
    { level: "intermediate", name: "Gölge + jumping jack süper set", nameEn: "Shadow + jack super set", sets: "5x1 dk", duration: "1 dk", desc: "30 sn jumping jack (yıldız sıçrama) + 30 sn gölge boksu yap, hiç durmadan tekrarla. Amaç: kalbi sürekli yüksek tutan kesintisiz kondisyon.", descEn: "Do 30s jumping jacks + 30s shadow boxing, repeat nonstop. Goal: continuous conditioning that keeps the heart rate up.", equip: [], rest: 30, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Tabata burpee", nameEn: "Tabata burpees", sets: "8x20 sn", duration: "20 sn", desc: "8 tur boyunca: 20 saniye maksimum hızda burpee (eğil-şınav-zıpla), 10 saniye dinlen. Toplam 4 dakika. Amaç: klasik Tabata ile çok yüksek yoğunlukta yağ yakımı. (Zor)", descEn: "For 8 rounds: 20 seconds of max-speed burpees (drop-push-jump), 10 seconds rest. 4 minutes total. Goal: very high-intensity fat burn with classic Tabata. (Hard)", equip: [], rest: 10, met: 11, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Sprint piramidi (zirve)", nameEn: "Sprint pyramid (peak)", sets: "MAKS", duration: "6 dk", desc: "Yerinde sprintleri süreyi artırıp azaltarak yap (ör. 20-30-40-30-20 sn); nabzını zirvede tut, aralarda az dinlen. Amaç: maksimum kondisyon kapasitesi. (Zor)", descEn: "Do in-place sprints with rising then falling durations (e. g. 20-30-40-30-20s); keep your heart rate peaked, little rest between. Goal: maximum conditioning capacity. (Hard)", equip: [], rest: 30, met: 12, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Çift HIIT bloğu (combo)", nameEn: "Double HIIT block", sets: "MAKS", duration: "7 dk", desc: "Burpee, jump squat ve yumruklu şınav bloklarını arka arkaya, az dinlenerek yap. Tüm vücut zorlanır. Amaç: zirve dayanıklılık ve yağ yakımı. (Çok zor)", descEn: "Do blocks of burpees, jump squats and punch push-ups back to back, with little rest. Works the whole body. Goal: peak endurance and fat burn. (Very hard)", equip: [], rest: 30, met: 11.5, hedefKas: "Tüm Vücut" },
  ],
  combo: [
    { level: "beginner", name: "1-2 (jab-cross)", nameEn: "1-2 (jab-cross)", sets: "3x3 dk", duration: "3 dk", desc: "Jab açar, cross gücü taşır. Boksun en temel ikilisi.", descEn: "Jab opens, cross brings the power. Boxing's most basic pair.", equip: [], rest: 45, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "1-1-2 (çift jab-cross)", nameEn: "1-1-2 (double jab-cross)", sets: "3x3 dk", duration: "3 dk", desc: "İlk jab ölçer, ikinci jab girer, cross gücü indirir.", descEn: "The first jab measures, the second steps in, the cross brings it down.", equip: [], rest: 45, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "1-2-3 (jab-cross-kroşe)", nameEn: "1-2-3 (jab-cross-hook)", sets: "3x3 dk", duration: "3 dk", desc: "Klasik üçlü; akıcı geçişle jab-cross-kroşe.", descEn: "The classic trio; jab-cross-hook with smooth transitions.", equip: [], rest: 45, met: 7.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "beginner", name: "2-3 (cross-kroşe)", nameEn: "2-3 (cross-hook)", sets: "3x3 dk", duration: "3 dk", desc: "Güçlü elle aç, kroşe ile sar. Kısa mesafe ikilisi.", descEn: "Open with the power hand, wrap with the hook. A short-range pair.", equip: [], rest: 45, met: 7.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "beginner", name: "1-2 vücut (gövdeye)", nameEn: "1-2 to the body", sets: "3x3 dk", duration: "3 dk", desc: "Diz bük, gövdeye jab-cross at. Kat değiştirmenin temeli.", descEn: "Bend the knees, throw a jab-cross to the body. The basis of level change.", equip: [], rest: 45, met: 7.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "1-2-3-2 zincir", nameEn: "1-2-3-2 chain", sets: "3x3 dk", duration: "3 dk", desc: "Klasik 4'lü zincir; ritmi koruyarak akıcı vur.", descEn: "The classic 4-punch chain; hit fluidly while keeping rhythm.", equip: [], rest: 60, met: 8, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "1-2-3b-2 (vücut-baş)", nameEn: "1-2-3body-2 (body-head)", sets: "3x3 dk", duration: "3 dk", desc: "Gövdeye kroşe ile guard'ı indir, cross ile başa dön.", descEn: "Drop the guard with a hook to the body, return to the head with the cross.", equip: [], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "1-6-3 (jab-aparkat-kroşe)", nameEn: "1-6-3 (jab-uppercut-hook)", sets: "3x3 dk", duration: "3 dk", desc: "Üç farklı açıdan ardışık saldırı.", descEn: "Successive attack from three different angles.", equip: [], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "1-2-5-6 (iki aparkat)", nameEn: "1-2-5-6 (double uppercut)", sets: "3x3 dk", duration: "3 dk", desc: "Düz vuruşlardan alttan aparkatlara geçiş.", descEn: "Transition from straight punches to uppercuts from below.", equip: [], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "1-2-3-4-5-6 tam seri", nameEn: "1-2-3-4-5-6 full series", sets: "3x3 dk", duration: "3 dk", desc: "Tüm vuruş tiplerini içeren, maksimum hızda tam seri.", descEn: "A full series at max speed containing all punch types.", equip: [], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Savunma araları olan kombinasyon", nameEn: "Combo with defense gaps", sets: "3x3 dk", duration: "3 dk", desc: "Vur-slip-vur paterniyle saldırıyı savunmayla harmanla.", descEn: "Blend attack with defense in a hit-slip-hit pattern.", equip: [], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Doğaçlama kombinasyon", nameEn: "Freestyle combination", sets: "3x3 dk", duration: "3 dk", desc: "Anlık karar vererek doğaçla; gerçek dövüş zekasını geliştir.", descEn: "Improvise with instant decisions; develops real fight intelligence.", equip: [], rest: 45, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Yorgunlukta kombinasyon kalitesi", nameEn: "Combo quality under fatigue", sets: "3x3 dk", duration: "3 dk", desc: "Son round yorgunluğunda bile form bozulmadan vur.", descEn: "Hit without form breaking down even under last-round fatigue.", equip: [], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "2-3-2 (cross-kroşe-cross) güç", nameEn: "2-3-2 (cross-hook-cross) power", sets: "3x3 dk", duration: "3 dk", desc: "Momentumu kullanarak güçlü bir şekilde bitir.", descEn: "Finish strong using the momentum.", equip: [], rest: 60, met: 8.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "1-2-3b-3 (vücut-baş kroşe)", nameEn: "1-2-3body-3 (body-head hook)", sets: "3x3 dk", duration: "3 dk", desc: "Vücuda kroşe ile guard'ı indir, başa kroşe ile bitir.", descEn: "Drop the guard with a hook to the body, finish with a hook to the head.", equip: [], rest: 60, met: 8.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Çift kroşe (3-3) düzeltmesi", nameEn: "Double hook (3-3) fix", sets: "3x3 dk", duration: "3 dk", desc: "Aynı elle iki kroşe — biri vücuda, biri başa. Zamanlama çalışması.", descEn: "Two hooks with the same hand — one to the body, one to the head. Timing work.", equip: [], rest: 60, met: 8.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Counter combo (kaçır-vur)", nameEn: "Counter combo (slip-strike)", sets: "3x3 dk", duration: "3 dk", desc: "Slip sonrası 4'lü kontra serisi. Reaktif (tepkisel) saldırı.", descEn: "A 4-punch counter series after a slip. Reactive attack.", equip: [], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "8 vuruşluk maraton zinciri", nameEn: "8-punch marathon chain", sets: "3x3 dk", duration: "3 dk", desc: "Durmadan 8'li serileri tekrarla. Hacim ve dayanıklılık.", descEn: "Repeat 8-punch series nonstop. Volume and endurance.", equip: [], rest: 15, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Feint-kombinasyon-feint sarmalı", nameEn: "Feint-combo-feint spiral", sets: "3x3 dk", duration: "3 dk", desc: "Sahte hamleyle aç, kombinasyonu boşalt, feint ile çık. Aldatma ustalığı.", descEn: "Open with a feint, unload the combination, exit with a feint. Mastery of deception.", equip: [], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "1-2-3-2-1 (geri dönüş)", nameEn: "1-2-3-2-1 (return)", sets: "3x3 dk", duration: "3 dk", desc: "Jab-cross-kroşe sonra aynı yoldan geri dön: cross-jab. Akıcı gidiş-dönüş serisi.", descEn: "Jab-cross-hook then return the same way: cross-jab. Fluid out-and-back series.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "6-3-2 (aparkat-kroşe-cross)", nameEn: "6-3-2 (uppercut-hook-cross)", sets: "3x3 dk", duration: "3 dk", desc: "Sağ aparkat, sol kroşe, sağ cross. Yakın mesafeden orta mesafeye geçen kombinasyon.", descEn: "Right uppercut, left hook, right cross. A combo that moves from close to mid range.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "1-2 + slip + 2", nameEn: "1-2 + slip + 2", sets: "3x3 dk", duration: "3 dk", desc: "1-2 at, gelen kontrayı slip et, tekrar cross ile karşılık ver. Hücum-savunma-hücum.", descEn: "Throw 1-2, slip the counter, answer again with a cross. Offense-defense-offense.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Body-body-head (3b-3b-2)", nameEn: "Body-body-head (3b-3b-2)", sets: "3x3 dk", duration: "3 dk", desc: "Gövdeye iki sol kroşe, ardından başa cross. Eli aşağı indirtip üstten bitir.", descEn: "Two left hooks to the body, then a cross to the head. Drop their guard low, finish high.", equip: ["bag"], rest: 60, met: 8.5, hedefKas: "Tüm Vücut" },
    { level: "beginner", name: "1-1 (çift jab)", nameEn: "1-1 (double jab)", sets: "3x3 dk", duration: "3 dk", desc: "İki jab'ı arka arkaya at (1-1); ikincisini daha sert ve biraz daha ileri uzatarak. Amaç: rakiple mesafe açmak ve baskı kurmak için çift jab kullanmak.", descEn: "Throw two jabs back to back (1-1); make the second harder and reach a bit further. Goal: use the double jab to open distance and apply pressure.", equip: ["bag"], rest: 45, met: 6, hedefKas: "Omuz, Sırt" },
    { level: "beginner", name: "1-2-2 (jab-cross-cross)", nameEn: "1-2-2", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla: jab (1), cross (2), tekrar cross (2). İkinci cross'a ağırlığını tam ver — bitirici gibi. Amaç: jab'la açıp iki düz yumrukla güçlü bitiren temel seri.", descEn: "In order: jab (1), cross (2), cross again (2). Put your full weight into the second cross — like a finisher. Goal: a basic series that opens with a jab and finishes hard with two straights.", equip: ["bag"], rest: 45, met: 7, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "1-4-3 (jab-sol aparkat-kroşe)", nameEn: "1-4-3", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla: jab (1), sol aparkat (4, alttan yukarı), sağ kroşe (3, yandan). El seviyesini düz-alt-yan değiştirerek vur. Amaç: kat değiştiren akıcı bir orta mesafe serisi.", descEn: "In order: jab (1), left uppercut (4, from below), right hook (3, from the side). Vary your punch level straight-low-side. Goal: a fluid level-changing mid-range series.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "2-3-2 (cross-kroşe-cross)", nameEn: "2-3-2", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla: cross (2), sol kroşe (3), tekrar cross (2). Her yumruktan sonra merkeze dön ki dengen bozulmasın. Amaç: güçlü düz-yan-düz kombinasyonu.", descEn: "In order: cross (2), left hook (3), cross again (2). Return to center after each punch so you stay balanced. Goal: a powerful straight-side-straight combination.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "3-3-2 (kroşe-kroşe-cross)", nameEn: "3-3-2", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla: sol kroşe (3), sağ kroşe (3), cross (2). İki yandan gelen kroşeyle aç, cross'la bitir. Amaç: yakın mesafe güç serisi.", descEn: "In order: left hook (3), right hook (3), cross (2). Open with two hooks from the sides, finish with a cross. Goal: a close-range power series.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Slip + 2-3 kontra", nameEn: "Slip + 2-3 counter", sets: "3x3 dk", duration: "3 dk", desc: "Gelen jab'ı slip et (başını yana kaydır), hemen cross (2) - sol kroşe (3) ile karşılık ver. Amaç: savunmadan hücuma geçen bir kontra serisi.", descEn: "Slip the incoming jab (shift your head to the side), immediately counter with cross (2) - left hook (3). Goal: a counter series moving from defense to offense.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "1-2-3-4-3-2 (uzun zincir)", nameEn: "1-2-3-4-3-2 (long chain)", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla: jab-cross-sol kroşe-sağ aparkat, sonra geri dön: sol kroşe-cross. Altı yumruğu nefesini ve dengeni koruyarak akıcı at. Amaç: uzun kombinasyon dayanıklılığı.", descEn: "In order: jab-cross-left hook-right uppercut, then return: left hook-cross. Throw all six fluidly, keeping breath and balance. Goal: long-combination endurance.", equip: ["bag"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Feint-1-2-roll-3", nameEn: "Feint-1-2-roll-3", sets: "3x3 dk", duration: "3 dk", desc: "Önce sahte hamle yap (feint), ardından 1-2 (jab-cross) at, gelen kontrayı roll ederek (kavisle) geç, sonra sol kroşe (3) ile bitir. Amaç: aldatma-hücum-savunma-hücum akışı. (İleri)", descEn: "First feint, then throw 1-2 (jab-cross), roll under the counter, and finish with a left hook (3). Goal: a deceive-attack-defend-attack flow. (Advanced)", equip: ["bag"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "10 vuruş maraton", nameEn: "10-punch marathon", sets: "3x3 dk", duration: "3 dk", desc: "On yumrukluk uzun bir kombinasyonu hızlı ve hatasız tamamla (ör. 1-2-3-2-1-2-5-6-3-2); nefesini bölme. Amaç: yüksek hacim ve dayanıklılık sınırını zorlamak.", descEn: "Complete a long ten-punch combination fast and flawless (e. g. 1-2-3-2-1-2-5-6-3-2); don't break your breathing. Goal: push the high-volume endurance limit.", equip: ["bag"], rest: 60, met: 9.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Kontra patlama (counter blast)", nameEn: "Counter blast", sets: "3x3 dk", duration: "3 dk", desc: "Önce rakibin (hayali) kombinasyonunu savun (slip/roll/blok), hemen ardından 4 yumrukluk bir kontra serisi patlat. Amaç: savunduktan sonra avlanan kontra atağını çalışmak.", descEn: "First defend the opponent's (imaginary) combination (slip/roll/block), then immediately explode a 4-punch counter series. Goal: practice the hunting counter-attack right after defending.", equip: ["bag"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Temel tazeleme: 1-2-3", nameEn: "Fundamentals: 1-2-3", sets: "3x3 dk", duration: "3 dk", desc: "Yavaş ve net 1-2-3 (jab-cross-sol kroşe); her yumruktan sonra merkeze dön. Hızdan çok temizlik. Amaç: temel üçlü kombinasyonu kusursuzlaştırmak.", descEn: "Slow, clean 1-2-3 (jab-cross-left hook); return to center after each. Cleanliness over speed. Goal: perfect the basic three-punch combo.", equip: ["bag"], rest: 60, met: 7, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Temel tazeleme: 1-1-2", nameEn: "Fundamentals: 1-1-2", sets: "3x3 dk", duration: "3 dk", desc: "Yavaş ve net: jab (1), tekrar jab (1), cross (2). İki jab'la mesafe aç, cross'la bitir. Her yumruktan sonra eli guard'a getir. Amaç: temel kombinasyonu taze tutmak.", descEn: "Slow and clean: jab (1), jab again (1), cross (2). Open with two jabs, finish with the cross. Return to guard after each. Goal: keep the basic combo fresh.", equip: ["bag"], rest: 60, met: 7, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Temel tazeleme: 1-2 slip 2", nameEn: "Fundamentals: 1-2 slip 2", sets: "3x3 dk", duration: "3 dk", desc: "Yavaş ve net: 1-2 (jab-cross) at, ardından hayali kontrayı slip et (başı yana kaydır), tekrar cross (2) ile karşılık ver. Amaç: temel hücum-savunma-hücum akışını taze tutmak.", descEn: "Slow and clean: throw 1-2 (jab-cross), slip the imaginary counter (shift head to the side), then answer with a cross (2). Goal: keep the basic attack-defend-attack flow fresh.", equip: ["bag"], rest: 60, met: 7, hedefKas: "Tüm Vücut" },
  ],
  sparring: [
    { level: "beginner", name: "Yavaş tempo sparring sim", nameEn: "Slow-tempo sparring sim", sets: "3x3 dk", duration: "3 dk", desc: "Kontrollü hızda, mesafe tutmaya odaklanarak çalış.", descEn: "Work at controlled speed, focusing on holding range.", equip: [], rest: 60, met: 7, hedefKas: "Tüm Vücut" },
    { level: "beginner", name: "Savunma odaklı round", nameEn: "Defense-focused round", sets: "3x3 dk", duration: "3 dk", desc: "Atak yerine kaçınma ve bloklara odaklan.", descEn: "Focus on evasion and blocks instead of attacking.", equip: [], rest: 60, met: 8.5, hedefKas: "Tüm Vücut" },

// Ekipman boşsa (hiç seçilmemişse) sadece vücut ağırlığı (equip:[]) hareketler.
function poolForCategory(catId, equipment, level) {
  const list = MASTER_POOL[catId] || [];
  return list.filter(ex => {
    if (level && level !== "mix" && ex.level !== level) return false; // "mix" → tüm seviyeler
    if (!ex.equip || ex.equip.length === 0) return true; // bodyweight her zaman
    return ex.equip.some(e => equipment.includes(e));
  });
}


// ─── Süre / Oynatma Listesi Yardımcıları ──────────────────────────────────────
function parseDuration(str) {
  if (!str) return null;
  let m = str.match(/\d+x(\d+)\s*dk/); if (m) return parseInt(m[1]) * 60;
  m = str.match(/(\d+)\s*dk/);         if (m) return parseInt(m[1]) * 60;
  m = str.match(/(\d+)\s*sn/);         if (m) return parseInt(m[1]);
  return null;
}
// Bir hareketin açıklamasından dinlenme süresini çıkarmaya çalış.
// "20 sn maksimum, 10 sn dinlenme" → 10 · "30 s max, 30 s rest" → 30 · "minimum dinlenme" → 10 · "dinlenmesiz" → 0
function restFromDescription(ex) {
  const d = `${ex.desc || ""} ${ex.descEn || ""}`.toLowerCase();
  if (!d.trim()) return null;
  // dinlenmesiz / no rest → 0
  if (/dinlenmesiz|no.?rest|no rest|nonstop|durmadan/.test(d)) return 0;
  // "X sn dinlenme" / "X s rest" / "X sn rest" gibi açık ifade
  let m = d.match(/(\d+)\s*(?:sn|s|saniye|sec|second[s]?)\s*(?:dinlen|rest)/);
  if (m) return parseInt(m[1]);
  // "rest X s" / "dinlenme X sn" ters sıra
  m = d.match(/(?:dinlen\w*|rest)\s*(\d+)\s*(?:sn|s|saniye|sec)/);
  if (m) return parseInt(m[1]);
  // "minimum dinlenme" / "minimal rest" → çok kısa
  if (/minim\w*\s*(?:dinlen|rest)|(?:dinlen|rest)\s*minim/.test(d)) return 10;
  return null;
}
function parseExerciseTiming(ex) {
  const d = ex.duration || "";
  let m = d.match(/(\d+)x(\d+)\s*dk/); if (m) return { sets: parseInt(m[1]), perSet: parseInt(m[2]) * 60 };
  m = d.match(/(\d+)x(\d+)\s*sn/);     if (m) return { sets: parseInt(m[1]), perSet: parseInt(m[2]) };
  m = d.match(/^(\d+)\s*dk/);          if (m) return { sets: 1, perSet: parseInt(m[1]) * 60 };
  m = d.match(/^(\d+)\s*sn/);          if (m) return { sets: 1, perSet: parseInt(m[1]) };
  return { sets: 0, perSet: null };
}
function computeRestSeconds(ex, perSet, phaseName, customRest) {
  const name = (ex.name || "").toLowerCase();
  // Isınma/soğuma İÇİNDEKİ hareketler arası dinlenme gerekmez (akıcı olmalı)
  const isWC = phaseName === "Isınma" || phaseName === "Soğuma";
  if (isWC) return 0;
  // 1. ÖNCELİK: harekete açıkça yazılmış rest (saniye) — en gerçekçi
  if (typeof ex.rest === "number") return ex.rest;
  // 2. ÖNCELİK: açıklamadan çıkarılan dinlenme (Tabata 10sn, burpee 30sn, dinlenmesiz 0...)
  const fromDesc = restFromDescription(ex);
  if (fromDesc !== null) return fromDesc;
  // 3. Kullanıcı sabit dinlenme seçtiyse onu kullan (30-90 arası serbest)
  if (customRest) return Math.max(10, Math.min(customRest, 90));
  // 4. Hareketin zorluğuna göre hesap: kolay 30sn, zor 60sn
  // Ayak işi / merdiven hareketleri: kısa dinlenme (40sn) — teknik+hız işi, uzun dinlenme gerekmez
  const ph = (phaseName || "").toLowerCase();
  const isFootwork = ph.includes("ayak") || ph.includes("footwork") || /merdiven|ladder|adım|pivot|shuffle|step/.test(name);
  if (isFootwork) return 40;
  let rest = 30;
  if (perSet >= 180) rest = 60;
  else if (perSet >= 120) rest = 45;
  else if (perSet >= 60) rest = 40;
  else rest = 30;
  const hard = ["sparring", "patlayıcı", "maksimum", "sprint", "ağır", "burpee", "hiit", "anaerobik", "yoğunluk", "tam tempo", "final", "yorgunluk", "güç"];
  if (hard.some(k => name.includes(k))) rest += 15;
  const easy = ["hafif", "yavaş", "teknik", "duruş", "ritim", "esneme"];
  if (easy.some(k => name.includes(k))) rest -= 5;
  return Math.max(20, Math.min(75, rest));
}
// İki faz arası geçiş dinlenmesi (örn. ısınma → ana antrenman). Kısa tutulur.
function transitionRest() { return 30; }
function makeRest(seconds, nextName, t) {
  return { name: t.rest, desc: nextName ? `${t.next}: ${nextName}` : t.catchBreath, phaseName: t.phaseRest, color: "#3b82f6", seconds, setLabel: null, timed: true, kind: "rest" };
}
function buildPlaylist(program, customRest, t) {
  const steps = [];
  const phases = program.phases || [];
  phases.forEach((phase, phaseIdx) => {
    const color = phase.color || RED;
    const isWC = phase.name === "Isınma" || phase.name === "Soğuma";
    const isCooldown = phase.name === "Soğuma";
    const exercises = phase.exercises || [];
    exercises.forEach((ex, exIdx) => {
      const { sets, perSet } = parseExerciseTiming(ex);
      const restSec = computeRestSeconds(ex, perSet || 0, phase.name, customRest);
      if (perSet && sets >= 1) {
        for (let s = 0; s < sets; s++) {
          steps.push({ name: ex.name, nameEn: ex.nameEn, video: ex.video, desc: ex.desc, hedefKas: ex.hedefKas, phaseName: phase.name, color, seconds: perSet, setLabel: sets > 1 ? `Set ${s + 1}/${sets}` : null, timed: true, kind: "exercise" });
          // Setler arası dinlenme (ısınma/soğuma hariç, son set hariç)
          if (!isWC && s < sets - 1 && restSec > 0) steps.push(makeRest(restSec, ex.name, t));
        }
      } else {
        steps.push({ name: ex.name, nameEn: ex.nameEn, video: ex.video, desc: ex.desc, hedefKas: ex.hedefKas, phaseName: phase.name, color, seconds: null, setLabel: ex.sets || null, timed: false, kind: "exercise" });
      }
      // Ana antrenmanda HER hareketten sonra dinlenme (fazın son hareketi dahil — faz geçişi için)
      const isLastInPhase = exIdx === exercises.length - 1;
      if (!isWC && !isLastInPhase && restSec > 0) steps.push(makeRest(restSec, exercises[exIdx + 1]?.name, t));
    });
    // Faz bittikten sonra geçiş dinlenmesi: ısınma sonrası ve ana fazlar arası
    // (soğuma sonrası yok = antrenman biter; soğuma öncesi de kısa nefes olsun)
    const isLastPhase = phaseIdx === phases.length - 1;
    if (!isLastPhase && !isCooldown) {
      const nextPhase = phases[phaseIdx + 1];
      const nextName = nextPhase?.exercises?.[0]?.name || nextPhase?.name;
      steps.push(makeRest(transitionRest(), nextName, t));
    }
  });
  return steps;
}

function catLabel(c, lang) { return lang === "en" ? c.en : c.tr; }
// "5x3 dk" → "5 round × 3 dk", "15-12-10-8" → olduğu gibi (azalan tekrar), boşsa ""
function humanizeSets(s, lang) {
  if (!s) return "";
  if (isDescendingReps(s)) return s + (lang === "en" ? " reps" : " tekrar");
  const m = s.match(/^(\d+)\s*x\s*(\d+)\s*(dk|sn|min)/i);
  if (m) {
    const unit = m[3].toLowerCase().startsWith("s") && m[3].toLowerCase() !== "sn" ? "min" : m[3];
    const roundW = lang === "en" ? "rounds" : "round";
    return `${m[1]} ${roundW} × ${m[2]} ${unit === "min" ? "dk" : unit}`;
  }
  return s;
}

// Kullanıcı kendi videolarını uygulama içinden ekleyebilir (localStorage). Anahtar = hareket adı.
const MOVE_VIDEOS_KEY = "boxerpro_move_videos_v1";
function loadMoveVideos() {
  if (typeof window === "undefined") return {};
  try { return JSON.parse(window.localStorage.getItem(MOVE_VIDEOS_KEY) || "{}"); } catch { return {}; }
}
function saveMoveVideo(name, url) {
  const all = loadMoveVideos();
  if (url) all[name] = url; else delete all[name];
  try { window.localStorage.setItem(MOVE_VIDEOS_KEY, JSON.stringify(all)); } catch {}
}
// Bir hareket için kayıtlı video: önce kullanıcının eklediği, sonra koddaki video alanı.
function getMoveVideo(ex) {
  if (!ex) return null;
  const custom = loadMoveVideos();
  return custom[ex.name] || custom[ex.nameEn] || ex.video || null;
}
// Video URL'sini gömülebilir biçime çevir. { type: "youtube"|"file"|"link", src }
function parseVideoUrl(url) {
  if (!url) return null;
  const u = url.trim();
  // YouTube
  let m = u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{6,})/);
  if (m) return { type: "youtube", src: `https://www.youtube.com/embed/${m[1]}?rel=0&playsinline=1` };
  // Doğrudan video dosyası
  if (/\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(u)) return { type: "file", src: u };
  return { type: "link", src: u };
}

// Hareket videosu linki: kayıtlı video varsa onu, yoksa YouTube'da hareket adıyla arama açar.
function moveVideoUrl(ex, lang) {
  const v = getMoveVideo(ex);
  if (v) return v;
  const name = (lang === "en" ? (ex.nameEn || ex.name) : ex.name) || "";
  const q = encodeURIComponent((lang === "en" ? name + " boxing technique" : name + " boks tekniği"));
  return `https://www.youtube.com/results?search_query=${q}`;
}

            {allowEdit && <span onClick={(e) => { e.stopPropagation(); addOrEdit(); }} style={{ color: "#888", fontSize: 11, fontWeight: 700, padding: "4px 6px" }}>✏️</span>}
          </button>
        ) : (
          <div onClick={(e) => e.stopPropagation()}>
            <div style={{ position: "relative", width: "100%", paddingTop: "56.25%", borderRadius: 12, overflow: "hidden", background: "#000" }}>
              {parsed.type === "youtube" ? (
                <iframe src={parsed.src} title="video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none" }} />
              ) : (
                <video src={parsed.src} controls playsInline style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "contain", background: "#000" }} />
              )}
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={(e) => { e.stopPropagation(); setOpen(false); }} style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, color: "#999", borderRadius: 10, padding: "9px", fontSize: 12.5, fontWeight: 800, cursor: "pointer" }}>{lang === "en" ? "Close" : "Kapat"}</button>
              {allowEdit && <button onClick={(e) => { e.stopPropagation(); addOrEdit(); }} style={{ background: CARD, border: `1px solid ${LINE}`, color: "#999", borderRadius: 10, padding: "9px 14px", fontSize: 12.5, fontWeight: 800, cursor: "pointer" }}>✏️ {lang === "en" ? "Change" : "Değiştir"}</button>}
              {allowEdit && <button onClick={(e) => { e.stopPropagation(); remove(); }} style={{ background: "transparent", border: `1px solid ${LINE}`, color: "#777", borderRadius: 10, padding: "9px 12px", fontSize: 12.5, cursor: "pointer" }}>🗑</button>}
            </div>
          </div>
        )}
      </div>
    );
  }

  // Video yok (veya sadece harici link): ekle butonu + YouTube arama
  return (
    <div style={{ marginTop: 10, display: "flex", gap: 8, flexWrap: "wrap" }}>
      {allowEdit && (
        <button onClick={(e) => { e.stopPropagation(); addOrEdit(); }} style={{ display: "inline-flex", alignItems: "center", gap: 7, background: `${c}14`, border: `1px dashed ${c}77`, color: c, borderRadius: 10, padding: "9px 14px", fontSize: 12.5, fontWeight: 800, cursor: "pointer" }}>➕ {lang === "en" ? "Add your video" : "Kendi videonu ekle"}</button>
      )}
      <a href={moveVideoUrl(ex, lang)} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "#999", fontSize: 12.5, fontWeight: 700, textDecoration: "none", border: `1px solid ${LINE}`, borderRadius: 10, padding: "9px 14px" }}>🔍 {lang === "en" ? "Search on YouTube" : "YouTube'da ara"}</a>
    </div>
  );
}

// ─── Egzersiz Satırı (tik sistemi) ────────────────────────────────────────────
function ExerciseRow({ ex, color, index, done, onToggleDone, lang, editMode, onRemove, isWC, rounds, onRounds, restVal, onRest, minVal, onMinutes }) {
  const t = T[lang || "tr"];
  const dur = parseDuration(ex.duration || "");
  const [left, setLeft] = useState(dur);
  const [running, setRunning] = useState(false);
  const [timerDone, setTimerDone] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (running && left > 0) {
      ref.current = setInterval(() => setLeft(p => { if (p <= 1) { clearInterval(ref.current); setRunning(false); setTimerDone(true); return 0; } return p - 1; }), 1000);
    } else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [running]);
  const reset = () => { clearInterval(ref.current); setRunning(false); setTimerDone(false); setLeft(dur); };
  const toggle = () => { if (timerDone) { reset(); return; } setRunning(r => !r); };
  const pct = dur ? (left / dur) * 100 : 100;
  const mm = dur ? String(Math.floor(left / 60)).padStart(2, "0") : null;
  const ss = dur ? String(left % 60).padStart(2, "0") : null;
  return (
    <div style={{ background: done ? `${color}10` : CARD, borderRadius: 14, padding: "13px 14px", border: `1px solid ${done ? color + "55" : LINE}`, transition: "all 0.3s", opacity: done ? 0.6 : 1 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <button onClick={onToggleDone}
          style={{ width: 26, height: 26, borderRadius: 8, background: done ? color : "transparent", border: `2px solid ${done ? color : "#444"}`, color: "#000", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900, flexShrink: 0, cursor: "pointer", transition: "all 0.2s" }}>
          {done ? "✓" : ""}
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ color: done ? "#666" : "#f0f0f0", fontSize: 13, fontWeight: 700, textDecoration: done ? "line-through" : "none" }}>{ex.name}</div>
          <div style={{ color: "#666", fontSize: 11, marginTop: 1 }}>
            {humanizeSets(ex.sets || ex.duration, lang)}
          </div>
        </div>
        {dur && !done && !editMode && (
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ color: running ? color : timerDone ? "#444" : "#777", fontSize: 13, fontWeight: 800, fontVariantNumeric: "tabular-nums", minWidth: 40, textAlign: "right" }}>{mm}:{ss}</span>
            <button onClick={toggle} style={{ background: running ? "#2a2a2a" : timerDone ? "#1e1e1e" : color, border: "none", borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 12, color: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>{running ? "⏸" : timerDone ? "↺" : "▶"}</button>
          </div>
        )}
        {editMode && onRemove && (
          <button onClick={onRemove}
            style={{ background: `${RED}1a`, border: `1px solid ${RED}66`, color: RED, borderRadius: 8, padding: "7px 12px", fontSize: 12, fontWeight: 800, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
            ✕ {(T[lang || "tr"]).removeMove}
          </button>
        )}
      </div>
      {dur && !done && !timerDone && (
        <div style={{ marginTop: 8, height: 2, background: "#222", borderRadius: 1, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: color, transition: running ? "width 1s linear" : "none" }} />
        </div>
      )}
      {ex.desc && <div style={{ marginTop: 7, color: "#555", fontSize: 11, lineHeight: 1.5 }}>{ex.desc}</div>}
      {ex.hedefKas && !isWC && (
        <div style={{ display: "inline-flex", alignItems: "center", gap: 5, marginTop: 8, background: `${color}14`, border: `1px solid ${color}33`, borderRadius: 7, padding: "3px 9px" }}>
          <span style={{ fontSize: 11 }}>💪</span>
          <span style={{ color: color, fontSize: 10.5, fontWeight: 700, letterSpacing: 0.3 }}>{ex.hedefKas}</span>
        </div>
      )}
      {editMode && isWC && onMinutes && (
        <div style={{ display: "flex", gap: 8, marginTop: 9, alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#ffffff08", borderRadius: 8, padding: "4px 6px 4px 10px" }}>
            <span style={{ color: "#777", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{(lang === "en" ? "MIN" : "DK")}</span>
            <button onClick={() => onMinutes(Math.max(1, (minVal || 1) - 1))} style={{ width: 22, height: 22, borderRadius: 6, border: `1px solid ${color}55`, background: "transparent", color, fontSize: 14, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
            <span style={{ color: "#fff", fontSize: 12.5, fontWeight: 800, minWidth: 30, textAlign: "center" }}>{minVal || 1} dk</span>

        <div style={{ display: "flex", gap: 8, marginTop: 9, flexWrap: "wrap", alignItems: "center" }}>

          ) : null}
          {onMinutes && !isDescendingReps(ex.sets) && (parseInt((ex.duration || "").match(/(\d+)\s*dk/)?.[1]) > 0) && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#ffffff08", borderRadius: 8, padding: "4px 6px 4px 10px" }}>
              <span style={{ color: "#777", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{lang === "en" ? "MIN/ROUND" : "DK/ROUND"}</span>
              <button onClick={() => onMinutes(Math.max(1, (minVal || 1) - 1))} style={{ width: 22, height: 22, borderRadius: 6, border: `1px solid ${color}55`, background: "transparent", color, fontSize: 14, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
              <span style={{ color: "#fff", fontSize: 12.5, fontWeight: 800, minWidth: 30, textAlign: "center" }}>{minVal || 1} dk</span>
              <button onClick={() => onMinutes(Math.min(10, (minVal || 1) + 1))} style={{ width: 22, height: 22, borderRadius: 6, border: `1px solid ${color}55`, background: "transparent", color, fontSize: 14, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>

            <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#ffffff08", borderRadius: 8, padding: "4px 6px 4px 10px" }}>

  );
}
