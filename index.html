            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {byMonth[m].slice().reverse().map(e => {
                const d = new Date(e.date);
                const isAuto = e.kind === "auto";
                return (
                  <div key={e.id} onClick={() => { setSelected(e); setEditNote(e.note || ""); }} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px 14px", cursor: "pointer" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: e.note ? 6 : 0 }}>
                      <div style={{ width: 36, textAlign: "center", flexShrink: 0 }}>
                        <div style={{ color: "#fff", fontSize: 16, fontWeight: 900, lineHeight: 1 }}>{d.getDate()}</div>
                        <div style={{ color: "#666", fontSize: 8, letterSpacing: 1 }}>{MONTH_NAMES[lang][d.getMonth()].slice(0, 3)}</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ color: "#eee", fontSize: 13, fontWeight: 700 }}>{e.title || (lang === "en" ? "Training note" : "Antrenman notu")}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, flexWrap: "wrap" }}>
                          <span style={{ background: isAuto ? `${RED}22` : "#3b82f622", color: isAuto ? RED : "#3b82f6", fontSize: 9, fontWeight: 800, padding: "1px 6px", borderRadius: 4 }}>{isAuto ? t.autoTag : t.manualTag}</span>
                          {e.points > 0 && <span style={{ color: GOLD, fontSize: 11, fontWeight: 800 }}>+{e.points} {t.pts}</span>}
                          {e.calories > 0 && <span style={{ color: RED, fontSize: 11, fontWeight: 800 }}>{e.calories}🔥</span>}
                          {e.distanceKm > 0 && <span style={{ color: "#3b82f6", fontSize: 11, fontWeight: 800 }}>{e.distanceKm} km</span>}
                        </div>
                      </div>
                      <button onClick={(ev) => { ev.stopPropagation(); handleDelete(e.id); }} aria-label={lang === "en" ? "Delete" : "Sil"} style={{ background: "none", border: "none", color: "#555", fontSize: 16, cursor: "pointer", flexShrink: 0 }}>×</button>
                    </div>
                    {e.note && <div style={{ color: "#999", fontSize: 12, lineHeight: 1.5, paddingLeft: 44, whiteSpace: "pre-wrap" }}>{e.note}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── Koşu Modu ────────────────────────────────────────────────────────────────
function RunningMode({ lang, onSaved }) {
  const t = T[lang];
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0); // saniye
  const [finished, setFinished] = useState(false);
  const [km, setKm] = useState("");
  const [saved, setSaved] = useState(false);
  const [gpsKm, setGpsKm] = useState(0); // GPS ile ölçülen mesafe
  const [gpsStatus, setGpsStatus] = useState("idle"); // idle | tracking | denied | unavailable
  const startRef = useRef(null);
  const accRef = useRef(0); // duraklatmada biriken süre
  const intRef = useRef(null);
  const watchRef = useRef(null);
  const lastPosRef = useRef(null);
  const gpsKmRef = useRef(0);

  // İki GPS noktası arası mesafe (Haversine, km)
  const haversine = (a, b) => {
    const R = 6371; // km
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
    const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  };

  const startGps = () => {
    if (typeof navigator === "undefined" || !navigator.geolocation) { setGpsStatus("unavailable"); return; }
    try {
      watchRef.current = navigator.geolocation.watchPosition(
        (pos) => {
          setGpsStatus("tracking");
          const cur = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy };
          if (lastPosRef.current && cur.acc < 30) { // sadece doğru okumalar
            const d = haversine(lastPosRef.current, cur);
            if (d > 0.002 && d < 0.5) { // 2m-500m arası sıçramaları al (zıplama/hata ele)
              gpsKmRef.current += d;
              setGpsKm(gpsKmRef.current);
              setKm(gpsKmRef.current.toFixed(2));
            }
          }
          lastPosRef.current = cur;
        },
        (err) => { setGpsStatus(err.code === 1 ? "denied" : "unavailable"); },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
      );
    } catch { setGpsStatus("unavailable"); }
  };
  const stopGps = () => { if (watchRef.current != null && navigator.geolocation) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; } };

  useEffect(() => {
    if (running) {
      startRef.current = Date.now();
      intRef.current = setInterval(() => {
        setElapsed(accRef.current + Math.floor((Date.now() - startRef.current) / 1000));
      }, 500);
      startGps();
    } else {
      clearInterval(intRef.current);
      if (startRef.current) accRef.current += Math.floor((Date.now() - startRef.current) / 1000);
      startRef.current = null;
      stopGps();
      lastPosRef.current = null; // duraklatınca son konumu sıfırla (boşluk eklenmesin)
    }
    return () => { clearInterval(intRef.current); stopGps(); };
  }, [running]);

  useWakeLock(running);

  const reset = () => { setRunning(false); setElapsed(0); setFinished(false); setKm(""); setSaved(false); setGpsKm(0); setGpsStatus("idle"); accRef.current = 0; startRef.current = null; gpsKmRef.current = 0; lastPosRef.current = null; };
  const finish = () => { setRunning(false); setFinished(true); };

  const minutes = elapsed / 60;
  const kmNum = parseFloat(km) || 0;
  const cals = kmNum > 0 ? runningCalories(kmNum, minutes, userWeight()) : 0;
  const paceMin = kmNum > 0 ? minutes / kmNum : 0;
  const paceStr = paceMin > 0 ? `${Math.floor(paceMin)}:${String(Math.round((paceMin % 1) * 60)).padStart(2, "0")}` : "—";

  const handleSave = () => {
    if (kmNum <= 0) return;
    addJournalEntry({
      kind: "auto",
      title: `${lang === "en" ? "Run" : "Koşu"} · ${kmNum} km`,
      points: PTS_PER_WORKOUT,
      cats: [lang === "en" ? "Running" : "Koşu"],
      calories: cals,
      distanceKm: kmNum,
      durationMin: Math.round(minutes),
      note: `${kmNum} km · ${Math.floor(minutes)} dk · ${paceStr} ${t.runMinPerKm} · ${cals} kcal`,
    });
    setSaved(true);
    if (onSaved) onSaved({ calories: cals });
  };

  const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
  const ss = String(elapsed % 60).padStart(2, "0");

  if (saved) {
    return (
      <div style={{ textAlign: "center", padding: "30px 10px" }}>
        <div style={{ fontSize: 60, marginBottom: 14 }}>🏃</div>
        <div style={{ color: GOLD, fontSize: 18, fontWeight: 900, marginBottom: 20 }}>{t.runSaved}</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: "#3b82f6", fontSize: 22, fontWeight: 900 }}>{kmNum}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>KM</div>
          </div>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: RED, fontSize: 22, fontWeight: 900 }}>{cals}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>🔥 KCAL</div>
          </div>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: GOLD, fontSize: 22, fontWeight: 900 }}>{paceStr}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>{t.runMinPerKm.toUpperCase()}</div>
          </div>
        </div>
        <button onClick={reset} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>
          {lang === "en" ? "New Run" : "Yeni Koşu"}
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, #10b98115, ${CARD})`, border: `1px solid #10b98144`, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>🏃</div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 6 }}>{t.runTitle}</div>
        <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{t.runDesc}</div>
      </div>

      {/* Kronometre */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 20, padding: "28px 20px", textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 64, fontWeight: 900, color: running ? "#10b981" : "#fff", letterSpacing: 2, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{mm}:{ss}</div>
        <div style={{ color: "#666", fontSize: 11, letterSpacing: 3, marginTop: 8, fontWeight: 700 }}>{running ? (lang === "en" ? "RUNNING..." : "KOŞUYORSUN...") : (lang === "en" ? "TIMER" : "KRONOMETRE")}</div>
        {/* Canlı GPS mesafe */}
        {(gpsStatus === "tracking" || gpsKm > 0) && (
          <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${LINE}` }}>
            <div style={{ color: "#10b981", fontSize: 34, fontWeight: 900, fontVariantNumeric: "tabular-nums" }}>{gpsKm.toFixed(2)} <span style={{ fontSize: 16 }}>km</span></div>
            <div style={{ color: "#10b981", fontSize: 10, letterSpacing: 1, fontWeight: 700, marginTop: 4 }}>{t.gpsTracking}</div>
          </div>
        )}
        {running && gpsStatus === "denied" && <div style={{ color: GOLD, fontSize: 11, marginTop: 12, lineHeight: 1.4 }}>{t.gpsDenied}</div>}
        {running && gpsStatus === "unavailable" && <div style={{ color: "#888", fontSize: 11, marginTop: 12, lineHeight: 1.4 }}>{t.gpsUnavailable}</div>}
        {running && gpsStatus === "tracking" && <div style={{ color: "#555", fontSize: 10, marginTop: 8 }}>{t.gpsHint}</div>}
      </div>

      {/* Kontroller */}
      {!finished ? (
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          {!running ? (
            <button onClick={() => setRunning(true)} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: "#10b981", color: "#fff", fontSize: 16, fontWeight: 900, cursor: "pointer" }}>
              {elapsed > 0 ? t.runResume : t.runStart}
            </button>
          ) : (
            <button onClick={() => setRunning(false)} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: GOLD, color: "#000", fontSize: 16, fontWeight: 900, cursor: "pointer" }}>
              {t.runPause}
            </button>
          )}
          {elapsed > 0 && !running && (
            <button onClick={finish} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: RED, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>
              {t.runFinish}
            </button>
          )}
        </div>
      ) : (
        /* Mesafe girişi */
        <div style={{ background: CARD, border: `1px solid ${RED}44`, borderRadius: 16, padding: 18, marginBottom: 14 }}>
          <div style={{ color: "#fff", fontSize: 14, fontWeight: 800, marginBottom: 12 }}>{t.runDistance}{gpsKm > 0 && <span style={{ color: "#10b981", fontSize: 11, fontWeight: 700 }}> · 📍 GPS: {gpsKm.toFixed(2)} km</span>}</div>
          <input type="number" inputMode="decimal" value={km} onChange={e => setKm(e.target.value)} placeholder="5.0" autoFocus
            style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 12, padding: "16px", color: "#fff", fontSize: 24, fontWeight: 900, textAlign: "center", marginBottom: 14 }} />
          {kmNum > 0 && (
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: RED, fontSize: 20, fontWeight: 900 }}>{cals}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>🔥 KCAL</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: GOLD, fontSize: 20, fontWeight: 900 }}>{paceStr}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>{t.runMinPerKm.toUpperCase()}</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: "#10b981", fontSize: 20, fontWeight: 900 }}>{Math.floor(minutes)}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>DK</div>
              </div>
            </div>
          )}
          <button onClick={handleSave} disabled={kmNum <= 0} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: kmNum > 0 ? `linear-gradient(135deg, ${RED}, #ff6b6b)` : "#222", color: kmNum > 0 ? "#fff" : "#555", fontSize: 15, fontWeight: 900, cursor: kmNum > 0 ? "pointer" : "default" }}>
            {t.runFinish}
          </button>
        </div>
      )}

      <button onClick={reset} style={{ width: "100%", padding: "11px", borderRadius: 12, border: `1px solid ${LINE}`, background: "transparent", color: "#666", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
        {t.runReset}
      </button>
    </div>
  );
}

function AutoProgram({ lang, roundSec, restSec, coachOn, soundOn, warnSec, equipment, onWorkoutComplete }) {
  const t = T[lang];
  const prof = loadProfile();
  const [level, setLevel] = useState(prof && prof.experience ? suggestedLevel(prof.experience) : "intermediate");
  const [totalMin, setTotalMin] = useState(45);
  const [program, setProgram] = useState(null);
  const [limitHit, setLimitHit] = useState(false); // ücretsiz günlük limit aşıldı mı
  const [focusCats, setFocusCats] = useState({}); // {} = dengeli; {bag:'high', cardio:'low'} = seçili+yoğunluk
  const toggleFocus = (id) => setFocusCats(prev => {
    const next = { ...prev };
    if (next[id]) delete next[id]; else next[id] = "mid"; // seçince varsayılan orta
    return next;
  });
  const setIntensity = (id, level) => setFocusCats(prev => ({ ...prev, [id]: level }));
  const goal = prof && prof.goal; // hedefe göre kişiselleştirme
  const isPremium = loadPremium();

  // Süre seçenekleri: 15-60 dk + saat formatında
  const DURATIONS = [15, 30, 45, 60, 75, 90, 105, 120];
  const fmtDur = (m) => {
    if (m < 60) return lang === "en" ? `${m} min` : `${m} dk`;
    const h = Math.floor(m / 60), mm = m % 60;
    const hWord = lang === "en" ? (h === 1 ? "1 hr" : `${h} hr`) : `${h} saat`;
    if (mm === 0) return hWord;
    return lang === "en" ? `${hWord} ${mm} min` : `${hWord} ${mm} dk`;
  };

  if (program) {
    return (
      <div>
        <button onClick={() => setProgram(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, fontWeight: 700, padding: 0 }}>‹ {t.back}</button>
        <ProgramDisplay program={program} accentColor={RED} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onComplete={onWorkoutComplete} equipment={equipment} level={level} />
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, ${RED}15, ${CARD})`, border: `1px solid ${RED}44`, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>⚡</div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 6 }}>{t.autoTitle}</div>
        <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{t.autoDesc}</div>
      </div>

      {/* Seviye */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.level}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {LEVELS.map(l => (
            <button key={l.id} onClick={() => setLevel(l.id)} style={{ flex: 1, background: level === l.id ? `${l.color}25` : CARD, color: level === l.id ? l.color : "#666", border: `1.5px solid ${level === l.id ? l.color : LINE}`, borderRadius: 10, padding: "10px 4px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
              {l.icon} {lang === "en" ? l.en : l.tr}
            </button>
          ))}
        </div>
      </div>

      {/* Toplam süre seçimi */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 2, marginBottom: 10, fontWeight: 700 }}>{t.totalDuration}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
          {DURATIONS.map(m => (
            <button key={m} onClick={() => setTotalMin(m)} style={{ background: totalMin === m ? RED : CARD, color: totalMin === m ? "#fff" : "#888", border: `1.5px solid ${totalMin === m ? RED : LINE}`, borderRadius: 10, padding: "12px 4px", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
              {fmtDur(m)}
            </button>
          ))}
        </div>
      </div>

      {/* Neye odaklanmak istersin — kategori + yoğunluk seçimi */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 2, marginBottom: 6, fontWeight: 700 }}>{t.focusTitle.toUpperCase()}</div>
        <div style={{ color: "#777", fontSize: 11, lineHeight: 1.4, marginBottom: 10 }}>{t.focusHint}</div>
        {/* Dengeli (hepsi) */}
        <button onClick={() => setFocusCats({})}
          style={{ background: Object.keys(focusCats).length === 0 ? RED : CARD, color: Object.keys(focusCats).length === 0 ? "#fff" : "#888", border: `1.5px solid ${Object.keys(focusCats).length === 0 ? RED : LINE}`, borderRadius: 10, padding: "9px 13px", fontSize: 12.5, fontWeight: 800, cursor: "pointer", marginBottom: 8 }}>
          ⚖️ {t.focusAll}
        </button>
        {/* Kategoriler — her biri seçilince altında Az/Orta/Yoğun çıkar */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {VISIBLE_CATEGORIES.map(c => {
            const on = !!focusCats[c.id];
            const lvl = focusCats[c.id];
            return (
              <div key={c.id} style={{ background: on ? `${c.color}11` : "transparent", border: `1.5px solid ${on ? c.color : LINE}`, borderRadius: 12, padding: on ? "10px 12px" : "0" }}>
                <button onClick={() => toggleFocus(c.id)}
                  style={{ width: "100%", background: "transparent", color: on ? "#fff" : "#888", border: on ? "none" : `1.5px solid ${LINE}`, borderRadius: on ? 0 : 10, padding: on ? "0 0 8px 0" : "11px 13px", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-start" }}>
                  <span>{c.icon}</span>{lang === "en" ? c.en : c.tr}{on && <span style={{ color: c.color, marginLeft: "auto" }}>✓</span>}
                </button>
                {on && (
                  <div style={{ display: "flex", gap: 6 }}>
                    {[["low", t.intLow], ["mid", t.intMid], ["high", t.intHigh]].map(([key, label]) => (
                      <button key={key} onClick={() => setIntensity(c.id, key)}
                        style={{ flex: 1, background: lvl === key ? c.color : CARD, color: lvl === key ? "#000" : "#999", border: `1px solid ${lvl === key ? c.color : LINE}`, borderRadius: 8, padding: "7px 4px", fontSize: 11.5, fontWeight: 800, cursor: "pointer" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Ücretsiz limit uyarısı */}
      {!isPremium && (
        <div style={{ background: limitHit ? `${GOLD}18` : "#ffffff06", border: `1px solid ${limitHit ? GOLD : LINE}`, borderRadius: 10, padding: 11, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 15 }}>{limitHit ? "🔒" : "ℹ️"}</span>
          <span style={{ color: limitHit ? GOLD : "#888", fontSize: 11.5, lineHeight: 1.4, fontWeight: limitHit ? 700 : 400 }}>{t.freeLimitAuto}</span>
        </div>
      )}

      <button onClick={() => {
          if (!canUseAuto()) { setLimitHit(true); return; }
          const p = buildAutoProgram(totalMin, level, equipment, lang, new Date().getDate(), goal, focusCats);
          if (!isPremium) bumpAutoGen();
          setProgram(p);
        }}
        style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${RED}55` }}>
        {t.generateAuto}
      </button>
    </div>
  );
}

function ProgramPicker({ lang, roundSec, restSec, coachOn, soundOn, warnSec, equipment, onWorkoutComplete }) {
  const t = T[lang];
  const [level, setLevel] = useState("intermediate");
  const [selected, setSelected] = useState([]); // seçili modlar (kategoriler)
  const [plan, setPlan] = useState([]); // plan blokları: {uid, catId, ex, rounds}
  const [viewing, setViewing] = useState(false);
  // Hızlı başlat: karta tıklanınca seçilen tek hareket {catId, ex} + round
  const [quick, setQuick] = useState(null);
  const [quickRounds, setQuickRounds] = useState(3);
  const [quickPlaying, setQuickPlaying] = useState(false);
  const [warmupMin, setWarmupMin] = useState(10);
  const [cooldownMin, setCooldownMin] = useState(10);
  const [shadowOpen, setShadowOpen] = useState(false); // Gölge boksu alt-tarz paneli açık mı

  // Benzersiz blok kimliği (aynı hareket birden çok blok olarak eklenebilsin diye)
  const uidRef = useRef(0);
  const nextUid = () => `b${++uidRef.current}`;

  // Mod seçimi değişince planı temizle (kural 1: filtre değişince boş gelsin)
  const toggleCat = (id) => {
    setSelected(prev => {
      const nx = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      return nx;
    });
    setPlan(p => p.filter(item => (selected.includes(id) ? item.catId !== id : true)));
    setViewing(false);
  };

  // Seviye veya ekipman değişince planı temizle (kural 1: filtre değişince boş gelsin)
  useEffect(() => {
    setPlan([]);
    setViewing(false);
  }, [level]);

  // Ekipman değişince uygun olmayan hareketleri plandan at
  useEffect(() => {
    setPlan(p => p.filter(item => {
      const poolEx = (MASTER_POOL[item.catId] || []).find(e => e.name === item.ex.name);
      if (!poolEx) return true;
      return !poolEx.equip || poolEx.equip.length === 0 || poolEx.equip.some(e => equipment.includes(e));
    }));
    setViewing(false);
  }, [equipment]);

  // Görünür kategoriler + her birinin filtrelenmiş havuzu — sadece filtre değişince hesaplanır.
  // ÖNEMLİ: tüm erken return'lerden ÖNCE çağrılmalı (hook sırası sabit kalsın — React #300).
  const { visibleCats, poolByCat } = useMemo(() => {
    const cats = selected.length > 0 ? selected : VISIBLE_CATEGORIES.map(c => c.id);
    const byCat = {};
    cats.forEach(catId => { byCat[catId] = poolForCategory(catId, equipment, level); });
    return { visibleCats: cats, poolByCat: byCat };
  }, [selected, equipment, level]);

  // Hareketin plandaki toplam blok sayısı (havuzda rozet göstermek için)
  const countInPlan = (catId, name) => plan.filter(i => i.catId === catId && i.ex.name === name).length;

  // Havuzdan EKLE — her tıklama yeni bir blok ekler (aynı hareket tekrar eklenebilir)
  const addEx = (catId, ex, rounds) => {
    setPlan(prev => [...prev, { uid: nextUid(), catId, ex, rounds: rounds || defaultRounds(ex), roundMin: defaultRoundMin(ex), restSec: 45 }]);
    setViewing(false);
  };
  // Bloğu kaldır (uid ile — sadece o bloğu)
  const removeBlock = (uid) => { setPlan(prev => prev.filter(b => b.uid !== uid)); setViewing(false); };
  // Bir bloğun round sayısını değiştir
  const setBlockRounds = (uid, rounds) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, rounds } : b));
    setViewing(false);
  };
  // Bir bloğun round süresini (dk) değiştir
  const setBlockRoundMin = (uid, roundMin) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, roundMin } : b));
    setViewing(false);
  };
  // Bir bloğun dinlenme süresini (sn) değiştir
  const setBlockRest = (uid, restSec) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, restSec } : b));
    setViewing(false);
  };

  // Rastgele program (kural 2): seçili modların ekipman-uygun havuzundan 4-6 hareket
  // Plandan program nesnesi kur — her blok kendi round sayısı kadar tekrarlanır
  const buildFromPlan = () => {
    const byCat = {};
    plan.forEach(block => { (byCat[block.catId] = byCat[block.catId] || []).push(block); });
    // Kategorileri profesyonel seans sırasına göre diz (ANTRENÖR mantığı)
    const orderedCatIds = Object.keys(byCat).sort((a, b) => (CATEGORY_ORDER[a] || 99) - (CATEGORY_ORDER[b] || 99));
    const mainPhases = orderedCatIds.map(catId => {
      const c = CATEGORIES.find(x => x.id === catId);
      const exercises = byCat[catId].map(block => {
        const rm = block.roundMin || defaultRoundMin(block.ex);
        const isDesc = isDescendingReps(block.ex.sets);
        // Azalan tekrar (şınav vb.) ise süre/dinlenme dokunma; aksi halde kullanıcının seçtiği süreyi uygula
        const durStr = isDesc ? block.ex.duration : `${block.rounds}x${rm} dk`;
        return {
          name: lang === "en" ? block.ex.nameEn : block.ex.name,
          nameEn: block.ex.nameEn,
          video: block.ex.video,
          sets: isDesc ? block.ex.sets : `${block.rounds}x${rm} dk`,
          duration: durStr, // playlist round sayısını ve süresini buradan okur
          desc: lang === "en" ? block.ex.descEn : block.ex.desc,
          rest: (typeof block.restSec === "number") ? block.restSec : undefined, // round arası dinlenme (sn)
        };
      });
      const totalRounds = byCat[catId].reduce((s, b) => s + (b.rounds || 1), 0);
      return {
        name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId,
        duration: `${Math.max(totalRounds * 3, 8)} dk`,
        exercises,
      };
    });
    // Isınma & soğuma — toplam süreyi İKİYE böl, toplamı TAM tutsun, güne göre hafif değişsin.
    // Gün tohumu: günün sayısına göre bölüşüm dönüşümlü değişir (bazı gün ip ağırlıklı, bazı gün mobilite)
    const daySeed = new Date().getDate();
    // toplam t dk'yı (ilk parça, ikinci parça) olarak böl — ikisi tam t etsin, ilk parça ~%55-65
    const splitMinutes = (total, seed) => {
      const t = Math.max(2, Math.round(total));
      // dönüşümlü oran: seed çift → ilk parça biraz büyük, tek → ikinci parça biraz büyük
      const firstRatio = (seed % 2 === 0) ? 0.6 : 0.4;
      let first = Math.round(t * firstRatio);
      first = Math.max(1, Math.min(t - 1, first)); // en az 1, en fazla t-1
      return [first, t - first]; // toplam tam = t
    };
    const [wA, wB] = splitMinutes(warmupMin, daySeed);
    const [cA, cB] = splitMinutes(cooldownMin, daySeed + 1);
    const warm = { name: "Isınma", color: "#3b82f6", duration: `${warmupMin} dk`, exercises: [
      { name: lang==="en"?"Jump rope / shadow warm-up":"İp / gölge ısınma", sets: null, duration: `${wA} dk`, desc: lang==="en"?"Gradually raise heart rate.":"Nabzı kademeli yükselt." },
      { name: lang==="en"?"Dynamic mobility":"Dinamik mobilite", sets: null, duration: `${wB} dk`, desc: lang==="en"?"Shoulders, hips, neck.":"Omuz, kalça, boyun." },
    ]};
    const cool = { name: "Soğuma", color: "#10b981", duration: `${cooldownMin} dk`, exercises: [
      { name: lang==="en"?"Slow shadow & breathing":"Yavaş gölge & nefes", sets: null, duration: `${cA} dk`, desc: lang==="en"?"Lower heart rate, relax.":"Nabzı düşür, gevşe." },
      { name: lang==="en"?"Full-body stretch":"Tam vücut esneme", sets: null, duration: `${cB} dk`, desc: lang==="en"?"Hold each 30-40 s.":"Her bölgede 30-40 sn." },
    ]};
    const totalMin = warmupMin + cooldownMin + mainPhases.reduce((s,p)=>{const m=p.duration.match(/(\d+)/);return s+(m?parseInt(m[1]):0);},0);
    const cats = Object.keys(byCat).map(id => CATEGORIES.find(c=>c.id===id));
    return {
      title: cats.length === 1 ? epicTitle(cats[0].id, level, lang) : (lang==="en"?"Custom War Plan":"Özel Savaş Planı"),
      subtitle: cats.map(c=>catLabel(c,lang)).join(" + "),
      totalTime: `${totalMin} dk`,
      phases: [warm, ...mainPhases, cool],
    };
  };

  // Karta tıklanınca hızlı başlat ekranını aç (round = hareketin varsayılanı)
  const openQuick = (catId, ex) => {
    setQuick({ catId, ex });
    setQuickRounds(defaultRounds(ex));
    setQuickPlaying(false);
  };

  // Tek hareketten program kur — round sayısı sets'e çarpan olarak yansır (veri kopyalanmaz)
  const buildSingleProgram = (catId, ex, rounds) => {
    const c = CATEGORIES.find(x => x.id === catId);
    return {
      title: lang === "en" ? ex.nameEn : ex.name,
      subtitle: `${catLabel(c, lang)} · ${rounds} ${t.rounds3}`,
      totalTime: `${estimateMinutes(ex, rounds)} dk`,
      phases: [{
        name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId,
        duration: `${estimateMinutes(ex, rounds)} dk`,
        exercises: [{
          name: lang === "en" ? ex.nameEn : ex.name,
          sets: applyRounds(ex.sets, rounds),
          duration: applyRoundsToDuration(ex.duration, rounds), // playlist round'u buradan okur
          desc: lang === "en" ? ex.descEn : ex.desc,
        }],
      }],
    };
  };

  // Hızlı başlat oynatıcı ekranı
  if (quick && quickPlaying) {
    const program = buildSingleProgram(quick.catId, quick.ex, quickRounds);
    const accent = CATEGORIES.find(c => c.id === quick.catId)?.color || RED;
    return (
      <WorkoutPlayer program={program} accentColor={accent} lang={lang} roundSec={roundSec} restSec={restSec}
        coachOn={coachOn} soundOn={soundOn} warnSec={warnSec}
        onExit={() => { setQuickPlaying(false); setQuick(null); }} onComplete={onWorkoutComplete} />
    );
  }

  // Hızlı başlat — round seçici (stepper) ekranı
  if (quick) {
    const c = CATEGORIES.find(x => x.id === quick.catId);
    const est = estimateMinutes(quick.ex, quickRounds);
    return (
      <div>
        <button onClick={() => setQuick(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 20, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>

        <div style={{ background: `linear-gradient(135deg, ${c.color}18, ${CARD})`, border: `1px solid ${c.color}44`, borderRadius: 18, padding: 22, marginBottom: 24, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>{c.icon}</div>
          <div style={{ color: c.color, fontSize: 11, letterSpacing: 2, fontWeight: 800, marginBottom: 6 }}>{catLabel(c, lang).toUpperCase()}</div>
          <div style={{ color: "#fff", fontSize: 21, fontWeight: 900, lineHeight: 1.2, marginBottom: 8 }}>{lang === "en" ? quick.ex.nameEn : quick.ex.name}</div>
          {(lang === "en" ? quick.ex.descEn : quick.ex.desc) && <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5 }}>{lang === "en" ? quick.ex.descEn : quick.ex.desc}</div>}
          {/* Her seviyede: hareketi bilmeyenler için video linki */}
          <a href={moveVideoUrl(quick.ex, lang)}
            target="_blank" rel="noopener noreferrer"
            style={{ display: "inline-block", marginTop: 14, background: "#ffffff0d", border: `1px solid ${c.color}55`, color: c.color, borderRadius: 10, padding: "9px 16px", fontSize: 12.5, fontWeight: 800, textDecoration: "none" }}>
            {t.watchHow}
          </a>
        </div>

        {isDescendingReps(quick.ex.sets) ? (
          /* Azalan tekrar: round değiştirilemez, set planını göster */
          <div style={{ background: `${c.color}12`, border: `1px solid ${c.color}44`, borderRadius: 14, padding: 16, marginBottom: 20, textAlign: "center" }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>{lang === "en" ? "SET PLAN (reps per set)" : "SET PLANI (set başına tekrar)"}</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
              {quick.ex.sets.split("-").map((rep, i) => (
                <div key={i} style={{ background: CARD, border: `1px solid ${c.color}55`, borderRadius: 10, padding: "8px 14px", minWidth: 36 }}>
                  <div style={{ color: c.color, fontSize: 18, fontWeight: 900, lineHeight: 1 }}>{rep}</div>
                  <div style={{ color: "#555", fontSize: 8, fontWeight: 700, marginTop: 2 }}>{i + 1}. {lang === "en" ? "set" : "set"}</div>
                </div>
              ))}
            </div>
            <div style={{ color: "#666", fontSize: 11, marginTop: 10, lineHeight: 1.4 }}>{lang === "en" ? "Each set has fewer reps — push hard early, finish strong." : "Her set daha az tekrar — başta zorla, güçlü bitir."}</div>
          </div>
        ) : (
          <div style={{ color: "#666", fontSize: 12.5, textAlign: "center", lineHeight: 1.5, marginBottom: 20, background: `${c.color}10`, border: `1px solid ${c.color}33`, borderRadius: 12, padding: 14 }}>
            {lang === "en" ? "Add it to your plan, then set rounds, length and rest below." : "Plana ekle, sonra aşağıda round, süre ve dinlenmeyi ayarla."}
          </div>
        )}

        <button onClick={() => { addEx(quick.catId, quick.ex, defaultRounds(quick.ex)); setQuick(null); }}
          style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${c.color}, ${GOLD})`, color: "#000", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${c.color}55` }}>
          + {t.addToPlan}
        </button>
      </div>
    );
  }

  if (viewing && plan.length > 0) {
    const program = buildFromPlan();
    const accent = selected.length === 1 ? CATEGORIES.find(c => c.id === selected[0])?.color : RED;
    return (
      <div>
        <button onClick={() => setViewing(false)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>
        <ProgramDisplay program={program} accentColor={accent} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onComplete={onWorkoutComplete} equipment={equipment} level={level} />
      </div>
    );
  }

  const lvl = LEVELS.find(l => l.id === level);

  return (
    <div>
      {/* Seviye */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.level}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {LEVELS.map(l => (
            <button key={l.id} onClick={() => { setLevel(l.id); }} style={{ flex: 1, background: level === l.id ? l.color : CARD, color: level === l.id ? "#000" : "#666", border: `1px solid ${level === l.id ? l.color : LINE}`, borderRadius: 12, padding: "10px 4px", fontSize: 11, fontWeight: 900, cursor: "pointer" }}>{l.icon} {lang === "en" ? l.en : l.tr}</button>
          ))}
        </div>
        {level === "pro" && <div style={{ marginTop: 8, color: "#888", fontSize: 11, textAlign: "center", background: "#ffffff08", borderRadius: 8, padding: "6px 10px" }}>⚫ {t.proHint}</div>}
      </div>

      {/* Mod seçimi */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.type} <span style={{ color: "#333" }}>{t.typeHint}</span></div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {VISIBLE_CATEGORIES.map(c => {
            // Gölge boksu: kendisi + alt-tarzları (combo/defense/sparring) seçiliyse aktif say
            const isShadow = c.id === "shadow";
            const active = isShadow
              ? selected.some(id => ["shadow", "combo", "defense", "sparring"].includes(id))
              : selected.includes(c.id);
            return (
              <button key={c.id}
                onClick={() => { if (isShadow) { setShadowOpen(o => !o); } else { toggleCat(c.id); } }}
                style={{ background: active ? `${c.color}25` : CARD, color: active ? c.color : "#666", border: `1.5px solid ${active ? c.color + "88" : LINE}`, borderRadius: 12, padding: "12px 10px", fontSize: 13, fontWeight: 700, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>{c.icon}</span><span style={{ flex: 1 }}>{catLabel(c, lang)}</span>
                {isShadow ? <span style={{ fontSize: 12 }}>{shadowOpen ? "▲" : "▾"}</span> : (active && <span style={{ fontSize: 14 }}>✓</span>)}
              </button>
            );
          })}
        </div>

        {/* Gölge Boksu alt-tarz seçici */}
        {shadowOpen && (
          <div style={{ marginTop: 10, background: "#a855f70d", border: "1px solid #a855f733", borderRadius: 12, padding: 12 }}>
            <div style={{ color: "#a855f7", fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 10 }}>
              👊 {lang === "en" ? "WHICH SHADOW STYLE?" : "HANGİ TARZDA GÖLGE BOKSU?"}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {SHADOW_STYLES.map(s => {
                const on = selected.includes(s.id);
                return (
                  <button key={s.id} onClick={() => toggleCat(s.id)}
                    style={{ background: on ? "#a855f725" : CARD, border: `1.5px solid ${on ? "#a855f788" : LINE}`, borderRadius: 10, padding: "10px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                      <span style={{ fontSize: 15 }}>{s.icon}</span>
                      <span style={{ color: on ? "#a855f7" : "#ccc", fontSize: 12.5, fontWeight: 800, flex: 1 }}>{lang === "en" ? s.en : s.tr}</span>
                      {on && <span style={{ color: "#a855f7", fontSize: 13 }}>✓</span>}
                    </div>
                    <div style={{ color: "#666", fontSize: 10, lineHeight: 1.3 }}>{lang === "en" ? s.desc.en : s.desc.tr}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ANTRENÖR REHBERİ — sadece Çaylak seviyede göster */}
      {level === "beginner" && (
      <div style={{ background: `linear-gradient(135deg, ${GOLD}10, ${CARD})`, border: `1px solid ${GOLD}44`, borderRadius: 14, padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <span style={{ fontSize: 18 }}>🥊</span>
          <span style={{ color: GOLD, fontSize: 11, letterSpacing: 2, fontWeight: 900 }}>{t.coachGuide}</span>
        </div>
        <div style={{ color: "#999", fontSize: 11, marginBottom: 8 }}>{t.recommendedOrder}</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center", marginBottom: 12 }}>
          {(SESSION_TEMPLATES[level] || SESSION_TEMPLATES.intermediate)[lang].map((stp, i, arr) => (
            <span key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ background: "#1a1a1a", color: "#ccc", fontSize: 10.5, fontWeight: 700, padding: "4px 8px", borderRadius: 6 }}>{i + 1}. {stp}</span>
              {i < arr.length - 1 && <span style={{ color: GOLD, fontSize: 11 }}>→</span>}
            </span>
          ))}
        </div>
        <button onClick={() => {
            const tmpl = SESSION_TEMPLATES[level] || SESSION_TEMPLATES.intermediate;
            const newPlan = [];
            tmpl.catIds.forEach(catId => {
              const poolList = poolForCategory(catId, equipment, level);
              if (poolList.length > 0) { const pe = poolList[Math.floor(Math.random() * poolList.length)]; newPlan.push({ uid: nextUid(), catId, ex: pe, rounds: defaultRounds(pe) }); }
            });
            setSelected(tmpl.catIds.filter(id => poolForCategory(id, equipment, level).length > 0));
            setPlan(newPlan);
            setViewing(false);
          }}
          style={{ width: "100%", background: GOLD, color: "#000", border: "none", borderRadius: 10, padding: "11px", fontSize: 13, fontWeight: 900, cursor: "pointer", letterSpacing: 0.5 }}>
          ⚡ {t.useTemplate}
        </button>
        {selected.length > 0 && (
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${LINE}` }}>
            <div style={{ color: GOLD, fontSize: 11, fontWeight: 800, marginBottom: 8 }}>{t.coachTipTitle}</div>
            {selected.map(catId => {
              const tip = PAIRING_TIPS[catId];
              const c = CATEGORIES.find(x => x.id === catId);
              if (!tip) return null;
              return (
                <div key={catId} style={{ marginBottom: 8 }}>
                  <div style={{ color: c.color, fontSize: 11.5, fontWeight: 700, marginBottom: 2 }}>{c.icon} {catLabel(c, lang)}</div>
                  <div style={{ color: "#aaa", fontSize: 11, lineHeight: 1.45 }}>{lang === "en" ? tip.en : tip.tr}</div>
                  <div style={{ color: "#666", fontSize: 10, marginTop: 3 }}>
                    {t.pairsWith} {tip.with.map(wId => { const wc = CATEGORIES.find(x => x.id === wId); return wc ? `${wc.icon} ${catLabel(wc, lang)}` : ""; }).filter(Boolean).join(" · ")}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      )}

      {/* Aktif Plan */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ color: "#555", fontSize: 10, letterSpacing: 3, fontWeight: 700 }}>{t.activePlan}</span>
          {plan.length > 0 && <button onClick={() => setPlan([])} style={{ background: "none", border: "none", color: "#666", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>{t.clearPlan}</button>}
        </div>
        {plan.length > 1 && (
          <div style={{ color: "#10b981", fontSize: 10.5, marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>{t.autoSorted}</div>
        )}
        {plan.length === 0 ? (
          <div style={{ background: CARD, border: `1px dashed ${LINE}`, borderRadius: 14, padding: 20, textAlign: "center", color: "#555", fontSize: 13, lineHeight: 1.6 }}>{t.emptyPlan}</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[...plan].sort((a, b) => (CATEGORY_ORDER[a.catId] || 99) - (CATEGORY_ORDER[b.catId] || 99)).map((block) => {
              const c = CATEGORIES.find(x => x.id === block.catId);
              return (
                <div key={block.uid} style={{ background: `${c.color}14`, border: `1px solid ${c.color}44`, borderRadius: 10, padding: "10px 12px" }}>

                  </div>
                  {/* Hareket bazlı round seçici (1-12) */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: isDescendingReps(block.ex.sets) ? 0 : 7 }}>
                    <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.roundLabel}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                      <button onClick={() => setBlockRounds(block.uid, Math.max(1, block.rounds - 1))}
                        style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                      <div style={{ minWidth: 38, textAlign: "center", color: "#fff", fontSize: 15, fontWeight: 900 }}>{block.rounds}</div>
                      <button onClick={() => setBlockRounds(block.uid, Math.min(12, block.rounds + 1))}
                        style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                      <span style={{ color: "#666", fontSize: 11, marginLeft: 2 }}>{t.rounds3}</span>
                    </div>
                  </div>
                  {/* Süre (dk/round) ve dinlenme (sn) — azalan tekrar hareketlerinde gizli */}
                  {!isDescendingReps(block.ex.sets) && (
                    <>
                      {/* Round süresi */}
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                        <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.roundMinLabel}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                          <button onClick={() => setBlockRoundMin(block.uid, Math.max(1, (block.roundMin || defaultRoundMin(block.ex)) - 1))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                          <div style={{ minWidth: 38, textAlign: "center", color: "#fff", fontSize: 15, fontWeight: 900 }}>{block.roundMin || defaultRoundMin(block.ex)}</div>
                          <button onClick={() => setBlockRoundMin(block.uid, Math.min(15, (block.roundMin || defaultRoundMin(block.ex)) + 1))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                          <span style={{ color: "#666", fontSize: 11, marginLeft: 2 }}>{t.perRoundShort}</span>
                        </div>
                      </div>
                      {/* Dinlenme süresi */}
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.restLabel}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                          <button onClick={() => setBlockRest(block.uid, Math.max(0, (typeof block.restSec === "number" ? block.restSec : 45) - 15))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                          <div style={{ minWidth: 52, textAlign: "center", color: "#fff", fontSize: 14, fontWeight: 900 }}>{(typeof block.restSec === "number" ? block.restSec : 45) === 0 ? t.noRest : `${(typeof block.restSec === "number" ? block.restSec : 45)} sn`}</div>
                          <button onClick={() => setBlockRest(block.uid, Math.min(120, (typeof block.restSec === "number" ? block.restSec : 45) + 15))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              );
            })}
            <div style={{ color: "#666", fontSize: 11, textAlign: "right", marginTop: 2 }}>{plan.length} {t.movesInPlan} · {plan.reduce((s,b)=>s+(b.rounds||1),0)} {t.rounds3}</div>
          </div>
        )}
      </div>

      {/* Süre ayarı */}
      {plan.length > 0 && (
        <div style={{ background: "#0e0e10", borderRadius: 16, padding: 16, marginBottom: 18, border: `1px solid ${LINE}` }}>
          <DurationRow label={`🔥 ${t.warmup}`} color="#3b82f6" value={warmupMin} options={[5, 10, 15, 20]} onChange={setWarmupMin} />
          <DurationRow label={`🧊 ${t.cooldown}`} color="#10b981" value={cooldownMin} options={[5, 10, 15, 20]} onChange={setCooldownMin} last />

      )}

      {/* Elit Havuz — buradan ekle (kural 1 & 3) */}
      <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 4, fontWeight: 700 }}>{t.pool}</div>

    </div>
  );
}

function SettingsPanel({ lang, roundSec, setRoundSec, restSec, setRestSec, coachOn, setCoachOn, soundOn, setSoundOn, warnSec, setWarnSec, equipment, toggleEquip, onEditProfile }) {
  const t = T[lang];
  const [reminder, setReminder] = useState(() => loadReminder());
  const [reminderMsg, setReminderMsg] = useState("");

  const toggleReminder = async () => {
    if (!reminder.enabled) {
      const perm = await requestNotifPermission();
      if (perm === "granted") {
        const r = { ...reminder, enabled: true }; setReminder(r); saveReminder(r); setReminderMsg("");
        try { new Notification("BOXER PRO", { body: t.reminderBody }); } catch {}
      } else if (perm === "unsupported") setReminderMsg(t.reminderUnsupported);
      else setReminderMsg(t.reminderDenied);
    } else {
      const r = { ...reminder, enabled: false }; setReminder(r); saveReminder(r); setReminderMsg("");
    }
  };
  const changeTime = (time) => { const r = { ...reminder, time }; setReminder(r); saveReminder(r); };

  return (
    <div style={{ background: CARD, borderRadius: 14, padding: 16, marginBottom: 16, border: `1px solid ${LINE}` }}>
      {/* Profil düzenle */}
      <button onClick={onEditProfile} style={{ width: "100%", marginBottom: 16, padding: "12px", borderRadius: 10, border: `1px solid ${RED}55`, background: `${RED}11`, color: RED, fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
        👤 {t.pEdit}
      </button>

      {/* Antrenman hatırlatması */}
      <div style={{ background: "#0e0e10", border: `1px solid ${reminder.enabled ? "#10b981" + "55" : LINE}`, borderRadius: 12, padding: 14, marginBottom: 16 }}>

          <span style={{ color: "#ddd", fontSize: 13, fontWeight: 800 }}>🔔 {t.reminderTitle}</span>
          <button onClick={toggleReminder} role="switch" aria-checked={reminder.enabled} style={{ background: reminder.enabled ? "#10b981" : "#333", border: "none", borderRadius: 20, width: 46, height: 26, cursor: "pointer", position: "relative", transition: "background 0.2s" }}>
            <div style={{ position: "absolute", top: 3, left: reminder.enabled ? 23 : 3, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
          </button>
        </div>
        {!reminder.enabled && <div style={{ color: "#777", fontSize: 11.5, lineHeight: 1.4 }}>{t.reminderDesc}</div>}

          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ color: "#888", fontSize: 12 }}>{t.reminderTime}:</span>
            <input type="time" value={reminder.time} onChange={e => changeTime(e.target.value)} aria-label={t.reminderTime}

            <span style={{ color: "#10b981", fontSize: 11, fontWeight: 700 }}>{t.reminderOn}</span>
          </div>
        )}
        {reminderMsg && <div style={{ color: GOLD, fontSize: 11, marginTop: 8, lineHeight: 1.4 }}>{reminderMsg}</div>}

      {/* Raund & dinlenme */}
      <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#888", fontSize: 10, letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>{t.roundTime}</div>
          <div style={{ display: "flex", gap: 5 }}>
            {[[120, "2dk"], [180, "3dk"], [240, "4dk"]].map(([v, l]) => <button key={v} onClick={() => setRoundSec(v)} style={{ flex: 1, background: roundSec === v ? RED : "#1a1a1a", color: roundSec === v ? "#fff" : "#666", border: "none", borderRadius: 8, padding: "8px 2px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{l}</button>)}

        <div style={{ color: "#555", fontSize: 11, marginBottom: 10 }}>{t.musicHint}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {[

            { name: "Apple Music", url: "https://music.apple.com", color: "#FA243C" },
            { name: "YT Music", url: "https://music.youtube.com", color: "#FF0000" },
          ].map(m => (
            <a key={m.name} href={m.url} target="_blank" rel="noopener noreferrer"

              ▶ {m.name}
            </a>
          ))}
        </div>
      </div>
    </div>
  );

// ─── Ana Uygulama ─────────────────────────────────────────────────────────────
function AppInner() {
  const [lang, setLang] = useState("tr");
  const [showSplash, setShowSplash] = useState(true);
  const [profile, setProfile] = useState(null);
  const [showProfile, setShowProfile] = useState(false); // onboarding veya düzenleme
  const [showTour, setShowTour] = useState(false);
  const [tab, setTab] = useState("week");
  const [showSettings, setShowSettings] = useState(false);
  const [showEquipment, setShowEquipment] = useState(false);
  const [showPremium, setShowPremium] = useState(false);

  // Ayarlar
  const [roundSec, setRoundSec] = useState(180);
  const [restSec, setRestSec] = useState(60);
  const [coachOn, setCoachOn] = useState(false);
  const [soundOn, setSoundOn] = useState(true);
  const [warnSec, setWarnSec] = useState(30);
  const [equipment, setEquipment] = useState(["none", "rope", "bag"]);

  // Puan & kemer & disiplin cezası
  const [progress, setProgress] = useState({ points: 0, workouts: 0, lastWorkoutDate: null });
  const [penaltyNotice, setPenaltyNotice] = useState(null); // { days, points }
  const [beltUnlock, setBeltUnlock] = useState(null); // yeni açılan kemer (kutlama)
  useEffect(() => {
    const loaded = loadProgress();
    const { progress: penalized, penaltyDays, penaltyPoints } = applyDisciplinePenalty(loaded);
    setProgress(penalized);
    if (penaltyDays > 0) setPenaltyNotice({ days: penaltyDays, points: penaltyPoints });
    const prof = loadProfile();
    if (prof) setProfile(prof);
  }, []);
  const onWorkoutComplete = (info) => {
    setProgress(prev => {
      const before = prev.points;
      const after = before + PTS_PER_WORKOUT;
      const np = { points: after, workouts: prev.workouts + 1, lastWorkoutDate: todayStr() };
      saveProgress(np);
      // Bu antrenmanla yeni bir kemer eşiği aşıldı mı?
      const newlyUnlocked = BELTS.find(b => b.pts > 0 && before < b.pts && after >= b.pts);
      if (newlyUnlocked) setBeltUnlock(newlyUnlocked);
      return np;
    });
    // Günlüğe otomatik kayıt
    addJournalEntry({
      kind: "auto",
      title: (info && info.title) || (lang === "en" ? "Workout completed" : "Antrenman tamamlandı"),
      points: PTS_PER_WORKOUT,
      cats: (info && info.cats) || [],
      calories: (info && info.calories) || 0,
      durationMin: (info && info.durationMin) || 0,
    });
    setPenaltyNotice(null); // antrenman yapınca ceza uyarısını kaldır
  };

  const toggleEquip = (id) => setEquipment(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const t = T[lang];

  const tabs = [
    { id: "week", icon: "📅", label: t.tabPlan },
    { id: "train", icon: "🥊", label: t.tabTrain },
  ];
  // Antrenman Zamanı içindeki alt seçim: null=menü, 'build'/'auto'/'run'=o ekran
  const [trainMode, setTrainMode] = useState(null);

  const saveProfileAndClose = (p) => { saveProfile(p); setProfile(p); setShowProfile(false); if (!tourSeen()) setShowTour(true); };
  // Koşu kaydedildiğinde: puan/kemer ekle (günlüğe RunningMode zaten yazdı)
  const onRunSaved = () => {
    setProgress(prev => {
      const before = prev.points;
      const after = before + PTS_PER_WORKOUT;
      const np = { points: after, workouts: prev.workouts + 1, lastWorkoutDate: todayStr() };
      saveProgress(np);
      const newlyUnlocked = BELTS.find(b => b.pts > 0 && before < b.pts && after >= b.pts);
      if (newlyUnlocked) setBeltUnlock(newlyUnlocked);
      return np;
    });
    setPenaltyNotice(null);
  };

  if (showSplash) return <SplashScreen onStart={() => { setShowSplash(false); if (!loadProfile()) setShowProfile(true); }} lang={lang} setLang={setLang} />;
  // Onboarding: profil hiç oluşturulmamışsa veya kullanıcı düzenlemek istediyse
  if (showProfile) return <ProfileScreen lang={lang} initial={profile} isEdit={!!profile} onSave={saveProfileAndClose} onSkip={() => { saveProfile({ completed: true, skipped: true }); setProfile({ completed: true, skipped: true }); setShowProfile(false); if (!tourSeen()) setShowTour(true); }} />;
  if (showTour) return <TourScreen lang={lang} onDone={() => { markTourSeen(); setShowTour(false); }} />;

  return (
    <div style={{ background: BG, minHeight: "100vh", fontFamily: "'Inter',-apple-system,sans-serif", color: "#fff", maxWidth: 430, margin: "0 auto" }}>
      {/* Global cila: buton dokunma efekti, içerik belirme, kaydırma yumuşatma */}
      <style>{`
        * { -webkit-tap-highlight-color: transparent; }
        button { transition: transform 0.08s ease, opacity 0.15s ease; touch-action: manipulation; }
        button:active { transform: scale(0.96); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content { animation: fadeIn 0.25s ease-out; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        input, textarea, select { -webkit-appearance: none; }
        body { overscroll-behavior: none; }
      `}</style>
      {/* Kemer kutlama paneli */}
      {beltUnlock && (
        <div onClick={() => setBeltUnlock(null)} style={{ position: "fixed", inset: 0, zIndex: 300, background: "rgba(0,0,0,0.85)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, maxWidth: 430, margin: "0 auto", cursor: "pointer" }}>
          <style>{`@keyframes beltPop{0%{transform:scale(0) rotate(-30deg);opacity:0}55%{transform:scale(1.25) rotate(10deg)}100%{transform:scale(1) rotate(0);opacity:1}}@keyframes beltGlow{0%,100%{filter:drop-shadow(0 0 18px ${beltUnlock.color}99)}50%{filter:drop-shadow(0 0 38px ${beltUnlock.color})}}`}</style>
          <div style={{ fontSize: 100, animation: "beltPop 0.7s ease-out, beltGlow 1.8s ease-in-out infinite 0.7s" }}>{beltUnlock.icon}</div>
          <div style={{ color: beltUnlock.color, fontSize: 13, letterSpacing: 4, fontWeight: 900, marginTop: 16, marginBottom: 6 }}>{t.beltUnlocked}</div>
          <div style={{ color: "#fff", fontSize: 26, fontWeight: 900, textAlign: "center", marginBottom: 4 }}>{lang === "en" ? beltUnlock.nameEn : beltUnlock.nameTr}</div>
          <div style={{ color: "#888", fontSize: 13, marginBottom: 30 }}>{beltUnlock.pts}+ {t.points}</div>
          <button onClick={() => setBeltUnlock(null)} style={{ background: `linear-gradient(135deg, ${beltUnlock.color}, ${GOLD})`, color: "#000", border: "none", borderRadius: 14, padding: "14px 40px", fontSize: 15, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>{t.beltContinue}</button>
        </div>
      )}
      <div style={{ padding: "calc(env(safe-area-inset-top) + 20px) 20px 0", background: `linear-gradient(180deg, #15050a 0%, ${BG} 100%)` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 10, color: RED, letterSpacing: 4, fontWeight: 900, marginBottom: 6 }}>{t.appTitle}</div>
            <div style={{ fontSize: 24, fontWeight: 900, letterSpacing: -1, lineHeight: 1.1 }}>{t.appSub.split(" ")[0]}<br /><span style={{ color: RED }}>{t.appSub.split(" ").slice(1).join(" ") || t.appSub}</span></div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
            <LangToggle lang={lang} setLang={setLang} />
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => { setShowPremium(s => !s); setShowEquipment(false); setShowSettings(false); }} aria-label={t.premiumShort} style={{ background: showPremium ? GOLD : `${GOLD}18`, border: `1px solid ${GOLD}`, color: showPremium ? "#000" : GOLD, borderRadius: 10, padding: "7px 12px", fontSize: 13, cursor: "pointer", fontWeight: 800 }}>⭐ {t.premiumShort}</button>
              <button onClick={() => { setShowEquipment(s => !s); setShowSettings(false); setShowPremium(false); }} aria-label={t.equipShort} style={{ background: showEquipment ? GOLD : CARD, border: `1px solid ${showEquipment ? GOLD : LINE}`, color: showEquipment ? "#000" : "#888", borderRadius: 10, padding: "7px 10px", fontSize: 15, cursor: "pointer", fontWeight: 700, lineHeight: 1 }}>🧰</button>
              <button onClick={() => { setShowSettings(s => !s); setShowEquipment(false); setShowPremium(false); }} aria-label={t.settings} style={{ background: showSettings ? RED : CARD, border: `1px solid ${showSettings ? RED : LINE}`, color: showSettings ? "#fff" : "#888", borderRadius: 10, padding: "7px 10px", fontSize: 15, cursor: "pointer", fontWeight: 700, lineHeight: 1 }}>⚙</button>
            </div>
          </div>
        </div>

        {penaltyNotice && (
          <div style={{ background: `${RED}1a`, border: `1px solid ${RED}66`, borderRadius: 12, padding: "12px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 22 }}>⚠️</span>
            <div style={{ flex: 1 }}>
              <div style={{ color: RED, fontSize: 11, fontWeight: 900, letterSpacing: 1 }}>{t.penaltyTitle}</div>
              <div style={{ color: "#ddd", fontSize: 12, marginTop: 2 }}>{t.penaltyMsg(penaltyNotice.days, penaltyNotice.points)}</div>
              <div style={{ color: "#fff", fontSize: 12, marginTop: 5, fontStyle: "italic", fontWeight: 600 }}>🥊 {disciplineMessage(penaltyNotice.days, lang)}</div>
            </div>
            <button onClick={() => setPenaltyNotice(null)} style={{ background: "none", border: "none", color: "#888", fontSize: 18, cursor: "pointer" }}>×</button>
          </div>
        )}
        {<BeltBar points={progress.points} lang={lang} />}

        {showPremium && <div className="tab-content"><PremiumPanel lang={lang} /></div>}

        {showEquipment && <div className="tab-content"><EquipmentPanel lang={lang} equipment={equipment} toggleEquip={toggleEquip} /></div>}

        {showSettings && (
          <div className="tab-content"><SettingsPanel lang={lang} roundSec={roundSec} setRoundSec={setRoundSec} restSec={restSec} setRestSec={setRestSec} coachOn={coachOn} setCoachOn={setCoachOn} soundOn={soundOn} setSoundOn={setSoundOn} warnSec={warnSec} setWarnSec={setWarnSec} onEditProfile={() => { setShowSettings(false); setShowProfile(true); }} /></div>
        )}

        <div style={{ display: "flex", gap: 6, background: CARD, borderRadius: 14, padding: 5 }}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => { setTab(tb.id); if (tb.id !== "train") setTrainMode(null); }} style={{ flex: 1, background: tab === tb.id ? RED : "transparent", color: tab === tb.id ? "#fff" : "#666", border: "none", borderRadius: 10, padding: "11px 4px", fontSize: 13, fontWeight: 800, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <span style={{ fontSize: 16 }}>{tb.icon}</span><span>{tb.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div key={tab + (trainMode || "")} className="tab-content" style={{ padding: "20px 20px 80px" }}>
        {tab === "week" && <TrainingJournal lang={lang} />}
        {tab === "train" && !trainMode && (
          <div>
            <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 4 }}>{t.tabTrain}</div>
            <div style={{ color: "#888", fontSize: 13, marginBottom: 20 }}>{t.trainPickTitle}</div>
            {[
              { id: "build", icon: "🥊", label: t.tabBuild, desc: t.trainBuildDesc, color: RED },
              { id: "auto", icon: "⚡", label: t.tabAuto, desc: t.trainAutoDesc, color: GOLD },
              { id: "run", icon: "🏃", label: t.tabRun, desc: t.trainRunDesc, color: "#10b981" },
            ].map(opt => (
              <button key={opt.id} onClick={() => setTrainMode(opt.id)}
                style={{ width: "100%", textAlign: "left", background: CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${opt.color}`, borderRadius: 14, padding: "18px 16px", marginBottom: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                <span style={{ fontSize: 30 }}>{opt.icon}</span>
                <span style={{ flex: 1 }}>
                  <span style={{ display: "block", color: "#fff", fontSize: 16, fontWeight: 800, marginBottom: 3 }}>{opt.label}</span>
                  <span style={{ display: "block", color: "#888", fontSize: 12, lineHeight: 1.4 }}>{opt.desc}</span>
                </span>
                <span style={{ color: opt.color, fontSize: 20, fontWeight: 800 }}>›</span>
              </button>
            ))}
          </div>
        )}
        {tab === "train" && trainMode && (
          <div>
            <button onClick={() => setTrainMode(null)} style={{ background: "transparent", border: "none", color: "#888", fontSize: 14, fontWeight: 700, cursor: "pointer", marginBottom: 14, padding: 0 }}>{t.trainBack}</button>
            {trainMode === "build" && <ProgramPicker lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} equipment={equipment} onWorkoutComplete={onWorkoutComplete} />}
            {trainMode === "auto" && <AutoProgram lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} equipment={equipment} onWorkoutComplete={onWorkoutComplete} />}
            {trainMode === "run" && <RunningMode lang={lang} onSaved={onRunSaved} />}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Hata Sınırı (çökme koruması) ─────────────────────────────────────────────
// Beklenmedik bir hata olursa tüm uygulama beyaz ekrana düşmesin; nazik bir
// kurtarma ekranı göster. Bozuk veri vs. durumlarda kullanıcı uygulamadan atılmaz.
class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(err, info) { /* sessiz: üretimde loglama servisi bağlanabilir */ }
  handleReset = () => { this.setState({ hasError: false }); };
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ background: BG, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, maxWidth: 430, margin: "0 auto", textAlign: "center", fontFamily: "'Inter',-apple-system,sans-serif" }}>
          <div style={{ fontSize: 50, marginBottom: 16 }}>🥊</div>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 10 }}>Bir şeyler ters gitti / Something went wrong</div>
          <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5, marginBottom: 24 }}>Verilerin güvende. Uygulamayı yeniden başlatmayı dene. / Your data is safe. Try restarting.</div>
          <button onClick={this.handleReset} style={{ padding: "14px 28px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>↺ Yeniden Dene / Retry</button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  return (
    <ErrorBoundary>
      <AppInner />
    </ErrorBoundary>
  );
}


// Babel derlemesi bitince boot ekranini kaldir ve uygulamayi mount et.
const __rootEl = document.getElementById('root');
const __root = ReactDOM.createRoot(__rootEl);
__root.render(React.createElement(App));
const __boot = document.getElementById('boot');
if (__boot) {
  __boot.style.transition = 'opacity 0.35s ease';
  __boot.style.opacity = '0';
  setTimeout(() => __boot.remove(), 380);
}
</script>
</body>
</html>
