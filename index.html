          { n: "5", tr: "Sol Aparkat", en: "Left Uppercut", d_tr: "Öndeki el, alttan", d_en: "Lead hand, from below", c: "#f59e0b" },
          { n: "6", tr: "Sağ Aparkat", en: "Right Uppercut", d_tr: "Arka el, alttan", d_en: "Rear hand, from below", c: "#f59e0b" },
        ];
        const combos = [
          { seq: "1-2", tr: "jab – cross", en: "jab – cross" },
          { seq: "1-1-2", tr: "çift jab – cross", en: "double jab – cross" },
          { seq: "1-2-3", tr: "jab – cross – sol kroşe", en: "jab – cross – left hook" },
          { seq: "1-2-3-2", tr: "jab – cross – kroşe – cross", en: "jab – cross – hook – cross" },
          { seq: "2-3-2", tr: "cross – kroşe – cross", en: "cross – hook – cross" },
          { seq: "1-6-3", tr: "jab – sağ aparkat – sol kroşe", en: "jab – right uppercut – left hook" },
        ];
        return (
          <div style={{ marginBottom: 12 }}>
            <button onClick={() => setShowGuide(v => !v)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, background: `linear-gradient(135deg, ${RED}1a, ${CARD})`, border: `1px solid ${RED}44`, borderRadius: 14, padding: "13px 15px", cursor: "pointer", textAlign: "left" }}>
              <span style={{ fontSize: 20 }}>📖</span>
              <span style={{ flex: 1 }}>
                <span style={{ display: "block", color: "#fff", fontSize: 14, fontWeight: 800 }}>{lang === "en" ? "Combo Numbering Guide" : "Kombinasyon Numara Rehberi"}</span>
                <span style={{ display: "block", color: "#999", fontSize: 11.5, marginTop: 1 }}>{lang === "en" ? "What do 1-2-3 mean? Learn the boxing language." : "1-2-3 ne demek? Boksun dilini öğren."}</span>
              </span>
              <span style={{ color: RED, fontSize: 16, fontWeight: 900, transform: showGuide ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>›</span>
            </button>
            {showGuide && (
              <div style={{ background: CARD, border: `1px solid ${LINE}`, borderTop: "none", borderRadius: "0 0 14px 14px", padding: "14px 15px", marginTop: -6 }}>
                <div style={{ color: "#777", fontSize: 10.5, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>{lang === "en" ? "THE NUMBERS" : "NUMARALAR"}</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                  {nums.map(x => (
                    <div key={x.n} style={{ display: "flex", alignItems: "center", gap: 10, background: "#ffffff06", borderRadius: 10, padding: "9px 11px" }}>
                      <span style={{ width: 30, height: 30, borderRadius: "50%", background: x.c, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 900, flexShrink: 0 }}>{x.n}</span>
                      <span style={{ minWidth: 0 }}>
                        <span style={{ display: "block", color: "#fff", fontSize: 12.5, fontWeight: 800 }}>{lang === "en" ? x.en : x.tr}</span>
                        <span style={{ display: "block", color: "#888", fontSize: 10.5, lineHeight: 1.3 }}>{lang === "en" ? x.d_en : x.d_tr}</span>
                      </span>
                    </div>
                  ))}
                </div>
                <div style={{ color: "#777", fontSize: 10.5, letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>{lang === "en" ? "POPULAR COMBOS" : "POPÜLER KOMBİNASYONLAR"}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                  {combos.map(x => (
                    <div key={x.seq} style={{ display: "flex", alignItems: "center", gap: 12, background: "#ffffff06", borderRadius: 10, padding: "9px 12px" }}>
                      <span style={{ color: RED, fontSize: 14, fontWeight: 900, letterSpacing: 1, minWidth: 62 }}>{x.seq}</span>
                      <span style={{ color: "#bbb", fontSize: 12, fontWeight: 600 }}>{lang === "en" ? x.en : x.tr}</span>
                    </div>
                  ))}
                </div>
                <div style={{ color: "#666", fontSize: 11, lineHeight: 1.5, marginTop: 12, background: `${GOLD}10`, borderRadius: 8, padding: "9px 11px" }}>💡 {lang === "en" ? "Numbers assume orthodox (right-handed) stance. Southpaws mirror left/right. \"b\" after a number (e.g. 3b) means to the body." : "Numaralar ortodoks (sağ elini arkada tutan) duruşa göredir. Güneypençe (solak) tam tersi. Numaradan sonra \"b\" (ör. 3b) gövdeye demektir."}</div>
              </div>
            )}
          </div>
        );
      })()}

      {/* Arama */}
      <div style={{ position: "relative", margin: "14px 0 12px" }}>
        <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", fontSize: 15, opacity: 0.6 }}>🔍</span>
        <input value={query} onChange={e => setQuery(e.target.value)} placeholder={lang === "en" ? "Search a move, muscle…" : "Hareket, kas ara…"}
          style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 12, padding: "13px 14px 13px 40px", color: "#fff", fontSize: 14, fontWeight: 600 }} />
        {query && <button onClick={() => setQuery("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "#ffffff14", border: "none", color: "#aaa", borderRadius: 8, width: 26, height: 26, cursor: "pointer", fontSize: 13 }}>✕</button>}
      </div>

      {/* Kategori filtresi */}
      <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 8, marginBottom: 6 }}>
        <button onClick={() => setCatFilter("all")} style={{ flexShrink: 0, background: catFilter === "all" ? RED : CARD, color: catFilter === "all" ? "#fff" : "#999", border: `1px solid ${catFilter === "all" ? RED : LINE}`, borderRadius: 20, padding: "7px 14px", fontSize: 12.5, fontWeight: 800, cursor: "pointer" }}>{lang === "en" ? "All" : "Hepsi"}</button>
        {CATEGORIES.map(c => (
          <button key={c.id} onClick={() => setCatFilter(c.id)} style={{ flexShrink: 0, background: catFilter === c.id ? c.color : CARD, color: catFilter === c.id ? "#000" : "#999", border: `1px solid ${catFilter === c.id ? c.color : LINE}`, borderRadius: 20, padding: "7px 14px", fontSize: 12.5, fontWeight: 800, cursor: "pointer", whiteSpace: "nowrap" }}>{c.icon} {catLabel(c, lang)}</button>
        ))}
      </div>

      {grouped.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 20px", color: "#666" }}>
          <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.5 }}>🔍</div>
          <div style={{ fontSize: 13.5 }}>{lang === "en" ? "No moves found." : "Hareket bulunamadı."}</div>
        </div>
      ) : grouped.map(g => (
        <div key={g.cat.id} style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 15 }}>{g.cat.icon}</span>
            <span style={{ color: g.cat.color, fontSize: 13, fontWeight: 900, letterSpacing: 0.5 }}>{catLabel(g.cat, lang)}</span>
            <span style={{ color: "#555", fontSize: 11, fontWeight: 700 }}>· {g.moves.length}</span>
          </div>
          {g.moves.map(m => {
            const lo = levelObj(m.level);
            const open = openId === m._key;
            const nm = lang === "en" ? (m.nameEn || m.name) : m.name;
            const ds = lang === "en" ? (m.descEn || m.desc) : m.desc;
            return (
              <div key={m._key} onClick={() => setOpenId(open ? null : m._key)} style={{ background: CARD, border: `1px solid ${open ? g.cat.color + "66" : LINE}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8, cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                  <div style={{ color: "#fff", fontSize: 14, fontWeight: 700, flex: 1 }}>{nm}</div>
                  <span style={{ background: `${lo.color}22`, color: lo.color, fontSize: 9, fontWeight: 900, padding: "3px 8px", borderRadius: 5, letterSpacing: 0.5, flexShrink: 0 }}>{lang === "en" ? lo.en : lo.tr}</span>
                </div>
                <div style={{ display: "flex", gap: 10, marginTop: 6, flexWrap: "wrap" }}>
                  {m.duration && <span style={{ color: "#888", fontSize: 11.5, fontWeight: 600 }}>⏱️ {m.duration}</span>}
                  {m.hedefKas && <span style={{ color: "#888", fontSize: 11.5, fontWeight: 600 }}>💪 {m.hedefKas}</span>}
                  {m.equip && m.equip.length > 0 && <span style={{ color: "#888", fontSize: 11.5, fontWeight: 600 }}>🧰 {m.equip.join(", ")}</span>}
                </div>
                {open && ds && (
                  <div style={{ color: "#bbb", fontSize: 12.5, lineHeight: 1.6, marginTop: 10, paddingTop: 10, borderTop: `1px solid ${LINE}` }}>
                    {ds}
                    <VideoBlock ex={m} lang={lang} color={g.cat.color} allowEdit />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}


// ─── Antrenman Günlüğü ────────────────────────────────────────────────────────
const MONTH_NAMES = {
  tr: ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"],
  en: ["January","February","March","April","May","June","July","August","September","October","November","December"],
};
function TrainingJournal({ lang, onStartFirst }) {
  const t = T[lang];
  const [entries, setEntries] = useState(() => loadJournal());
  const [adding, setAdding] = useState(false);
  const [draftTitle, setDraftTitle] = useState("");
  const [draftNote, setDraftNote] = useState("");
  const now = new Date();
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null); // {year, month, day} — gün detayı için
  const [editNote, setEditNote] = useState("");
  const [showData, setShowData] = useState(false);
  const [importText, setImportText] = useState("");
  const [dataMsg, setDataMsg] = useState("");
  const [weightInput, setWeightInput] = useState("");
  const refresh = () => setEntries(loadJournal());

  const tip = dailyTip(lang, now.getDate());
  const quote = useMemo(() => LEGEND_QUOTES[now.getDate() % LEGEND_QUOTES.length], []);

  const yearEntries = entries.filter(e => new Date(e.date).getFullYear() === viewYear);
  const totalPts = entries.reduce((s, e) => s + (e.points || 0), 0);
  const totalCals = entries.reduce((s, e) => s + (e.calories || 0), 0);
  const totalKm = entries.reduce((s, e) => s + (e.distanceKm || 0), 0);
  const thisMonthCount = entries.filter(e => { const d = new Date(e.date); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); }).length;
  const streak = useMemo(() => computeStreak(entries), [entries]);

  const byMonth = {};
  yearEntries.forEach(e => { const d = new Date(e.date); const k = d.getMonth(); (byMonth[k] = byMonth[k] || []).push(e); });
  const monthKeys = Object.keys(byMonth).map(Number).sort((a, b) => b - a);

  const entriesOnDay = (day) => entries.filter(e => { const d = new Date(e.date); return d.getFullYear() === viewYear && d.getMonth() === viewMonth && d.getDate() === day; });
  const dayHasEntry = (day) => entriesOnDay(day).length > 0;
  const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y - 1); } else setViewMonth(m => m - 1); };
  const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y + 1); } else setViewMonth(m => m + 1); };
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDow = (() => { const d = new Date(viewYear, viewMonth, 1).getDay(); return d === 0 ? 6 : d - 1; })();
  const WEEKDAY_LABELS = lang === "en" ? ["M","T","W","T","F","S","S"] : ["Pt","Sa","Ça","Pe","Cu","Ct","Pz"];
  const isToday = (day) => now.getFullYear() === viewYear && now.getMonth() === viewMonth && now.getDate() === day;

  // İlerleme verileri
  const prof = loadProfile();
  const weeklyTarget = (prof && prof.weeklyTarget) || 3;
  const weekCount = workoutsThisWeek();
  const cal7 = useMemo(() => caloriesLastDays(7), [entries]);
  const cal7Max = Math.max(1, ...cal7.map(d => d.value));
  const topCats = useMemo(() => categoryBreakdown().slice(0, 5), [entries]);
  const weightLog = useMemo(() => loadWeightLog(), [entries, dataMsg]);
  const isPremium = loadPremium();

  const handleSave = () => {
    if (!draftTitle.trim() && !draftNote.trim()) return;
    addJournalEntry({ kind: "manual", title: draftTitle.trim(), note: draftNote.trim(), points: 0 });
    setDraftTitle(""); setDraftNote(""); setAdding(false); refresh();
  };
  const handleDelete = (id) => { if (window.confirm(t.deleteConfirm)) { deleteJournalEntry(id); refresh(); setSelected(null); } };
  const handleUpdateNote = () => { if (selected) { updateJournalEntry(selected.id, { note: editNote }); refresh(); setSelected({ ...selected, note: editNote }); } };

  // ── Gün detayı: o günün TÜM antrenmanları + notları ──
  if (selectedDay) {
    const dayEntries = entries.filter(e => {
      const d = new Date(e.date);
      return d.getFullYear() === selectedDay.year && d.getMonth() === selectedDay.month && d.getDate() === selectedDay.day;
    }).sort((a, b) => (b.kind === "auto" ? 1 : 0) - (a.kind === "auto" ? 1 : 0));
    const totalKcal = dayEntries.reduce((s, e) => s + (e.calories || 0), 0);
    const totalMin = dayEntries.reduce((s, e) => s + (e.durationMin || 0), 0);
    return (
      <div>
        <button onClick={() => setSelectedDay(null)} aria-label={t.back} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, fontWeight: 700, padding: 0 }}>‹ {t.journalTitle}</button>
        <div style={{ background: `linear-gradient(135deg, ${RED}15, ${CARD})`, border: `1px solid ${RED}44`, borderRadius: 16, padding: 18, marginBottom: 16 }}>
          <div style={{ color: "#fff", fontSize: 22, fontWeight: 900 }}>{selectedDay.day} {MONTH_NAMES[lang][selectedDay.month]} {selectedDay.year}</div>
          <div style={{ display: "flex", gap: 14, marginTop: 8, flexWrap: "wrap" }}>
            <span style={{ color: "#aaa", fontSize: 12.5, fontWeight: 700 }}>🥊 {dayEntries.length} {lang === "en" ? "entries" : "kayıt"}</span>
            {totalMin > 0 && <span style={{ color: "#10b981", fontSize: 12.5, fontWeight: 700 }}>⏱️ {totalMin} {lang === "en" ? "min" : "dk"}</span>}
            {totalKcal > 0 && <span style={{ color: RED, fontSize: 12.5, fontWeight: 700 }}>🔥 {totalKcal} kcal</span>}
          </div>
        </div>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{lang === "en" ? "THAT DAY" : "O GÜN YAPILANLAR"}</div>
        {dayEntries.map(e => {
          const isAuto = e.kind === "auto";
          return (
            <div key={e.id} onClick={() => { setSelected(e); setEditNote(e.note || ""); }} style={{ background: CARD, border: `1px solid ${isAuto ? RED + "33" : "#3b82f633"}`, borderRadius: 12, padding: "13px 14px", cursor: "pointer", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                <div style={{ color: "#fff", fontSize: 14.5, fontWeight: 800 }}>{e.title || (lang === "en" ? "Training note" : "Antrenman notu")}</div>
                <span style={{ background: isAuto ? `${RED}22` : "#3b82f622", color: isAuto ? RED : "#3b82f6", fontSize: 9.5, fontWeight: 800, padding: "2px 8px", borderRadius: 5, flexShrink: 0 }}>{isAuto ? t.autoTag : t.manualTag}</span>
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 6, flexWrap: "wrap" }}>
                {e.points > 0 && <span style={{ color: GOLD, fontSize: 12, fontWeight: 700 }}>+{e.points} {t.pts}</span>}
                {e.calories > 0 && <span style={{ color: RED, fontSize: 12, fontWeight: 700 }}>{e.calories}🔥</span>}
                {e.durationMin > 0 && <span style={{ color: "#10b981", fontSize: 12, fontWeight: 700 }}>{e.durationMin} {lang === "en" ? "min" : "dk"}</span>}
                {e.distanceKm > 0 && <span style={{ color: "#3b82f6", fontSize: 12, fontWeight: 700 }}>{e.distanceKm} km</span>}
              </div>
              {e.note ? (
                <div style={{ color: "#bbb", fontSize: 12.5, lineHeight: 1.5, marginTop: 8, background: "#ffffff08", borderRadius: 8, padding: "8px 10px" }}>📝 {e.note}</div>
              ) : (
                <div style={{ color: "#666", fontSize: 11.5, marginTop: 8, fontStyle: "italic" }}>{lang === "en" ? "Tap to add a note ›" : "Not eklemek için dokun ›"}</div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  // ── Detay / düzenleme ekranı ──
  if (selected) {
    const d = new Date(selected.date);
    const isAuto = selected.kind === "auto";
    return (
      <div>
        <button onClick={() => setSelected(null)} aria-label={t.back} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, fontWeight: 700, padding: 0 }}>‹ {t.journalTitle}</button>
        <div style={{ background: `linear-gradient(135deg, ${isAuto ? RED : "#3b82f6"}15, ${CARD})`, border: `1px solid ${isAuto ? RED : "#3b82f6"}44`, borderRadius: 16, padding: 18, marginBottom: 16 }}>
          <div style={{ color: "#666", fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 8 }}>{t.entryDetail}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div style={{ textAlign: "center", flexShrink: 0 }}>
              <div style={{ color: "#fff", fontSize: 28, fontWeight: 900, lineHeight: 1 }}>{d.getDate()}</div>
              <div style={{ color: "#888", fontSize: 10, fontWeight: 700 }}>{MONTH_NAMES[lang][d.getMonth()].slice(0, 3)} {d.getFullYear()}</div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#fff", fontSize: 16, fontWeight: 800, lineHeight: 1.3 }}>{selected.title || (lang === "en" ? "Training note" : "Antrenman notu")}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
                <span style={{ background: isAuto ? `${RED}22` : "#3b82f622", color: isAuto ? RED : "#3b82f6", fontSize: 10, fontWeight: 800, padding: "2px 8px", borderRadius: 5 }}>{isAuto ? t.autoTag : t.manualTag}</span>
                {selected.points > 0 && <span style={{ color: GOLD, fontSize: 13, fontWeight: 800 }}>+{selected.points} {t.pts}</span>}
                {selected.calories > 0 && <span style={{ color: RED, fontSize: 13, fontWeight: 800 }}>{selected.calories}🔥</span>}
                {selected.distanceKm > 0 && <span style={{ color: "#3b82f6", fontSize: 13, fontWeight: 800 }}>{selected.distanceKm} km</span>}
              </div>
            </div>
          </div>
          {selected.cats && selected.cats.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {selected.cats.map((cc, i) => <span key={i} style={{ background: "#ffffff0d", color: "#aaa", fontSize: 11, padding: "3px 9px", borderRadius: 6 }}>{cc}</span>)}
            </div>
          )}
        </div>
        {selected.phases && selected.phases.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{lang === "en" ? "WHAT YOU DID" : "YAPILAN HAREKETLER"}</div>
            {selected.phases.map((ph, pi) => (
              <div key={pi} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ color: "#fff", fontSize: 13, fontWeight: 800, marginBottom: 8 }}>{ph.name}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                  {ph.moves.map((m, mi) => (
                    <div key={mi} style={{ display: "flex", alignItems: "center", gap: 8, color: "#bbb", fontSize: 12.5 }}>
                      <span style={{ color: RED, fontWeight: 900 }}>·</span> {m}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{lang === "en" ? "MY NOTES" : "NOTLARIM"}</div>
        <textarea value={editNote} onChange={e => setEditNote(e.target.value)} placeholder={t.addNoteHere} rows={6} aria-label={lang === "en" ? "My notes" : "Notlarım"}
          style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 12, padding: "14px", color: "#fff", fontSize: 14, lineHeight: 1.6, marginBottom: 12, resize: "vertical", fontFamily: "inherit" }} />
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => handleDelete(selected.id)} aria-label={lang === "en" ? "Delete entry" : "Kaydı sil"} style={{ padding: "13px 18px", borderRadius: 12, border: `1px solid ${LINE}`, background: "transparent", color: "#888", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>🗑</button>
          <button onClick={handleUpdateNote} style={{ flex: 1, padding: "13px", borderRadius: 12, border: "none", background: RED, color: "#fff", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>{t.updateNote}</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Seri (streak) rozeti */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, background: streak > 0 ? "#ff6b0018" : "#ffffff06", border: `1px solid ${streak > 0 ? "#ff6b0055" : LINE}`, borderRadius: 14, padding: "12px 14px", marginBottom: 14 }}>
        <span style={{ fontSize: 26 }}>{streak > 0 ? "🔥" : "🥊"}</span>
        {streak > 0 ? (
          <span>
            <span style={{ color: "#ff8c3d", fontSize: 20, fontWeight: 900 }}>{streak}</span>
            <span style={{ color: "#ddd", fontSize: 13, fontWeight: 700, marginLeft: 6 }}>{t.streakDays}</span>
          </span>
        ) : (
          <span style={{ color: "#999", fontSize: 12.5, fontWeight: 600 }}>{t.streakStart}</span>
        )}
      </div>

      {/* Günün önerisi + motivasyon */}
      <div style={{ background: `linear-gradient(135deg, ${GOLD}12, ${CARD})`, border: `1px solid ${GOLD}33`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
        <div style={{ color: GOLD, fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 6 }}>💡 {t.todayTip}</div>
        <div style={{ color: "#eee", fontSize: 13, lineHeight: 1.5, marginBottom: 10 }}>{tip}</div>
        <div style={{ borderTop: `1px solid ${LINE}`, paddingTop: 10 }}>
          <div style={{ color: "#ddd", fontSize: 12.5, fontStyle: "italic", lineHeight: 1.45 }}>"{lang === "en" ? quote.en : quote.tr}"</div>
          <div style={{ color: RED, fontSize: 11, fontWeight: 800, marginTop: 4 }}>— {quote.author}</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>

        return (
          <div style={{ marginBottom: 18 }}>
            {fresh.length > 0 && (
              <div style={{ background: `linear-gradient(135deg, ${GOLD}22, ${CARD})`, border: `1px solid ${GOLD}`, borderRadius: 14, padding: "12px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 24 }}>🎉</span>
                <div>
                  <div style={{ color: GOLD, fontSize: 12.5, fontWeight: 900 }}>{lang === "en" ? "New achievement!" : "Yeni başarım!"}</div>
                  <div style={{ color: "#ddd", fontSize: 12, fontWeight: 600 }}>{fresh.map(a => `${a.icon} ${lang === "en" ? a.en : a.tr}`).join(" · ")}</div>
                </div>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, fontWeight: 700 }}>🏆 {lang === "en" ? "ACHIEVEMENTS" : "BAŞARIMLAR"}</div>
              <div style={{ color: GOLD, fontSize: 11, fontWeight: 800 }}>{unlockedCount}/{achs.length}</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              {achs.map(a => (
                <div key={a.id} style={{ background: a.unlocked ? `${a.color}18` : CARD, border: `1px solid ${a.unlocked ? a.color + "66" : LINE}`, borderRadius: 12, padding: "12px 8px", textAlign: "center", position: "relative", opacity: a.unlocked ? 1 : 0.62 }}>
                  <div style={{ fontSize: 24, marginBottom: 5, filter: a.unlocked ? "none" : "grayscale(1)" }}>{a.unlocked ? a.icon : "🔒"}</div>
                  <div style={{ color: a.unlocked ? "#fff" : "#888", fontSize: 10.5, fontWeight: 800, lineHeight: 1.2, marginBottom: 4 }}>{lang === "en" ? a.en : a.tr}</div>
                  {a.unlocked ? (
                    <div style={{ color: a.color, fontSize: 9, fontWeight: 800, letterSpacing: 0.3 }}>{lang === "en" ? "UNLOCKED" : "AÇILDI"}</div>
                  ) : (
                    <>
                      <div style={{ height: 4, background: "#1a1a1f", borderRadius: 2, overflow: "hidden", margin: "4px 2px 3px" }}>
                        <div style={{ height: "100%", width: `${a.pct}%`, background: a.color, borderRadius: 2 }} />
                      </div>
                      <div style={{ color: "#666", fontSize: 8.5, fontWeight: 700 }}>{a.current}/{a.goal}</div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Aylık kayıt listesi */}
      <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.monthList}</div>
      {yearEntries.length === 0 ? (
        <div style={{ textAlign: "center", padding: "32px 20px", background: CARD, border: `1px dashed ${LINE}`, borderRadius: 16 }}>
          <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.6 }}>🥊</div>
          <div style={{ color: "#ccc", fontSize: 14, fontWeight: 800, marginBottom: 6 }}>{t.emptyJournalTitle}</div>
          <div style={{ color: "#666", fontSize: 12.5, lineHeight: 1.5, marginBottom: onStartFirst ? 16 : 0 }}>{t.noEntries}</div>
          {onStartFirst && (
            <button onClick={onStartFirst} style={{ background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", border: "none", borderRadius: 12, padding: "13px 22px", fontSize: 14, fontWeight: 900, cursor: "pointer", boxShadow: `0 6px 20px ${RED}44`, letterSpacing: 0.3 }}>🥊 {lang === "en" ? "Start your first workout" : "İlk antrenmanına başla"}</button>
          )}
        </div>
      ) : (
        monthKeys.map(m => (
          <div key={m} style={{ marginBottom: 16 }}>
            <div style={{ color: "#888", fontSize: 12, fontWeight: 800, marginBottom: 8 }}>{MONTH_NAMES[lang][m]} {viewYear}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {byMonth[m].slice().reverse().map(e => {
                const d = new Date(e.date);
                const isAuto = e.kind === "auto";
                return (
                  <div key={e.id} onClick={() => { setSelected(e); setEditNote(e.note || ""); }} style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px 14px", cursor: "pointer" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: e.note ? 6 : 0 }}>
                      <div style={{ width: 36, textAlign: "center", flexShrink: 0 }}>
                        <div style={{ color: "#fff", fontSize: 16, fontWeight: 900, lineHeight: 1 }}>{d.getDate()}</div>
                        <div style={{ color: "#666", fontSize: 8, letterSpacing: 1 }}>{MONTH_NAMES[lang][d.getMonth()].slice(0, 3)}</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ color: "#eee", fontSize: 13, fontWeight: 700 }}>{e.title || (lang === "en" ? "Training note" : "Antrenman notu")}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, flexWrap: "wrap" }}>
                          <span style={{ background: isAuto ? `${RED}22` : "#3b82f622", color: isAuto ? RED : "#3b82f6", fontSize: 9, fontWeight: 800, padding: "1px 6px", borderRadius: 4 }}>{isAuto ? t.autoTag : t.manualTag}</span>
                          {e.points > 0 && <span style={{ color: GOLD, fontSize: 11, fontWeight: 800 }}>+{e.points} {t.pts}</span>}
                          {e.calories > 0 && <span style={{ color: RED, fontSize: 11, fontWeight: 800 }}>{e.calories}🔥</span>}
                          {e.distanceKm > 0 && <span style={{ color: "#3b82f6", fontSize: 11, fontWeight: 800 }}>{e.distanceKm} km</span>}
                        </div>
                      </div>
                      <button onClick={(ev) => { ev.stopPropagation(); handleDelete(e.id); }} aria-label={lang === "en" ? "Delete" : "Sil"} style={{ background: "none", border: "none", color: "#555", fontSize: 16, cursor: "pointer", flexShrink: 0 }}>×</button>
                    </div>
                    {e.note && <div style={{ color: "#999", fontSize: 12, lineHeight: 1.5, paddingLeft: 44, whiteSpace: "pre-wrap" }}>{e.note}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── Koşu Modu ────────────────────────────────────────────────────────────────
// ─── Gelişmiş Timer (kendi antrenmanın için round zamanlayıcı) ─────────────────
const TIMER_CFG_KEY = "boxerpro_timer_cfg_v1";
const TIMER_FAVS_KEY = "boxerpro_timer_favs_v1";
function loadTimerCfg() {
  const def = { rounds: 3, work: 180, rest: 60, prep: 10, preSoundOn: true, preSoundSec: 10, shakeOn: false };
  if (typeof window === "undefined") return def;
  try { return { ...def, ...JSON.parse(window.localStorage.getItem(TIMER_CFG_KEY) || "{}") }; } catch { return def; }
}
function saveTimerCfg(c) { try { window.localStorage.setItem(TIMER_CFG_KEY, JSON.stringify(c)); } catch {} }
function loadTimerFavs() {
  if (typeof window === "undefined") return [];
  try { return JSON.parse(window.localStorage.getItem(TIMER_FAVS_KEY) || "[]"); } catch { return []; }
}
function saveTimerFavs(f) { try { window.localStorage.setItem(TIMER_FAVS_KEY, JSON.stringify(f)); } catch {} }
const fmtMS = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function TimerMode({ lang, soundOn, onSaved }) {
  const [cfg, setCfg] = useState(loadTimerCfg);
  const [running, setRunning] = useState(false);
  const [active, setActive] = useState(false); // tam ekran timer açık mı
  const [phase, setPhase] = useState("prep"); // prep | work | rest | done
  const [round, setRound] = useState(1);
  const [left, setLeft] = useState(cfg.prep || 0);
  const iv = useRef(null);
  const leftRef = useRef(0); // combo çağırıcının, effect'i yeniden başlatmadan "kalan süre"yi okuyabilmesi için
  const lastPhraseRef = useRef(""); // art arda aynı sözün tekrarını engellemek için
  const cue = useRef({ ten:false, t3:false, t2:false, t1:false });
  const [combo, setCombo] = useState(false); // kombinasyon çağırıcı
  const comboT = useRef(null);
  const [favs, setFavs] = useState(loadTimerFavs);
  const [showFavs, setShowFavs] = useState(false);
  const [savingFav, setSavingFav] = useState(false);
  const [favName, setFavName] = useState("");
  const shakeCooldown = useRef(0);

  useEffect(() => { saveTimerCfg(cfg); }, [cfg]);
  useEffect(() => { leftRef.current = left; }, [left]);

  const phaseTotal = phase === "prep" ? (cfg.prep||1) : phase === "work" ? cfg.work : cfg.rest;
  const accent = phase === "work" ? RED : phase === "rest" ? "#10b981" : GOLD;

  const start = () => {
    haptic(HAPTIC.tap);
    cue.current = { ten:false, t3:false, t2:false, t1:false };
    const startPhase = (cfg.prep > 0) ? "prep" : "work";
    setPhase(startPhase); setRound(1); setLeft(startPhase === "prep" ? cfg.prep : cfg.work);
    setActive(true); setRunning(true);
    if (combo) primeSpeech();
    if (soundOn && startPhase === "work") playNextExercise();
  };
  const stopAll = () => { setRunning(false); clearInterval(iv.current); };
  const exit = () => { stopAll(); setActive(false); setPhase("prep"); setRound(1); setLeft(cfg.prep||0); };

  const logWorkout = () => {
    const totalMin = Math.max(1, Math.round((cfg.rounds * cfg.work) / 60));
    try { addJournalEntry({ kind: "auto", title: lang === "en" ? "⏱️ Timer session" : "⏱️ Timer antrenmanı", points: PTS_PER_WORKOUT, calories: Math.round(totalMin * 8), durationMin: totalMin }); } catch {}
    onSaved && onSaved();
  };

  // İlerleyiş: her saniye
  useEffect(() => {
    if (!running) { clearInterval(iv.current); return; }
    iv.current = setInterval(() => {
      setLeft(prev => {
        if (prev > 1) return prev - 1;
        // faz bitti → sonraki faza geç
        clearInterval(iv.current);
        advance();
        return 0;
      });
    }, 1000);
    return () => clearInterval(iv.current);
  }, [running, phase, round]);

  // Sesli uyarılar (Pre-Sound: ayarlanabilir saniye + son 3-2-1)
  useEffect(() => {
    if (!running || phase === "done") return;
    const c = cue.current;
    const warnAt = cfg.preSoundSec || 10;
    if (cfg.preSoundOn && left === warnAt && phaseTotal > warnAt + 1 && !c.ten) { c.ten = true; if (soundOn) playTenLeft(); haptic(HAPTIC.warning); }
    if (left === 3 && phaseTotal > 4 && !c.t3) { c.t3 = true; if (soundOn) playCountTick(false); haptic(HAPTIC.tap); }
    if (left === 2 && phaseTotal > 3 && !c.t2) { c.t2 = true; if (soundOn) playCountTick(false); haptic(HAPTIC.tap); }
    if (left === 1 && phaseTotal > 2 && !c.t1) { c.t1 = true; if (soundOn) playCountTick(true); haptic(HAPTIC.tap); }
  }, [left, running]);

  // Kombinasyon çağırıcı — sadece çalışma (work) fazında, rastgele combo/nida seslendir
  useEffect(() => {
    if (!(running && phase === "work" && combo)) { clearTimeout(comboT.current); return; }
    let stop = false;
    const pick = (arr) => {
      if (arr.length <= 1) return arr[0];
      let choice;
      do { choice = arr[Math.floor(Math.random() * arr.length)]; } while (choice === lastPhraseRef.current);
      return choice;
    };
    const say = (text) => { lastPhraseRef.current = text; speak(text, lang); haptic(HAPTIC.tap); };
    const estSpeechMs = (text) => 350 + text.split(/\s+/).length * 230; // konuşma süresini kabaca tahmin et, kesilmesin
    const fire = () => {
      if (stop) return;
      const combos = COMBO_CALLS[lang] || COMBO_CALLS.tr;
      const barks = BARK_CALLS[lang] || BARK_CALLS.tr;
      // Round ilerledikçe (kalan süre azaldıkça) hoca daha sık ve daha kesik konuşur — gerçek yorgunluk baskısı
      const totalWork = cfg.work || 1;
      const elapsedFrac = 1 - Math.min(1, leftRef.current / totalWork); // 0 (round başı) → 1 (round sonu)
      const barkChance = 0.28 + elapsedFrac * 0.22; // %28 → %50 arası
      const isBark = Math.random() < barkChance;
      const arr = isBark ? barks : combos;
      const phrase = pick(arr);
      say(phrase);
      // Kombinasyondan sonra bazen (round ilerledikçe daha sık) hızlı bir yönlendirme nidası ekle —
      // gerçek hocaların "1-2! ...Çık!" tarzı kombinasyon+direktif kalıbı
      const chainChance = 0.25 + elapsedFrac * 0.2;
      if (!isBark && Math.random() < chainChance) {
        const wait = estSpeechMs(phrase) + 150 + Math.random() * 250;
        setTimeout(() => { if (!stop) say(pick(barks)); }, wait);
      }
      const speedFactor = 1 - elapsedFrac * 0.35; // round sonuna doğru %35'e kadar hızlan
      const baseDelay = isBark ? (2800 + Math.random() * 400) : (2600 + Math.random() * 1600);
      comboT.current = setTimeout(fire, Math.max(1500, baseDelay * speedFactor));
    };
    comboT.current = setTimeout(fire, 1200);
    return () => { stop = true; clearTimeout(comboT.current); };
  }, [running, phase, combo, lang]);

  // Sallama ile duraklat/devam et — aktif timer ekranında, ayardan açıksa
  useEffect(() => {
    if (!(active && cfg.shakeOn) || typeof window === "undefined") return;
    const THRESHOLD = 18; // ivme farkı eşiği
    let last = { x: null, y: null, z: null };
    const onMotion = (e) => {
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a || a.x == null) return;
      if (last.x !== null) {
        const delta = Math.abs(a.x - last.x) + Math.abs(a.y - last.y) + Math.abs(a.z - last.z);
        const now = Date.now();
        if (delta > THRESHOLD && now - shakeCooldown.current > 1200) {
          shakeCooldown.current = now;
          setRunning(r => !r);
          haptic(HAPTIC.warning);
        }
      }
      last = { x: a.x, y: a.y, z: a.z };
    };
    window.addEventListener("devicemotion", onMotion);
    return () => window.removeEventListener("devicemotion", onMotion);
  }, [active, cfg.shakeOn]);

  const advance = () => {
    cue.current = { ten:false, t3:false, t2:false, t1:false };
    if (phase === "prep") { setPhase("work"); setLeft(cfg.work); if (soundOn) playNextExercise(); haptic(HAPTIC.success); return; }
    if (phase === "work") {
      if (round >= cfg.rounds) { setPhase("done"); setRunning(false); if (soundOn) playFinishBeeps(); haptic(HAPTIC.success); logWorkout(); return; }
      if (cfg.rest > 0) { setPhase("rest"); setLeft(cfg.rest); if (soundOn) playToRest(); haptic(HAPTIC.warning); }
      else { setRound(r => r+1); setLeft(cfg.work); if (soundOn) playNextExercise(); haptic(HAPTIC.success); }
      return;
    }
    if (phase === "rest") { setRound(r => r+1); setPhase("work"); setLeft(cfg.work); if (soundOn) playRestEnd(); haptic(HAPTIC.success); return; }
  };

  const skip = () => { clearInterval(iv.current); advance(); };
  const setC = (k,v) => setCfg(c => ({ ...c, [k]: v }));

  const requestShakePermission = async () => {
    try {
      if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== "granted") return false;
      }
      return true;
    } catch { return true; } // izin API'si olmayan cihazlarda (Android vb.) zaten gerekmiyor
  };
  const toggleShake = async () => {
    if (!cfg.shakeOn) { const ok = await requestShakePermission(); if (!ok) return; }
    setC("shakeOn", !cfg.shakeOn);
  };

  const applyFav = (f) => { setCfg(c => ({ ...c, rounds: f.rounds, work: f.work, rest: f.rest, prep: f.prep })); setShowFavs(false); };
  const deleteFav = (id) => { const next = favs.filter(f => f.id !== id); setFavs(next); saveTimerFavs(next); };
  const confirmSaveFav = () => {
    const name = favName.trim() || `${cfg.rounds}×${fmtMS(cfg.work)}`;
    const next = [...favs, { id: `f${Date.now()}`, name, rounds: cfg.rounds, work: cfg.work, rest: cfg.rest, prep: cfg.prep }];
    setFavs(next); saveTimerFavs(next); setSavingFav(false); setFavName("");
  };

  // ── KURULUM EKRANI ──
  if (!active) {
    const Stepper = ({ label, val, disp, min, max, step, onCh }) => (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: CARD, border: `1px solid ${LINE}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
        <span style={{ color: "#ddd", fontSize: 14, fontWeight: 700 }}>{label}</span>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => onCh(Math.max(min, val - step))} style={{ width: 34, height: 34, borderRadius: 10, border: `1px solid ${RED}55`, background: "transparent", color: RED, fontSize: 20, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
          <span style={{ color: "#fff", fontSize: 16, fontWeight: 900, minWidth: 58, textAlign: "center", fontVariantNumeric: "tabular-nums" }}>{disp}</span>
          <button onClick={() => onCh(Math.min(max, val + step))} style={{ width: 34, height: 34, borderRadius: 10, border: `1px solid ${RED}55`, background: "transparent", color: RED, fontSize: 20, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
        </div>
      </div>
    );
    const totalMin = Math.round((cfg.rounds * cfg.work + Math.max(0, cfg.rounds - 1) * cfg.rest + (cfg.prep||0)) / 60);
    return (
      <div>
        <div style={{ color: "#888", fontSize: 13, lineHeight: 1.5, marginBottom: 16 }}>{lang === "en" ? "Set up your own round timer for shadow, bag or any training. Rounds, work, rest — you decide." : "Kendi round zamanlayıcını kur: gölge, torba ya da istediğin antrenman için. Round, çalışma, dinlenme — hepsi sana kalmış."}</div>

        {/* Favoriler */}
        {favs.length > 0 && (
          <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
            {favs.map(f => (
              <div key={f.id} onClick={() => applyFav(f)} style={{ flexShrink: 0, background: CARD, border: `1px solid ${GOLD}44`, borderRadius: 12, padding: "10px 14px", cursor: "pointer", position: "relative" }}>
                <div style={{ color: GOLD, fontSize: 11, fontWeight: 900 }}>⭐ {f.name}</div>
                <div style={{ color: "#777", fontSize: 10, marginTop: 2 }}>{f.rounds} × {fmtMS(f.work)}</div>
                <button onClick={(e) => { e.stopPropagation(); deleteFav(f.id); }} style={{ position: "absolute", top: -6, right: -6, width: 18, height: 18, borderRadius: "50%", background: "#333", border: "none", color: "#999", fontSize: 11, lineHeight: 1, cursor: "pointer" }}>×</button>
              </div>
            ))}
          </div>
        )}
        {savingFav ? (
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <input autoFocus value={favName} onChange={e => setFavName(e.target.value)} placeholder={lang === "en" ? "Preset name (optional)" : "Ayar adı (opsiyonel)"} style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 13 }} />
            <button onClick={confirmSaveFav} style={{ background: GOLD, border: "none", borderRadius: 10, padding: "0 16px", color: "#000", fontWeight: 800, fontSize: 13, cursor: "pointer" }}>{lang === "en" ? "Save" : "Kaydet"}</button>
          </div>
        ) : (
          <button onClick={() => setSavingFav(true)} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, width: "100%", background: "transparent", border: `1px dashed ${GOLD}55`, borderRadius: 12, padding: "10px", color: GOLD, fontSize: 12.5, fontWeight: 800, cursor: "pointer", marginBottom: 14 }}>☆ {lang === "en" ? "Save as favorite" : "Favorilere Ekle"}</button>
        )}

        <Stepper label={lang==="en"?"Rounds":"Round sayısı"} val={cfg.rounds} disp={cfg.rounds} min={1} max={20} step={1} onCh={v=>setC("rounds",v)} />
        <Stepper label={lang==="en"?"Round time":"Round süresi"} val={cfg.work} disp={fmtMS(cfg.work)} min={10} max={600} step={10} onCh={v=>setC("work",v)} />
        <Stepper label={lang==="en"?"Rest":"Dinlenme"} val={cfg.rest} disp={cfg.rest===0?(lang==="en"?"None":"Yok"):fmtMS(cfg.rest)} min={0} max={180} step={5} onCh={v=>setC("rest",v)} />
        <Stepper label={lang==="en"?"Prepare":"Hazırlık"} val={cfg.prep} disp={cfg.prep===0?(lang==="en"?"None":"Yok"):cfg.prep+" sn"} min={0} max={30} step={5} onCh={v=>setC("prep",v)} />
        {/* Kombinasyon çağırıcı */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: combo ? `${RED}14` : CARD, border: `1px solid ${combo ? RED+"66" : LINE}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
          <span style={{ minWidth: 0, paddingRight: 10 }}>
            <span style={{ display: "block", color: "#ddd", fontSize: 14, fontWeight: 700 }}>🎙️ {lang==="en"?"Combo caller":"Kombinasyon çağırıcı"}</span>
            <span style={{ display: "block", color: "#888", fontSize: 11.5, marginTop: 2, lineHeight: 1.35 }}>{lang==="en"?"Calls random combos out loud during each round (great for shadow)." : "Her round'da sesli rastgele kombinasyon söyler (gölge boks için birebir)."}</span>
          </span>
          <button onClick={() => { const nx = !combo; setCombo(nx); if (nx) primeSpeech(); }} style={{ flexShrink: 0, background: combo ? RED : "#1e1e1e", color: combo ? "#fff" : "#666", border: "none", borderRadius: 20, padding: "8px 16px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{combo ? (lang==="en"?"ON":"AÇIK") : (lang==="en"?"OFF":"KAPALI")}</button>
        </div>

        {/* Pre-Sound: round bitmeden önce uyarı sesi */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: cfg.preSoundOn ? `${GOLD}12` : CARD, border: `1px solid ${cfg.preSoundOn ? GOLD+"55" : LINE}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
          <span style={{ minWidth: 0, paddingRight: 10 }}>
            <span style={{ display: "block", color: "#ddd", fontSize: 14, fontWeight: 700 }}>🔔 {lang==="en"?"Pre-Sound":"Ön Uyarı Sesi"}</span>
            <span style={{ display: "block", color: "#888", fontSize: 11.5, marginTop: 2, lineHeight: 1.35 }}>{lang==="en"?`Warns ${cfg.preSoundSec}s before each round ends.`:`Her round bitmeden ${cfg.preSoundSec} sn önce uyarır.`}</span>
          </span>
          <button onClick={() => setC("preSoundOn", !cfg.preSoundOn)} style={{ flexShrink: 0, background: cfg.preSoundOn ? GOLD : "#1e1e1e", color: cfg.preSoundOn ? "#000" : "#666", border: "none", borderRadius: 20, padding: "8px 16px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{cfg.preSoundOn ? (lang==="en"?"ON":"AÇIK") : (lang==="en"?"OFF":"KAPALI")}</button>
        </div>
        {cfg.preSoundOn && <Stepper label={lang==="en"?"Warn before":"Kaç sn önce"} val={cfg.preSoundSec} disp={cfg.preSoundSec+" sn"} min={3} max={59} step={1} onCh={v=>setC("preSoundSec",v)} />}

        {/* Shake: sallayarak duraklat/devam et */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: cfg.shakeOn ? `${RED}14` : CARD, border: `1px solid ${cfg.shakeOn ? RED+"66" : LINE}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
          <span style={{ minWidth: 0, paddingRight: 10 }}>
            <span style={{ display: "block", color: "#ddd", fontSize: 14, fontWeight: 700 }}>📳 {lang==="en"?"Shake to pause":"Sallayarak Duraklat"}</span>
            <span style={{ display: "block", color: "#888", fontSize: 11.5, marginTop: 2, lineHeight: 1.35 }}>{lang==="en"?"Shake your phone during the timer to pause/resume.":"Timer çalışırken telefonu salla, duraklat/devam et."}</span>
          </span>
          <button onClick={toggleShake} style={{ flexShrink: 0, background: cfg.shakeOn ? RED : "#1e1e1e", color: cfg.shakeOn ? "#fff" : "#666", border: "none", borderRadius: 20, padding: "8px 16px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{cfg.shakeOn ? (lang==="en"?"ON":"AÇIK") : (lang==="en"?"OFF":"KAPALI")}</button>
        </div>

        <div style={{ textAlign: "center", color: "#666", fontSize: 12.5, fontWeight: 700, margin: "6px 0 16px" }}>{lang==="en"?"Total":"Toplam"}: ~{totalMin} {lang==="en"?"min":"dk"}</div>
        <button onClick={start} style={{ width: "100%", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", border: "none", borderRadius: 16, padding: "18px", fontSize: 18, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 8px 26px ${RED}55` }}>▶ {lang==="en"?"START TIMER":"TIMER'I BAŞLAT"}</button>
      </div>
    );
  }

  // ── TAM EKRAN TIMER ──
  const R = 130, C = 2 * Math.PI * R;
  const frac = phaseTotal > 0 ? left / phaseTotal : 0;
  const phaseLabel = phase === "prep" ? (lang==="en"?"GET READY":"HAZIRLAN") : phase === "work" ? (lang==="en"?"WORK":"ÇALIŞ") : phase === "rest" ? (lang==="en"?"REST":"DİNLEN") : (lang==="en"?"DONE":"BİTTİ");
  return (
    <div style={{ position: "fixed", inset: 0, background: BG, zIndex: 200, maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 20px)" }}>
      {phase !== "done" ? (
        <>
          <div style={{ color: accent, fontSize: 15, fontWeight: 900, letterSpacing: 3, marginBottom: 10 }}>{phaseLabel}</div>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: `linear-gradient(135deg, ${GOLD}, #ffcf4d)`, borderRadius: 20, padding: "8px 20px", marginBottom: phase === "rest" ? 10 : 18, boxShadow: `0 4px 16px ${GOLD}44` }}>
            <span style={{ fontSize: 13 }}>★</span>
            <span style={{ color: "#1a1200", fontSize: 14, fontWeight: 900 }}>{lang==="en"?"Round":"Round"} {round} {lang==="en"?"of":"/"} {cfg.rounds}</span>
          </div>
          {phase === "rest" && <div style={{ color: "#8ab4f8", fontSize: 13, fontWeight: 600, fontStyle: "italic", marginBottom: 16, maxWidth: 280, textAlign: "center" }}>"{REST_QUOTES[lang][round % REST_QUOTES[lang].length]}"</div>}
          <button onClick={() => { const nx = !combo; setCombo(nx); if (nx) primeSpeech(); }} style={{ display: "inline-flex", alignItems: "center", gap: 7, background: combo ? `${RED}22` : "#ffffff08", border: `1px solid ${combo ? RED : LINE}`, color: combo ? "#fff" : "#888", borderRadius: 20, padding: "7px 14px", fontSize: 12, fontWeight: 800, cursor: "pointer", marginBottom: 18 }}>🎙️ {lang==="en"?"Combo caller":"Combo çağırıcı"}: {combo ? (lang==="en"?"ON":"AÇIK") : (lang==="en"?"OFF":"KAPALI")}</button>
          <div style={{ position: "relative", width: 300, height: 300, marginBottom: 4 }}>
            <svg width="300" height="300" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="150" cy="150" r={R} fill="none" stroke="#1a1a1f" strokeWidth="14" />
              <circle cx="150" cy="150" r={R} fill="none" stroke={accent} strokeWidth="14" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - frac)} style={{ transition: "stroke-dashoffset 1s linear" }} />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ color: "#fff", fontSize: 64, fontWeight: 900, fontVariantNumeric: "tabular-nums", letterSpacing: -2 }}>{fmtMS(left)}</div>
            </div>
          </div>
          {/* Yansıma efekti */}
          <div aria-hidden="true" style={{ color: accent, fontSize: 40, fontWeight: 900, fontVariantNumeric: "tabular-nums", letterSpacing: -1, transform: "scaleY(-1)", opacity: 0.14, marginTop: -6, marginBottom: 18, WebkitMaskImage: "linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 85%)", maskImage: "linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 85%)" }}>{fmtMS(left)}</div>

          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <button onClick={() => { const ok = window.confirm ? window.confirm(lang==="en"?"Restart from round 1?":"Round 1'den yeniden başlansın mı?") : true; if (ok) { stopAll(); start(); } }} aria-label={lang==="en"?"Reset":"Sıfırla"} style={{ width: 48, height: 48, borderRadius: "50%", background: CARD, border: `1px solid ${LINE}`, color: "#888", fontSize: 16, cursor: "pointer" }}>↺</button>
            <button onClick={exit} style={{ width: 56, height: 56, borderRadius: "50%", background: CARD, border: `1px solid ${LINE}`, color: "#888", fontSize: 18, cursor: "pointer" }}>✕</button>
            <button onClick={() => setRunning(r => !r)} style={{ width: 76, height: 76, borderRadius: "50%", background: accent, border: "none", color: "#fff", fontSize: 26, cursor: "pointer", boxShadow: `0 6px 22px ${accent}66` }}>{running ? "⏸" : "▶"}</button>
            <button onClick={skip} style={{ width: 56, height: 56, borderRadius: "50%", background: CARD, border: `1px solid ${LINE}`, color: "#888", fontSize: 18, cursor: "pointer" }}>⏭</button>
          </div>
        </>
      ) : (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 60, marginBottom: 12 }}>🏆</div>
          <div style={{ color: "#fff", fontSize: 26, fontWeight: 900, marginBottom: 8 }}>{lang==="en"?"Session complete!":"Antrenman bitti!"}</div>
          <div style={{ color: "#aaa", fontSize: 14, marginBottom: 4 }}>{cfg.rounds} round · {fmtMS(cfg.work)} {lang==="en"?"each":"her biri"}</div>
          <div style={{ color: GOLD, fontSize: 14, fontWeight: 800, marginBottom: 28 }}>+{PTS_PER_WORKOUT} {lang==="en"?"points":"puan"}</div>
          <div style={{ display: "flex", gap: 12 }}>
            <button onClick={() => { setPhase("prep"); setActive(false); }} style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, color: "#ccc", borderRadius: 14, padding: "15px", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>{lang==="en"?"Close":"Kapat"}</button>
            <button onClick={start} style={{ flex: 1, background: RED, border: "none", color: "#fff", borderRadius: 14, padding: "15px", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>↺ {lang==="en"?"Again":"Tekrar"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function RunningMode({ lang, onSaved }) {
  const t = T[lang];
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0); // saniye
  const [finished, setFinished] = useState(false);
  const [km, setKm] = useState("");
  const [saved, setSaved] = useState(false);
  const [gpsKm, setGpsKm] = useState(0); // GPS ile ölçülen mesafe
  const [gpsStatus, setGpsStatus] = useState("idle"); // idle | tracking | denied | unavailable
  const startRef = useRef(null);
  const accRef = useRef(0); // duraklatmada biriken süre
  const intRef = useRef(null);
  const watchRef = useRef(null);
  const lastPosRef = useRef(null);
  const gpsKmRef = useRef(0);

  // İki GPS noktası arası mesafe (Haversine, km)
  const haversine = (a, b) => {
    const R = 6371; // km
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
    const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  };

  const startGps = () => {
    if (typeof navigator === "undefined" || !navigator.geolocation) { setGpsStatus("unavailable"); return; }
    try {
      watchRef.current = navigator.geolocation.watchPosition(
        (pos) => {
          setGpsStatus("tracking");
          const cur = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy };
          if (lastPosRef.current && cur.acc < 30) { // sadece doğru okumalar
            const d = haversine(lastPosRef.current, cur);
            if (d > 0.002 && d < 0.5) { // 2m-500m arası sıçramaları al (zıplama/hata ele)
              gpsKmRef.current += d;
              setGpsKm(gpsKmRef.current);
              setKm(gpsKmRef.current.toFixed(2));
            }
          }
          lastPosRef.current = cur;
        },
        (err) => { setGpsStatus(err.code === 1 ? "denied" : "unavailable"); },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
      );
    } catch { setGpsStatus("unavailable"); }
  };
  const stopGps = () => { if (watchRef.current != null && navigator.geolocation) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; } };

  useEffect(() => {
    if (running) {
      startRef.current = Date.now();
      intRef.current = setInterval(() => {
        setElapsed(accRef.current + Math.floor((Date.now() - startRef.current) / 1000));
      }, 500);
      startGps();
    } else {
      clearInterval(intRef.current);
      if (startRef.current) accRef.current += Math.floor((Date.now() - startRef.current) / 1000);
      startRef.current = null;
      stopGps();
      lastPosRef.current = null; // duraklatınca son konumu sıfırla (boşluk eklenmesin)
    }
    return () => { clearInterval(intRef.current); stopGps(); };
  }, [running]);

  useWakeLock(running);

  const reset = () => { setRunning(false); setElapsed(0); setFinished(false); setKm(""); setSaved(false); setGpsKm(0); setGpsStatus("idle"); accRef.current = 0; startRef.current = null; gpsKmRef.current = 0; lastPosRef.current = null; };
  const finish = () => { setRunning(false); setFinished(true); };

  const minutes = elapsed / 60;
  const kmNum = parseFloat(km) || 0;
  const cals = kmNum > 0 ? runningCalories(kmNum, minutes, userWeight()) : 0;
  const paceMin = kmNum > 0 ? minutes / kmNum : 0;
  const paceStr = paceMin > 0 ? `${Math.floor(paceMin)}:${String(Math.round((paceMin % 1) * 60)).padStart(2, "0")}` : "—";

  const handleSave = () => {
    if (kmNum <= 0) return;
    addJournalEntry({
      kind: "auto",
      title: `${lang === "en" ? "Run" : "Koşu"} · ${kmNum} km`,
      points: PTS_PER_WORKOUT,
      cats: [lang === "en" ? "Running" : "Koşu"],
      calories: cals,
      distanceKm: kmNum,
      durationMin: Math.round(minutes),
      note: `${kmNum} km · ${Math.floor(minutes)} dk · ${paceStr} ${t.runMinPerKm} · ${cals} kcal`,
    });
    setSaved(true);
    if (onSaved) onSaved({ calories: cals });
  };

  const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
  const ss = String(elapsed % 60).padStart(2, "0");

  if (saved) {
    return (
      <div style={{ textAlign: "center", padding: "30px 10px" }}>
        <div style={{ fontSize: 60, marginBottom: 14 }}>🏃</div>
        <div style={{ color: GOLD, fontSize: 18, fontWeight: 900, marginBottom: 20 }}>{t.runSaved}</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: "#3b82f6", fontSize: 22, fontWeight: 900 }}>{kmNum}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>KM</div>
          </div>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: RED, fontSize: 22, fontWeight: 900 }}>{cals}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>🔥 KCAL</div>
          </div>
          <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 14 }}>
            <div style={{ color: GOLD, fontSize: 22, fontWeight: 900 }}>{paceStr}</div>
            <div style={{ color: "#666", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>{t.runMinPerKm.toUpperCase()}</div>
          </div>
        </div>
        <button onClick={reset} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>
          {lang === "en" ? "New Run" : "Yeni Koşu"}
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, #10b98115, ${CARD})`, border: `1px solid #10b98144`, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>🏃</div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 6 }}>{t.runTitle}</div>
        <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{t.runDesc}</div>
      </div>

      {/* Kronometre */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 20, padding: "28px 20px", textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 64, fontWeight: 900, color: running ? "#10b981" : "#fff", letterSpacing: 2, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{mm}:{ss}</div>
        <div style={{ color: "#666", fontSize: 11, letterSpacing: 3, marginTop: 8, fontWeight: 700 }}>{running ? (lang === "en" ? "RUNNING..." : "KOŞUYORSUN...") : (lang === "en" ? "TIMER" : "KRONOMETRE")}</div>
        {/* Canlı GPS mesafe */}
        {(gpsStatus === "tracking" || gpsKm > 0) && (
          <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${LINE}` }}>
            <div style={{ color: "#10b981", fontSize: 34, fontWeight: 900, fontVariantNumeric: "tabular-nums" }}>{gpsKm.toFixed(2)} <span style={{ fontSize: 16 }}>km</span></div>
            <div style={{ color: "#10b981", fontSize: 10, letterSpacing: 1, fontWeight: 700, marginTop: 4 }}>{t.gpsTracking}</div>
          </div>
        )}
        {running && gpsStatus === "denied" && <div style={{ color: GOLD, fontSize: 11, marginTop: 12, lineHeight: 1.4 }}>{t.gpsDenied}</div>}
        {running && gpsStatus === "unavailable" && <div style={{ color: "#888", fontSize: 11, marginTop: 12, lineHeight: 1.4 }}>{t.gpsUnavailable}</div>}
        {running && gpsStatus === "tracking" && <div style={{ color: "#555", fontSize: 10, marginTop: 8 }}>{t.gpsHint}</div>}
      </div>

      {/* Kontroller */}
      {!finished ? (
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          {!running ? (
            <button onClick={() => setRunning(true)} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: "#10b981", color: "#fff", fontSize: 16, fontWeight: 900, cursor: "pointer" }}>
              {elapsed > 0 ? t.runResume : t.runStart}
            </button>
          ) : (
            <button onClick={() => setRunning(false)} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: GOLD, color: "#000", fontSize: 16, fontWeight: 900, cursor: "pointer" }}>
              {t.runPause}
            </button>
          )}
          {elapsed > 0 && !running && (
            <button onClick={finish} style={{ flex: 2, padding: "17px", borderRadius: 14, border: "none", background: RED, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>
              {t.runFinish}
            </button>
          )}
        </div>
      ) : (
        /* Mesafe girişi */
        <div style={{ background: CARD, border: `1px solid ${RED}44`, borderRadius: 16, padding: 18, marginBottom: 14 }}>
          <div style={{ color: "#fff", fontSize: 14, fontWeight: 800, marginBottom: 12 }}>{t.runDistance}{gpsKm > 0 && <span style={{ color: "#10b981", fontSize: 11, fontWeight: 700 }}> · 📍 GPS: {gpsKm.toFixed(2)} km</span>}</div>
          <input type="number" inputMode="decimal" value={km} onChange={e => setKm(e.target.value)} placeholder="5.0" autoFocus
            style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 12, padding: "16px", color: "#fff", fontSize: 24, fontWeight: 900, textAlign: "center", marginBottom: 14 }} />
          {kmNum > 0 && (
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: RED, fontSize: 20, fontWeight: 900 }}>{cals}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>🔥 KCAL</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: GOLD, fontSize: 20, fontWeight: 900 }}>{paceStr}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>{t.runMinPerKm.toUpperCase()}</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: "#10b981", fontSize: 20, fontWeight: 900 }}>{Math.floor(minutes)}</div>
                <div style={{ color: "#666", fontSize: 9, fontWeight: 700, marginTop: 2 }}>DK</div>
              </div>
            </div>
          )}
          <button onClick={handleSave} disabled={kmNum <= 0} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: kmNum > 0 ? `linear-gradient(135deg, ${RED}, #ff6b6b)` : "#222", color: kmNum > 0 ? "#fff" : "#555", fontSize: 15, fontWeight: 900, cursor: kmNum > 0 ? "pointer" : "default" }}>
            {t.runFinish}
          </button>
        </div>
      )}

      <button onClick={reset} style={{ width: "100%", padding: "11px", borderRadius: 12, border: `1px solid ${LINE}`, background: "transparent", color: "#666", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
        {t.runReset}
      </button>
    </div>
  );
}
