// Ana ekran kartları için gömülü vektörel sanat (fotoğraf yok, telifsiz, her cihazda net)
function HomeCardArt({ kind, color }) {
  const c = color || "#ffffff";
  const wrap = { position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none" };
  if (kind === "glove") {
    return (
      <svg viewBox="0 0 270 188" preserveAspectRatio="xMidYMid slice" style={wrap}>
        <g stroke={c} strokeWidth="3" opacity="0.10" strokeLinecap="round">
          {[26, 42, 58, 74].map((y, i) => <line key={i} x1={4 + i * 6} y1={y} x2={64 - i * 4} y2={y} />)}
        </g>
        <g opacity="0.13" fill={c}>
          <ellipse cx="212" cy="92" rx="46" ry="50" />
          <ellipse cx="171" cy="116" rx="19" ry="29" />
          <rect x="156" y="136" width="104" height="34" rx="11" />
        </g>
        <g opacity="0.08" fill={c}>
          {[0, 1, 2, 3].map(r => [0, 1, 2, 3, 4].map(col => <circle key={r + "-" + col} cx={14 + col * 13} cy={112 + r * 13} r="2.2" />))}
        </g>
      </svg>
    );
  }
  if (kind === "timer") {
    const cx = 214, cy = 92, R = 54;
    const ticks = Array.from({ length: 12 }, (_, i) => {
      const a = (i / 12) * Math.PI * 2;
      return { x1: cx + Math.cos(a) * (R - 8), y1: cy + Math.sin(a) * (R - 8), x2: cx + Math.cos(a) * R, y2: cy + Math.sin(a) * R };
    });
    return (
      <svg viewBox="0 0 270 188" preserveAspectRatio="xMidYMid slice" style={wrap}>
        <g stroke={c} fill="none" opacity="0.14">
          <circle cx={cx} cy={cy} r={R} strokeWidth="4" />
          <circle cx={cx} cy={cy} r={R - 13} strokeWidth="1.5" strokeDasharray="2 7" />
          {ticks.map((t, i) => <line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2} strokeWidth="3" strokeLinecap="round" />)}
          <path d={`M${cx} ${cy} L${cx} ${cy - R + 16}`} strokeWidth="4" strokeLinecap="round" />
          <path d={`M${cx} ${cy} L${cx + 26} ${cy + 10}`} strokeWidth="3" strokeLinecap="round" />
        </g>
        <circle cx={cx} cy={cy} r="4" fill={c} opacity="0.2" />
      </svg>
    );
  }
  // trophy / rozet
  const cx = 210, cy = 88;
  const rays = Array.from({ length: 12 }, (_, i) => {
    const a = (i / 12) * Math.PI * 2;
    return { x2: cx + Math.cos(a) * 70, y2: cy + Math.sin(a) * 70 };
  });
  return (
    <svg viewBox="0 0 270 188" preserveAspectRatio="xMidYMid slice" style={wrap}>
      <g stroke={c} strokeWidth="3" opacity="0.10" strokeLinecap="round">
        {rays.map((r, i) => <line key={i} x1={cx} y1={cy} x2={r.x2} y2={r.y2} />)}
      </g>
      <g opacity="0.16" fill={c}>
        <path d={`M${cx-26} ${cy-30} h52 v10 q0 26 -26 30 q-26 -4 -26 -30 z`} />
        <path d={`M${cx-30} ${cy-26} q-12 2 -12 14 q0 10 14 12`} fill="none" stroke={c} strokeWidth="4" />
        <path d={`M${cx+30} ${cy-26} q12 2 12 14 q0 10 -14 12`} fill="none" stroke={c} strokeWidth="4" />
        <rect x={cx-5} y={cy+8} width="10" height="16" />
        <rect x={cx-18} y={cy+24} width="36" height="9" rx="3" />
      </g>
    </svg>
  );
}

function AppInner() {
  const [lang, setLang] = useState("tr");
  const [showSplash, setShowSplash] = useState(true);
  const [profile, setProfile] = useState(null);
  const [showProfile, setShowProfile] = useState(false); // onboarding veya düzenleme
  const [showTour, setShowTour] = useState(false);
  const [tab, setTab] = useState("home");
  const [showSettings, setShowSettings] = useState(false);
  const [showEquipment, setShowEquipment] = useState(false);
  const [showPremium, setShowPremium] = useState(false);

  // Ayarlar
  const [roundSec, setRoundSec] = useState(180);
  const [restSec, setRestSec] = useState(60);
  const [coachOn, setCoachOn] = useState(true);
  const [soundOn, setSoundOn] = useState(true);
  const [warnSec, setWarnSec] = useState(30);
  const [equipment, setEquipment] = useState(["none", "rope", "bag"]);

  // Puan & kemer & disiplin cezası
  const [progress, setProgress] = useState({ points: 0, workouts: 0, lastWorkoutDate: null });
  const [penaltyNotice, setPenaltyNotice] = useState(null); // { days, points }
  const [beltUnlock, setBeltUnlock] = useState(null); // yeni açılan kemer (kutlama)
  useEffect(() => {
    const loaded = loadProgress();
    const { progress: penalized, penaltyDays, penaltyPoints } = applyDisciplinePenalty(loaded);
    setProgress(penalized);
    if (penaltyDays > 0) setPenaltyNotice({ days: penaltyDays, points: penaltyPoints });
    const prof = loadProfile();
    if (prof) setProfile(prof);
  }, []);
  const onWorkoutComplete = (info) => {
    setProgress(prev => {
      const before = prev.points;
      const after = before + PTS_PER_WORKOUT;
      const np = { points: after, workouts: prev.workouts + 1, lastWorkoutDate: todayStr() };
      saveProgress(np);
      // Bu antrenmanla yeni bir kemer eşiği aşıldı mı?
      const newlyUnlocked = BELTS.find(b => b.pts > 0 && before < b.pts && after >= b.pts);
      if (newlyUnlocked) setBeltUnlock(newlyUnlocked);
      return np;
    });
    // Günlüğe otomatik kayıt
    addJournalEntry({
      kind: "auto",
      title: (info && info.title) || (lang === "en" ? "Workout completed" : "Antrenman tamamlandı"),
      points: PTS_PER_WORKOUT,
      cats: (info && info.cats) || [],
      calories: (info && info.calories) || 0,
      durationMin: (info && info.durationMin) || 0,
      phases: (info && info.phases) || null,
    });
    setPenaltyNotice(null); // antrenman yapınca ceza uyarısını kaldır
  };

  const toggleEquip = (id) => setEquipment(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const t = T[lang];

  const tabs = [
    { id: "home", icon: "🏠", label: lang === "en" ? "Home" : "Ana", title: lang === "en" ? "Home" : "Ana Ekran" },
    { id: "progress", icon: "📊", label: lang === "en" ? "Analysis" : "Analiz", title: lang === "en" ? "Personal Analysis" : "Kişisel Analiz" },
    { id: "train", icon: "🥊", label: lang === "en" ? "Train" : "Antrenman", title: lang === "en" ? "Training Time" : "Antrenman Vakti" },
    { id: "techniques", icon: "📚", label: lang === "en" ? "Moves" : "Teknik", title: lang === "en" ? "Techniques & Moves" : "Teknik ve Hareketler" },
    { id: "more", icon: "⚙️", label: lang === "en" ? "Settings" : "Ayarlar", title: lang === "en" ? "Settings" : "Ayarlar" },
  ];
  const [trainSub, setTrainSub] = useState("auto"); // Antrenman içi segment: auto/build/run
  const [autoInitMin, setAutoInitMin] = useState(null); // Ana ekrandan seçilen hızlı süre
  const [quickAutoGen, setQuickAutoGen] = useState(false); // Hızlı/Standart/Tam/Pro kartından mı geldi — profile göre anında program kur
  const [autoFlowActive, setAutoFlowActive] = useState(false); // Hızlı akış başladı mı — quickAutoGen tetikleyicisi tüketilse bile AutoProgram ekranda kalsın
  const [autoLevel, setAutoLevel] = useState(null); // Otomatik Program akışı 1. adımda seçilen seviye (ayrı ekran)
  const [favProgram, setFavProgram] = useState(null); // favoriden başlatılan program
  const [favs, setFavs] = useState(() => loadFavorites());
  const refreshFavs = () => setFavs(loadFavorites());
  useEffect(() => { if (tab === "home" && !favProgram) setFavs(loadFavorites()); }, [tab, favProgram]);
  // Sekme veya antrenman alt-ekranı değişince sayfayı en üste sarla — kullanıcı her zaman ekranın başından görsün
  useEffect(() => { window.scrollTo(0, 0); }, [tab, trainSub, autoLevel]);

  const saveProfileAndClose = (p) => { saveProfile(p); setProfile(p); setShowProfile(false); if (!tourSeen()) setShowTour(true); };
  // Koşu kaydedildiğinde: puan/kemer ekle (günlüğe RunningMode zaten yazdı)
  const onRunSaved = () => {
    setProgress(prev => {
      const before = prev.points;
      const after = before + PTS_PER_WORKOUT;
      const np = { points: after, workouts: prev.workouts + 1, lastWorkoutDate: todayStr() };
      saveProgress(np);
      const newlyUnlocked = BELTS.find(b => b.pts > 0 && before < b.pts && after >= b.pts);
      if (newlyUnlocked) setBeltUnlock(newlyUnlocked);
      return np;
    });
    setPenaltyNotice(null);
  };

  if (showSplash) return <SplashScreen onStart={() => { setShowSplash(false); if (!loadProfile()) setShowProfile(true); }} lang={lang} setLang={setLang} />;
  // Onboarding: profil hiç oluşturulmamışsa veya kullanıcı düzenlemek istediyse
  if (showProfile) return <ProfileScreen lang={lang} initial={profile} isEdit={!!profile} onSave={saveProfileAndClose} onSkip={() => { saveProfile({ completed: true, skipped: true }); setProfile({ completed: true, skipped: true }); setShowProfile(false); if (!tourSeen()) setShowTour(true); }} />;
  if (showTour) return <TourScreen lang={lang} onDone={() => { markTourSeen(); setShowTour(false); }} />;

  return (
    <div style={{ background: BG, minHeight: "100vh", fontFamily: "'Inter',-apple-system,sans-serif", color: "#fff", maxWidth: 430, margin: "0 auto" }}>
      {/* Global cila: buton dokunma efekti, içerik belirme, kaydırma yumuşatma */}
      <style>{`
        * { -webkit-tap-highlight-color: transparent; }
        button { transition: transform 0.08s ease, opacity 0.15s ease; touch-action: manipulation; }
        button:active { transform: scale(0.96); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content { animation: fadeIn 0.25s ease-out; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        input, textarea, select { -webkit-appearance: none; }
        body { overscroll-behavior: none; }
      `}</style>
      {/* Kemer kutlama paneli */}
      {beltUnlock && (
        <div onClick={() => setBeltUnlock(null)} style={{ position: "fixed", inset: 0, zIndex: 300, background: "rgba(0,0,0,0.85)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, maxWidth: 430, margin: "0 auto", cursor: "pointer" }}>
          <style>{`@keyframes beltPop{0%{transform:scale(0) rotate(-30deg);opacity:0}55%{transform:scale(1.25) rotate(10deg)}100%{transform:scale(1) rotate(0);opacity:1}}@keyframes beltGlow{0%,100%{filter:drop-shadow(0 0 18px ${beltUnlock.color}99)}50%{filter:drop-shadow(0 0 38px ${beltUnlock.color})}}`}</style>
          <div style={{ fontSize: 100, animation: "beltPop 0.7s ease-out, beltGlow 1.8s ease-in-out infinite 0.7s" }}>{beltUnlock.icon}</div>
          <div style={{ color: beltUnlock.color, fontSize: 13, letterSpacing: 4, fontWeight: 900, marginTop: 16, marginBottom: 6 }}>{t.beltUnlocked}</div>
          <div style={{ color: "#fff", fontSize: 26, fontWeight: 900, textAlign: "center", marginBottom: 4 }}>{lang === "en" ? beltUnlock.nameEn : beltUnlock.nameTr}</div>
          <div style={{ color: "#888", fontSize: 13, marginBottom: 30 }}>{beltUnlock.pts}+ {t.points}</div>
          <button onClick={() => setBeltUnlock(null)} style={{ background: `linear-gradient(135deg, ${beltUnlock.color}, ${GOLD})`, color: "#000", border: "none", borderRadius: 14, padding: "14px 40px", fontSize: 15, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>{t.beltContinue}</button>
        </div>
      )}
      <div style={{ padding: "calc(env(safe-area-inset-top) + 20px) 20px 0", background: `linear-gradient(180deg, #15050a 0%, ${BG} 100%)` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 10, color: RED, letterSpacing: 4, fontWeight: 900, marginBottom: 6 }}>{t.appTitle}</div>
            <div style={{ fontSize: 24, fontWeight: 900, letterSpacing: -1, lineHeight: 1.1 }}>{t.appSub.split(" ")[0]}<br /><span style={{ color: RED }}>{t.appSub.split(" ").slice(1).join(" ") || t.appSub}</span></div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
            <LangToggle lang={lang} setLang={setLang} />
          </div>
        </div>

        {penaltyNotice && (
          <div style={{ background: `${RED}1a`, border: `1px solid ${RED}66`, borderRadius: 12, padding: "12px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 22 }}>⚠️</span>
            <div style={{ flex: 1 }}>
              <div style={{ color: RED, fontSize: 11, fontWeight: 900, letterSpacing: 1 }}>{t.penaltyTitle}</div>
              <div style={{ color: "#ddd", fontSize: 12, marginTop: 2 }}>{t.penaltyMsg(penaltyNotice.days, penaltyNotice.points)}</div>
              <div style={{ color: "#fff", fontSize: 12, marginTop: 5, fontStyle: "italic", fontWeight: 600 }}>🥊 {disciplineMessage(penaltyNotice.days, lang)}</div>
            </div>
            <button onClick={() => setPenaltyNotice(null)} style={{ background: "none", border: "none", color: "#888", fontSize: 18, cursor: "pointer" }}>×</button>
          </div>
        )}
        {(tab === "home" || tab === "progress") && <BeltBar points={progress.points} lang={lang} />}
        {tab === "home" && (() => { const s = computeStreak(loadJournal()); return s > 0 ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 8 }}>
            <span style={{ fontSize: 14 }}>🔥</span>
            <span style={{ color: "#ff8c3d", fontSize: 13, fontWeight: 900 }}>{s}</span>
            <span style={{ color: "#888", fontSize: 11.5, fontWeight: 700 }}>{t.streakDays}</span>
          </div>
        ) : null; })()}
      </div>

      <div key={tab + (favProgram ? "fav" : "") + (tab === "train" ? trainSub + (autoInitMin || "") : "")} className="tab-content" style={{ padding: "20px 20px calc(env(safe-area-inset-bottom) + 110px)" }}>
        {!favProgram && (() => {
          const accents = { home: RED, progress: "#3b82f6", train: "#f97316", techniques: "#a855f7", more: "#10b981" };
          const ac = accents[tab] || RED;
          const cur = tabs.find(x => x.id === tab) || {};
          return (
            <div style={{ position: "relative", marginBottom: 20 }}>
              {/* Sayfaya özel yumuşak renk ışıması */}
              <div style={{ position: "absolute", top: -30, left: -20, width: 200, height: 120, background: ac, opacity: 0.16, filter: "blur(60px)", borderRadius: "50%", pointerEvents: "none" }} />
              <div style={{ display: "flex", alignItems: "center", gap: 12, position: "relative" }}>
                <span style={{ fontSize: 26, filter: `drop-shadow(0 0 12px ${ac}aa)` }}>{cur.icon}</span>
                <span style={{ color: "#fff", fontSize: 25, fontWeight: 900, letterSpacing: -0.4 }}>{cur.title}</span>
              </div>
              <div style={{ width: 44, height: 4, background: ac, borderRadius: 2, marginTop: 10, boxShadow: `0 0 14px ${ac}` }} />
            </div>
          );
        })()}
        {/* ── ANA (Home): vitrin — çipler + yana kaydırılan kartlar ── */}
        {tab === "home" && !favProgram && (() => {
          const quickPresets = [
            { min: 15, sub: lang === "en" ? "Quick" : "Hızlı", img: QUICK_IMG_15 },
            { min: 30, sub: lang === "en" ? "Standard" : "Standart", img: QUICK_IMG_30 },
            { min: 45, sub: lang === "en" ? "Full" : "Tam", img: QUICK_IMG_45 },
            { min: 60, sub: lang === "en" ? "Pro" : "Pro", img: QUICK_IMG_60 },
          ];
          const chip = (icon, label, onClick, gold) => (
            <button onClick={onClick} style={{ flexShrink: 0, display: "flex", alignItems: "center", gap: 7, background: CARD, border: `1px solid ${gold ? GOLD + "88" : LINE}`, color: gold ? GOLD : "#ddd", borderRadius: 22, padding: "10px 16px", fontSize: 13.5, fontWeight: 800, cursor: "pointer" }}>
              <span style={{ fontSize: 15 }}>{icon}</span>{label}
            </button>
          );
          return (
            <div>
              {/* Antrenman günü hatırlatma bandı (reminder açık + bugün çalışılmadıysa) */}
              {(() => {
                const rem = loadReminder();
                if (!rem.enabled) return null;
                const today = todayStr();
                const trainedToday = loadJournal().some(e => e.date === today && (e.kind === "auto" || e.durationMin > 0));
                if (trainedToday) return null;
                return (
                  <button onClick={() => { setAutoInitMin(null); setQuickAutoGen(false); setAutoLevel(null); setAutoFlowActive(false); setTrainSub("auto"); setTab("train"); }} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, background: `linear-gradient(135deg, ${RED}22, ${CARD})`, border: `1px solid ${RED}55`, borderRadius: 14, padding: "13px 15px", marginBottom: 16, cursor: "pointer", textAlign: "left" }}>
                    <span style={{ fontSize: 24 }}>🔔</span>
                    <span style={{ flex: 1 }}>
                      <span style={{ display: "block", color: "#fff", fontSize: 14, fontWeight: 800 }}>{lang === "en" ? "Time to train today!" : "Bugün antrenman zamanı!"}</span>
                      <span style={{ display: "block", color: "#bbb", fontSize: 12, marginTop: 1 }}>{lang === "en" ? "Keep your streak alive — tap to start." : "Serini bozma — başlamak için dokun."}</span>
                    </span>
                    <span style={{ background: RED, color: "#fff", borderRadius: 20, padding: "8px 14px", fontSize: 12.5, fontWeight: 900 }}>▶</span>
                  </button>
                );
              })()}
              {/* Aksiyon çipleri (yatay kaydırma) */}
              <div style={{ display: "flex", gap: 9, overflowX: "auto", paddingBottom: 6, marginBottom: 22, scrollbarWidth: "none" }}>
                {chip("⭐", "Premium", () => setShowPremium(true), true)}
                {chip("🎛", lang === "en" ? "Create" : "Kendin Kur", () => { setTrainSub("build"); setTab("train"); })}
                {chip("🔖", lang === "en" ? "Favorites" : "Favoriler", () => { const el = document.getElementById("home-favs"); if (el) el.scrollIntoView({ behavior: "smooth" }); })}
                {chip("📚", lang === "en" ? "Moves" : "Teknikler", () => setTab("techniques"))}
              </div>

              {/* SENİN İÇİN ÖNERİLEN */}
              <div style={{ color: "#fff", fontSize: 16, fontWeight: 900, letterSpacing: 0.3, marginBottom: 4 }}>{lang === "en" ? "RECOMMENDED FOR YOU" : "SENİN İÇİN ÖNERİLEN"}</div>
              <div style={{ color: "#777", fontSize: 12.5, lineHeight: 1.4, marginBottom: 14 }}>{lang === "en" ? "Based on your profile and what you've done so far." : "Profiline ve şimdiye kadar yaptıklarına göre."}</div>
              <div style={{ display: "flex", gap: 14, overflowX: "auto", paddingBottom: 10, marginBottom: 26, scrollbarWidth: "none" }}>
                {/* Büyük öneri kartı 1 */}
                <button onClick={() => { setAutoInitMin(null); setQuickAutoGen(false); setAutoLevel(null); setAutoFlowActive(false); setTrainSub("auto"); setTab("train"); }} style={{ flexShrink: 0, width: 270, height: 188, borderRadius: 20, border: "none", cursor: "pointer", padding: 22, textAlign: "left", position: "relative", overflow: "hidden", background: `linear-gradient(150deg, ${RED}, #7f1d1d)`, boxShadow: "0 10px 30px rgba(0,0,0,0.4)" }}>
                  <img src={CARD_IMG_GLOVES} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={{ position: "absolute", inset: 0, background: `linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.55)), linear-gradient(120deg, ${RED}55, transparent 60%)` }} />
                  <div style={{ color: "#fff", fontSize: 23, fontWeight: 900, lineHeight: 1.15, position: "relative", textShadow: "0 2px 12px rgba(0,0,0,0.6)" }}>{lang === "en" ? "Find your next workout" : "Sıradaki antrenmanını bul"}</div>
                  <div style={{ position: "absolute", left: 22, bottom: 22, display: "inline-flex", alignItems: "center", gap: 8, background: "#ffffff", color: "#111", borderRadius: 22, padding: "10px 16px", fontSize: 13, fontWeight: 900 }}>🔍 {lang === "en" ? "START" : "BAŞLA"}</div>
                </button>
                {/* Kart 2 — timer */}
                <button onClick={() => { setTrainSub("run"); setTab("train"); }} style={{ flexShrink: 0, width: 270, height: 188, borderRadius: 20, border: "none", cursor: "pointer", padding: 22, textAlign: "left", position: "relative", overflow: "hidden", background: "linear-gradient(150deg, #10b981, #064e3b)", boxShadow: "0 10px 30px rgba(0,0,0,0.4)" }}>
                  <img src={CARD_IMG_RING} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.6)), linear-gradient(120deg, rgba(16,185,129,0.35), transparent 60%)" }} />
                  <div style={{ color: "#fff", fontSize: 23, fontWeight: 900, lineHeight: 1.15, position: "relative", textShadow: "0 2px 12px rgba(0,0,0,0.6)" }}>{lang === "en" ? "Round Timer" : "Round Timer"}</div>
                  <div style={{ position: "absolute", left: 22, bottom: 22, display: "inline-flex", alignItems: "center", gap: 8, background: "#ffffff", color: "#111", borderRadius: 22, padding: "10px 16px", fontSize: 13, fontWeight: 900 }}>▶ {lang === "en" ? "OPEN" : "AÇ"}</div>
                </button>
                {/* Kart 3 — başarımlar */}
                <button onClick={() => setTab("progress")} style={{ flexShrink: 0, width: 270, height: 188, borderRadius: 20, border: "none", cursor: "pointer", padding: 22, textAlign: "left", position: "relative", overflow: "hidden", background: "#111", boxShadow: "0 10px 30px rgba(0,0,0,0.4)" }}>
                  <img src={CARD_IMG_CHAMP} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={{ position: "absolute", inset: 0, background: `linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.6)), linear-gradient(120deg, ${GOLD}44, transparent 60%)` }} />
                  <div style={{ color: "#fff", fontSize: 23, fontWeight: 900, lineHeight: 1.15, position: "relative", textShadow: "0 2px 12px rgba(0,0,0,0.7)" }}>{lang === "en" ? "Your records & badges" : "Rekorların & rozetlerin"}</div>
                  <div style={{ position: "absolute", left: 22, bottom: 22, display: "inline-flex", alignItems: "center", gap: 8, background: GOLD, color: "#1a1205", borderRadius: 22, padding: "10px 16px", fontSize: 13, fontWeight: 900 }}>📊 {lang === "en" ? "VIEW" : "GÖR"}</div>
                </button>
              </div>

              {/* HAZIR ANTRENMANLAR */}
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ color: "#fff", fontSize: 16, fontWeight: 900, letterSpacing: 0.3 }}>{lang === "en" ? "READY WORKOUTS" : "HAZIR ANTRENMANLAR"}</div>
              </div>
              <div style={{ color: "#777", fontSize: 12.5, marginBottom: 14 }}>{lang === "en" ? "Tap a duration — jump straight into training, built for your level." : "Bir süreye dokun — seviyene göre hazırlanmış antrenmana direkt gir."}</div>
              <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 10, marginBottom: 26, scrollbarWidth: "none" }}>
                {quickPresets.map(p => (
                  <button key={p.min} onClick={() => { setAutoInitMin(p.min); setQuickAutoGen(true); setAutoFlowActive(true); setTrainSub("auto"); setTab("train"); }} style={{ flexShrink: 0, width: 130, height: 150, borderRadius: 18, border: "none", cursor: "pointer", padding: 0, textAlign: "left", position: "relative", overflow: "hidden", boxShadow: "0 8px 22px rgba(0,0,0,0.35)" }}>
                    <img src={p.img} alt={p.sub} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                    <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.35) 45%, rgba(0,0,0,0.88) 100%)" }} />
                    <div style={{ position: "absolute", left: 16, bottom: 30, color: "#fff", fontSize: 26, fontWeight: 900, letterSpacing: -0.5, textShadow: "0 2px 8px rgba(0,0,0,0.6)" }}>{p.min} <span style={{ fontSize: 14, fontWeight: 800 }}>{lang === "en" ? "min" : "dk"}</span></div>
                    <div style={{ position: "absolute", left: 16, bottom: 12, color: "rgba(255,255,255,0.9)", fontSize: 12.5, fontWeight: 700, textShadow: "0 1px 6px rgba(0,0,0,0.6)" }}>{p.sub}</div>
                  </button>
                ))}
              </div>

              {/* FAVORİLER */}
              {favs.length > 0 && (
                <div id="home-favs">
                  <div style={{ color: "#fff", fontSize: 16, fontWeight: 900, letterSpacing: 0.3, marginBottom: 14 }}>⭐ {lang === "en" ? "MY FAVORITES" : "FAVORİLERİM"}</div>
                  {favs.map(f => (
                    <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 10, background: CARD, border: `1px solid ${GOLD}33`, borderLeft: `4px solid ${GOLD}`, borderRadius: 14, padding: "14px 14px", marginBottom: 10 }}>
                      <button onClick={() => setFavProgram(f.program)} style={{ flex: 1, textAlign: "left", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                        <span style={{ display: "block", color: "#fff", fontSize: 15, fontWeight: 800, marginBottom: 3 }}>{f.label}</span>
                        <span style={{ display: "block", color: "#888", fontSize: 12 }}>{f.program.subtitle || f.program.totalTime || ""}</span>
                      </button>
                      <button onClick={() => setFavProgram(f.program)} style={{ background: GOLD, color: "#000", border: "none", borderRadius: 10, padding: "9px 14px", fontSize: 13, fontWeight: 900, cursor: "pointer" }}>▶</button>
                      <button onClick={() => { if (window.confirm(lang === "en" ? "Remove this favorite?" : "Bu favoriyi sil?")) { removeFavorite(f.id); refreshFavs(); } }} aria-label={lang === "en" ? "Remove" : "Sil"} style={{ background: "transparent", color: "#777", border: `1px solid ${LINE}`, borderRadius: 10, padding: "9px 11px", fontSize: 13, cursor: "pointer" }}>🗑</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}
        {tab === "home" && favProgram && (
          <div>
            <button onClick={() => setFavProgram(null)} style={{ background: "transparent", border: "none", color: "#888", fontSize: 14, fontWeight: 700, cursor: "pointer", marginBottom: 14, padding: 0 }}>{t.trainBack}</button>
            <ProgramDisplay program={favProgram} accentColor={RED} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onComplete={onWorkoutComplete} equipment={equipment} level={profile && profile.experience ? suggestedLevel(profile.experience) : "intermediate"} onSavedFav={refreshFavs} />
          </div>
        )}

        {/* ── İLERLEME (Progress) ── */}
        {tab === "progress" && (<div><HeroBanner img={BANNER_PROG} color="#3b82f6" /><TrainingJournal lang={lang} onStartFirst={() => { setAutoLevel(null); setAutoFlowActive(false); setTrainSub("auto"); setTab("train"); }} /></div>)}

        {/* ── TEKNİKLER (Moves) ── */}
        {tab === "techniques" && (<div><HeroBanner img={BANNER_TECH} color="#a855f7" /><MoveLibrary lang={lang} /></div>)}

        {/* ── ANTRENMAN (Train): üstte segment geçişi ── */}
        {tab === "train" && (
          <div>
            <HeroBanner img={BANNER_TRAIN} color="#f97316" />
            <div style={{ display: "flex", gap: 6, background: CARD, borderRadius: 12, padding: 4, marginBottom: 18 }}>
              {[{ id: "auto", icon: "⚡", label: lang === "en" ? "Auto" : "Otomatik" }, { id: "build", icon: "🥊", label: lang === "en" ? "Build" : "Kendin Kur" }, { id: "run", icon: "⏱️", label: lang === "en" ? "Timer" : "Timer" }].map(sg => (
                <button key={sg.id} onClick={() => setTrainSub(sg.id)} style={{ flex: 1, background: trainSub === sg.id ? RED : "transparent", color: trainSub === sg.id ? "#fff" : "#888", border: "none", borderRadius: 9, padding: "10px 4px", fontSize: 12.5, fontWeight: 800, cursor: "pointer" }}>{sg.icon} {sg.label}</button>
              ))}
            </div>
            {trainSub === "auto" && (
              autoFlowActive || autoLevel ? (
                <AutoProgram lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} equipment={equipment} onWorkoutComplete={onWorkoutComplete} initMin={autoInitMin} autoGenerate={quickAutoGen} onConsumedAutoGenerate={() => setQuickAutoGen(false)} initLevel={autoLevel} onChangeLevel={() => setAutoLevel(null)} />
              ) : (
                <AutoLevelPicker lang={lang} onPick={(lvl) => setAutoLevel(lvl)} />
              )
            )}
            {trainSub === "build" && <ProgramPicker lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} equipment={equipment} onWorkoutComplete={onWorkoutComplete} />}
            {trainSub === "run" && <TimerMode lang={lang} soundOn={soundOn} onSaved={onRunSaved} />}
          </div>
        )}

        {/* ── AYARLAR (Settings): sadece ayarlarla ilgili ── */}
        {tab === "more" && (
          <div>
            <EquipmentPanel lang={lang} equipment={equipment} toggleEquip={toggleEquip} />
            <div style={{ height: 14 }} />
            <SettingsPanel lang={lang} roundSec={roundSec} setRoundSec={setRoundSec} restSec={restSec} setRestSec={setRestSec} coachOn={coachOn} setCoachOn={setCoachOn} soundOn={soundOn} setSoundOn={setSoundOn} warnSec={warnSec} setWarnSec={setWarnSec} onEditProfile={() => setShowProfile(true)} onReplayTour={() => setShowTour(true)} />
          </div>
        )}
      </div>

      {/* Premium tam ekran açılır */}
      {showPremium && (
        <div style={{ position: "fixed", inset: 0, zIndex: 300, background: BG, overflowY: "auto", maxWidth: 430, margin: "0 auto" }}>
          <div style={{ padding: "calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 30px)" }}>
            <button onClick={() => setShowPremium(false)} style={{ background: CARD, border: `1px solid ${LINE}`, color: "#aaa", borderRadius: 10, padding: "9px 16px", fontSize: 14, fontWeight: 700, cursor: "pointer", marginBottom: 16 }}>✕ {lang === "en" ? "Close" : "Kapat"}</button>
            <PremiumPanel lang={lang} />
          </div>
        </div>
      )}

      {/* Sabit alt menü (fotoğraftaki gibi) */}
      <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 100, background: "rgba(16,16,20,0.92)", backdropFilter: "blur(14px)", WebkitBackdropFilter: "blur(14px)", borderTop: `1px solid ${LINE}`, padding: "8px 6px calc(env(safe-area-inset-bottom) + 8px)", maxWidth: 430, margin: "0 auto", display: "flex" }}>
        {tabs.map(tb => {
          const accents = { home: RED, progress: "#3b82f6", train: "#f97316", techniques: "#a855f7", more: "#10b981" };
          const ac = accents[tb.id] || RED;
          const active = tab === tb.id;
          return (
            <button key={tb.id} onClick={() => { setTab(tb.id); setFavProgram(null); }} style={{ flex: 1, background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "6px 2px" }}>
              <span style={{ fontSize: 21, lineHeight: 1, filter: active ? `drop-shadow(0 0 8px ${ac}aa)` : "grayscale(0.4)", opacity: active ? 1 : 0.55, transform: active ? "translateY(-1px)" : "none", transition: "all 0.2s" }}>{tb.icon}</span>
              <span style={{ fontSize: 10, fontWeight: active ? 900 : 700, color: active ? ac : "#777", letterSpacing: 0.2 }}>{tb.label}</span>
              <span style={{ width: 5, height: 5, borderRadius: "50%", background: active ? ac : "transparent", marginTop: 1 }} />
            </button>
          );
        })}
      </div>
    </div>
  );
}
// ─── Hata Sınırı (çökme koruması) ─────────────────────────────────────────────
// Beklenmedik bir hata olursa tüm uygulama beyaz ekrana düşmesin; nazik bir
// kurtarma ekranı göster. Bozuk veri vs. durumlarda kullanıcı uygulamadan atılmaz.
class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(err, info) { /* sessiz: üretimde loglama servisi bağlanabilir */ }
  handleReset = () => { this.setState({ hasError: false }); };
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ background: BG, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, maxWidth: 430, margin: "0 auto", textAlign: "center", fontFamily: "'Inter',-apple-system,sans-serif" }}>
          <div style={{ fontSize: 50, marginBottom: 16 }}>🥊</div>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 10 }}>Bir şeyler ters gitti / Something went wrong</div>
          <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5, marginBottom: 24 }}>Verilerin güvende. Uygulamayı yeniden başlatmayı dene. / Your data is safe. Try restarting.</div>
          <button onClick={this.handleReset} style={{ padding: "14px 28px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer" }}>↺ Yeniden Dene / Retry</button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  return (
    <ErrorBoundary>
      <AppInner />
    </ErrorBoundary>
  );
}

// Babel derlemesi bitince boot ekranini kaldir ve uygulamayi mount et.
const __rootEl = document.getElementById('root');
const __root = ReactDOM.createRoot(__rootEl);
__root.render(React.createElement(App));
const __boot = document.getElementById('boot');
if (__boot) {
  __boot.style.transition = 'opacity 0.35s ease';
  __boot.style.opacity = '0';
  setTimeout(() => __boot.remove(), 380);
}
</script>
