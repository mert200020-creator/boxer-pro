<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0c; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  /* Yükleme ekranı (Babel derlerken görünür) */
  #boot {
    position: fixed; inset: 0; background: #0a0a0c; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    font-family: 'Inter', sans-serif; z-index: 9999;
  }
  #boot .glove { font-size: 56px; animation: bootPulse 1.1s ease-in-out infinite; }
  #boot .ttl { color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; }
  #boot .sub { color: #FF3333; font-size: 11px; font-weight: 800; letter-spacing: 4px; }
  @keyframes bootPulse { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.12); opacity: 1; } }
  ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
  /* Genel cila: sekme geçişinde yumuşak giriş + butonlarda dokunma hissi */
  .tab-content { animation: fadeUp 0.30s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  button { transition: transform 0.08s ease, filter 0.15s ease, opacity 0.15s ease; }
  button:active { transform: scale(0.96); }
  /* Yatay kart şeritlerinde kaydırma akıcı olsun */
  div[style*="overflow-x: auto"], div[style*="overflowX"] { -webkit-overflow-scrolling: touch; }
</style>

// ─── Ses Sistemi (Web Audio — çan/zil, dosya gerektirmez) ─────────────────────
let _audioCtx = null, _masterBus = null;
function getAudioCtx() {
  if (typeof window === "undefined") return null;
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { return null; }
  }
  if (_audioCtx.state === "suspended") { try { _audioCtx.resume(); } catch {} }
  return _audioCtx;
}
// Master bus: kompresör + yüksek kazanç → müzik çalarken bile duyulur, kesilmez, bozulmaz.
function getMasterBus() {
  const ctx = getAudioCtx();
  if (!ctx) return null;
  if (!_masterBus || _masterBus._ctx !== ctx) {
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -16; comp.knee.value = 22; comp.ratio.value = 4;
    comp.attack.value = 0.002; comp.release.value = 0.18;
    const g = ctx.createGain();
    g.gain.value = 3.2; // müziğin üstünde net duyulacak yükseklik
    comp.connect(g); g.connect(ctx.destination);
    comp._ctx = ctx;
    _masterBus = comp;
  }
  return _masterBus;
}
function bellStrike(fundamental, when = 0, peak = 0.5, decay = 2.4) {
  const ctx = getAudioCtx();
  const bus = getMasterBus();
  if (!ctx || !bus) return;
  const partials = [
    { mult: 1.0, g: 1.0, d: 1.0 }, { mult: 2.0, g: 0.6, d: 0.9 },
    { mult: 2.76, g: 0.4, d: 0.7 }, { mult: 3.0, g: 0.25, d: 0.6 },
    { mult: 4.07, g: 0.2, d: 0.45 }, { mult: 5.43, g: 0.12, d: 0.35 },
  ];
  const t0 = ctx.currentTime + when;
  partials.forEach(p => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = fundamental * p.mult;
    osc.connect(g); g.connect(bus);
    const amp = peak * p.g, dur = decay * p.d;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(amp, t0 + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  });
}
function playDong() { bellStrike(660, 0, 0.78, 2.6); bellStrike(988, 0.14, 0.62, 2.8); }
function playBeep() { bellStrike(1318, 0, 0.8, 0.9); bellStrike(1318, 0.16, 0.8, 0.9); } // çift, keskin uyarı bipi
function playFinishBeeps() { bellStrike(784, 0, 0.7, 1.6); bellStrike(988, 0.18, 0.7, 1.8); bellStrike(1319, 0.4, 0.75, 3.0); }

// Düşük gürültü tabanlı "whoosh" — geçiş vurgusu için
function whoosh(when = 0, peak = 0.35, dur = 0.45, hi = false) {
  const ctx = getAudioCtx();
  const bus = getMasterBus();
  if (!ctx || !bus) return;
  const t0 = ctx.currentTime + when;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len); // sönen gürültü
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter(); filt.type = "bandpass";
  filt.frequency.setValueAtTime(hi ? 1800 : 500, t0);
  filt.frequency.exponentialRampToValueAtTime(hi ? 600 : 1600, t0 + dur);
  filt.Q.value = 0.8;
  const g = ctx.createGain();
  g.gain.setValueAtTime(peak, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(filt); filt.connect(g); g.connect(bus);
  src.start(t0); src.stop(t0 + dur + 0.05);
}

// HAREKETTEN HAREKETE geçiş: güçlü, yükselen çift gong + whoosh (savaşa devam hissi)
function playNextExercise() {
  whoosh(0, 0.5, 0.4, true);
  bellStrike(523, 0.05, 0.8, 1.8);   // C5
  bellStrike(784, 0.22, 0.85, 2.2);  // G5 — yükselen, motive edici
}

// ─── Sesli Komut (SpeechSynthesis — Hayali Antrenör) ──────────────────────────
let _voicesReady = false;
function primeSpeech() {
  // Mobilde sesi "ısıt" — kullanıcı dokunuşu anında sessiz bir utterance ile motor uyandırılır
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance("");
    u.volume = 0;
    window.speechSynthesis.speak(u);
    _voicesReady = true;
  } catch {}
}
function pickVoice(lang) {
  if (typeof window === "undefined" || !window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  const want = lang === "en" ? "en" : "tr";
  const matches = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(want));
  if (matches.length === 0) return null;
  // Cihazda birden fazla ses varsa, daha net/güçlü duyulan "gelişmiş" kalite sesleri tercih et
  // (iOS: "Enhanced"/"Premium", Android/Chrome: "Neural"/"Natural" gibi etiketlerle gelir)
  const quality = matches.find(v => /enhanced|premium|neural|natural|studio/i.test(v.name));
  return quality || matches[0];
}
function speak(text, lang) {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === "en" ? "en-US" : "tr-TR";
    const v = pickVoice(lang);
    if (v) u.voice = v;
    // Hoca tonu: net, güçlü ve önde duyulsun — hafif hızlı ve az daha kalın perde, gerçek köşe hocası gibi
    u.rate = 1.08; u.pitch = 0.92; u.volume = 1.0;
    // Konuşma bitince Web Audio motorunu uyandır (iOS'te konuşma sonrası bipler kesilmesin)
    u.onend = () => { try { getMasterBus(); } catch {} };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch {}
}

function haptic(pattern = 40) {
  if (typeof navigator !== "undefined" && navigator.vibrate) {

}

// ─── Wake Lock (antrenman sırasında ekran uyumasın) ───────────────────────────
function useWakeLock(active) {
  useEffect(() => {
    if (!active || typeof navigator === "undefined") return;
    let lock = null;
    let released = false;

    // 1) Native Wake Lock API (destekleyen tarayıcılarda birincil yöntem)
    const requestNative = async () => {
      if (!navigator.wakeLock) return;
      try { lock = await navigator.wakeLock.request("screen"); } catch {}
    };
    requestNative();
    const onVisible = () => { if (!released && document.visibilityState === "visible") requestNative(); };
    document.addEventListener("visibilitychange", onVisible);

    // 2) Yedek yöntem: iOS'ta (özellikle "Ana Ekrana Ekle" ile kurulmuş PWA'da) Wake Lock API
    // güvenilir değil. Görünmez, sessiz bir "video" (canvas'tan üretilen akış) oynatarak
    // tarayıcının ekranı kilitlememesini sağlıyoruz — dışarıdan dosya gerektirmez.
    let video = null;
    try {
      const canvas = document.createElement("canvas");
      canvas.width = 2; canvas.height = 2;
      const ctx = canvas.getContext("2d");
      if (ctx) ctx.fillRect(0, 0, 2, 2);
      const stream = canvas.captureStream ? canvas.captureStream(1) : null;
      if (stream) {
        video = document.createElement("video");
        video.muted = true;
        video.setAttribute("muted", "");
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.loop = true;
        video.style.position = "fixed";
        video.style.width = "1px";
        video.style.height = "1px";
        video.style.opacity = "0";
        video.style.pointerEvents = "none";
        video.srcObject = stream;
        document.body.appendChild(video);
        video.play().catch(() => {});
      }
    } catch {}

    return () => {
      released = true;
      document.removeEventListener("visibilitychange", onVisible);
      try { lock && lock.release(); } catch {}
      try { if (video) { video.pause(); video.srcObject = null; video.remove(); } } catch {}
    };
  }, [active]);
}

function callsForStep(step, lang) {
  const phase = (step?.phaseName || "");
  // Isınma / Soğuma önce kontrol edilir — buralarda vuruş komutu verilmez
  if (/Isınma|Warm/i.test(phase)) return WARMUP_CALLS[lang];
  if (/Soğuma|Cool/i.test(phase)) return COOLDOWN_CALLS[lang];
  const name = (step?.name || "") + " " + phase;
  for (const m of MOVE_CALLS) { if (m.test.test(name)) return m[lang]; }
  const p = phase.toLowerCase();
  if (/kuvvet|strength/.test(p)) return PHASE_CALLS.strength[lang];
  if (/kondisyon|cardio/.test(p)) return PHASE_CALLS.cardio[lang];
  if (/ayak|footwork/.test(p)) return PHASE_CALLS.footwork[lang];
  if (/savunma|defense|defence/.test(p)) return PHASE_CALLS.defense[lang];
  return COMBO_CALLS[lang]; // gölge/torba/kombinasyon/sparring → vuruş kombinasyonları
}

];
const PTS_PER_WORKOUT = 75;        // puan kazanmak artık daha zor (100 → 75)
const PENALTY_PER_DAY = 100;       // her boş gün için ceza
const STORE_KEY = "boxerpro_progress_v2";

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
// İki YYYY-MM-DD tarihi arası tam gün farkı
function daysBetween(a, b) {
  const da = new Date(a + "T00:00:00"), db = new Date(b + "T00:00:00");
  return Math.floor((db - da) / 86400000);
}

function loadProgress() {
  if (typeof window === "undefined") return { points: 0, workouts: 0, lastWorkoutDate: null };
  try {
    const raw = window.localStorage.getItem(STORE_KEY);
    if (raw) { const p = JSON.parse(raw); return { points: p.points || 0, workouts: p.workouts || 0, lastWorkoutDate: p.lastWorkoutDate || null }; }
  } catch {}
  return { points: 0, workouts: 0, lastWorkoutDate: null };
}
function saveProgress(p) {
  try { window.localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch {}
}

// ─── Ghost Modu — geçmiş antrenman rekorları (localStorage) ───────────────────
const GHOST_KEY = "boxerpro_ghost_v1";
// title bazlı en iyi skor saklanır: { [title]: { rounds, intensityScore, totalTime } }
function loadGhosts() {
  if (typeof window === "undefined") return {};
  try { return JSON.parse(window.localStorage.getItem(GHOST_KEY) || "{}"); } catch { return {}; }
}
function getGhost(title) {
  return loadGhosts()[title] || null;
}
// Yeni skoru kaydet — sadece öncekinden iyiyse rekoru günceller
function saveGhost(title, stats) {
  try {
    const all = loadGhosts();
    const prev = all[title];
    if (!prev || stats.intensityScore > prev.intensityScore) {
      all[title] = { rounds: stats.rounds, intensityScore: stats.intensityScore, totalTime: stats.totalTime };
      window.localStorage.setItem(GHOST_KEY, JSON.stringify(all));
    }
  } catch {}
}

// ─── Kullanıcı Profili (localStorage) ─────────────────────────────────────────
// { name, age, weight, height, fitness, experience, stance, goal, weeklyTarget, completed }
const PROFILE_KEY = "boxerpro_profile_v1";
function loadProfile() {
  if (typeof window === "undefined") return null;
  try { const p = window.localStorage.getItem(PROFILE_KEY); return p ? JSON.parse(p) : null; } catch { return null; }
}
function saveProfile(p) {
  try { window.localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
}
// Boks tecrübesine göre önerilen seviye
function suggestedLevel(experience) {
  if (experience === "none" || experience === "beginner") return "beginner";
  if (experience === "intermediate") return "intermediate";
  if (experience === "advanced" || experience === "pro") return "pro";
  return "beginner";
}
// BMI hesabı (bilgi amaçlı)
function calcBMI(weight, height) {
  const w = parseFloat(weight), h = parseFloat(height) / 100;
  if (!w || !h) return null;
  return (w / (h * h)).toFixed(1);
}
// Profilden kilo al (yoksa varsayılan 70 kg)
function userWeight() {
  const p = loadProfile();
  const w = p && parseFloat(p.weight);
  return (w && w > 20 && w < 300) ? w : 70;
}
// Kalori = MET × kilo(kg) × süre(saat). MET değerleri aktiviteye göre.
// Boks/torba ~8-10, gölge ~6, sparring ~12, kondisyon ~9, kuvvet ~5, ip ~11
function metForPhase(phaseName) {
  const n = (phaseName || "").toLowerCase();
  if (n.includes("ısın") || n.includes("warm") || n.includes("soğu") || n.includes("cool")) return 4;
  if (n.includes("sparring") || n.includes("spar")) return 12;
  if (n.includes("torba") || n.includes("bag")) return 9.5;
  if (n.includes("kondisyon") || n.includes("cardio")) return 9;
  if (n.includes("gölge") || n.includes("shadow")) return 6.5;
  if (n.includes("kombinasyon") || n.includes("combo")) return 8;
  if (n.includes("kuvvet") || n.includes("strength")) return 5.5;
  if (n.includes("ayak") || n.includes("footwork")) return 7;
  if (n.includes("savunma") || n.includes("defense")) return 6;
  if (n.includes("dinlen") || n.includes("rest")) return 1.5;
  return 7; // genel boks antrenmanı ortalaması
}
// Bir programın toplam kalorisini tahmin et (faz sürelerine göre)
function estimateProgramCalories(program, weight) {
  const w = weight || userWeight();
  let totalSec = 0, weightedMet = 0;
  (program.phases || []).forEach(phase => {
    const phaseMet = metForPhase(phase.name);
    (phase.exercises || []).forEach(ex => {
      // Hareketin kendi MET'i varsa onu kullan (tabloda her harekete atandı), yoksa faz ortalaması
      const met = (typeof ex.met === "number" && ex.met > 0) ? ex.met : phaseMet;
      const sec = parseProgSeconds(ex.duration || ex.sets || "");
      totalSec += sec; weightedMet += met * sec;
    });
  });
  if (totalSec === 0) return 0;
  const avgMet = weightedMet / totalSec;
  const hours = totalSec / 3600;
  return Math.round(avgMet * w * hours);
}
// "3x3 dk" / "45 sn" / "3 dk" → saniye
function parseProgSeconds(str) {
  if (!str) return 0;
  let m = str.match(/(\d+)x(\d+)\s*dk/); if (m) return parseInt(m[1]) * parseInt(m[2]) * 60;
  m = str.match(/(\d+)x(\d+)\s*sn/);     if (m) return parseInt(m[1]) * parseInt(m[2]);
  m = str.match(/(\d+)\s*dk/);            if (m) return parseInt(m[1]) * 60;
  m = str.match(/(\d+)\s*sn/);            if (m) return parseInt(m[1]);
  return 0;
}
// Programın toplam aktif süresi (saniye)
function estimateProgramSeconds(program) {
  let total = 0;
  (program.phases || []).forEach(phase => (phase.exercises || []).forEach(ex => { total += parseProgSeconds(ex.duration || ex.sets || ""); }));
  return total;
}
// Koşu kalorisi: MET koşu temposuna göre (km/saat). ~7-14 MET aralığı.
function runningCalories(km, minutes, weight) {
  const w = weight || userWeight();
  const d = parseFloat(km) || 0;
  if (d <= 0) return 0;
  // Koşuda kalori esas olarak MESAFEYE bağlı: ~kilo(kg) × km kcal (fiziksel iş temelli).
  // Taban katsayı ~0.95 kcal/kg/km. Süre/tempo varsa küçük bir düzeltme uygula.
  let perKgPerKm = 0.95;
  if (minutes && minutes > 0) {
    const speed = d / (minutes / 60); // km/saat
    // Hızlı koşu birim mesafede biraz daha fazla yakar; çok yavaş (yürüyüş) biraz az
    if (speed >= 13) perKgPerKm = 1.05;
    else if (speed >= 11) perKgPerKm = 1.02;
    else if (speed >= 8) perKgPerKm = 0.98;
    else if (speed >= 6) perKgPerKm = 0.95;
    else perKgPerKm = 0.85; // yürüyüş temposu
  }
  return Math.round(perKgPerKm * w * d);
}

// Seri (streak): bugünden veya dünden geriye, en az bir antrenman kaydı olan ardışık gün sayısı.
// Bugün henüz antrenman yapılmadıysa seri kopmaz (dün antrenman varsa "devam ediyor" sayılır);
// hem bugün hem dün boşsa seri 0'a düşer.
function computeStreak(entries) {
  if (!entries || entries.length === 0) return 0;
  const days = new Set(entries.map(e => e.date));
  const d = new Date();
  const fmt = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
  let streak = 0;
  let cursor = new Date(d);
  if (!days.has(fmt(cursor))) cursor.setDate(cursor.getDate() - 1); // bugün yoksa dünden başla
  while (days.has(fmt(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
  return streak;
}

// Kişisel rekorlar — günlük verisinden hesaplanır (tüm zamanlar)
function personalRecords() {
  const all = loadJournal();
  const workouts = all.filter(e => e.kind === "auto" || e.durationMin > 0);
  const totalWorkouts = all.length;
  const totalMin = all.reduce((s, e) => s + (e.durationMin || 0), 0);
  const totalKcal = all.reduce((s, e) => s + (e.calories || 0), 0);
  const longestMin = all.reduce((m, e) => Math.max(m, e.durationMin || 0), 0);
  const bestKcal = all.reduce((m, e) => Math.max(m, e.calories || 0), 0);
  // En uzun gün serisi (ardışık günlerde kayıt)
  const days = [...new Set(all.map(e => e.date))].sort();
  let bestStreak = 0, cur = 0, prev = null;
  for (const d of days) {
    if (prev) {
      const diff = Math.round((new Date(d) - new Date(prev)) / 86400000);
      cur = diff === 1 ? cur + 1 : 1;
    } else cur = 1;
    bestStreak = Math.max(bestStreak, cur);
    prev = d;
  }
  return { totalWorkouts, totalMin, totalKcal, longestMin, bestKcal, bestStreak };
}

// Haftalık istatistik (offset: 0=bu hafta, -1=geçen hafta) — Pzt başlangıç
function weekStats(offset) {
  const all = loadJournal();
  const now = new Date();
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const monday = new Date(now); monday.setDate(now.getDate() - dow + offset * 7); monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 7);
  const inWeek = all.filter(e => { const d = new Date(e.date); return d >= monday && d < sunday; });
  return {
    count: inWeek.length,
    min: inWeek.reduce((s, e) => s + (e.durationMin || 0), 0),
    kcal: inWeek.reduce((s, e) => s + (e.calories || 0), 0),
    days: new Set(inWeek.map(e => { const d = new Date(e.date); d.setHours(0,0,0,0); return d.getTime(); })).size,
  };
}

// Disiplin cezası: son idmandan bu yana kaç tam gün geçtiyse (gün başına ceza).
// Bugün dahil değil; "dün antrenman yaptıysa" ceza yok. Puan 0 altına inmez.
function applyDisciplinePenalty(progress) {
  if (!progress.lastWorkoutDate) return { progress, penaltyDays: 0, penaltyPoints: 0 };
  const gap = daysBetween(progress.lastWorkoutDate, todayStr());
  const missedDays = Math.max(0, gap - 1); // 1 gün boşluk normal (her gün antrenman şart değil); 2+ gün ceza
  if (missedDays <= 0) return { progress, penaltyDays: 0, penaltyPoints: 0 };
  const penalty = Math.min(progress.points, missedDays * PENALTY_PER_DAY);
  const np = { ...progress, points: progress.points - penalty, lastWorkoutDate: todayStr() };
  saveProgress(np);
  return { progress: np, penaltyDays: missedDays, penaltyPoints: penalty };
}

const MASTER_POOL = {
  shadow: [
    { level: "beginner", name: "Sol direk (jab) tekrarı", nameEn: "Jab repetition", sets: "3x3 dk", duration: "3 dk", desc: "Jab'i omuzdan düz fırlat, atışın hemen ardından el çeneye geri döner. Mesafeyi ölçen ve ritmi kuran en temel silahın.", descEn: "Throw the jab straight from the shoulder; the hand snaps back to the chin right after. Your most basic weapon for measuring range and setting rhythm.", equip: [], rest: 45, met: 5.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "1-2 temel (jab-cross)", nameEn: "Basic 1-2 (jab-cross)", sets: "3x2 dk", duration: "2 dk", desc: "Jab yolu açar, cross gücü taşır. Cross'ta arka topuğu içeri çevir ki güç kalçadan yumruğa aksın.", descEn: "Jab opens the path, cross brings the power. On the cross, turn the rear heel in so power flows from the hip into the punch.", equip: [], rest: 45, met: 5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Duruş & guard pratiği", nameEn: "Stance & guard drill", sets: "1x2 dk", duration: "2 dk", desc: "Eller çene hizasında, dirsekler gövdeye yakın, ağırlık iki ayağa dengeli. Tüm tekniğin başladığı temel duruş.", descEn: "Hands at chin level, elbows close to the body, weight balanced on both feet. The base stance where all technique begins.", equip: [], rest: 20, met: 5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Yavaş teknik gölge (jab-cross tekrarı)", nameEn: "Slow technical shadow (jab-cross)", sets: "3x2 dk", duration: "2 dk", desc: "Jab ve 1-2'yi acele etmeden, kusursuz formda tekrarla. Amaç hız değil, doğru hareketi kas hafızasına yazmak.", descEn: "Repeat the jab and 1-2 unhurried, in flawless form. The goal isn't speed but writing the correct movement into muscle memory.", equip: [], rest: 55, met: 5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Kroşe (hook) temeli", nameEn: "Hook basics", sets: "3x2 dk", duration: "2 dk", desc: "Dirsek 90 derece, ön ayakta pivot yap ve gücü kalçadan al. Yan taraftan gelen yıkıcı vuruş. Hiç durmadan doğru teknik kroşeler atılmalı", descEn: "Elbow at 90 degrees, pivot on the lead foot and draw power from the hip. A devastating shot coming from the side. Throw clean, technical hooks nonstop.", equip: [], rest: 45, met: 5, hedefKas: "Core, Omuz, Bacak" },
    { level: "beginner", name: "Aparkat (uppercut) temeli", nameEn: "Uppercut basics", sets: "3x2 dk", duration: "2 dk", desc: "Dizden hafifçe çök, yumruğu alttan yukarı sür. Çeneni koru, gücü bacaktan başlat. Hiç durmadan doğru teknik aparkat atılmalı.", descEn: "Dip slightly from the knees and drive the fist up from below. Protect your chin, start the power from the legs. Throw clean, technical uppercuts nonstop.", equip: [], rest: 45, met: 5, hedefKas: "Core, Omuz, Bacak" },
    { level: "beginner", name: "Serbest hafif gölge", nameEn: "Free light shadow", sets: "3x2 dk", duration: "2 dk", desc: "Öğrendiğin tüm vuruşları (jab, 1-2, kroşe, aparkat,kroşe) kendi ritminde, karışık uygula. Akışı hisset.", descEn: "Apply all your punches (jab, 1-2, hook, uppercut, hook) mixed up at your own rhythm. Feel the flow.", equip: [], rest: 55, met: 5, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "1-2-3-2 zincir", nameEn: "1-2-3-2 chain", sets: "3x3 dk", duration: "3 dk", desc: "Kroşeyi kısa ve sıkı tut, seriyi son cross'ta tüm gücünü vererek bitir.", descEn: "Keep the hook short and tight, finish the series by putting all your power into the last cross.", equip: [], rest: 60, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Eskiv (slip) + kontra", nameEn: "Slip + counter", sets: "3x3 dk", duration: "3 dk", desc: "Hayali jab'i başını yana kaydırarak savuştur, hemen ardından 2-3 ile kontra çık.", descEn: "Slip the imaginary jab by moving your head aside, then counter immediately with a 2-3.", equip: [], rest: 60, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Açılı ayak işi (pivot) + vuruş", nameEn: "Angled footwork (pivot) + punch", sets: "3x3 dk", duration: "3 dk", desc: "Pivot yaptıktan sonra farklı bir açıdan saldır, rakibin guard'ının dışına çık.", descEn: "After pivoting, attack from a different angle and get outside the opponent's guard.", equip: [], rest: 45, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Ritim değişimi (yavaş-patlama)", nameEn: "Rhythm shift (slow-burst)", sets: "3x3 dk", duration: "3 dk", desc: "İki yavaş vuruşun ardından ani, hızlı bir 4'lü patlama yap. Rakibi tempo değişimiyle şaşırt.", descEn: "After two slow punches, fire a sudden, fast 4-punch burst. Surprise the opponent with the tempo change.", equip: [], rest: 55, met: 7, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Çift jab + cross (1-1-2)", nameEn: "Double jab + cross (1-1-2)", sets: "3x3 dk", duration: "3 dk", desc: "İlk jab mesafeyi ölçer, ikinci jab içeri girer, cross gücü indirir.", descEn: "The first jab measures range, the second jab steps in, the cross brings the power down.", equip: [], rest: 60, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Feint + jab (sahte hamle)", nameEn: "Feint + jab", sets: "3x3 dk", duration: "3 dk", desc: "Sahte bir hareketle rakibi yanılt, açık bulduğun anda gerçek jab'i sok.", descEn: "Fool the opponent with a fake move, then slip the real jab in the moment you find an opening.", equip: [], rest: 45, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Dumbbell ile interval shadow", nameEn: "Dumbbell interval shadow", sets: "3x3 dk", duration: "3 dk", desc: "Hafif dambıllarla (0. 5-1-2 kg) gölge boksu yap. Omuz dayanıklılığını ve vuruş gücünü artırır.", descEn: "Shadow box with light dumbbells (0. 5-1-2 kg). Builds shoulder endurance and punching power.", equip: ["dumbbell"], rest: 45, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Lomachenko el-göz koordinasyonu", nameEn: "Lomachenko hand-eye coordination", sets: "3x3 dk", duration: "3 dk", desc: "Bir kombinasyon ya da tek vuruş at, hemen açı değiştir. Hayali rakibe sürekli hızlı vuruşlarla baskı kur.", descEn: "Throw a combo or single shot, then immediately change angle. Keep constant pressure on the imaginary opponent with fast punches.", equip: [], rest: 50, met: 6.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "5+ vuruşluk kombinasyon kırılması", nameEn: "5+ punch combination break", sets: "3x3 dk", duration: "3 dk", desc: "En az 5 yumrukluk seriler at; maksimum hızda, aralara güçlü tek vuruşlar serpiştir.", descEn: "Throw series of at least 5 punches at max speed, sprinkling strong single shots in between.", equip: [], rest: 50, met: 6.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Mayweather omuz roll kontrası", nameEn: "Mayweather shoulder-roll counter", sets: "3x3 dk", duration: "3 dk", desc: "Omuzla bloke et, ardından kontra çık; ya da omuz bloğunun arkasından roll yapıp kroşe ile cevap ver.", descEn: "Block with the shoulder, then counter; or roll behind the shoulder block and answer with a hook.", equip: [], rest: 50, met: 6.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Dumbbell patlayıcı çıkış shadow", nameEn: "Dumbbell explosive shadow", sets: "3x3 dk", duration: "3 dk", desc: "Dambılla sürekli kombinasyon,eller kalkmadıgında bırak ve dumbellsız kombinasyonlara devam. Bırakdığınız anda eller rahatlar ve uçar. Vuruş çıkış hızını geliştirir.", descEn: "Constant combos with the dumbbell; when the hands won't rise anymore, drop it and continue combos without weights. The moment you let go, the hands relax and fly. Develops punch release speed.", equip: ["dumbbell"], rest: 50, met: 9, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Küba stili gölge boksu", nameEn: "Cuban-style shadow boxing", sets: "3x3 dk", duration: "3 dk", desc: "Guard'ı düşük tut, beklenmedik açılardan gelen yumruklarla rakibi şaşırt.", descEn: "Keep the guard low and surprise the opponent with punches from unexpected angles.", equip: [], rest: 50, met: 6.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Hagler switch-hit (ortodoks↔güney)", nameEn: "Hagler switch-hitting", sets: "3x3 dk", duration: "3 dk", desc: "Round içinde duruş değiştir (ortodoks↔güney) ve her iki taraftan da güçlü vurabildiğini göster.", descEn: "Switch stance within the round (orthodox↔southpaw) and show you can hit hard from both sides.", equip: [], rest: 50, met: 6.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "3 dakika durmadan vuruş (volume)", nameEn: "3-min nonstop output", sets: "3x3 dk", duration: "3 dk", desc: "Rakibe nefes aldırmadan, süre boyunca sürekli yumruk üret. Hacim ve dayanıklılık testi.", descEn: "Produce punches continuously the whole time, giving the opponent no breath. A volume and endurance test.", equip: [], rest: 45, met: 9, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Feint + patlayıcı giriş", nameEn: "Feint + explosive entry", sets: "3x3 dk", duration: "3 dk", desc: "Yumruk atacakmış gibi yapıp kandır, sonra patlayıcı bir girişle kombinasyonu boşalt.", descEn: "Fake as if you'll punch to fool them, then unload the combination with an explosive entry.", equip: [], rest: 45, met: 9, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Aparkat çiftleri (6-6)", nameEn: "Uppercut doubles (6-6)", sets: "3x2 dk", duration: "2 dk", desc: "Dizden hafif çök, alttan yukarı iki aparkat at; çeneni koru. Süre boyunca durmadan, temiz teknikle.", descEn: "Dip from the knees and throw two uppercuts from below; protect your chin. Nonstop with clean technique.", equip: [], rest: 45, met: 5, hedefKas: "Core, Omuz, Bacak" },
    { level: "beginner", name: "Jab + geri adım (vur-kaç)", nameEn: "Jab + step back (hit & move)", sets: "3x3 dk", duration: "3 dk", desc: "Jab at, hemen bir adım geri çık. Mesafe yönetimi ve vur-kaç hissi.", descEn: "Throw a jab and immediately step back. Distance management and hit-and-move feel.", equip: [], rest: 40, met: 5.5, hedefKas: "Omuz, Bacak" },
    { level: "intermediate", name: "Çift kroşe gölge (3-3)", nameEn: "Double hook shadow (3-3)", sets: "3x3 dk", duration: "3 dk", desc: "Sol-sağ kroşeyi gövde mekaniğiyle bağla; kalçadan döndür. Durmadan akıcı tekrar.", descEn: "Link left-right hooks with body mechanics; rotate from the hips. Fluid, nonstop reps.", equip: [], rest: 45, met: 7, hedefKas: "Yan Karın (Oblik), Omuz" },
    { level: "intermediate", name: "Sol-sağ aparkat + kroşe", nameEn: "Left-right uppercut + hook", sets: "3x3 dk", duration: "3 dk", desc: "Aparkat-aparkat ardından bir kroşe ile bitir. Yakın mesafe kombinasyonu.", descEn: "Uppercut-uppercut then finish with a hook. Close-range combination.", equip: [], rest: 45, met: 7, hedefKas: "Core, Omuz" },
    { level: "pro", name: "Defansif gölge (slip-roll + 1-2)", nameEn: "Defensive shadow (slip-roll + 1-2)", sets: "3x3 dk", duration: "3 dk", desc: "Hayali yumruğu sliple geç, roll yap ve hemen 1-2 ile karşılık ver. Savunma-hücum geçişi.", descEn: "Slip the imaginary punch, roll, then counter immediately with a 1-2. Defense-to-offense transition.", equip: [], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Mayweather pull + cross", nameEn: "Mayweather pull + cross", sets: "3x3 dk", duration: "3 dk", desc: "Üst gövdeyi geri çekip yumruğu boşa düşür, ardından keskin cross ile kontra. Mesafe ve zamanlama.", descEn: "Pull the upper body back to make the punch miss, then counter with a sharp cross. Distance and timing.", equip: [], rest: 60, met: 8, hedefKas: "Omuz, Core" },
    { level: "beginner", name: "Tek jab — nokta atışı", nameEn: "Single jab — precision", sets: "3x2 dk", duration: "2 dk", desc: "Boks duruşunda dur (zayıf taraf önde). Öndeki elini düz bir çizgide ileri uzatıp hızla geri çek; her seferinde öndeki omzunu çenene yaklaştır. Tek tek, acele etmeden, hedefe nişan alır gibi at. Amaç: jab'ı doğru ve isabetli atmayı öğrenmek.", descEn: "Stand in your boxing stance (weak side forward). Extend your lead hand straight out and snap it back; bring your lead shoulder toward your chin each time. One at a time, no rush, like aiming at a target. Goal: learn to throw an accurate jab.", equip: [], rest: 40, met: 5, hedefKas: "Omuz, Sırt" },
    { level: "beginner", name: "Cross tekrarı (sağ el)", nameEn: "Cross reps (rear hand)", sets: "3x2 dk", duration: "2 dk", desc: "Boks duruşunda, arka elini (sağ el) çeneden ileri düz fırlat. Gücü ayağından al: arka topuğunu içe çevir ve kalçanı döndür, sonra eli geri çek. Yavaş ve doğru tekrarla. Amaç: en sert yumruğun olan cross'un temel mekaniğini oturtmak.", descEn: "In your stance, throw your rear hand (right) straight forward from the chin. Get power from the ground: pivot your rear heel inward and rotate the hip, then retract. Repeat slowly and correctly. Goal: build the mechanics of your hardest punch, the cross.", equip: [], rest: 40, met: 5, hedefKas: "Omuz, Core, Bacak" },
    { level: "beginner", name: "Guard'da nefes ritmi", nameEn: "Guard breathing rhythm", sets: "3x2 dk", duration: "2 dk", desc: "Eller şakaklarda, dirsekler kapalı dursun. Hafif hafif yumruk atarken her vuruşta burnundan/ağzından kısa ve sert nefes ver (tısss gibi). Omuzlarını gevşek tut. Amaç: yorulmadan, ritimli nefes almayı ve rahat kalmayı öğrenmek.", descEn: "Hands at the temples, elbows closed. Throwing light punches, exhale short and sharp on each one (a 'tss' sound). Keep your shoulders loose. Goal: learn rhythmic breathing and staying relaxed without tiring.", equip: [], rest: 35, met: 4.5, hedefKas: "Omuz" },
    { level: "beginner", name: "Jab-jab-geri çık", nameEn: "Jab-jab-step out", sets: "3x3 dk", duration: "3 dk", desc: "İki hızlı jab at, hemen ardından bir adım geriye çıkarak mesafe aç. Sonra tekrar yaklaş ve tekrarla. Ayakların çaprazlanmasın. Amaç: vur ve hemen güvenli mesafeye kaç (vur-kaç) alışkanlığı.", descEn: "Throw two quick jabs, then immediately step back to open distance. Approach again and repeat. Don't cross your feet. Goal: build the hit-and-move habit — strike then escape to safe range.", equip: [], rest: 40, met: 5.5, hedefKas: "Omuz, Bacak" },
    { level: "intermediate", name: "Çift cross feinti", nameEn: "Double cross feint", sets: "3x3 dk", duration: "3 dk", desc: "Önce cross atacakmış gibi omzunu/elini hafif oynat ama atma (sahte hamle). Rakip irkilince gerçek cross'u patlat. Yavaş başla, zamanlamayı çöz. Amaç: rakibi kandırıp açık yakalamak.", descEn: "First fake the cross with a small shoulder/hand movement but don't throw it. When the opponent flinches, explode the real cross. Start slow, find the timing. Goal: deceive the opponent and catch an opening.", equip: [], rest: 45, met: 7, hedefKas: "Omuz, Core" },
    { level: "intermediate", name: "Aşağı-yukarı (vücut-baş 1-2)", nameEn: "Low-high (body-head 1-2)", sets: "3x3 dk", duration: "3 dk", desc: "Önce öndeki elinle gövdeye (karın hizasına) jab at, dizini hafif bükerek alçal; hemen ardından arka elinle başa cross at. El seviyeni değiştirerek vur. Amaç: rakibin korumasını şaşırtmak için kat (yükseklik) değiştirmeyi öğrenmek.", descEn: "First jab to the body (stomach level) with your lead hand, dipping slightly at the knees; then immediately cross to the head with your rear hand. Vary your punch height. Goal: learn to change levels to confuse the opponent's guard.", equip: [], rest: 45, met: 7, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Kroşe-aparkat geçişi", nameEn: "Hook-uppercut transition", sets: "3x3 dk", duration: "3 dk", desc: "Sol kroşe at (dirsek 90°, yandan gelen yumruk), hemen aynı elle alttan yukarı bir aparkata geç. İki yumruk arasında bileğini ve dirsek açını yumuşakça çevir. Amaç: yakın mesafede iki farklı yumruğu akıcı bağlamak.", descEn: "Throw a left hook (elbow at 90°, a punch from the side), then flow into an uppercut from below with the same hand. Smoothly rotate your wrist and elbow between the two. Goal: link two different close-range punches fluidly.", equip: [], rest: 45, met: 7, hedefKas: "Omuz, Core" },
    { level: "intermediate", name: "Geri çekil + cross kontra", nameEn: "Pull back + cross counter", sets: "3x3 dk", duration: "3 dk", desc: "Rakibin yumruğu gelirken üst gövdeni hafif geriye al ki yumruk boşa düşsün; tam o anda ağırlığını öne taşıyıp arka elinle cross at. Amaç: yumruğu ıskalatıp anında karşılık vermeyi (kontra) öğrenmek.", descEn: "As the opponent's punch comes, lean your upper body back slightly so it misses; at that exact moment shift your weight forward and throw a rear-hand cross. Goal: make the punch miss and counter instantly.", equip: [], rest: 45, met: 7, hedefKas: "Core, Bacak" },
    { level: "intermediate", name: "Ritim kırma (durakla-patla)", nameEn: "Rhythm break (pause-burst)", sets: "3x3 dk", duration: "3 dk", desc: "Bir süre yavaş, rahat hareket et; sonra aniden 3-4 yumrukluk hızlı bir seri patlat, tekrar yavaşla. Temponu sürekli değiştir. Amaç: rakibin tahmin edemeyeceği şekilde ani hızlanıp yavaşlamayı öğrenmek.", descEn: "Move slow and relaxed for a while; then suddenly burst a fast 3-4 punch series, then slow down again. Keep changing your tempo. Goal: learn to speed up and slow down unpredictably.", equip: [], rest: 45, met: 7.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Switch-stance kombinasyon", nameEn: "Switch-stance combination", sets: "3x3 dk", duration: "3 dk", desc: "Normal duruşunla (ortodoks) birkaç yumruk at, sonra ayaklarını değiştirip ters duruşa (güneypençe) geç ve oradan da vur. Dengeni koru. Amaç: iki yönden de dövüşebilmek, rakibi şaşırtmak. (İleri seviye)", descEn: "Throw a few punches from your normal stance (orthodox), then switch your feet to the opposite stance (southpaw) and punch from there too. Keep your balance. Goal: be able to fight from both sides and confuse the opponent. (Advanced)", equip: [], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Gölgede 6 vuruş zinciri", nameEn: "6-punch shadow chain", sets: "3x3 dk", duration: "3 dk", desc: "Altı yumrukluk bir kombinasyon seç (ör. jab-cross-sol kroşe-sağ cross-sol aparkat-sağ cross) ve hiç durmadan, hatasız tekrarla. Nefesini kontrol et. Amaç: uzun kombinasyonları yorulmadan akıcı atabilmek.", descEn: "Pick a six-punch combination (e. g. jab-cross-left hook-right cross-left uppercut-right cross) and repeat it flawlessly without stopping. Control your breathing. Goal: throw long combos fluidly without tiring.", equip: [], rest: 60, met: 8.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Sürekli baskı (volume pressure)", nameEn: "Constant pressure (volume)", sets: "3x3 dk", duration: "3 dk", desc: "Sürekli öne doğru yürüyerek durmadan yumruk üret; rakibe nefes alacak boşluk bırakma. Tempoyu düşürme. Amaç: rakibin üstüne giderek bastıran (pressure-fighter) tarzını çalışmak.", descEn: "Constantly walk forward producing nonstop punches; give the opponent no room to breathe. Don't drop the tempo. Goal: practice the pressure-fighter style that overwhelms the opponent.", equip: [], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Temel tazeleme: 1-2", nameEn: "Fundamentals: 1-2", sets: "3x3 dk", duration: "3 dk", desc: "Yavaş ve net 1-2 (jab-cross); her yumrukta kalçayı döndür, eli guard'a geri getir. Hız değil mükemmel form. Amaç: en temel kombinasyonu kusursuzlaştırmak.", descEn: "Slow, clean 1-2 (jab-cross); rotate the hip on each punch, return to guard. Perfect form, not speed. Goal: perfect the most basic combination.", equip: [], rest: 45, met: 5, hedefKas: "Omuz, Core" },
  ],
  bag: [
    { level: "beginner", name: "Jab-cross torba", nameEn: "Jab-cross on bag", sets: "3x3 dk", duration: "3 dk", desc: "Torbayı savurmadan, kontrollü ve tam formda vur. Ağırlık transferini her yumrukta hisset.", descEn: "Hit controlled and in full form without swinging the bag. Feel the weight transfer on every punch.", equip: ["bag"], rest: 60, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Tek tek güç vuruşu", nameEn: "Single power shots", sets: "3x3 dk", duration: "3 dk", desc: "Her vuruşu tek tek, ağırlığını arkadan öne aktararak at. Gücün kaynağını öğren.", descEn: "Throw each punch one by one, transferring your weight from back to front. Learn the source of power.", equip: ["bag"], rest: 60, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Hayali rakip torba", nameEn: "Imaginary opponent bag", sets: "3x3 dk", duration: "3 dk", desc: "Torba sanki rakibinmiş gibi bloklar yap ve öğrendiklerini uygula.", descEn: "Treat the bag as if it's your opponent: throw blocks and apply what you've learned.", equip: [], rest: 60, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "1-2-3 temel kombinasyon", nameEn: "Basic 1-2-3 combo", sets: "3x3 dk", duration: "3 dk", desc: "Jab-cross-kroşeyi akıcı geçişlerle, kesintisiz bir seri halinde vur.", descEn: "Throw jab-cross-hook as one uninterrupted series with smooth transitions.", equip: ["bag"], rest: 60, met: 6, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Düz vuruş dayanıklılığı", nameEn: "Straight-punch endurance", sets: "3x3 dk", duration: "3 dk", desc: "Sürekli jab-cross at; amaç kol ve omuz dayanıklılığını inşa etmek. Vuramaycak duruma gelirsen eller yukarda dinlen ve devam et.", descEn: "Throw jab-cross continuously; the goal is to build arm and shoulder endurance. If you can't punch anymore, rest with hands up and continue.", equip: ["bag"], rest: 60, met: 7.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "1-2-3-2 güç serisi", nameEn: "1-2-3-2 power series", sets: "3x3 dk", duration: "3 dk", desc: "Hızlı-hızlı-güçlü-güçlü ritmiyle vur; ilk ikisi açar, son ikisi yıkar.", descEn: "Hit with a fast-fast-strong-strong rhythm; the first two open, the last two break down.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Vücut-baş kat geçişi", nameEn: "Body-head level change", sets: "3x3 dk", duration: "3 dk", desc: "Diz bükerek karaciğere kroşe at hemen arkasına beklemeden çeneye ikinci yumruk. İki açıdan da yap. Hedef değiştirmeyi öğren.", descEn: "Bend the knees and hook to the liver, then a second punch to the chin without waiting. Do it from both angles. Learn to switch targets.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "1-2-5-6 (iki aparkat)", nameEn: "1-2-5-6 (double uppercut)", sets: "3x3 dk", duration: "3 dk", desc: "Düz vuruşlar rakibin elini yukarı çeker, ardından gelen aparkatlar alttan girer.", descEn: "The straight punches pull the opponent's hands up, then the uppercuts come in from below.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "Jab-cross-aparkat (1-2-6)", nameEn: "Jab-cross-uppercut (1-2-6)", sets: "3x3 dk", duration: "3 dk", desc: "Düz vuruşların ardından alttan keskin bir aparkat sok.", descEn: "After the straight punches, drive in a sharp uppercut from below.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "intermediate", name: "Hız + güç değişimi", nameEn: "Speed-power switch", sets: "3x3 dk", duration: "3 dk", desc: "Hafif ve hızlı bir serinin ardından tek bir ağır vuruş patlat.", descEn: "After a light, fast series, explode with one heavy shot.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Omuz, Sırt, Core" },
    { level: "intermediate", name: "Jab Cross atan rakip torba", nameEn: "Jab-cross opponent bag", sets: "3x3 dk", duration: "3 dk", desc: "Rakibiniz size sürekli jab cross atıyor bunları savusturup kombinasyon uygulayın. Torbayı rakibin gibi gör", descEn: "Your opponent keeps throwing jab-crosses at you; deflect them and apply your combinations. See the bag as the opponent.", equip: [], rest: 60, met: 8, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Patlayıcı kombinasyon kırılmaları", nameEn: "Explosive combination breaks", sets: "3x3 dk", duration: "3 dk", desc: "20 sn maksimum patlama, 10 sn tempo şeklinde döngü kur. Sürekli baskı kurma çalışması. Yumruklar sürekli atılmalı süre bitene kadar.", descEn: "Build a loop of 20s max burst, 10s tempo. Keep punching constantly until time runs out. Continuous pressure work.", equip: ["bag"], rest: 50, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Canelo kontra atak drili", nameEn: "Canelo counter-attack drill", sets: "3x3 dk", duration: "3 dk", desc: "Önce eğil yada roll, ardından sağ kroşe çeneye - rakibin karaciğerine sol kroşe ve başa kontra çık. Hiç durmadan tekrarlanmalı.", descEn: "First dip or roll, then counter with a right hook to the chin, a left hook to the opponent's liver and to the head. Repeat nonstop.", equip: ["bag"], rest: 60, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Ağır torba interval drili", nameEn: "Heavy bag interval drill", sets: "30x30 sn", duration: "30sn", desc: "30 sn maksimum hacimde vur, 15 sn dinlen. Anaerobik dayanıklılık geliştirir.", descEn: "Hit at max volume for 30s, rest 15s. Builds anaerobic endurance.", equip: ["bag"], rest: 15, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "1-2-3 çık ve 1-2-3(b)", nameEn: "1-2-3 out & 1-2-3(body)", sets: "3x3 dk", duration: "3 dk", desc: "Kombinasyon jab cross hook adımlamayla geri cık ve tekrar jab cross karaciğer ile rakibi bitir. Sürekli yapılmalı yorulmak yok.", descEn: "Combo jab-cross-hook, step out, then finish the opponent with jab-cross-liver again. Do it constantly, no getting tired.", equip: ["bag"], rest: 60, met: 11, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "1-1(b)-2 roll kroşe", nameEn: "1-1(body)-2 roll hook", sets: "3x3 dk", duration: "3 dk", desc: "İlk jab yüze sonra gövdeye hiç beklemeden cross yüze gelen yumrugun altından eğil overhand yada kroşe ile rakibi bitir", descEn: "First jab to the face, then to the body without pausing, cross to the face; dip under the incoming punch and finish with an overhand or hook.", equip: [], rest: 50, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Tyson çift kroşe yıkımı", nameEn: "Tyson double-hook demolition", sets: "3x3 dk", duration: "3 dk", desc: "Eğil ve peek-a-boo gücüyle patla: sol kroşe vücuda, hemen ardından sağ kroşe başa sonra sağ kroşe vucuda sol kroşe başa. Tyson'ın imza yıkımı", descEn: "Dip and explode with peek-a-boo power: left hook to the body, then right hook to the head, then right hook to the body, left hook to the head. Tyson's signature demolition.", equip: ["bag"], rest: 60, met: 11, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Foreman ağır el baskısı", nameEn: "Foreman heavy-hand pressure", sets: "3x3 dk", duration: "3 dk", desc: "Yumrukdan slip yada roll mutlaka olmalı arkasına hemen bitirici yumruk durmadan tekrarla", descEn: "Always slip or roll a punch first, then immediately a finishing shot right behind it. Repeat nonstop.", equip: ["bag"], rest: 30, met: 8.5, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "9 vuruşluk patlama serisi", nameEn: "9-punch blast series", sets: "3x3 dk", duration: "3 dk", desc: "30 saniyede 9'luk seriler patlat, 10 saniye eller yukarıda maçtaymıs gibi dinlen jablar atılabilir rakibi yaklastırma tedirgin et. Anaerobik dayanıklılık çalışması.", descEn: "Fire 9-punch series in 30 seconds, then rest 10 seconds with hands up as if in a match — you can throw jabs, keep the opponent away and unsettled. Anaerobic endurance work.", equip: ["bag"], rest: 60, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "pro", name: "Aparkat + kroşe yakın mesafe", nameEn: "Uppercut + hook infighting", sets: "3x3 dk", duration: "3 dk", desc: "Klinç mesafesinde güçlü ve seri yumruklar alttan aparkat, yandan kroşe at iki taraftanda yapılmalı. Yakın mesafe (iç savaş) çalışması.", descEn: "At clinch range, strong and rapid punches: uppercut from below, hook from the side, do it from both sides. Close-range (infighting) work.", equip: ["bag"], rest: 45, met: 8.5, hedefKas: "Core, Omuz, Bacak" },
    { level: "pro", name: "Maksimum güç tek vuruş (one-shot)", nameEn: "Max-power single shot", sets: "3x3 dk", duration: "3 dk", desc: "Tek ama tam yıkıcı vuruş at. Her çeşit yumruk atılabilir ama hiç durulmamalı. Nakavt gücünü geliştirir.", descEn: "Throw a single but fully devastating shot. Any punch type is allowed but never stop. Develops knockout power.", equip: ["bag"], rest: 60, met: 11, hedefKas: "Omuz, Sırt, Core" },
    { level: "beginner", name: "Düz jab serisi (mesafe)", nameEn: "Straight jab series (range)", sets: "3x3 dk", duration: "3 dk", desc: "Torbaya uzaktan sürekli jab; omuzla mesafeyi ölç, geri çekmeyi unutma. Ritmi koru.", descEn: "Continuous jabs to the bag from range; measure distance with the shoulder, always retract. Keep rhythm.", equip: ["bag"], rest: 45, met: 6, hedefKas: "Omuz, Sırt" },
    { level: "intermediate", name: "1-2-3-4 kombinasyon", nameEn: "1-2-3-4 combination", sets: "3x3 dk", duration: "3 dk", desc: "Jab-cross-sol kroşe-sağ kroşe; her vuruşta kalçayı döndür. Akıcı dört vuruşluk seri.", descEn: "Jab-cross-left hook-right hook; rotate the hips on each shot. Fluid four-punch series.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Vücut serisi (kroşe-kroşe)", nameEn: "Body series (hook-hook)", sets: "3x3 dk", duration: "3 dk", desc: "Dizden hafif çök, gövdeye sol-sağ kroşe. Karaciğer-dalak hattına güçlü ve kontrollü.", descEn: "Dip slightly, left-right hooks to the body. Strong, controlled shots to the liver-spleen line.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Yan Karın (Oblik)" },
    { level: "intermediate", name: "1-2 sürekli (volume)", nameEn: "Continuous 1-2 (volume)", sets: "3x3 dk", duration: "3 dk", desc: "Süre boyunca durmadan 1-2; temiz teknik ve yüksek hacim. Dayanıklılık vuruşu.", descEn: "Nonstop 1-2 the whole time; clean technique, high volume. Endurance punching.", equip: ["bag"], rest: 45, met: 8.5, hedefKas: "Omuz, Sırt" },
    { level: "pro", name: "Power 2 (tek cross yıkım)", nameEn: "Power 2 (one-shot cross)", sets: "3x3 dk", duration: "3 dk", desc: "Her cross'a tüm kalça ve ayak gücünü koy; az sayıda ama maksimum güçle. Nakavt vuruşu.", descEn: "Put full hip and foot power into each cross; few but maximum-power shots. The knockout punch.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Açıdan 1-2 (pivot sonrası)", nameEn: "Angle 1-2 (after pivot)", sets: "3x3 dk", duration: "3 dk", desc: "Yana pivot at, yeni açıdan 1-2 patlat. Rakibin görmediği açıdan vurmayı öğren.", descEn: "Pivot to the side, explode a 1-2 from the new angle. Learn to hit from angles the opponent can't see.", equip: ["bag"], rest: 60, met: 8.5, hedefKas: "Tüm Vücut" },
    { level: "beginner", name: "Jab — mesafe ölçme", nameEn: "Jab — range finding", sets: "3x3 dk", duration: "3 dk", desc: "Torbaya tek tek jab atarak tam doğru mesafede durmayı bul: kolun rahatça uzanıp torbaya değmeli, ne çok yakın ne çok uzak. Her jab'dan sonra eli geri çek. Amaç: doğru mesafeyi hissetmek.", descEn: "Throw single jabs at the bag to find the correct distance: your arm should comfortably reach and touch the bag, not too close or far. Retract after each jab. Goal: feel the right range.", equip: ["bag"], rest: 45, met: 6, hedefKas: "Omuz, Sırt" },
    { level: "beginner", name: "Cross — güç temeli", nameEn: "Cross — power basics", sets: "3x3 dk", duration: "3 dk", desc: "Arka elinle torbaya düz cross at; gücü kalça dönüşü ve arka topuğun içe çevrilmesinden al. Az ama doğru ve sert at. Amaç: torbada gerçek cross gücünü hissedip mekaniği oturtmak.", descEn: "Throw a straight cross at the bag with your rear hand; get power from hip rotation and pivoting the rear heel inward. Few but correct and hard. Goal: feel real cross power on the bag and lock in the mechanics.", equip: ["bag"], rest: 45, met: 6.5, hedefKas: "Omuz, Core, Bacak" },
    { level: "beginner", name: "Sol kroşe tekrarı", nameEn: "Left hook reps", sets: "3x3 dk", duration: "3 dk", desc: "Dirseğini 90° açıyla yana kaldır, kalçanı döndürerek torbaya yandan sol kroşe at. Yumruğu savurmuyorsun, gövdenle döndürüyorsun. Amaç: yandan gelen güçlü kroşeyi öğrenmek.", descEn: "Raise your elbow to a 90° angle to the side, rotate your hips and throw a left hook into the bag from the side. You don't swing the arm, you turn it with your body. Goal: learn the powerful side hook.", equip: ["bag"], rest: 45, met: 6.5, hedefKas: "Yan Karın (Oblik), Omuz" },
    { level: "intermediate", name: "1-2-3-2 ritim", nameEn: "1-2-3-2 rhythm", sets: "3x3 dk", duration: "3 dk", desc: "Sırayla at: jab (1), cross (2), sol kroşe (3), cross (2). Her yumruktan sonra ellerini guard'a (yüzüne) geri getir ve merkeze dön. Akıcı ve ritimli. Amaç: dört yumrukluk dengeli bir seriyi oturtmak.", descEn: "Throw in order: jab (1), cross (2), left hook (3), cross (2). Return your hands to guard and re-center after each punch. Fluid and rhythmic. Goal: lock in a balanced four-punch series.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Aparkat serisi (5-6)", nameEn: "Uppercut series (5-6)", sets: "3x3 dk", duration: "3 dk", desc: "Dizlerini hafif bükerek alçal ve alttan yukarı sol aparkat (5) - sağ aparkat (6) at. Gücü bacaklarından yukarı taşı. Amaç: yakın mesafede çeneye/gövdeye giden aparkatları çalışmak.", descEn: "Dip slightly at the knees and throw a left uppercut (5) - right uppercut (6) from below. Drive the power up from your legs. Goal: practice close-range uppercuts to the chin/body.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Core, Omuz" },
    { level: "intermediate", name: "Vücut-baş-vücut", nameEn: "Body-head-body", sets: "3x3 dk", duration: "3 dk", desc: "Gövdeye sol kroşe (alçal), başa cross (doğrul), tekrar gövdeye kroşe. Elini sürekli aşağı-yukarı oynatarak vur. Amaç: rakibin korumasını bir aşağı bir yukarı çekip açık bulmak.", descEn: "Left hook to the body (dip), cross to the head (rise), hook to the body again. Keep moving your punches up and down. Goal: pull the opponent's guard up and down to find an opening.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "intermediate", name: "Hız serisi (speed flurry)", nameEn: "Speed flurry", sets: "4x40 sn", duration: "40 sn", desc: "40 saniye boyunca hafif ama çok hızlı yumruklar yağdır; güçten çok hıza odaklan, teknik bozulmasın. Amaç: el hızını ve yumruk sıklığını artırmak.", descEn: "For 40 seconds, rain down light but very fast punches; focus on speed over power, keep technique clean. Goal: increase hand speed and punch frequency.", equip: ["bag"], rest: 30, met: 8.5, hedefKas: "Omuz, Sırt" },
    { level: "intermediate", name: "Tek-tek ağır vuruş", nameEn: "One-by-one heavy shots", sets: "3x3 dk", duration: "3 dk", desc: "Her yumruğa tüm gücünü koy, aralarda ellerini guard'a geri getirip bir saniye bekle, sonra tekrar sert vur. Amaç: tek vuruşta maksimum güç üretmeyi ve kontrolü dengelemek.", descEn: "Put all your power into each punch, return to guard and pause a second between, then hit hard again. Goal: balance maximum single-punch power with control.", equip: ["bag"], rest: 60, met: 8, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "9 vuruş patlaması", nameEn: "9-punch blast", sets: "3x3 dk", duration: "3 dk", desc: "Dokuz yumrukluk bir seriyi tek nefeste, durmadan torbaya boşalt; bitince kısa toparlan ve tekrarla. Amaç: kısa sürede yüksek yoğunluklu patlama yapma kapasitesini geliştirmek.", descEn: "Unload a nine-punch series into the bag in one breath, nonstop; recover briefly and repeat. Goal: develop the capacity for high-intensity bursts in a short time.", equip: ["bag"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Knockout setup (kur-yık)", nameEn: "Knockout setup", sets: "3x3 dk", duration: "3 dk", desc: "Önce hafif yumruklarla (jab gibi) rakibin korumasını meşgul et ve bir açık yarat; o açık oluşunca tek ağır yumrukla bitir. Amaç: rastgele değil, kurarak bitirici vuruş atmayı öğrenmek.", descEn: "First busy the opponent's guard with light punches (like jabs) and create an opening; when it appears, finish with one heavy shot. Goal: learn to set up the finishing punch rather than throwing randomly.", equip: ["bag"], rest: 60, met: 8.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Sürekli baskı torba", nameEn: "Relentless pressure bag", sets: "3x3 dk", duration: "3 dk", desc: "Her yumrukta torbayı ileri it ve peşinden git; torba sallanırken sen üstüne yürü, durmadan vur. Amaç: rakibi geri ittirerek bastıran sürekli baskı tarzını ve dayanıklılığı çalışmak.", descEn: "Push the bag forward with each punch and follow it; as it swings, walk it down and keep punching. Goal: practice the relentless pressure style that drives the opponent back, plus endurance.", equip: ["bag"], rest: 60, met: 9.5, hedefKas: "Tüm Vücut" },
    { level: "pro", name: "Açı + patlama kombosu", nameEn: "Angle + burst combo", sets: "3x3 dk", duration: "3 dk", desc: "Ön ayağında pivot yaparak yana bir açı al (torbanın yan tarafına geç), sonra o yeni açıdan 4 yumrukluk bir seri patlat. Amaç: rakibin göremediği açıdan vurmayı öğrenmek.", descEn: "Pivot on your lead foot to take a side angle (move to the side of the bag), then explode a 4-punch series from that new angle. Goal: learn to hit from an angle the opponent can't see.", equip: ["bag"], rest: 60, met: 9, hedefKas: "Tüm Vücut" },
  ],
  footwork: [
    { level: "beginner", name: "İleri-geri temel adım", nameEn: "Basic in-out step", sets: "3x2 dk", duration: "2 dk", desc: "Küçük adımlarla ileri-geri hareket et; ayaklar asla çaprazlanmasın. Eller yukarda çeneyi koru", descEn: "Move in and out with small steps; the feet should never cross. Hands up, protect the chin.", equip: [], rest: 40, met: 4, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Yan adım (sağ-sol)", nameEn: "Lateral step (R-L)", sets: "3x2 dk", duration: "2 dk", desc: "Duruş genişliğini sabit tut, ağırlık merkezini koruyarak yana kay. Eller yukarda çeneyi koru", descEn: "Keep the stance width steady and slide sideways keeping your center of gravity. Hands up, protect the chin.", equip: [], rest: 40, met: 5, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Atlama ipi temel", nameEn: "Basic jump rope", sets: "3x3 dk", duration: "3 dk", desc: "Sabit bir tempoyla ip atla; ayak bileği esnekliğini ve ritmini geliştir.", descEn: "Jump rope at a steady tempo; develops ankle elasticity and rhythm.", equip: ["rope"], rest: 60, met: 10, hedefKas: "Baldır, Omuz" },
    { level: "beginner", name: "Yerinde ip taklidi", nameEn: "Shadow rope (no rope)", sets: "3x2 dk", duration: "2 dk", desc: "İp yoksa el ve ayak ritmini ipsiz taklit et; aynı koordinasyonu çalış.", descEn: "No rope? Mimic the hand and foot rhythm without one; train the same coordination.", equip: [], rest: 30, met: 4, hedefKas: "Baldır, Omuz" },
    { level: "beginner", name: "Pivot temeli (ön ayak)", nameEn: "Pivot basics (lead foot)", sets: "3x2 dk", duration: "2 dk", desc: "Ön ayağını eksen alarak dön, bu sırada guard'ını hep yukarıda tut. Düzgün yapdığından emin ol.", descEn: "Turn using your lead foot as the axis, keeping your guard up the whole time. Make sure you do it properly.", equip: [], rest: 40, met: 4, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Üçgen adım (triangle step)", nameEn: "Triangle step", sets: "3x2 dk", duration: "2 dk", desc: "Köşegen (üçgen) adımlarla pozisyon değiştir, rakibe göre açını ayarla.", descEn: "Change position with diagonal (triangle) steps, adjusting your angle relative to the opponent.", equip: [], rest: 40, met: 5, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Yer merdiveni: tek adım (ladder)", nameEn: "Ladder: one step per box", sets: "3x2 dk", duration: "2 dk", desc: "Her kareye bir ayak basarak hızlı ve ritmik ilerle. Ayak koordinasyonunun temeli. Bir ayak yukarda olmalı eller çenede", descEn: "Step one foot into each box, moving fast and rhythmically. The basis of foot coordination. One foot should stay up, hands at the chin.", equip: [], rest: 40, met: 5, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Yer merdiveni: iki ayak içeri", nameEn: "Ladder: two feet in", sets: "3x2 dk", duration: "2 dk", desc: "Her kareye iki ayak bas, küçük ve hızlı adımlarla geç. Ayak hızını artırır. Sol ayak geri gelirken sağ ayak hemen karenin içine girmeli eller çenede unutma.", descEn: "Put both feet in each box, passing through with small fast steps. Increases foot speed. As the left foot comes back, the right must enter the box immediately — don't forget, hands at the chin.", equip: [], rest: 40, met: 5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Pivot + açı bulma", nameEn: "Pivot + find angle", sets: "3x3 dk", duration: "3 dk", desc: "Ön ayakta pivot yaparak rakibin yan tarafına geç, yeni açıdan saldırı fırsatı yarat.", descEn: "Pivot on the lead foot to move to the opponent's side, creating an attacking chance from a new angle.", equip: [], rest: 40, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Yer merdiveni: yan ayak (lateral)", nameEn: "Ladder: lateral shuffle", sets: "3x3 dk", duration: "3 dk", desc: "Yana dönük dur, içeri-dışarı adımlarla merdiveni geç. Lateral (yanal) hızını geliştirir. Eller yukarıda.", descEn: "Stand sideways and pass through the ladder with in-out steps. Develops lateral speed. Hands up.", equip: [], rest: 40, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Yer merdiveni: Ickey shuffle", nameEn: "Ladder: Ickey shuffle", sets: "3x3 dk", duration: "3 dk", desc: "İçeri-içeri-dışarı ritmiyle ilerle, bu sırada boks duruşunu koru. Ritim ve denge çalışması. İçeri adım atarken jab-cross at.", descEn: "Move with an in-in-out rhythm while keeping your boxing stance. Rhythm and balance work. Throw a jab-cross as you step in.", equip: [], rest: 40, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Yer merdiveni + jab çıkışı", nameEn: "Ladder + jab exit", sets: "3x3 dk", duration: "3 dk", desc: "Karelere basarken patlayıcı bir jab at ve geri dön. Ayak ile el bağlantısını kurar.", descEn: "Throw an explosive jab as you step on the boxes and return. Builds the foot-to-hand connection.", equip: [], rest: 40, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "L-step köşe çıkışı", nameEn: "L-step corner escape", sets: "3x3 dk", duration: "3 dk", desc: "Köşeden L harfi çizerek çık ve merkeze dön. Sıkışınca kaçış becerisi.", descEn: "Exit the corner tracing an 'L' and return to center. An escape skill for when you're cornered.", equip: [], rest: 40, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "İleri-geri vuruş çalışması", nameEn: "In-out punch drill", sets: "3x3 dk", duration: "3 dk", desc: "Menzile hızla patla, vur ve hemen geri çık. Vur-kaç çalışması. Örnek rakibin üstüne giderek jab cross adımlamayla geriye cıkarken side step kroşeyle cıkılabilir.", descEn: "Explode into range fast, hit, and pull back immediately. Hit-and-run work. For example, go in on the opponent with a jab-cross and exit backward with a side-step hook.", equip: [], rest: 45, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Yana kayma + kontra", nameEn: "Lateral slide + counter", sets: "3x3 dk", duration: "3 dk", desc: "Yana kayarak vuruştan çık, yeni açıdan kontra at.", descEn: "Slide sideways to escape the punch, then counter from the new angle.", equip: [], rest: 60, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Geri adım + jab cross (out-boxing)", nameEn: "Step-back + jab-cross (out-boxing)", sets: "3x3 dk", duration: "3 dk", desc: "Mesafeyi koru; geri adım atarken jab cross ile rakibi rahatsız et.", descEn: "Keep your distance; harass the opponent with a jab-cross while stepping back.", equip: [], rest: 60, met: 5.5, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "Atlama ipi çift tempo", nameEn: "Jump rope double tempo", sets: "3x3 dk", duration: "3 dk", desc: "İp atlarken hızlı ve yavaş tempo arasında geçiş yap.", descEn: "Switch between fast and slow tempo while jumping rope.", equip: ["rope"], rest: 45, met: 10, hedefKas: "Baldır, Omuz" },
    { level: "pro", name: "Tyson Peek-a-boo adımları", nameEn: "Tyson Peek-a-boo steps", sets: "3x3 dk", duration: "3 dk", desc: "Baş hareketiyle yana kay, içeri gir ve kroşe atacak açıyı yakala.", descEn: "Slide aside with head movement, step in, and find the angle to throw a hook.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Lomachenko matrix pivotları", nameEn: "Lomachenko matrix pivots", sets: "3x3 dk", duration: "3 dk", desc: "Sürekli pivot yaparak rakibin kör noktasına geç. Üst düzey ayak hızı.", descEn: "Constantly pivot to get to the opponent's blind spot. Elite-level footwork.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Double-under (çift tur ip)", nameEn: "Double-unders", sets: "3x3 dk", duration: "3 dk", desc: "Tek sıçrayışta ipi iki tur çevir. Patlayıcı baldır gücü ister.", descEn: "Spin the rope twice in a single jump. Requires explosive calf power.", equip: ["rope"], rest: 45, met: 8.5, hedefKas: "Baldır, Omuz" },
    { level: "pro", name: "Hız merdiveni simülasyonu", nameEn: "Speed ladder sim", sets: "3x3 dk", duration: "3 dk", desc: "Yerinde, maksimum hızda küçük adımlar at ve her adımda mutlaka yumrukta olsun El- Ayak frekansını yükseltir.", descEn: "Take small steps at max speed in place, and there must be a punch on every step. Raises hand-foot frequency.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Yer merdiveni: çapraz + açı kombosu", nameEn: "Ladder: crossover + angle combo", sets: "3x3 dk", duration: "3 dk", desc: "Çapraz adımlarla merdiveni geç, çıkışta açı bulup 1-2 at. Elit koordinasyon.", descEn: "Pass the ladder with crossover steps, find an angle on exit and throw a 1-2. Elite coordination.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Yorgun bacak teknik koruma", nameEn: "Fatigued-leg control", sets: "3x3 dk", duration: "3 dk", desc: "Sağ elini atarken cross atarken sol ayağını yakala ,Sol elini jab atarken sağ ayağını yakala hiç durmadan yapılmalı.", descEn: "When you throw the right (cross) catch your left foot; when you throw the left (jab) catch your right foot. Must be done nonstop.", equip: [], rest: 50, met: 4.5, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Ali shuffle (hızlı ayak değişimi)", nameEn: "Ali shuffle", sets: "3x3 dk", duration: "3 dk", desc: "Yerinde şimşek hızıyla ayak değiştir, ardından jab cross at. Ali'nin imza hareketi. Ayak arka tabanı ile dans sonrası jab cross", descEn: "Switch feet at lightning speed in place, then throw a jab-cross. Ali's signature move. Dance on the balls of your feet, then jab-cross.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Çapraz adım kesme (cutting the ring)", nameEn: "Cutting the ring", sets: "3x3 dk", duration: "3 dk", desc: "Rakibin kaçış yolunu çapraz adımla kes, köşeye sıkıştır.", descEn: "Cut off the opponent's escape route with a diagonal step and trap them in the corner.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Çoklu yön sıçrama (plyometrik)", nameEn: "Multi-directional bounds", sets: "3x3 dk", duration: "3 dk", desc: "İleri, yana ve geri patlayıcı sıçramalar yap. Patlayıcı ayak gücü.", descEn: "Do explosive bounds forward, sideways and back. Explosive foot power.", equip: [], rest: 30, met: 8.5, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Pivot + omuz feinti kombosu", nameEn: "Pivot + shoulder feint combo", sets: "3x3 dk", duration: "3 dk", desc: "Pivotla açı bul, omuzla sahte hamle yap, kör noktadan vur.", descEn: "Find an angle with a pivot, fake with the shoulder, and strike from the blind spot.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Out-fighter mesafe yönetimi", nameEn: "Out-fighter range control", sets: "3x3 dk", duration: "3 dk", desc: "Uzun mesafede kal, sürekli hareket et ve jab'le dövüşü yönet.", descEn: "Stay at long range, keep moving, and control the fight with the jab.", equip: [], rest: 30, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Daire çiz (ring etrafı)", nameEn: "Circle the ring", sets: "3x3 dk", duration: "3 dk", desc: "Guard'ı koruyarak sağa ve sola daire çiz; ayakları çaprazlama. Ring üzerinde hareket.", descEn: "Circle right and left keeping your guard; don't cross the feet. Moving around the ring.", equip: [], rest: 40, met: 6, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Ayak ucu hız (fast feet)", nameEn: "Fast feet", sets: "4x30 sn", duration: "30 sn", desc: "Ayak uçlarında, yerinde hızlı tempolu adımlar. Ayak hızı ve sıçrama gücü.", descEn: "Quick on the balls of the feet, fast in-place steps. Foot speed and bounce.", equip: [], rest: 25, met: 7, hedefKas: "Baldır, Bacak" },
    { level: "intermediate", name: "Gir-çık ritmi (in-out)", nameEn: "In-out rhythm", sets: "3x3 dk", duration: "3 dk", desc: "Hızlı bir adım gir, jab at, hemen geri çık. Mesafeye girip çıkma ritmi.", descEn: "Step in fast, jab, step right back out. Rhythm of entering and exiting range.", equip: [], rest: 40, met: 7.5, hedefKas: "Bacak" },
    { level: "intermediate", name: "Yan kayma çiftli (shuffle)", nameEn: "Lateral shuffle (double)", sets: "3x3 dk", duration: "3 dk", desc: "İki yana kontrollü kayma adımları; merkez dengeni koru. Yanal hareket.", descEn: "Controlled shuffle steps side to side; keep your center balance. Lateral movement.", equip: [], rest: 35, met: 7.5, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "Hızlı yön değiştirme drili", nameEn: "Rapid direction change", sets: "4x40 sn", duration: "40 sn", desc: "Komutsuz, ani yön değişimleriyle hareket et; dengeni hiç bozmadan. Reaktif ayak işi.", descEn: "Move with sudden direction changes; never lose balance. Reactive footwork.", equip: [], rest: 30, met: 9, hedefKas: "Bacak, Baldır" },
    { level: "beginner", name: "Öne-arkaya sekme", nameEn: "Bounce front-back", sets: "3x3 dk", duration: "3 dk", desc: "Ayak uçlarında hafifçe zıplar gibi öne ve arkaya küçük adımlar at; topuklarını yere tam basma, dengeni ortada tut. Amaç: boksörün temel hafif sekme ritmini oturtmak.", descEn: "Bounce lightly on the balls of your feet, taking small steps forward and back; don't plant your heels, keep your balance centered. Goal: build the boxer's basic light bounce rhythm.", equip: [], rest: 35, met: 6, hedefKas: "Baldır, Bacak" },
    { level: "beginner", name: "Adım + guard koru", nameEn: "Step + keep guard", sets: "3x3 dk", duration: "3 dk", desc: "Hareket ederken ellerin sürekli yukarıda (yüzünü korur şekilde) kalsın; sağa-sola, öne-arkaya adım at ama ayakların asla çaprazlanmasın. Amaç: hareketle savunmayı aynı anda yapmak.", descEn: "Keep your hands up (protecting your face) the whole time you move; step side to side and front to back, but never cross your feet. Goal: move and defend at the same time.", equip: [], rest: 35, met: 6, hedefKas: "Bacak, Omuz" },
    { level: "beginner", name: "İp: tek ayak sıçrama", nameEn: "Rope: single-leg hops", sets: "3x3 dk", duration: "3 dk", desc: "İp atlarken sırayla tek ayak üstünde sıçra (birkaç sol, birkaç sağ). Dizini hafif yaylandır, ritmi koru. Amaç: ayak bileği esnekliği, denge ve koordinasyon.", descEn: "While jumping rope, hop on one foot at a time (a few on the left, a few on the right). Spring lightly from the knee, keep the rhythm. Goal: ankle elasticity, balance and coordination.", equip: ["rope"], rest: 30, met: 9, hedefKas: "Baldır, Bacak" },
    { level: "intermediate", name: "V-adım (içeri-dışarı)", nameEn: "V-step (in-out)", sets: "3x3 dk", duration: "3 dk", desc: "Yere hayali bir V çiz: öne-içeri doğru adımla gir, yumruk at, sonra geldiğin çizgiden geri-dışarı çık. Amaç: rakibe açıdan girip güvenle çıkmayı (açı yaratmayı) öğrenmek.", descEn: "Imagine a V on the floor: step in and forward, throw a punch, then exit back out along the line. Goal: learn to enter at an angle and exit safely (creating angles).", equip: [], rest: 35, met: 7.5, hedefKas: "Bacak" },
    { level: "intermediate", name: "Pivot + kroşe açısı", nameEn: "Pivot + hook angle", sets: "3x3 dk", duration: "3 dk", desc: "Ön ayağını sabit tutup topuğun üzerinde dön (pivot), böylece yan tarafa kayarsın; yeni açıdan kroşe atacak pozisyon al. Amaç: yön değiştirip rakibin yanından vurmak.", descEn: "Keep your lead foot planted and turn on it (pivot) so you shift to the side; set up to throw a hook from the new angle. Goal: change direction and hit from the opponent's side.", equip: [], rest: 40, met: 7.5, hedefKas: "Bacak, Core" },
    { level: "intermediate", name: "Yan-yan mekik adımı", nameEn: "Side-to-side shuttle", sets: "4x40 sn", duration: "40 sn", desc: "İki nokta belirle; aralarında hızlıca yana mekik adımlarıyla gidip gel, her yön değişiminde patlayıcı ol ama dengeni koru. Amaç: yanal çeviklik ve hızlı yön değiştirme.", descEn: "Mark two points; shuttle quickly side to side between them, be explosive on each change of direction but keep balance. Goal: lateral agility and fast direction changes.", equip: [], rest: 30, met: 8, hedefKas: "Bacak, Baldır" },
    { level: "intermediate", name: "İp: boksör sıçraması", nameEn: "Rope: boxer skip", sets: "3x3 dk", duration: "3 dk", desc: "İp atlarken ağırlığını iki ayağın arasında sırayla aktar (sağ-sol-sağ-sol), tek tek sıçrar gibi. Klasik boksör ritmidir. Amaç: kondisyon ve ayak ritmi.", descEn: "While skipping, shift your weight between your feet in turn (right-left-right-left), like hopping one at a time. The classic boxer rhythm. Goal: conditioning and foot rhythm.", equip: ["rope"], rest: 30, met: 9, hedefKas: "Baldır, Bacak" },
    { level: "pro", name: "Köşeden çıkış adımı", nameEn: "Escape-the-corner step", sets: "3x3 dk", duration: "3 dk", desc: "Kendini köşeye sıkışmış farz et: ön ayağında pivot yapıp bir yan adımla açıya kayarak köşeden kurtul. Amaç: baskı altında köşeye sıkışınca kaçabilmek.", descEn: "Imagine you're trapped in a corner: pivot on your lead foot and slide out to an angle with a side step. Goal: escape when trapped in a corner under pressure.", equip: [], rest: 45, met: 8, hedefKas: "Bacak" },
    { level: "pro", name: "Çok yönlü reaktif adım", nameEn: "Multi-direction reactive step", sets: "4x40 sn", duration: "40 sn", desc: "Dört yön (ileri-geri-sağ-sol) belirle; kendi kendine ani komut verip o yöne patlayıcı bir adım at, hemen toparlan. Dengen bozulmasın. Amaç: ani durumlara hızlı tepki veren ayak.", descEn: "Pick four directions (front-back-right-left); give yourself sudden cues and take an explosive step that way, then recover. Don't lose balance. Goal: feet that react fast to sudden situations.", equip: [], rest: 30, met: 9, hedefKas: "Bacak, Baldır" },
    { level: "pro", name: "İp: çift tur sprint", nameEn: "Rope: double-under sprint", sets: "4x30 sn", duration: "30 sn", desc: "30 saniye boyunca her sıçrayışta ipi ayağının altından iki kez geçir (double-under) — yani daha yükseğe ve hızlı sıçra. Amaç: patlayıcı kondisyon ve ip hızı. (Zor)", descEn: "For 30 seconds, pass the rope under your feet twice per jump (double-unders) — jump higher and faster. Goal: explosive conditioning and rope speed. (Hard)", equip: ["rope"], rest: 30, met: 11, hedefKas: "Baldır, Bacak" },
  ],
  strength: [
    { level: "beginner", name: "Standart şınav", nameEn: "Standard push-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca temiz formda olabildiğince çok şınav çek; gövdeni baştan topuğa düz bir hat gibi tut. Yapılamıyorsa dizlerden destek alınabilir.", descEn: "Do as many clean-form push-ups as you can the whole time; keep your body a straight line from head to heel. If you can't, you may support from the knees.", equip: [], rest: 60, met: 6.5, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "beginner", name: "Squat (hava)", nameEn: "Air squats", sets: "MAKS", duration: "10 dk", desc: "Süre boyunca maksimum tekrar. Dizin parmak ucunu geçmesin, kalçanı geriye it.", descEn: "Max reps the whole time. Don't let the knee pass the toes, push the hips back.", equip: [], rest: 60, met: 6.5, hedefKas: "Bacak, Kalça" },
    { level: "beginner", name: "Plank", nameEn: "Plank", sets: "3x40 sn", duration: "40 sn", desc: "Kalçan düşmeden, core'un sıkı şekilde pozisyonu koru. Süre dolana kadar dayan.", descEn: "Hold the position with a tight core without letting the hips drop. Hold until time is up.", equip: [], rest: 30, met: 4.5, hedefKas: "Core (Karın)" },
    { level: "beginner", name: "Dambıl curl (hafif)", nameEn: "Dumbbell curl (light)", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca kontrollü tekrarlar; kol gücünün temelini at, hızdan çok forma odaklan.", descEn: "Controlled reps the whole time; lay the foundation of arm strength, focus on form over speed.", equip: ["dumbbell"], rest: 55, met: 5, hedefKas: "Kol (Biceps)" },
    { level: "beginner", name: "Mekik (sit-up)", nameEn: "Sit-ups", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca kontrollü şekilde maksimum tekrar. Karın gücünü inşa et.", descEn: "Max controlled reps the whole time. Build abdominal strength.", equip: [], rest: 60, met: 6.5, hedefKas: "Core (Karın)" },
    { level: "beginner", name: "Sırt üstü köprü (glute bridge)", nameEn: "Glute bridge", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Kalça ve bel gücünü, dik duruşunu destekler.", descEn: "Max reps the whole time. Supports hip and lower-back strength and upright posture.", equip: [], rest: 60, met: 6.5, hedefKas: "Kalça, Bel" },
    { level: "beginner", name: "Yan plank (her taraf)", nameEn: "Side plank (each side)", sets: "3x25 sn", duration: "25 sn", desc: "Her iki tarafta da pozisyonu koruyarak bekle. Yan core ve denge çalışması.", descEn: "Hold the position on both sides. Side-core and balance work.", equip: [], rest: 25, met: 4.5, hedefKas: "Core (Karın)" },
    { level: "beginner", name: "Lunge (öne hamle)", nameEn: "Forward lunge", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca her iki bacağa dönüşümlü maksimum tekrar. Bacak gücü ve denge.", descEn: "Max reps the whole time, alternating both legs. Leg strength and balance.", equip: [], rest: 60, met: 6.5, hedefKas: "Bacak, Kalça" },
    { level: "beginner", name: "Superman (sırt)", nameEn: "Superman hold", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Bel-sırt zincirini güçlendirir, duruşu düzeltir.", descEn: "Max reps the whole time. Strengthens the lower-back chain and fixes posture.", equip: [], rest: 60, met: 6.5, hedefKas: "Bel, Sırt" },
    { level: "beginner", name: "Bisiklet mekik (oblik)", nameEn: "Bicycle crunches", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca maksimum tekrar. Yan karın ve gövde dönüş gücü — kroşenin motoru.", descEn: "Max reps the whole time. Side-abs and trunk-rotation power — the engine of the hook.", equip: [], rest: 60, met: 6.5, hedefKas: "Core (Karın)" },
    { level: "intermediate", name: "Şınav (yüksek tekrar)", nameEn: "Push-ups (high rep)", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca yüksek tempoda maksimum şınav. Kas dayanıklılığı.", descEn: "Max push-ups at high tempo the whole time. Muscular endurance.", equip: [], rest: 60, met: 7, hedefKas: "Göğüs, Triceps, Omuz" },
    { level: "intermediate", name: "Burpee", nameEn: "Burpees", sets: "MAKS", duration: "7 dk", desc: "Süre boyunca akıcı geçişle maksimum tekrar. Patlayıcı kalkış, tüm vücut. Tekrarı not al, kendinle yarış.", descEn: "Max reps the whole time with smooth transitions. Explosive rise, full body. Log your reps and race yourself.", equip: [], rest: 60, met: 9.5, hedefKas: "Tüm Vücut" },
