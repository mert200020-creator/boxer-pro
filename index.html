function AutoProgram({ lang, roundSec, restSec, coachOn, soundOn, warnSec, equipment, onWorkoutComplete, initMin, autoGenerate, onConsumedAutoGenerate, initLevel, onChangeLevel }) {
  const t = T[lang];
  const prof = loadProfile();
  const [level, setLevel] = useState(initLevel || (prof && prof.experience ? suggestedLevel(prof.experience) : "intermediate"));
  const levelLocked = !!initLevel; // Seviye ayrı seçim ekranından geldiyse burada tekrar sorma
  const [totalMin, setTotalMin] = useState(initMin || 45);
  const [program, setProgram] = useState(null);
  const [limitHit, setLimitHit] = useState(false); // ücretsiz günlük limit aşıldı mı
  const [focusCats, setFocusCats] = useState({}); // {} = dengeli; {bag:'high', cardio:'low'} = seçili+yoğunluk
  const goal = prof && prof.goal; // hedefe göre kişiselleştirme
  const isPremium = loadPremium();
  const [tired, setTired] = useState(false); // "Bugün yorgunum" — daha çok dinlenme, daha hafif kategori dağılımı

  // Ana ekrandan Hızlı/Standart/Tam/Pro kartına basıldıysa: kurulum ekranını atla,
  // profildeki seviye + hedefe göre programı hemen oluştur.
  useEffect(() => {
    if (autoGenerate && initMin && !program) {
      if (!canUseAuto()) { setLimitHit(true); onConsumedAutoGenerate && onConsumedAutoGenerate(); return; }
      const p = buildAutoProgram(initMin, level, equipment, lang, Math.floor(Math.random() * 100000), goal, {}, tired, true);
      if (!isPremium) bumpAutoGen();
      setProgram(p);
      onConsumedAutoGenerate && onConsumedAutoGenerate();
    }
    // eslint-disable-next-line
  }, [autoGenerate]);
  const toggleFocus = (id) => setFocusCats(prev => {
    const next = { ...prev };
    if (next[id]) delete next[id]; else next[id] = "mid"; // seçince varsayılan orta
    return next;
  });
  const setIntensity = (id, level) => setFocusCats(prev => ({ ...prev, [id]: level }));

  // Süre seçenekleri: 15-60 dk + saat formatında
  const DURATIONS = [15, 30, 45, 60, 75, 90, 105, 120];
  const fmtDur = (m) => {
    if (m < 60) return lang === "en" ? `${m} min` : `${m} dk`;
    const h = Math.floor(m / 60), mm = m % 60;
    const hWord = lang === "en" ? (h === 1 ? "1 hr" : `${h} hr`) : `${h} saat`;
    if (mm === 0) return hWord;
    return lang === "en" ? `${hWord} ${mm} min` : `${hWord} ${mm} dk`;
  };

  if (program) {
    return (
      <div>
        <button onClick={() => setProgram(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, fontWeight: 700, padding: 0 }}>‹ {t.back}</button>
        <ProgramDisplay program={program} accentColor={RED} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onComplete={onWorkoutComplete} equipment={equipment} level={level} />
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, ${RED}15, ${CARD})`, border: `1px solid ${RED}44`, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>⚡</div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 6 }}>{t.autoTitle}</div>
        <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{t.autoDesc}</div>
      </div>

      {/* Seviye */}
      {levelLocked ? (
        <button onClick={() => onChangeLevel && onChangeLevel()} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "10px 14px", marginBottom: 18, cursor: "pointer" }}>
          <span style={{ color: "#888", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>{t.level}</span>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ color: level === "mix" ? GOLD : (LEVELS.find(l=>l.id===level)||{}).color, fontSize: 13, fontWeight: 900 }}>
              {level === "mix" ? "🔀 " + (lang === "en" ? "MIX" : "KARMA") : (() => { const lo = LEVELS.find(l=>l.id===level); return lo ? `${lo.icon} ${lang==="en"?lo.en:lo.tr}` : ""; })()}
            </span>
            <span style={{ color: "#666", fontSize: 11 }}>✎</span>
          </span>
        </button>
      ) : (
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.level}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {LEVELS.map(l => (
            <button key={l.id} onClick={() => setLevel(l.id)} style={{ flex: 1, background: level === l.id ? `${l.color}25` : CARD, color: level === l.id ? l.color : "#666", border: `1.5px solid ${level === l.id ? l.color : LINE}`, borderRadius: 10, padding: "10px 4px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
              {l.icon} {lang === "en" ? l.en : l.tr}
            </button>
          ))}
          <button onClick={() => setLevel("mix")} style={{ flex: 1, background: level === "mix" ? `${GOLD}25` : CARD, color: level === "mix" ? GOLD : "#666", border: `1.5px solid ${level === "mix" ? GOLD : LINE}`, borderRadius: 10, padding: "10px 4px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
            🔀 {lang === "en" ? "MIX" : "KARMA"}
          </button>
        </div>
        {level === "mix" && <div style={{ color: "#888", fontSize: 11, lineHeight: 1.4, marginTop: 8 }}>{lang === "en" ? "Mixes Rookie, Rising and Pro moves together." : "Çaylak, Yükseliş ve Pro hareketlerini bir arada karıştırır."}</div>}
      </div>
      )}

      {/* Toplam süre seçimi */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <span style={{ fontSize: 16 }}>⏱️</span>
          <span style={{ color: "#fff", fontSize: 15, fontWeight: 900, letterSpacing: 0.3 }}>{t.totalDuration}</span>
          <span style={{ marginLeft: "auto", color: RED, fontSize: 14, fontWeight: 900 }}>{fmtDur(totalMin)}</span>
        </div>
        <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, scrollbarWidth: "none", WebkitOverflowScrolling: "touch" }}>
          {DURATIONS.map(m => {
            const on = totalMin === m;
            return (
              <button key={m} onClick={() => setTotalMin(m)} style={{ flexShrink: 0, minWidth: 64, position: "relative", overflow: "hidden", background: on ? `linear-gradient(150deg, ${RED}, #b91c1c)` : CARD, color: on ? "#fff" : "#aaa", border: `1.5px solid ${on ? RED : LINE}`, borderRadius: 12, padding: "10px 6px 8px", cursor: "pointer", boxShadow: on ? `0 4px 14px ${RED}44` : "none", transition: "all 0.15s" }}>
                <div style={{ fontSize: 16, fontWeight: 900, lineHeight: 1 }}>{m}</div>
                <div style={{ fontSize: 8.5, fontWeight: 700, opacity: 0.85, marginTop: 2, letterSpacing: 0.3 }}>{lang === "en" ? "min" : "dakika"}</div>
                {on && <div style={{ position: "absolute", top: 3, right: 5, fontSize: 9 }}>✓</div>}
              </button>
            );
          })}
        </div>
        <div style={{ color: "#666", fontSize: 10.5, lineHeight: 1.35, marginTop: 10, marginBottom: 12, display: "flex", alignItems: "flex-start", gap: 6, background: "#ffffff06", borderRadius: 10, padding: "8px 10px" }}>
          <span>ℹ️</span><span>{lang === "en" ? "Selected duration includes rest periods — the total matches exactly. Fine-tune via Edit." : "Seçtiğiniz süre dinlenmeler dahildir — toplam birebir bu kadar olur. Düzenle'den ayarlayabilirsiniz."}</span>
        </div>
        {/* Elle ince ayar — hazır süreler dışında istediğin dakikayı kendin belirle */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: CARD, border: `1px solid ${LINE}`, borderRadius: 14, padding: "12px 14px" }}>
          <span style={{ color: "#999", fontSize: 12, fontWeight: 700 }}>{lang === "en" ? "Or set it yourself" : "Ya da kendin ayarla"}</span>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => setTotalMin(m => Math.max(5, m - 5))} style={{ width: 30, height: 30, borderRadius: 9, border: `1px solid ${RED}55`, background: "transparent", color: RED, fontSize: 17, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
            <span style={{ color: "#fff", fontSize: 14.5, fontWeight: 900, minWidth: 54, textAlign: "center", fontVariantNumeric: "tabular-nums" }}>{totalMin} {lang === "en" ? "min" : "dk"}</span>
            <button onClick={() => setTotalMin(m => Math.min(180, m + 5))} style={{ width: 30, height: 30, borderRadius: 9, border: `1px solid ${RED}55`, background: "transparent", color: RED, fontSize: 17, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
          </div>
        </div>
      </div>

      {/* Bugün yorgunum — daha hafif bir program üretir, toplam süre aynı kalır */}
      <button onClick={() => setTired(v => !v)}
        style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, background: tired ? "#3b82f61a" : CARD, border: `1.5px solid ${tired ? "#3b82f6" : LINE}`, borderRadius: 12, padding: "13px 14px", marginBottom: 20, cursor: "pointer", textAlign: "left" }}>
        <span style={{ fontSize: 20 }}>😴</span>
        <span style={{ flex: 1 }}>
          <div style={{ color: tired ? "#3b82f6" : "#ddd", fontSize: 13.5, fontWeight: 800 }}>{lang === "en" ? "I'm tired today" : "Bugün Yorgunum"}</div>
          <div style={{ color: "#777", fontSize: 11, lineHeight: 1.4, marginTop: 2 }}>{lang === "en" ? "Same total time, lighter load — more rest, less strength/bag." : "Toplam süre aynı, yük daha hafif — daha çok dinlenme, daha az kuvvet/torba."}</div>
        </span>
        <span style={{ width: 22, height: 22, borderRadius: 6, border: `1.5px solid ${tired ? "#3b82f6" : "#555"}`, background: tired ? "#3b82f6" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          {tired && <span style={{ color: "#fff", fontSize: 13, fontWeight: 900 }}>✓</span>}
        </span>
      </button>

      {/* Neye odaklanmak istersin — kategori + yoğunluk seçimi */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 2, marginBottom: 6, fontWeight: 700 }}>{t.focusTitle.toUpperCase()}</div>
        <div style={{ color: "#777", fontSize: 11, lineHeight: 1.4, marginBottom: 10 }}>{t.focusHint}</div>
        {/* Dengeli (hepsi) */}
        <button onClick={() => setFocusCats({})}
          style={{ background: Object.keys(focusCats).length === 0 ? RED : CARD, color: Object.keys(focusCats).length === 0 ? "#fff" : "#888", border: `1.5px solid ${Object.keys(focusCats).length === 0 ? RED : LINE}`, borderRadius: 10, padding: "9px 13px", fontSize: 12.5, fontWeight: 800, cursor: "pointer", marginBottom: 8 }}>
          ⚖️ {t.focusAll}
        </button>
        {/* Kategoriler — her biri seçilince altında Az/Orta/Yoğun çıkar */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {VISIBLE_CATEGORIES.map(c => {
            const on = !!focusCats[c.id];
            const lvl = focusCats[c.id];
            return (
              <div key={c.id} style={{ background: on ? `${c.color}11` : "transparent", border: `1.5px solid ${on ? c.color : LINE}`, borderRadius: 12, padding: on ? "10px 12px" : "0" }}>
                <button onClick={() => toggleFocus(c.id)}
                  style={{ width: "100%", background: "transparent", color: on ? "#fff" : "#888", border: on ? "none" : `1.5px solid ${LINE}`, borderRadius: on ? 0 : 10, padding: on ? "0 0 8px 0" : "11px 13px", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-start" }}>
                  <span>{c.icon}</span>{lang === "en" ? c.en : c.tr}{on && <span style={{ color: c.color, marginLeft: "auto" }}>✓</span>}
                </button>
                {on && (
                  <div style={{ display: "flex", gap: 6 }}>
                    {[["low", t.intLow], ["mid", t.intMid], ["high", t.intHigh]].map(([key, label]) => (
                      <button key={key} onClick={() => setIntensity(c.id, key)}
                        style={{ flex: 1, background: lvl === key ? c.color : CARD, color: lvl === key ? "#000" : "#999", border: `1px solid ${lvl === key ? c.color : LINE}`, borderRadius: 8, padding: "7px 4px", fontSize: 11.5, fontWeight: 800, cursor: "pointer" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Ücretsiz limit uyarısı */}
      {!isPremium && (
        <div style={{ background: limitHit ? `${GOLD}18` : "#ffffff06", border: `1px solid ${limitHit ? GOLD : LINE}`, borderRadius: 10, padding: 11, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 15 }}>{limitHit ? "🔒" : "ℹ️"}</span>
          <span style={{ color: limitHit ? GOLD : "#888", fontSize: 11.5, lineHeight: 1.4, fontWeight: limitHit ? 700 : 400 }}>{t.freeLimitAuto}</span>
        </div>
      )}

      <button onClick={() => {
          if (!canUseAuto()) { setLimitHit(true); return; }
          const p = buildAutoProgram(totalMin, level, equipment, lang, Math.floor(Math.random() * 100000), goal, focusCats, tired);
          if (!isPremium) bumpAutoGen();
          setProgram(p);
        }}
        style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${RED}55` }}>
        {t.generateAuto}
      </button>
    </div>
  );
}

function ProgramPicker({ lang, roundSec, restSec, coachOn, soundOn, warnSec, equipment, onWorkoutComplete }) {
  const t = T[lang];
  const [level, setLevel] = useState("intermediate");
  const [levelChosen, setLevelChosen] = useState(false); // Seviye, ayrı bir ekranda mı seçildi
  const [selected, setSelected] = useState([]); // seçili modlar (kategoriler)
  const [plan, setPlan] = useState([]); // plan blokları: {uid, catId, ex, rounds}
  const [viewing, setViewing] = useState(false);
  // Hızlı başlat: karta tıklanınca seçilen tek hareket {catId, ex} + round
  const [quick, setQuick] = useState(null);
  const [quickRounds, setQuickRounds] = useState(3);
  const [quickPlaying, setQuickPlaying] = useState(false);
  const [warmupMin, setWarmupMin] = useState(10);
  const [cooldownMin, setCooldownMin] = useState(10);
  const [shadowOpen, setShadowOpen] = useState(false); // Gölge boksu alt-tarz paneli açık mı

  // Benzersiz blok kimliği (aynı hareket birden çok blok olarak eklenebilsin diye)
  const uidRef = useRef(0);
  const nextUid = () => `b${++uidRef.current}`;

  // Mod seçimi değişince planı temizle (kural 1: filtre değişince boş gelsin)
  const toggleCat = (id) => {
    setSelected(prev => {
      const nx = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      return nx;
    });
    setPlan(p => p.filter(item => (selected.includes(id) ? item.catId !== id : true)));
    setViewing(false);
  };

  // Seviye veya ekipman değişince planı temizle (kural 1: filtre değişince boş gelsin)
  useEffect(() => {
    setPlan([]);
    setViewing(false);
  }, [level]);

  // Ekipman değişince uygun olmayan hareketleri plandan at
  useEffect(() => {
    setPlan(p => p.filter(item => {
      const poolEx = (MASTER_POOL[item.catId] || []).find(e => e.name === item.ex.name);
      if (!poolEx) return true;
      return !poolEx.equip || poolEx.equip.length === 0 || poolEx.equip.some(e => equipment.includes(e));
    }));
    setViewing(false);
  }, [equipment]);

  // Görünür kategoriler + her birinin filtrelenmiş havuzu — sadece filtre değişince hesaplanır.
  // ÖNEMLİ: tüm erken return'lerden ÖNCE çağrılmalı (hook sırası sabit kalsın — React #300).
  const { visibleCats, poolByCat } = useMemo(() => {
    const cats = selected.length > 0 ? selected : VISIBLE_CATEGORIES.map(c => c.id);
    const byCat = {};
    cats.forEach(catId => { byCat[catId] = poolForCategory(catId, equipment, level); });
    return { visibleCats: cats, poolByCat: byCat };
  }, [selected, equipment, level]);

  // Hareketin plandaki toplam blok sayısı (havuzda rozet göstermek için)
  const countInPlan = (catId, name) => plan.filter(i => i.catId === catId && i.ex.name === name).length;

  // Havuzdan EKLE — her tıklama yeni bir blok ekler (aynı hareket tekrar eklenebilir)
  const addEx = (catId, ex, rounds) => {
    setPlan(prev => [...prev, { uid: nextUid(), catId, ex, rounds: rounds || defaultRounds(ex), roundMin: defaultRoundMin(ex), restSec: 45 }]);
    setViewing(false);
  };
  // Bloğu kaldır (uid ile — sadece o bloğu)
  const removeBlock = (uid) => { setPlan(prev => prev.filter(b => b.uid !== uid)); setViewing(false); };
  // Bir bloğun round sayısını değiştir
  const setBlockRounds = (uid, rounds) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, rounds } : b));
    setViewing(false);
  };
  // Bir bloğun round süresini (dk) değiştir
  const setBlockRoundMin = (uid, roundMin) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, roundMin } : b));
    setViewing(false);
  };
  // Bir bloğun dinlenme süresini (sn) değiştir
  const setBlockRest = (uid, restSec) => {
    setPlan(prev => prev.map(b => b.uid === uid ? { ...b, restSec } : b));
    setViewing(false);
  };

  // Rastgele program (kural 2): seçili modların ekipman-uygun havuzundan 4-6 hareket
  // Plandan program nesnesi kur — her blok kendi round sayısı kadar tekrarlanır
  const buildFromPlan = () => {
    const byCat = {};
    plan.forEach(block => { (byCat[block.catId] = byCat[block.catId] || []).push(block); });
    // Kategorileri profesyonel seans sırasına göre diz (ANTRENÖR mantığı)
    const orderedCatIds = Object.keys(byCat).sort((a, b) => (CATEGORY_ORDER[a] || 99) - (CATEGORY_ORDER[b] || 99));
    const mainPhases = orderedCatIds.map(catId => {
      const c = CATEGORIES.find(x => x.id === catId);
      const exercises = byCat[catId].map(block => {
        const rm = block.roundMin || defaultRoundMin(block.ex);
        const isDesc = isDescendingReps(block.ex.sets);
        // Azalan tekrar (şınav vb.) ise süre/dinlenme dokunma; aksi halde kullanıcının seçtiği süreyi uygula
        const durStr = isDesc ? block.ex.duration : `${block.rounds}x${rm} dk`;
        return {
          name: lang === "en" ? block.ex.nameEn : block.ex.name,
          nameEn: block.ex.nameEn,
          video: block.ex.video,
          sets: isDesc ? block.ex.sets : `${block.rounds}x${rm} dk`,
          duration: durStr, // playlist round sayısını ve süresini buradan okur
          desc: lang === "en" ? block.ex.descEn : block.ex.desc,
          rest: (typeof block.restSec === "number") ? block.restSec : undefined, // round arası dinlenme (sn)
        };
      });
      const totalRounds = byCat[catId].reduce((s, b) => s + (b.rounds || 1), 0);
      return {
        name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId,
        duration: `${Math.max(totalRounds * 3, 8)} dk`,
        exercises,
      };
    });
    // Isınma & soğuma — toplam süreyi İKİYE böl, toplamı TAM tutsun, güne göre hafif değişsin.
    // Gün tohumu: günün sayısına göre bölüşüm dönüşümlü değişir (bazı gün ip ağırlıklı, bazı gün mobilite)
    const daySeed = new Date().getDate();
    // toplam t dk'yı (ilk parça, ikinci parça) olarak böl — ikisi tam t etsin, ilk parça ~%55-65
    const splitMinutes = (total, seed) => {
      const t = Math.max(2, Math.round(total));
      // dönüşümlü oran: seed çift → ilk parça biraz büyük, tek → ikinci parça biraz büyük
      const firstRatio = (seed % 2 === 0) ? 0.6 : 0.4;
      let first = Math.round(t * firstRatio);
      first = Math.max(1, Math.min(t - 1, first)); // en az 1, en fazla t-1
      return [first, t - first]; // toplam tam = t
    };
    const [wA, wB] = splitMinutes(warmupMin, daySeed);
    const [cA, cB] = splitMinutes(cooldownMin, daySeed + 1);
    const warm = { name: "Isınma", color: "#3b82f6", duration: `${warmupMin} dk`, exercises: [
      { name: lang==="en"?"Jump rope / shadow warm-up":"İp / gölge ısınma", sets: null, duration: `${wA} dk`, desc: lang==="en"?"Gradually raise heart rate.":"Nabzı kademeli yükselt." },
      { name: lang==="en"?"Dynamic mobility":"Dinamik mobilite", sets: null, duration: `${wB} dk`, desc: lang==="en"?"Shoulders, hips, neck.":"Omuz, kalça, boyun." },
    ]};
    const cool = { name: "Soğuma", color: "#10b981", duration: `${cooldownMin} dk`, exercises: [
      { name: lang==="en"?"Slow shadow & breathing":"Yavaş gölge & nefes", sets: null, duration: `${cA} dk`, desc: lang==="en"?"Lower heart rate, relax.":"Nabzı düşür, gevşe." },
      { name: lang==="en"?"Full-body stretch":"Tam vücut esneme", sets: null, duration: `${cB} dk`, desc: lang==="en"?"Hold each 30-40 s.":"Her bölgede 30-40 sn." },
    ]};
    const totalMin = warmupMin + cooldownMin + mainPhases.reduce((s,p)=>{const m=p.duration.match(/(\d+)/);return s+(m?parseInt(m[1]):0);},0);
    const cats = Object.keys(byCat).map(id => CATEGORIES.find(c=>c.id===id));
    return {
      title: cats.length === 1 ? epicTitle(cats[0].id, level, lang) : (lang==="en"?"Custom War Plan":"Özel Savaş Planı"),
      subtitle: cats.map(c=>catLabel(c,lang)).join(" + "),
      totalTime: `${totalMin} dk`,
      phases: [warm, ...mainPhases, cool],
    };
  };

  // Karta tıklanınca hızlı başlat ekranını aç (round = hareketin varsayılanı)
  const openQuick = (catId, ex) => {
    setQuick({ catId, ex });
    setQuickRounds(defaultRounds(ex));
    setQuickPlaying(false);
  };

  // Tek hareketten program kur — round sayısı sets'e çarpan olarak yansır (veri kopyalanmaz)
  const buildSingleProgram = (catId, ex, rounds) => {
    const c = CATEGORIES.find(x => x.id === catId);
    return {
      title: lang === "en" ? ex.nameEn : ex.name,
      subtitle: `${catLabel(c, lang)} · ${rounds} ${t.rounds3}`,
      totalTime: `${estimateMinutes(ex, rounds)} dk`,
      phases: [{
        name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId,
        duration: `${estimateMinutes(ex, rounds)} dk`,
        exercises: [{
          name: lang === "en" ? ex.nameEn : ex.name,
          sets: applyRounds(ex.sets, rounds),
          duration: applyRoundsToDuration(ex.duration, rounds), // playlist round'u buradan okur
          desc: lang === "en" ? ex.descEn : ex.desc,
        }],
      }],
    };
  };

  // Hızlı başlat oynatıcı ekranı
  if (quick && quickPlaying) {
    const program = buildSingleProgram(quick.catId, quick.ex, quickRounds);
    const accent = CATEGORIES.find(c => c.id === quick.catId)?.color || RED;
    return (
      <WorkoutPlayer program={program} accentColor={accent} lang={lang} roundSec={roundSec} restSec={restSec}
        coachOn={coachOn} soundOn={soundOn} warnSec={warnSec}
        onExit={() => { setQuickPlaying(false); setQuick(null); }} onComplete={onWorkoutComplete} />
    );
  }

  // Hızlı başlat — round seçici (stepper) ekranı
  if (quick) {
    const c = CATEGORIES.find(x => x.id === quick.catId);
    const est = estimateMinutes(quick.ex, quickRounds);
    return (
      <div>
        <button onClick={() => setQuick(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 20, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>

        <div style={{ background: `linear-gradient(135deg, ${c.color}18, ${CARD})`, border: `1px solid ${c.color}44`, borderRadius: 18, padding: 22, marginBottom: 24, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>{c.icon}</div>
          <div style={{ color: c.color, fontSize: 11, letterSpacing: 2, fontWeight: 800, marginBottom: 6 }}>{catLabel(c, lang).toUpperCase()}</div>
          <div style={{ color: "#fff", fontSize: 21, fontWeight: 900, lineHeight: 1.2, marginBottom: 8 }}>{lang === "en" ? quick.ex.nameEn : quick.ex.name}</div>
          {(lang === "en" ? quick.ex.descEn : quick.ex.desc) && <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5 }}>{lang === "en" ? quick.ex.descEn : quick.ex.desc}</div>}
          {/* Hareket videosu: kendi videonu ekle / izle */}
          <div style={{ marginTop: 6, textAlign: "left" }}><VideoBlock ex={quick.ex} lang={lang} color={c.color} allowEdit /></div>
        </div>

        {isDescendingReps(quick.ex.sets) ? (
          /* Azalan tekrar: round değiştirilemez, set planını göster */
          <div style={{ background: `${c.color}12`, border: `1px solid ${c.color}44`, borderRadius: 14, padding: 16, marginBottom: 20, textAlign: "center" }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>{lang === "en" ? "SET PLAN (reps per set)" : "SET PLANI (set başına tekrar)"}</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
              {quick.ex.sets.split("-").map((rep, i) => (
                <div key={i} style={{ background: CARD, border: `1px solid ${c.color}55`, borderRadius: 10, padding: "8px 14px", minWidth: 36 }}>
                  <div style={{ color: c.color, fontSize: 18, fontWeight: 900, lineHeight: 1 }}>{rep}</div>
                  <div style={{ color: "#555", fontSize: 8, fontWeight: 700, marginTop: 2 }}>{i + 1}. {lang === "en" ? "set" : "set"}</div>
                </div>
              ))}
            </div>
            <div style={{ color: "#666", fontSize: 11, marginTop: 10, lineHeight: 1.4 }}>{lang === "en" ? "Each set has fewer reps — push hard early, finish strong." : "Her set daha az tekrar — başta zorla, güçlü bitir."}</div>
          </div>
        ) : (
          <div style={{ color: "#666", fontSize: 12.5, textAlign: "center", lineHeight: 1.5, marginBottom: 20, background: `${c.color}10`, border: `1px solid ${c.color}33`, borderRadius: 12, padding: 14 }}>
            {lang === "en" ? "Add it to your plan, then set rounds, length and rest below." : "Plana ekle, sonra aşağıda round, süre ve dinlenmeyi ayarla."}
          </div>
        )}

        <button onClick={() => { addEx(quick.catId, quick.ex, defaultRounds(quick.ex)); setQuick(null); }}
          style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${c.color}, ${GOLD})`, color: "#000", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${c.color}55` }}>
          + {t.addToPlan}
        </button>
      </div>
    );
  }

  if (viewing && plan.length > 0) {
    const program = buildFromPlan();
    const accent = selected.length === 1 ? CATEGORIES.find(c => c.id === selected[0])?.color : RED;
    return (
      <div>
        <button onClick={() => setViewing(false)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>
        <ProgramDisplay program={program} accentColor={accent} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onComplete={onWorkoutComplete} equipment={equipment} level={level} />
      </div>
    );
  }

  const lvl = LEVELS.find(l => l.id === level);

  if (!levelChosen) {
    return <AutoLevelPicker lang={lang} onPick={(id) => { setLevel(id); setLevelChosen(true); }} titleOverride={t.tabBuild} descOverride={lang === "en" ? "First, pick your level. You'll build your own workout on the next screen." : "Önce seviyeni seç. Sonraki ekranda kendi antrenmanını kuracaksın."} />;
  }

  return (
    <div>
      {/* Açıklama kartı */}
      <div style={{ background: `linear-gradient(135deg, ${GOLD}12, ${CARD})`, border: `1px solid ${GOLD}33`, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <div style={{ fontSize: 30, marginBottom: 8 }}>🛠️</div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginBottom: 6 }}>{t.tabBuild}</div>
        <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5 }}>{t.buildDesc}</div>
      </div>
      {/* Seviye — ayrı ekranda zaten seçildi, burada sadece hatırlatma + değiştirme */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "10px 14px", marginBottom: 18 }}>
        <span style={{ color: "#888", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>{t.level}</span>
        <button onClick={() => setLevelChosen(false)} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
          <span style={{ color: level === "mix" ? GOLD : (lvl && lvl.color), fontSize: 13, fontWeight: 900 }}>
            {level === "mix" ? "🔀 " + (lang === "en" ? "MIX" : "KARMA") : (lvl ? `${lvl.icon} ${lang==="en"?lvl.en:lvl.tr}` : "")}
          </span>
          <span style={{ color: "#666", fontSize: 11 }}>✎</span>
        </button>
      </div>
        {level === "pro" && <div style={{ marginTop: 8, color: "#888", fontSize: 11, textAlign: "center", background: "#ffffff08", borderRadius: 8, padding: "6px 10px" }}>⚫ {t.proHint}</div>}
        {level === "mix" && <div style={{ marginTop: 8, color: "#888", fontSize: 11, textAlign: "center", background: `${GOLD}10`, borderRadius: 8, padding: "6px 10px" }}>🔀 {lang === "en" ? "All levels' moves are listed — combine freely." : "Tüm seviyelerin hareketleri listelenir — istediğin gibi birleştir."}</div>}

      {/* Mod seçimi */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{t.type} <span style={{ color: "#333" }}>{t.typeHint}</span></div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {VISIBLE_CATEGORIES.map(c => {
            // Gölge boksu: kendisi + alt-tarzları (combo/defense/sparring) seçiliyse aktif say
            const isShadow = c.id === "shadow";
            const active = isShadow
              ? selected.some(id => ["shadow", "combo", "defense", "sparring"].includes(id))
              : selected.includes(c.id);
            return (
              <button key={c.id}
                onClick={() => { if (isShadow) { setShadowOpen(o => !o); } else { toggleCat(c.id); } }}
                style={{ background: active ? `${c.color}25` : CARD, color: active ? c.color : "#666", border: `1.5px solid ${active ? c.color + "88" : LINE}`, borderRadius: 12, padding: "12px 10px", fontSize: 13, fontWeight: 700, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>{c.icon}</span><span style={{ flex: 1 }}>{catLabel(c, lang)}</span>
                {isShadow ? <span style={{ fontSize: 12 }}>{shadowOpen ? "▲" : "▾"}</span> : (active && <span style={{ fontSize: 14 }}>✓</span>)}
              </button>
            );
          })}
        </div>

        {/* Gölge Boksu alt-tarz seçici */}
        {shadowOpen && (
          <div style={{ marginTop: 10, background: "#a855f70d", border: "1px solid #a855f733", borderRadius: 12, padding: 12 }}>
            <div style={{ color: "#a855f7", fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 10 }}>
              👊 {lang === "en" ? "WHICH SHADOW STYLE?" : "HANGİ TARZDA GÖLGE BOKSU?"}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {SHADOW_STYLES.map(s => {
                const on = selected.includes(s.id);
                return (
                  <button key={s.id} onClick={() => toggleCat(s.id)}
                    style={{ background: on ? "#a855f725" : CARD, border: `1.5px solid ${on ? "#a855f788" : LINE}`, borderRadius: 10, padding: "10px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                      <span style={{ fontSize: 15 }}>{s.icon}</span>
                      <span style={{ color: on ? "#a855f7" : "#ccc", fontSize: 12.5, fontWeight: 800, flex: 1 }}>{lang === "en" ? s.en : s.tr}</span>
                      {on && <span style={{ color: "#a855f7", fontSize: 13 }}>✓</span>}
                    </div>
                    <div style={{ color: "#666", fontSize: 10, lineHeight: 1.3 }}>{lang === "en" ? s.desc.en : s.desc.tr}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ANTRENÖR REHBERİ — sadece Çaylak seviyede göster */}
      {level === "beginner" && (
      <div style={{ background: `linear-gradient(135deg, ${GOLD}10, ${CARD})`, border: `1px solid ${GOLD}44`, borderRadius: 14, padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <span style={{ fontSize: 18 }}>🥊</span>
          <span style={{ color: GOLD, fontSize: 11, letterSpacing: 2, fontWeight: 900 }}>{t.coachGuide}</span>
        </div>
        <div style={{ color: "#999", fontSize: 11, marginBottom: 8 }}>{t.recommendedOrder}</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center", marginBottom: 12 }}>
          {(SESSION_TEMPLATES[level] || SESSION_TEMPLATES.intermediate)[lang].map((stp, i, arr) => (
            <span key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ background: "#1a1a1a", color: "#ccc", fontSize: 10.5, fontWeight: 700, padding: "4px 8px", borderRadius: 6 }}>{i + 1}. {stp}</span>
              {i < arr.length - 1 && <span style={{ color: GOLD, fontSize: 11 }}>→</span>}
            </span>
          ))}
        </div>
        <button onClick={() => {
            const tmpl = SESSION_TEMPLATES[level] || SESSION_TEMPLATES.intermediate;
            const newPlan = [];
            tmpl.catIds.forEach(catId => {
              const poolList = poolForCategory(catId, equipment, level);
              if (poolList.length > 0) { const pe = poolList[Math.floor(Math.random() * poolList.length)]; newPlan.push({ uid: nextUid(), catId, ex: pe, rounds: defaultRounds(pe) }); }
            });
            setSelected(tmpl.catIds.filter(id => poolForCategory(id, equipment, level).length > 0));
            setPlan(newPlan);
            setViewing(false);
          }}
          style={{ width: "100%", background: GOLD, color: "#000", border: "none", borderRadius: 10, padding: "11px", fontSize: 13, fontWeight: 900, cursor: "pointer", letterSpacing: 0.5 }}>
          ⚡ {t.useTemplate}
        </button>
        {selected.length > 0 && (
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${LINE}` }}>
            <div style={{ color: GOLD, fontSize: 11, fontWeight: 800, marginBottom: 8 }}>{t.coachTipTitle}</div>
            {selected.map(catId => {
              const tip = PAIRING_TIPS[catId];
              const c = CATEGORIES.find(x => x.id === catId);
              if (!tip) return null;
              return (
                <div key={catId} style={{ marginBottom: 8 }}>
                  <div style={{ color: c.color, fontSize: 11.5, fontWeight: 700, marginBottom: 2 }}>{c.icon} {catLabel(c, lang)}</div>
                  <div style={{ color: "#aaa", fontSize: 11, lineHeight: 1.45 }}>{lang === "en" ? tip.en : tip.tr}</div>
                  <div style={{ color: "#666", fontSize: 10, marginTop: 3 }}>
                    {t.pairsWith} {tip.with.map(wId => { const wc = CATEGORIES.find(x => x.id === wId); return wc ? `${wc.icon} ${catLabel(wc, lang)}` : ""; }).filter(Boolean).join(" · ")}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      )}

      {/* Aktif Plan */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ color: "#555", fontSize: 10, letterSpacing: 3, fontWeight: 700 }}>{t.activePlan}</span>
          {plan.length > 0 && <button onClick={() => setPlan([])} style={{ background: "none", border: "none", color: "#666", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>{t.clearPlan}</button>}
        </div>
        {plan.length > 1 && (
          <div style={{ color: "#10b981", fontSize: 10.5, marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>{t.autoSorted}</div>
        )}
        {plan.length === 0 ? (
          <div style={{ background: CARD, border: `1px dashed ${LINE}`, borderRadius: 14, padding: 20, textAlign: "center", color: "#555", fontSize: 13, lineHeight: 1.6 }}>{t.emptyPlan}</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[...plan].sort((a, b) => (CATEGORY_ORDER[a.catId] || 99) - (CATEGORY_ORDER[b.catId] || 99)).map((block) => {
              const c = CATEGORIES.find(x => x.id === block.catId);
              return (
                <div key={block.uid} style={{ background: `${c.color}14`, border: `1px solid ${c.color}44`, borderRadius: 10, padding: "10px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <span style={{ fontSize: 15 }}>{c.icon}</span>
                    <div style={{ flex: 1, color: "#eee", fontSize: 12.5, fontWeight: 700 }}>{lang === "en" ? block.ex.nameEn : block.ex.name}</div>
                    <button onClick={() => removeBlock(block.uid)} style={{ background: "none", border: "none", color: "#888", fontSize: 18, cursor: "pointer", lineHeight: 1 }}>×</button>
                  </div>
                  {/* Hareket bazlı round seçici (1-12) */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: isDescendingReps(block.ex.sets) ? 0 : 7 }}>
                    <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.roundLabel}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                      <button onClick={() => setBlockRounds(block.uid, Math.max(1, block.rounds - 1))}
                        style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                      <div style={{ minWidth: 38, textAlign: "center", color: "#fff", fontSize: 15, fontWeight: 900 }}>{block.rounds}</div>
                      <button onClick={() => setBlockRounds(block.uid, Math.min(12, block.rounds + 1))}
                        style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                      <span style={{ color: "#666", fontSize: 11, marginLeft: 2 }}>{t.rounds3}</span>
                    </div>
                  </div>
                  {/* Süre (dk/round) ve dinlenme (sn) — azalan tekrar hareketlerinde gizli */}
                  {!isDescendingReps(block.ex.sets) && (
                    <>
                      {/* Round süresi */}
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                        <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.roundMinLabel}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                          <button onClick={() => setBlockRoundMin(block.uid, Math.max(1, (block.roundMin || defaultRoundMin(block.ex)) - 1))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                          <div style={{ minWidth: 38, textAlign: "center", color: "#fff", fontSize: 15, fontWeight: 900 }}>{block.roundMin || defaultRoundMin(block.ex)}</div>
                          <button onClick={() => setBlockRoundMin(block.uid, Math.min(15, (block.roundMin || defaultRoundMin(block.ex)) + 1))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                          <span style={{ color: "#666", fontSize: 11, marginLeft: 2 }}>{t.perRoundShort}</span>
                        </div>
                      </div>
                      {/* Dinlenme süresi */}
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ color: "#888", fontSize: 10, fontWeight: 700, letterSpacing: 1, minWidth: 48 }}>{t.restLabel}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                          <button onClick={() => setBlockRest(block.uid, Math.max(0, (typeof block.restSec === "number" ? block.restSec : 45) - 15))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>−</button>
                          <div style={{ minWidth: 52, textAlign: "center", color: "#fff", fontSize: 14, fontWeight: 900 }}>{(typeof block.restSec === "number" ? block.restSec : 45) === 0 ? t.noRest : `${(typeof block.restSec === "number" ? block.restSec : 45)} sn`}</div>
                          <button onClick={() => setBlockRest(block.uid, Math.min(120, (typeof block.restSec === "number" ? block.restSec : 45) + 15))}
                            style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 18, fontWeight: 900, cursor: "pointer", lineHeight: 1 }}>+</button>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              );
            })}
            <div style={{ color: "#666", fontSize: 11, textAlign: "right", marginTop: 2 }}>{plan.length} {t.movesInPlan} · {plan.reduce((s,b)=>s+(b.rounds||1),0)} {t.rounds3}</div>
          </div>
        )}
      </div>

      {/* Süre ayarı */}
      {plan.length > 0 && (
        <div style={{ background: "#0e0e10", borderRadius: 16, padding: 16, marginBottom: 18, border: `1px solid ${LINE}` }}>
          <DurationRow label={`🔥 ${t.warmup}`} color="#3b82f6" value={warmupMin} options={[5, 10, 15, 20]} onChange={setWarmupMin} />
          <DurationRow label={`🧊 ${t.cooldown}`} color="#10b981" value={cooldownMin} options={[5, 10, 15, 20]} onChange={setCooldownMin} last />
        </div>
      )}

      {/* Elit Havuz — buradan ekle (kural 1 & 3) */}
      <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 4, fontWeight: 700 }}>{t.pool}</div>
      <div style={{ color: "#444", fontSize: 11, marginBottom: 12 }}>{t.addCustom}</div>
      {visibleCats.map(catId => {
        const c = CATEGORIES.find(x => x.id === catId);
        const poolList = poolByCat[catId] || [];
        if (poolList.length === 0) return null;
        return (
          <div key={catId} style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 3, height: 16, background: c.color, borderRadius: 2 }} />
              <span style={{ color: "#ccc", fontSize: 13, fontWeight: 800 }}>{c.icon} {catLabel(c, lang)}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {poolList.map((ex, ei) => {
                const count = countInPlan(catId, ex.name);
                return (
                  <button key={ei} onClick={() => openQuick(catId, ex)} style={{ background: count > 0 ? `${c.color}1a` : CARD, border: `1px solid ${count > 0 ? c.color + "66" : LINE}`, borderRadius: 10, padding: "11px 12px", display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer", textAlign: "left" }}>
                    <div style={{ width: 24, height: 24, borderRadius: 6, background: c.color, border: "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0, color: "#000", fontWeight: 900, marginTop: 1 }}>▶</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ color: count > 0 ? "#fff" : "#ddd", fontSize: 12.5, fontWeight: 700 }}>
                        {lang === "en" ? ex.nameEn : ex.name}
                        {level === "mix" && (() => { const lo = LEVELS.find(l => l.id === ex.level) || LEVELS[0]; return <span style={{ background: `${lo.color}22`, color: lo.color, fontSize: 8.5, fontWeight: 900, padding: "1px 6px", borderRadius: 5, marginLeft: 6, letterSpacing: 0.3 }}>{lang === "en" ? lo.en : lo.tr}</span>; })()}
                        {count > 0 && <span style={{ background: c.color, color: "#000", fontSize: 10, fontWeight: 900, padding: "1px 7px", borderRadius: 10, marginLeft: 6 }}>×{count}</span>}
                      </div>
                      {(lang === "en" ? ex.descEn : ex.desc) && <div style={{ color: "#555", fontSize: 10.5, marginTop: 2, lineHeight: 1.4 }}>{lang === "en" ? ex.descEn : ex.desc}</div>}
                    </div>
                    <span style={{ color: c.color, fontSize: 16, alignSelf: "center" }}>›</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Programı göster */}
      {plan.length > 0 && (
        <button onClick={() => setViewing(true)} style={{ width: "100%", marginTop: 8, padding: "16px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer", letterSpacing: 0.5, boxShadow: `0 4px 20px ${RED}55` }}>
          🥊 {t.showProgram} ({plan.length})
        </button>
      )}
    </div>
  );
}

// ─── Premium Paneli (ayrı segment) ────────────────────────────────────────────
function PremiumPanel({ lang }) {
  const t = T[lang];
  const [premium, setPremiumState] = useState(() => loadPremium());
  const buyPremium = () => { setPremium(true); setPremiumState(true); };
  return (
    <div style={{ background: `linear-gradient(135deg, ${GOLD}15, ${CARD})`, border: `1px solid ${GOLD}66`, borderRadius: 16, padding: 18, marginBottom: 16 }}>
      <div style={{ fontSize: 30, marginBottom: 8 }}>⭐</div>
      <div style={{ color: GOLD, fontSize: 18, fontWeight: 900, marginBottom: 4 }}>{t.premiumTitle}</div>
      {premium ? (
        <div style={{ color: "#10b981", fontSize: 14, fontWeight: 800, marginTop: 10 }}>{t.premiumActive}<br /><span style={{ color: "#aaa", fontSize: 12, fontWeight: 600 }}>{t.premiumThanks}</span></div>
      ) : (
        <>
          <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.5, marginBottom: 14 }}>{t.premiumDesc}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
            {[t.premiumF1, t.premiumF2, t.premiumF3, t.premiumF4, t.premiumF5, t.premiumF6].filter(Boolean).map((f, i) => (
              <div key={i} style={{ color: "#eee", fontSize: 13.5, display: "flex", alignItems: "center", gap: 10, background: "#ffffff06", borderRadius: 10, padding: "11px 13px", fontWeight: 600 }}>{f}</div>
            ))}
          </div>
          <button onClick={buyPremium} style={{ width: "100%", padding: "15px", borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${GOLD}, #ffed4e)`, color: "#000", fontSize: 15, fontWeight: 900, cursor: "pointer", letterSpacing: 0.5 }}>{t.premiumCta}</button>
          <button onClick={() => { if (loadPremium()) setPremiumState(true); }} style={{ width: "100%", marginTop: 8, padding: "10px", borderRadius: 10, border: "none", background: "transparent", color: "#888", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{t.premiumRestore}</button>
          <div style={{ color: "#555", fontSize: 10.5, marginTop: 8, lineHeight: 1.4, textAlign: "center" }}>{t.premiumNote}</div>
        </>
      )}
    </div>
  );
}

// ─── Ayarlar Paneli ───────────────────────────────────────────────────────────
function SettingsPanel({ lang, roundSec, setRoundSec, restSec, setRestSec, coachOn, setCoachOn, soundOn, setSoundOn, warnSec, setWarnSec, equipment, toggleEquip, onEditProfile, onReplayTour }) {
  const t = T[lang];
  const [reminder, setReminder] = useState(() => loadReminder());
  const [reminderMsg, setReminderMsg] = useState("");

  const toggleReminder = async () => {
    if (!reminder.enabled) {
      const perm = await requestNotifPermission();
      if (perm === "granted") {
        const r = { ...reminder, enabled: true }; setReminder(r); saveReminder(r); setReminderMsg("");
        try { new Notification("BOXER PRO", { body: t.reminderBody }); } catch {}
      } else if (perm === "unsupported") setReminderMsg(t.reminderUnsupported);
      else setReminderMsg(t.reminderDenied);
    } else {
      const r = { ...reminder, enabled: false }; setReminder(r); saveReminder(r); setReminderMsg("");
    }
  };
  const changeTime = (time) => { const r = { ...reminder, time }; setReminder(r); saveReminder(r); };

  return (
    <div style={{ background: CARD, borderRadius: 14, padding: 16, marginBottom: 16, border: `1px solid ${LINE}` }}>
      {/* Profil düzenle */}
      <button onClick={onEditProfile} style={{ width: "100%", marginBottom: 10, padding: "12px", borderRadius: 10, border: `1px solid ${RED}55`, background: `${RED}11`, color: RED, fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
        👤 {t.pEdit}
      </button>
      {onReplayTour && (
        <button onClick={onReplayTour} style={{ width: "100%", marginBottom: 16, padding: "12px", borderRadius: 10, border: `1px solid ${LINE}`, background: "transparent", color: "#aaa", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
          📖 {lang === "en" ? "Replay intro tour" : "Tanıtım turunu tekrar göster"}
        </button>
      )}

      {/* Antrenman hatırlatması */}
      <div style={{ background: "#0e0e10", border: `1px solid ${reminder.enabled ? "#10b981" + "55" : LINE}`, borderRadius: 12, padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: reminder.enabled ? 12 : 6 }}>
          <span style={{ color: "#ddd", fontSize: 13, fontWeight: 800 }}>🔔 {t.reminderTitle}</span>
          <button onClick={toggleReminder} role="switch" aria-checked={reminder.enabled} style={{ background: reminder.enabled ? "#10b981" : "#333", border: "none", borderRadius: 20, width: 46, height: 26, cursor: "pointer", position: "relative", transition: "background 0.2s" }}>
            <div style={{ position: "absolute", top: 3, left: reminder.enabled ? 23 : 3, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
          </button>
        </div>
        {!reminder.enabled && <div style={{ color: "#777", fontSize: 11.5, lineHeight: 1.4 }}>{t.reminderDesc}</div>}
        {reminder.enabled && (
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ color: "#888", fontSize: 12 }}>{t.reminderTime}:</span>
            <input type="time" value={reminder.time} onChange={e => changeTime(e.target.value)} aria-label={t.reminderTime}
              style={{ background: "#1a1a1f", border: `1px solid ${LINE}`, borderRadius: 8, padding: "6px 10px", color: "#fff", fontSize: 14, fontWeight: 700 }} />
            <span style={{ color: "#10b981", fontSize: 11, fontWeight: 700 }}>{t.reminderOn}</span>
          </div>
        )}
        {reminderMsg && <div style={{ color: GOLD, fontSize: 11, marginTop: 8, lineHeight: 1.4 }}>{reminderMsg}</div>}
      </div>

      {/* Raund & dinlenme */}
      <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#888", fontSize: 10, letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>{t.roundTime}</div>
          <div style={{ display: "flex", gap: 5 }}>
            {[[120, "2dk"], [180, "3dk"], [240, "4dk"]].map(([v, l]) => <button key={v} onClick={() => setRoundSec(v)} style={{ flex: 1, background: roundSec === v ? RED : "#1a1a1a", color: roundSec === v ? "#fff" : "#666", border: "none", borderRadius: 8, padding: "8px 2px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{l}</button>)}
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#888", fontSize: 10, letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>{t.restTime}</div>
          <div style={{ display: "flex", gap: 5 }}>
            {[[30, "30sn"], [60, "60sn"]].map(([v, l]) => <button key={v} onClick={() => setRestSec(v)} style={{ flex: 1, background: restSec === v ? GOLD : "#1a1a1a", color: restSec === v ? "#000" : "#666", border: "none", borderRadius: 8, padding: "8px 2px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{l}</button>)}
          </div>
        </div>
      </div>

      {/* Sesli antrenör */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ color: "#bbb", fontSize: 13, fontWeight: 700 }}>🎙 {t.coach}</span>
        <button onClick={() => setCoachOn(s => { const nx = !s; if (nx) { primeSpeech(); setTimeout(() => speak(COMBO_CALLS[lang][0], lang), 250); } return nx; })} style={{ background: coachOn ? "#22c55e" : "#1e1e1e", color: coachOn ? "#000" : "#666", border: "none", borderRadius: 20, padding: "6px 16px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{coachOn ? t.on : t.off}</button>
      </div>
      {/* Gong */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ color: "#bbb", fontSize: 13, fontWeight: 700 }}>🔔 {t.soundGong}</span>
        <button onClick={() => setSoundOn(s => !s)} style={{ background: soundOn ? "#22c55e" : "#1e1e1e", color: soundOn ? "#000" : "#666", border: "none", borderRadius: 20, padding: "6px 16px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{soundOn ? t.on : t.off}</button>
      </div>
      {/* İlk uyarı — kaç saniye kala */}
      <div style={{ color: "#bbb", fontSize: 13, fontWeight: 700, marginBottom: 4 }}>⏰ {lang === "en" ? "First warning (seconds left)" : "İlk uyarı (kaç saniye kala)"}</div>
      <div style={{ color: "#666", fontSize: 11, marginBottom: 8, lineHeight: 1.4 }}>{lang === "en" ? "The first alert fires this many seconds before the round ends. The last 3 seconds always count down automatically." : "İlk sesli/görsel uyarı, round bitmeden bu kadar saniye kala verilir. Son 3 saniye her zaman otomatik geri sayılır."}</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {[[0, lang === "en" ? "Off" : "Kapalı"], [10, "10 sn"], [15, "15 sn"], [20, "20 sn"], [30, "30 sn"], [45, "45 sn"], [60, "60 sn"]].map(([v, l]) => <button key={v} onClick={() => setWarnSec(v)} style={{ flex: "1 1 26%", background: warnSec === v ? RED : "#1a1a1a", color: warnSec === v ? "#fff" : "#666", border: "none", borderRadius: 8, padding: "9px 4px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>)}
      </div>
      <div style={{ color: "#555", fontSize: 11, marginTop: 10, textAlign: "center", lineHeight: 1.8 }}>🔊 {t.testSound}: <button onClick={() => playNextExercise()} style={{ background: "none", border: "none", color: "#10b981", cursor: "pointer", fontSize: 11, textDecoration: "underline", fontWeight: 700 }}>{lang === "en" ? "next move" : "sıradaki"}</button> · <button onClick={() => playToRest()} style={{ background: "none", border: "none", color: "#3b82f6", cursor: "pointer", fontSize: 11, textDecoration: "underline", fontWeight: 700 }}>{lang === "en" ? "rest" : "dinlenme"}</button> · <button onClick={() => playRestEnd()} style={{ background: "none", border: "none", color: GOLD, cursor: "pointer", fontSize: 11, textDecoration: "underline", fontWeight: 700 }}>{lang === "en" ? "resume" : "devam"}</button> · <button onClick={() => { playTenLeft(); setTimeout(() => playCountTick(false), 900); setTimeout(() => playCountTick(false), 1300); setTimeout(() => playCountTick(true), 1700); }} style={{ background: "none", border: "none", color: "#f59e0b", cursor: "pointer", fontSize: 11, textDecoration: "underline", fontWeight: 700 }}>{lang === "en" ? "10s+countdown" : "son 10sn+geri sayım"}</button> · <button onClick={() => playFinishBeeps()} style={{ background: "none", border: "none", color: RED, cursor: "pointer", fontSize: 11, textDecoration: "underline", fontWeight: 700 }}>{lang === "en" ? "finish" : "bitiş"}</button></div>

      {/* Müzik kısayolları — kendi müzik çaları aç */}
      <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px solid ${LINE}` }}>
        <div style={{ color: "#bbb", fontSize: 13, fontWeight: 700, marginBottom: 3 }}>🎵 {t.musicTitle}</div>
        <div style={{ color: "#555", fontSize: 11, marginBottom: 10 }}>{t.musicHint}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {[
            { name: "Spotify", url: "https://open.spotify.com", color: "#1DB954" },
            { name: "Apple Music", url: "https://music.apple.com", color: "#FA243C" },
            { name: "YT Music", url: "https://music.youtube.com", color: "#FF0000" },
          ].map(m => (
            <a key={m.name} href={m.url} target="_blank" rel="noopener noreferrer"
              style={{ flex: 1, textAlign: "center", background: `${m.color}22`, color: m.color, border: `1px solid ${m.color}55`, borderRadius: 10, padding: "10px 4px", fontSize: 12, fontWeight: 800, cursor: "pointer", textDecoration: "none" }}>
              ▶ {m.name}
            </a>
          ))}
        </div>
      </div>
    </div>
  );
}
