// ─── Program Görüntüleme (tik listesi + başlat) ───────────────────────────────
function ProgramDisplay({ program: incomingProgram, accentColor, lang, roundSec, restSec, coachOn, soundOn, warnSec, onComplete, equipment, level }) {
  const t = T[lang];
  const equip = equipment || [];
  const lvl = level || "intermediate";
  const [playing, setPlaying] = useState(false);
  const [doneSet, setDoneSet] = useState(() => new Set());
  // Programı düzenlenebilir yap: kullanıcı başlatmadan önce hareket çıkarabilsin
  const [program, setProgram] = useState(incomingProgram);
  const [editMode, setEditMode] = useState(false);
  useEffect(() => { setProgram(incomingProgram); }, [incomingProgram]);

  // Isınma/soğuma fazı mı? (bu fazlardaki hareketlerde round/dinlenme düzenlenemez — akıcı olmalı)
  const isWCPhase = (ph) => /Isınma|Soğuma|Warm|Cool/i.test(ph?.name || "");

  // Bir hareketi programdan çıkar (faz boş kalırsa fazı da kaldır)
  const removeExercise = (phaseIdx, exIdx) => {
    setProgram(prev => {
      const phases = prev.phases.map((ph, pi) => {
        if (pi !== phaseIdx) return ph;
        return { ...ph, exercises: ph.exercises.filter((_, ei) => ei !== exIdx) };
      }).filter(ph => {
        // Isınma/soğuma boş kalsa bile kalsın; ana fazlar boşalınca kalksın
        return isWCPhase(ph) || (ph.exercises && ph.exercises.length > 0);
      });
      return { ...prev, phases };
    });
    setDoneSet(new Set()); // tik'leri sıfırla (indeksler kaydı)
  };

  // Bir hareketin round sayısını değiştir (sets ve duration alanlarına aynı round'u uygula)
  const setExerciseRounds = (phaseIdx, exIdx, rounds) => {
    setProgram(prev => {
      const phases = prev.phases.map((ph, pi) => {
        if (pi !== phaseIdx) return ph;
        const exercises = ph.exercises.map((ex, ei) => ei !== exIdx ? ex : {
          ...ex, sets: applyRounds(ex.sets, rounds), duration: applyRoundsToDuration(ex.duration, rounds),
        });
        return { ...ph, exercises };
      });
      return { ...prev, phases };
    });
  };
  // Bir hareketin dinlenme süresini (sn) değiştir — elle ayarlanan değer her zaman öncelikli kullanılır
  const setExerciseRest = (phaseIdx, exIdx, restSecVal) => {
    setProgram(prev => {
      const phases = prev.phases.map((ph, pi) => {
        if (pi !== phaseIdx) return ph;
        const exercises = ph.exercises.map((ex, ei) => ei !== exIdx ? ex : { ...ex, rest: restSecVal });
        return { ...ph, exercises };
      });
      return { ...prev, phases };
    });
  };

  // ─── Düzenleme modunda yeni hareket ekleme akışı ───
  const [addPickerCat, setAddPickerCat] = useState(null); // kategori seçildi, hareket seçilecek
  const [addPickerEx, setAddPickerEx] = useState(null);   // { catId, ex } — round ayarlanacak
  const [addPickerRounds, setAddPickerRounds] = useState(3);

  // Seçilen hareketi (kullanıcının ayarladığı round ile) programa ekle.
  // İlgili kategoride faz varsa sonuna ekler; yoksa yeni faz kurar ve antrenör sıralamasına göre doğru yere yerleştirir.
  const addExerciseToPhase = (catId, ex, rounds) => {
    const c = CATEGORIES.find(x => x.id === catId);
    const newEx = {
      name: lang === "en" ? ex.nameEn : ex.name, nameEn: ex.nameEn, video: ex.video,
      sets: applyRounds(ex.sets, rounds), duration: applyRoundsToDuration(ex.duration, rounds),
      desc: lang === "en" ? ex.descEn : ex.desc,
      met: ex.met, hedefKas: ex.hedefKas, rest: ex.rest,
    };
    setProgram(prev => {
      let phases = (prev.phases || []).map(ph => ({ ...ph, exercises: ph.exercises ? [...ph.exercises] : ph.exercises }));
      const idx = phases.findIndex(ph => ph._catId === catId);
      if (idx >= 0) {
        phases[idx].exercises.push(newEx);
      } else {
        const newPhase = { name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId, duration: `${estimateMinutes(ex, rounds)} dk`, exercises: [newEx] };
        const warmups = phases.filter(ph => isWCPhase(ph) && /Isınma|Warm/i.test(ph.name || ""));
        const cools = phases.filter(ph => isWCPhase(ph) && /Soğuma|Cool/i.test(ph.name || ""));
        const mains = phases.filter(ph => !isWCPhase(ph));
        mains.push(newPhase);
        mains.sort((a, b) => (CATEGORY_ORDER[a._catId] || 99) - (CATEGORY_ORDER[b._catId] || 99));
        phases = [...warmups, ...mains, ...cools];
      }
      return { ...prev, phases };
    });
    setDoneSet(new Set());
  };

  const allKeys = [];
  program.phases?.forEach((ph, pi) => ph.exercises?.forEach((_, ei) => allKeys.push(`${pi}-${ei}`)));
  const total = allKeys.length;
  const doneCount = allKeys.filter(k => doneSet.has(k)).length;
  const allDone = total > 0 && doneCount === total;

  const toggleDone = (key) => setDoneSet(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });

  // Gerçek süre dağılımı: playlist'ten antrenman ve dinlenme dakikalarını ölç
  const timeSplit = useMemo(() => {
    const pl = buildPlaylist(program, restSec, t);
    let work = 0, rest = 0;
    pl.forEach(s => {
      if (s.kind === "rest") rest += (s.seconds || 0);
      else if (s.seconds) work += s.seconds;
      else work += 40; // süresiz (tekrar-bazlı) hareket ~40 sn
    });
    return { work: Math.round(work / 60), rest: Math.round(rest / 60), total: Math.round((work + rest) / 60) };
  }, [program, restSec, t]);

  if (playing) {
    return <WorkoutPlayer program={program} accentColor={accentColor} lang={lang} roundSec={roundSec} restSec={restSec} coachOn={coachOn} soundOn={soundOn} warnSec={warnSec} onExit={() => setPlaying(false)} onComplete={onComplete} />;
  }

  // Hareket ekleme akışı — round/dinlenme ayarı (Hızlı Başlat ile aynı desen)
  if (addPickerEx) {
    const { catId, ex } = addPickerEx;
    const c = CATEGORIES.find(x => x.id === catId);
    const est = estimateMinutes(ex, addPickerRounds);
    return (
      <div>
        <button onClick={() => setAddPickerEx(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 20, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>
        <div style={{ background: `linear-gradient(135deg, ${c.color}18, ${CARD})`, border: `1px solid ${c.color}44`, borderRadius: 18, padding: 22, marginBottom: 24, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>{c.icon}</div>
          <div style={{ color: c.color, fontSize: 11, letterSpacing: 2, fontWeight: 800, marginBottom: 6 }}>{catLabel(c, lang).toUpperCase()}</div>
          <div style={{ color: "#fff", fontSize: 21, fontWeight: 900, lineHeight: 1.2, marginBottom: 8 }}>{lang === "en" ? ex.nameEn : ex.name}</div>
          {(lang === "en" ? ex.descEn : ex.desc) && <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5 }}>{lang === "en" ? ex.descEn : ex.desc}</div>}
        </div>

        {isDescendingReps(ex.sets) ? (
          <div style={{ background: `${c.color}12`, border: `1px solid ${c.color}44`, borderRadius: 14, padding: 16, marginBottom: 20, textAlign: "center" }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>{lang === "en" ? "SET PLAN (reps per set)" : "SET PLANI (set başına tekrar)"}</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
              {ex.sets.split("-").map((rep, i) => (
                <div key={i} style={{ background: CARD, border: `1px solid ${c.color}55`, borderRadius: 10, padding: "8px 14px", minWidth: 36 }}>
                  <div style={{ color: c.color, fontSize: 18, fontWeight: 900, lineHeight: 1 }}>{rep}</div>
                  <div style={{ color: "#555", fontSize: 8, fontWeight: 700, marginTop: 2 }}>{i + 1}. set</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ background: `${c.color}12`, border: `1px solid ${c.color}44`, borderRadius: 14, padding: 18, marginBottom: 20 }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 12, textAlign: "center" }}>{t.selectRounds}</div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 18, marginBottom: 14 }}>
              <button onClick={() => setAddPickerRounds(r => Math.max(1, r - 1))} style={{ width: 44, height: 44, borderRadius: 12, border: `1.5px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 22, fontWeight: 900, cursor: "pointer" }}>−</button>
              <div style={{ color: "#fff", fontSize: 32, fontWeight: 900, minWidth: 50, textAlign: "center" }}>{addPickerRounds}</div>
              <button onClick={() => setAddPickerRounds(r => Math.min(15, r + 1))} style={{ width: 44, height: 44, borderRadius: 12, border: `1.5px solid ${c.color}55`, background: "transparent", color: c.color, fontSize: 22, fontWeight: 900, cursor: "pointer" }}>+</button>
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 12 }}>
              {[3, 5, 8, 12].map(n => (
                <button key={n} onClick={() => setAddPickerRounds(n)} style={{ background: addPickerRounds === n ? c.color : CARD, color: addPickerRounds === n ? "#000" : "#888", border: `1px solid ${addPickerRounds === n ? c.color : LINE}`, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>{n}</button>
              ))}
            </div>
            <div style={{ color: "#666", fontSize: 11.5, textAlign: "center" }}>{t.estTime}: <span style={{ color: c.color, fontWeight: 800 }}>~{est} dk</span></div>
          </div>
        )}

        <button onClick={() => { addExerciseToPhase(catId, ex, addPickerRounds); setAddPickerEx(null); setAddPickerCat(null); }}
          style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${c.color}, ${GOLD})`, color: "#000", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${c.color}55` }}>
          + {t.addToProgram}
        </button>
      </div>
    );
  }

  // Hareket ekleme akışı — kategori seçildikten sonra havuzdan hareket seç
  if (addPickerCat) {
    const c = CATEGORIES.find(x => x.id === addPickerCat);
    const pool = poolForCategory(addPickerCat, equip, lvl);
    return (
      <div>
        <button onClick={() => setAddPickerCat(null)} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, display: "flex", alignItems: "center", gap: 5, padding: 0, fontWeight: 700 }}>‹ {t.back}</button>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
          <span style={{ fontSize: 22 }}>{c.icon}</span>
          <span style={{ color: c.color, fontSize: 15, fontWeight: 900 }}>{catLabel(c, lang)}</span>
        </div>
        {pool.length === 0 && <div style={{ color: "#777", fontSize: 13, textAlign: "center", padding: 20 }}>{t.noExForCatLevel}</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {pool.map((ex, i) => (
            <button key={i} onClick={() => { setAddPickerEx({ catId: addPickerCat, ex }); setAddPickerRounds(defaultRounds(ex)); }}
              style={{ textAlign: "left", background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px 14px", cursor: "pointer" }}>
              <div style={{ color: "#f0f0f0", fontSize: 13, fontWeight: 700, marginBottom: 3 }}>{lang === "en" ? ex.nameEn : ex.name}</div>
              <div style={{ color: "#666", fontSize: 11, lineHeight: 1.4 }}>{lang === "en" ? ex.descEn : ex.desc}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: CARD, borderRadius: 16, padding: 16, marginBottom: 14, border: `1px solid ${accentColor}33`, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 90, height: 90, background: accentColor, opacity: 0.1, borderRadius: "50%", filter: "blur(30px)" }} />
        <div style={{ color: accentColor, fontSize: 10, letterSpacing: 2, marginBottom: 4, fontWeight: 700 }}>{program.totalTime || "60 dk"} · {t.program}</div>
        <div style={{ color: "#fff", fontSize: 20, fontWeight: 900, marginBottom: 3, letterSpacing: -0.3 }}>{program.title}</div>
        <div style={{ color: "#777", fontSize: 12 }}>{program.subtitle}</div>
      </div>

      {/* Gerçek süre dağılımı: kaç dk antrenman / kaç dk dinlenme */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <div style={{ flex: 1, background: `${RED}0d`, border: `1px solid ${RED}33`, borderRadius: 12, padding: "10px", textAlign: "center" }}>
          <div style={{ color: RED, fontSize: 18, fontWeight: 900 }}>{timeSplit.work}<span style={{ fontSize: 11 }}> dk</span></div>
          <div style={{ color: "#777", fontSize: 9.5, fontWeight: 700, marginTop: 2 }}>{t.workMin.toUpperCase()}</div>
        </div>
        <div style={{ flex: 1, background: "#3b82f60d", border: "1px solid #3b82f633", borderRadius: 12, padding: "10px", textAlign: "center" }}>
          <div style={{ color: "#3b82f6", fontSize: 18, fontWeight: 900 }}>{timeSplit.rest}<span style={{ fontSize: 11 }}> dk</span></div>
          <div style={{ color: "#777", fontSize: 9.5, fontWeight: 700, marginTop: 2 }}>{t.restMin.toUpperCase()}</div>
        </div>
        <div style={{ flex: 1, background: `${GOLD}0d`, border: `1px solid ${GOLD}33`, borderRadius: 12, padding: "10px", textAlign: "center" }}>
          <div style={{ color: GOLD, fontSize: 18, fontWeight: 900 }}>{timeSplit.total}<span style={{ fontSize: 11 }}> dk</span></div>
          <div style={{ color: "#777", fontSize: 9.5, fontWeight: 700, marginTop: 2 }}>{t.totalMin2.toUpperCase()}</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <button onClick={() => setPlaying(true)}
          style={{ flex: 1, padding: "17px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${RED}, #ff6b6b)`, color: "#fff", fontSize: 16, fontWeight: 900, cursor: "pointer", letterSpacing: 1, boxShadow: `0 6px 24px ${RED}55` }}>
          ▶ {t.startWorkout}
        </button>
        <button onClick={() => setEditMode(e => !e)}
          style={{ padding: "17px 16px", borderRadius: 14, border: `1px solid ${editMode ? GOLD : LINE}`, background: editMode ? `${GOLD}18` : CARD, color: editMode ? GOLD : "#999", fontSize: 14, fontWeight: 800, cursor: "pointer", whiteSpace: "nowrap" }}>
          {editMode ? t.doneEditing : t.editProgram}
        </button>
      </div>

      {/* İlerleme barı */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <div style={{ flex: 1, height: 6, background: "#1a1a1a", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${total ? (doneCount / total) * 100 : 0}%`, background: `linear-gradient(90deg, ${accentColor}, ${GOLD})`, transition: "width 0.3s", borderRadius: 3 }} />
        </div>
        <span style={{ color: "#888", fontSize: 11, fontWeight: 700 }}>{doneCount}/{total}</span>
      </div>

      {allDone && (
        <button onClick={() => { if (soundOn) playFinishBeeps(); onComplete && onComplete({ calories: estimateProgramCalories(program, userWeight()), durationMin: Math.round((estimateProgramSeconds(program)) / 60) }); }}
          style={{ width: "100%", marginBottom: 16, padding: "16px", borderRadius: 14, border: `2px solid ${GOLD}`, background: `${GOLD}15`, color: GOLD, fontSize: 15, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>
          🏆 {t.finishWorkout}
        </button>
      )}

      {editMode && (
        <div style={{ marginBottom: 18, background: `${GOLD}0a`, border: `1px solid ${GOLD}33`, borderRadius: 14, padding: 14 }}>
          <div style={{ color: GOLD, fontSize: 10, letterSpacing: 2, marginBottom: 10, fontWeight: 800 }}>{t.addExercise.toUpperCase()}</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
            {[...CATEGORIES].sort((a, b) => (CATEGORY_ORDER[a.id] || 99) - (CATEGORY_ORDER[b.id] || 99)).map(c => (
              <button key={c.id} onClick={() => setAddPickerCat(c.id)}
                style={{ background: CARD, border: `1.5px solid ${c.color}55`, color: c.color, borderRadius: 10, padding: "8px 12px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
                {c.icon} {catLabel(c, lang)}
              </button>
            ))}
          </div>
        </div>
      )}

      {program.phases?.map((phase, pi) => (
        <div key={pi} style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <div style={{ width: 3, height: 18, background: phase.color || accentColor, borderRadius: 2 }} />
            <span style={{ color: "#ddd", fontSize: 13, fontWeight: 800 }}>{phase.name}</span>
            <span style={{ background: `${phase.color || accentColor}22`, color: phase.color || accentColor, fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 5 }}>{phase.duration}</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {phase.exercises?.map((ex, ei) => {
              const key = `${pi}-${ei}`;
              const wc = isWCPhase(phase);
              const curRest = (typeof ex.rest === "number") ? ex.rest : computeRestSeconds(ex, parseDuration(ex.duration) || 0, phase.name, restSec);
              return <ExerciseRow key={ei} ex={ex} color={phase.color || accentColor} index={ei} done={doneSet.has(key)} onToggleDone={() => toggleDone(key)} lang={lang} editMode={editMode} onRemove={() => removeExercise(pi, ei)}
                isWC={wc}
                rounds={roundsFromSets(ex.sets)}
                onRounds={(r) => setExerciseRounds(pi, ei, r)}
                restVal={curRest}
                onRest={(r) => setExerciseRest(pi, ei, r)}
              />;
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Antrenman Oynatıcı (Fight Mode) ──────────────────────────────────────────
function WorkoutPlayer({ program, accentColor, lang, roundSec, restSec, coachOn: coachInit, soundOn: soundInit, warnSec, onExit, onComplete }) {
  const t = T[lang];
  // Oynatma listesi sadece girdiler değişince yeniden kurulur (her tick'te değil)
  const playlist = useMemo(() => buildPlaylist(program, restSec, t), [program, restSec, t]);
  const [idx, setIdx] = useState(0);
  const [left, setLeft] = useState(playlist[0]?.seconds ?? null);
  const [running, setRunning] = useState(false);
  const [finished, setFinished] = useState(false);
  const [started, setStarted] = useState(false); // antrenman bir kez başladı mı (koç anonsu için)
  // Antrenman ekranında bağımsız aç/kapa — başlangıç değeri ayarlardan gelir
  const [coachOn, setCoachOn] = useState(coachInit);
  const [soundOn, setSoundOn] = useState(soundInit);
  const [showInfo, setShowInfo] = useState(false); // açıklama açılır penceresi
  const ref = useRef(null);
  const warnedRef = useRef(false);
  const comboRef = useRef(null);
  const leftRef = useRef(left); // combo caller'ın anlık kalan süreyi okuması için
  useEffect(() => { leftRef.current = left; }, [left]);
  useEffect(() => { setShowInfo(false); }, [idx]); // hareket değişince açıklama penceresini kapat

  // Toplam geçen antrenman süresi (duraklatınca durur) — köşede gösterilir
  const [elapsedTotal, setElapsedTotal] = useState(0);
  useEffect(() => {
    if (!running || finished) return;
    const iv = setInterval(() => setElapsedTotal(e => e + 1), 1000);
    return () => clearInterval(iv);
  }, [running, finished]);
  // Programın toplam süresi (tüm zamanlı adımların saniyesi)
  const totalSeconds = useMemo(() => playlist.reduce((s, st) => s + (st.seconds || 0), 0), [playlist]);
  const fmtClock = (sec) => `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, "0")}`;

  const step = playlist[idx];
  const next = playlist[idx + 1];
  // Combo caller sadece gölge/torba/kombinasyon/sparring fazlarında
  const isStrikingPhase = step && /Gölge|Shadow|Torba|Bag|Kombinasyon|Combin|Sparring/i.test(step.phaseName);

  // ─── State Machine: IDLE → WARMUP → FIGHT → REST → FINISHED ───
  // Mevcut running/finished/idx/step'ten TÜRETİLİR (ayrı state tutmaz — tek doğruluk kaynağı).
  const phase = (() => {
    if (finished) return "FINISHED";
    if (!running && idx === 0 && (left === (step?.seconds ?? null))) return "IDLE";
    if (step?.kind === "rest") return "REST";
    if (step && /Isınma|Warm/i.test(step.phaseName)) return "WARMUP";
    return "FIGHT";
  })();

  // Antrenman istatistikleri — playlist'ten türetilir (sadece playlist değişince hesaplanır)
  const sessionStats = useMemo(() => {
    let totalTime = 0, rounds = 0, work = 0;
    playlist.forEach(s => {
      if (s.seconds) {
        totalTime += s.seconds;
        if (s.kind === "exercise" && s.timed) work += s.seconds;
      } else if (s.kind === "exercise") {
        // Süresiz (tekrar-bazlı) hareket: makul bir süre say (~40 sn/set) ki toplam gerçeğe yakın olsun
        totalTime += 40; work += 40;
      }
      if (s.kind === "exercise") rounds += 1;
    });
    // Yoğunluk skoru: aktif çalışma süresi (dk) × round katsayısı
    const intensityScore = Math.round((work / 60) * 2 + rounds * 3);
    const calories = estimateProgramCalories(program, userWeight());
    return { totalTime, rounds, intensityScore, calories };
  }, [playlist, program]);

  // Ghost: bu programın önceki en iyi kaydı (hedef olarak gösterilir)
  const ghost = useMemo(() => getGhost(program.title), [program.title]);
  // Şu ana kadar tamamlanan round sayısı (idx'e göre canlı ilerleme)
  const doneRounds = useMemo(() => playlist.slice(0, idx + 1).filter(s => s.kind === "exercise").length, [playlist, idx]);

  // Ekranı açık tut (yalnızca aktif sayım sırasında — pil dostu)
  useWakeLock(running && !finished);

  const goNext = useCallback(() => {
    setIdx(prevIdx => {
      if (prevIdx + 1 >= playlist.length) {
        setFinished(true); setRunning(false);
        if (soundOn) playFinishBeeps();
        haptic(HAPTIC.finish);
        saveGhost(program.title, sessionStats); // rekoru kaydet (sadece daha iyiyse)
        return prevIdx;
      }
      const ni = prevIdx + 1;
      setLeft(playlist[ni].seconds ?? null);
      warnedRef.current = false;
      // Geçiş sesi: sıradaki adımın türüne göre farklı
      if (soundOn) {
        const nextStep = playlist[ni];
        const curStep = playlist[prevIdx];
        if (nextStep.kind === "rest") playToRest();          // harekete → dinlenme: yumuşak düşen
        else if (curStep && curStep.kind === "rest") playRestEnd(); // dinlenme → harekete dön: uyarı
        else playNextExercise();                              // harekete → harekete: güçlü yükselen
      }
      haptic(HAPTIC.roundEnd);
      setRunning(playlist[ni].timed);
      return ni;
    });
  }, [playlist, soundOn, program.title, sessionStats]);

  // Geri sayım — gerçek zaman damgası temelli (sekme arka plana atılsa da drift olmaz)
  useEffect(() => {
    if (!(running && step?.timed && left > 0)) { clearInterval(ref.current); return; }
    // Bu adımın bitmesi gereken mutlak an
    const deadline = Date.now() + left * 1000;
    ref.current = setInterval(() => {
      const remaining = Math.max(0, Math.round((deadline - Date.now()) / 1000));
      setLeft(remaining);
      if (remaining <= 0) clearInterval(ref.current);
    }, 250); // 250ms'de bir düzelt → görsel akıcı, kayma yok
    return () => clearInterval(ref.current);
  }, [running, idx]);

  // Uyarı bipi + görsel/haptik uyarı (son X sn)
  useEffect(() => {
    if (running && step?.timed && warnSec > 0 && step.seconds > warnSec && left <= warnSec && !warnedRef.current) {
      warnedRef.current = true;
      if (soundOn) playBeep();
      haptic(HAPTIC.warning);
    }
  }, [left, running, warnSec, soundOn]);

  // Süre bitince otomatik geç
  useEffect(() => {
    if (step?.timed && running && left === 0) { const tm = setTimeout(goNext, 600); return () => clearTimeout(tm); }
  }, [left, running, goNext]);

  // Sesli Koç — her hareketin başında BİR KEZ adını ve ne çalışılacağını söyler.
  // İSTİSNA: Refleks tepki drilinde her 5-10 sn'de "Boks!" diyerek tepki sinyali verir.
  // Dinlenmede sessiz kalır. Hem zamanlı hem tekrar-bazlı hareketlerde çalışır.
  useEffect(() => {
    clearTimeout(comboRef.current);
    if (!coachOn || !started || finished) return; // antrenman başladıysa, bitmediyse
    const st = playlist[idx];
    if (!st || st.kind !== "exercise") return; // dinlenmede / bitişte konuşma
    // Refleks drili mi? (ad ile tanı — hem otomatik hem kendin kur'da çalışsın)
    const isReflex = /refleks tepki|reflex reaction/i.test(st.name || "");
    if (isReflex) {
      // Önce kısa açıklama, sonra periyodik "Boks!" sinyalleri (5-10 sn arası rastgele)
      const cue = lang === "en" ? "Box!" : "Boks!";
      let stop = false;
      const fireCue = () => {
        if (stop) return;
        speak(cue, lang); haptic(HAPTIC.tap);
        const delay = 5000 + Math.random() * 5000; // 5-10 sn
        comboRef.current = setTimeout(fireCue, delay);
      };
      // İlk önce ne yapılacağını söyle, sonra sinyalleri başlat
      comboRef.current = setTimeout(() => {
        speak(lang === "en" ? "Reflex drill. Slip and counter on each call." : "Refleks drili. Her sinyalde kaçıp vur.", lang);
        comboRef.current = setTimeout(fireCue, 3500);
      }, 400);
      return () => { stop = true; clearTimeout(comboRef.current); };
    }
    const name = st.name || "";
    const desc = (st.desc || "").split(".")[0]; // ilk cümle yeter
    const text = desc ? `${t.coachNow}: ${name}. ${desc}` : `${t.coachNow}: ${name}`;
    comboRef.current = setTimeout(() => { speak(text, lang); haptic(HAPTIC.tap); }, 400);
    return () => clearTimeout(comboRef.current);
  }, [coachOn, started, idx, lang, finished]);

  const restart = useCallback(() => {
    clearInterval(ref.current);
    setIdx(0); setLeft(playlist[0]?.seconds ?? null);
    setRunning(false); setFinished(false); setStarted(false); warnedRef.current = false; setElapsedTotal(0);
  }, [playlist]);

  if (finished) {
    return <FinishScreen program={program} stats={sessionStats} lang={lang} onRestart={restart} onExit={() => { onComplete && onComplete({ calories: sessionStats.calories, durationMin: Math.round(sessionStats.totalTime / 60) }); onExit(); }} />;
  }

  const mm = step?.seconds != null ? String(Math.floor(left / 60)).padStart(2, "0") : null;
  const ss = step?.seconds != null ? String(left % 60).padStart(2, "0") : null;
  const pct = step?.timed && step.seconds ? (left / step.seconds) * 100 : 0;
  const R = 92, circ = 2 * Math.PI * R;
  const col = step?.color || accentColor;
  const inWarn = step?.timed && warnSec > 0 && step.seconds > warnSec && left <= warnSec && left > 0;
  const timerColor = inWarn ? (left <= 10 ? RED : GOLD) : col;

  return (
    <div style={{ position: "fixed", inset: 0, background: BG, zIndex: 100, maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column" }}>
      {/* Görsel ritim — round sonuna doğru kenarlarda neon nabız */}
      {inWarn && (
        <>
          <style>{`@keyframes neonPulse{0%,100%{opacity:0.25}50%{opacity:0.85}}`}</style>
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 50,
            boxShadow: `inset 0 0 60px 12px ${timerColor}`,
            animation: `neonPulse ${left <= 10 ? 0.5 : 0.9}s ease-in-out infinite` }} />
        </>
      )}
      <div style={{ padding: "calc(env(safe-area-inset-top) + 12px) 20px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button onClick={onExit} style={{ background: CARD, border: `1px solid ${LINE}`, color: "#888", borderRadius: 10, padding: "8px 14px", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>✕ {t.exit}</button>
        {/* State Machine faz rozeti */}
        <span style={{ background: phase === "FIGHT" ? `${RED}22` : phase === "REST" ? "#3b82f622" : phase === "WARMUP" ? "#eab30822" : "#88888822",
          color: phase === "FIGHT" ? RED : phase === "REST" ? "#3b82f6" : phase === "WARMUP" ? GOLD : "#aaa",
          fontSize: 10, fontWeight: 900, letterSpacing: 2, padding: "5px 12px", borderRadius: 8 }}>
          {phase === "IDLE" ? t.phaseIdle : phase === "WARMUP" ? t.phaseWarmup : phase === "FIGHT" ? t.phaseFight : phase === "REST" ? t.phaseRestSM : t.phaseFinished}
        </span>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {/* Hayali Antrenör aç/kapa — antrenman ekranında görünür */}
          <button onClick={() => setCoachOn(v => { const nx = !v; if (nx) { primeSpeech(); setTimeout(() => speak(COMBO_CALLS[lang][0], lang), 200); } else { try { window.speechSynthesis.cancel(); } catch {} } return nx; })}
            style={{ background: coachOn ? `${GOLD}25` : CARD, border: `1px solid ${coachOn ? GOLD : LINE}`, color: coachOn ? GOLD : "#666", borderRadius: 10, padding: "7px 10px", fontSize: 14, cursor: "pointer", lineHeight: 1 }}
            title={t.coach}>🎙</button>
          {/* Gong aç/kapa */}
          <button onClick={() => setSoundOn(v => !v)}
            style={{ background: soundOn ? `${RED}22` : CARD, border: `1px solid ${soundOn ? RED + "88" : LINE}`, color: soundOn ? RED : "#666", borderRadius: 10, padding: "7px 10px", fontSize: 14, cursor: "pointer", lineHeight: 1 }}
            title={t.soundGong}>{soundOn ? "🔔" : "🔕"}</button>
          <div style={{ color: "#666", fontSize: 12, fontWeight: 700, marginLeft: 2 }}>{idx + 1}/{playlist.length}</div>
        </div>
      </div>

      <div style={{ height: 4, background: "#1a1a1a", margin: "0 20px", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${(idx / playlist.length) * 100}%`, background: `linear-gradient(90deg, ${col}, ${GOLD})`, transition: "width 0.3s", borderRadius: 2 }} />
      </div>
      {/* Geçen / toplam süre */}
      <div style={{ display: "flex", justifyContent: "space-between", margin: "6px 20px 0" }}>
        <span style={{ color: col, fontSize: 11, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>⏱ {t.elapsedLabel} {fmtClock(elapsedTotal)}</span>
        <span style={{ color: "#666", fontSize: 11, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{t.totalLabel} {fmtClock(totalSeconds)}</span>
      </div>

      {/* Ghost modu — önceki en iyiye karşı canlı ilerleme */}
      {ghost && (
        <div style={{ margin: "10px 20px 0", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: doneRounds > ghost.rounds ? `${GOLD}18` : "#ffffff08", border: `1px solid ${doneRounds > ghost.rounds ? GOLD + "55" : LINE}`, borderRadius: 10, padding: "7px 12px" }}>
          <span style={{ fontSize: 14 }}>👻</span>
          {doneRounds > ghost.rounds ? (
            <span style={{ color: GOLD, fontSize: 12, fontWeight: 800 }}>{t.ghostBeat}</span>
          ) : (
            <span style={{ color: "#999", fontSize: 11.5, fontWeight: 600 }}>
              {t.ghostBest}: <span style={{ color: "#ddd", fontWeight: 800 }}>{ghost.rounds}</span> {t.statRounds.toLowerCase()} · {t.now}: <span style={{ color: col, fontWeight: 800 }}>{doneRounds}</span>
            </span>
          )}
        </div>
      )}

      <div style={{ textAlign: "center", marginTop: 16 }}>
        <span style={{ background: `${col}22`, color: col, fontSize: 11, fontWeight: 800, letterSpacing: 2, padding: "5px 14px", borderRadius: 8 }}>{step?.kind === "rest" ? t.phaseRest : `${t.now} · ${step?.phaseName}`}</span>
      </div>

      <div style={{ flex: "0 0 auto", height: 168, padding: "10px 24px 6px", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", overflow: "hidden" }}>
        {step?.kind === "rest" ? (
          <><div style={{ fontSize: 40, marginBottom: 8 }}>😮‍💨</div><div style={{ color: "#3b82f6", fontSize: 28, fontWeight: 900, marginBottom: 10 }}>{t.rest}</div>{step?.desc && <div onClick={() => setShowInfo(true)} style={{ color: "#999", fontSize: 14, lineHeight: 1.45, maxWidth: 340, width: "100%", cursor: "pointer", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{step.desc}</div>}</>
        ) : (
          <>
            {step?.setLabel && <div style={{ color: col, fontSize: 14, fontWeight: 800, marginBottom: 6, flexShrink: 0 }}>{step.setLabel}</div>}
            <div style={{ color: "#fff", fontSize: 25, fontWeight: 900, lineHeight: 1.18, marginBottom: 8, flexShrink: 0, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden", maxWidth: 360 }}>{step?.name}</div>
            {step?.desc && (
              <div onClick={() => setShowInfo(true)} style={{ cursor: "pointer", maxWidth: 340, width: "100%", flexShrink: 0 }}>
                <div style={{ color: "#9a9a9a", fontSize: 13.5, lineHeight: 1.45, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{step.desc}</div>
                <div style={{ color: col, fontSize: 11, fontWeight: 700, marginTop: 4, opacity: 0.85 }}>{lang === "en" ? "tap to read full ›" : "tam açıklama için dokun ›"}</div>
              </div>
            )}
            <a href={moveVideoUrl(step, lang)} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{ display: "inline-block", marginTop: 10, flexShrink: 0, color: RED, fontSize: 13, fontWeight: 800, textDecoration: "none", border: `1px solid ${RED}55`, borderRadius: 10, padding: "8px 16px" }}>{t.watchVideo}</a>
          </>
        )}
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {step?.timed ? (
          <div style={{ position: "relative", width: 244, height: 244 }}>
            <svg width="244" height="244" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="122" cy="122" r={R} fill="none" stroke="#1a1a1a" strokeWidth="12" />
              <circle cx="122" cy="122" r={R} fill="none" stroke={timerColor} strokeWidth="12" strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.95s linear, stroke 0.3s" }} />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div style={{ color: inWarn ? timerColor : "#fff", fontSize: 58, fontWeight: 900, letterSpacing: -2, fontVariantNumeric: "tabular-nums", transition: "color 0.3s" }}>{mm}:{ss}</div>
            </div>
          </div>
        ) : (
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 52, marginBottom: 14 }}>💪</div><div style={{ color: "#888", fontSize: 14 }}>{lang === "en" ? "Finish this, then tap Done" : "Bu hareketi bitir, sonra Tamamla'ya bas"}</div></div>
        )}
      </div>

      {next && (
        <div style={{ margin: "0 20px 12px", padding: "12px 16px", background: CARD, borderRadius: 12, display: "flex", alignItems: "center", gap: 10, border: `1px solid ${LINE}` }}>
          <span style={{ color: GOLD, fontSize: 11, fontWeight: 800 }}>{t.next}</span>
          <span style={{ color: "#aaa", fontSize: 13, fontWeight: 600, flex: 1 }}>{next.kind === "rest" ? t.rest : next.name}</span>
          {next.setLabel && <span style={{ color: "#555", fontSize: 11 }}>{next.setLabel}</span>}
        </div>
      )}

      <div style={{ padding: "0 20px calc(env(safe-area-inset-bottom) + 22px)", display: "flex", gap: 10 }}>
        {step?.timed ? (
          <button onClick={() => { haptic(HAPTIC.tap); setStarted(true); if (coachOn) primeSpeech(); if (left === 0) { goNext(); return; } const w = !running; setRunning(w); if (w && idx === 0 && left === step.seconds && soundOn) playDong(); }}
            style={{ flex: 1, background: running ? "#1e1e1e" : col, color: running ? "#fff" : "#000", border: "none", borderRadius: 16, padding: "18px", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>
            {left === 0 ? `${t.next} →` : step?.kind === "rest" ? (running ? t.pause : t.resume) : (running ? t.pause : t.start)}
          </button>
        ) : (
          <button onClick={() => { setStarted(true); goNext(); }} style={{ flex: 1, background: col, color: "#000", border: "none", borderRadius: 16, padding: "18px", fontSize: 17, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>{t.completed} →</button>
        )}
        <button onClick={() => { setStarted(true); goNext(); }} style={{ background: "#1a1a1a", color: "#666", border: "none", borderRadius: 16, padding: "18px 20px", fontSize: 14, cursor: "pointer", fontWeight: 600 }}>{t.skip}</button>
      </div>

      {/* Tam açıklama açılır penceresi — ana ekranı hiç kaydırmaz, dokununca açılır */}
      {showInfo && step && step.kind !== "rest" && (
        <div onClick={() => setShowInfo(false)} style={{ position: "absolute", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.82)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: CARD, border: `1px solid ${col}55`, borderRadius: 18, padding: "22px 20px", maxWidth: 380, width: "100%", maxHeight: "80%", overflowY: "auto", boxShadow: `0 10px 40px rgba(0,0,0,0.6)` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 12 }}>
              <div style={{ color: "#fff", fontSize: 19, fontWeight: 900, lineHeight: 1.2 }}>{step.name}</div>
              <button onClick={() => setShowInfo(false)} style={{ flexShrink: 0, background: "#ffffff10", border: "none", color: "#aaa", borderRadius: 9, width: 32, height: 32, fontSize: 16, cursor: "pointer", lineHeight: 1 }}>✕</button>
            </div>
            {step.setLabel && <div style={{ color: col, fontSize: 13, fontWeight: 800, marginBottom: 10 }}>{step.setLabel}</div>}
            <div style={{ color: "#ccc", fontSize: 15, lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{step.desc}</div>
            {step.hedefKas && (
              <div style={{ display: "inline-flex", alignItems: "center", gap: 6, marginTop: 14, background: `${col}18`, border: `1px solid ${col}44`, borderRadius: 8, padding: "5px 11px" }}>
                <span style={{ fontSize: 13 }}>💪</span>
                <span style={{ color: col, fontSize: 12, fontWeight: 700 }}>{step.hedefKas}</span>
              </div>
            )}
            <a href={moveVideoUrl(step, lang)} target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", marginTop: 16, color: RED, fontSize: 14, fontWeight: 800, textDecoration: "none", border: `1px solid ${RED}55`, borderRadius: 12, padding: "12px" }}>{t.watchVideo}</a>
          </div>
        </div>
      )}
    </div>
  );
}

function FinishScreen({ program, stats, lang, onRestart, onExit }) {

  const s = stats || { totalTime: 0, rounds: 0, intensityScore: 0 };
  const cell = { flex: 1, textAlign: "center" };
  const num = { fontSize: 26, fontWeight: 900, lineHeight: 1 };
  const lbl = { fontSize: 10, color: "#666", letterSpacing: 1.5, fontWeight: 700, marginTop: 4, textTransform: "uppercase" };
  return (
    <div style={{ position: "fixed", inset: 0, background: BG, zIndex: 110, maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, overflow: "hidden" }}>
      <div style={{ position: "absolute", top: "20%", left: "50%", transform: "translateX(-50%)", width: 300, height: 300, background: GOLD, opacity: 0.12, borderRadius: "50%", filter: "blur(70px)" }} />

      <div style={{ display: "flex", width: "100%", background: CARD, borderRadius: 16, padding: "18px 4px", border: `1px solid ${LINE}`, marginBottom: 20, position: "relative", zIndex: 2 }}>

          <div style={{ ...num, color: "#10b981" }}>{Math.floor(s.totalTime / 60)}<span style={{ fontSize: 13 }}>dk</span></div>

        <div style={{ ...cell, borderLeft: `1px solid ${LINE}` }}>
          <div style={{ ...num, color: "#3b82f6" }}>{s.rounds}</div>
          <div style={lbl}>{t.statRounds}</div>
        </div>
        <div style={{ ...cell, borderLeft: `1px solid ${LINE}` }}>

        </div>
        <div style={{ ...cell, borderLeft: `1px solid ${LINE}` }}>
          <div style={{ ...num, color: GOLD }}>{s.intensityScore}</div>
          <div style={lbl}>{t.statScore}</div>

      <div style={{ background: `${GOLD}18`, border: `1px solid ${GOLD}55`, borderRadius: 12, padding: "7px 18px", marginBottom: 22, position: "relative", zIndex: 2 }}>

      </div>
      <div style={{ padding: "0 20px", textAlign: "center", marginBottom: 28, position: "relative", zIndex: 2 }}>
        <div style={{ color: "#eee", fontSize: 16, fontWeight: 700, lineHeight: 1.45, marginBottom: 12, fontStyle: "italic" }}>"{lang === "en" ? q.en : q.tr}"</div>

}

// ─── Profil / Onboarding Ekranı ───────────────────────────────────────────────
function ProfileScreen({ lang, initial, onSave, onSkip, isEdit }) {

    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
      {options.map(o => {

            style={{ background: on ? `${RED}22` : CARD, border: `1.5px solid ${on ? RED : LINE}`, color: on ? "#fff" : "#888", borderRadius: 10, padding: "9px 13px", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>
            {o.label}

  return (
    <div style={{ position: "fixed", inset: 0, background: BG, zIndex: 190, maxWidth: 430, margin: "0 auto", overflowY: "auto" }}>
      <div style={{ padding: "28px 22px 40px" }}>
        <div style={{ fontSize: 34, marginBottom: 10 }}>🥊</div>
        <div style={{ color: "#fff", fontSize: 24, fontWeight: 900, marginBottom: 6 }}>{t.profileTitle}</div>
        <div style={{ color: "#999", fontSize: 13.5, lineHeight: 1.5, marginBottom: 8 }}>{t.profileDesc}</div>

        <Label>{t.pName}</Label>
        <input value={p.name} onChange={e => set("name", e.target.value)} placeholder={t.pNamePh}
          style={{ ...numInput, textAlign: "left" }} />

        {/* Yaş / Kilo / Boy */}

          <div style={{ flex: 1 }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 800, marginBottom: 8 }}>{t.pAge}</div>
            <input type="number" inputMode="numeric" value={p.age} onChange={e => set("age", e.target.value)} placeholder="25" style={numInput} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 800, marginBottom: 8 }}>{t.pWeight}</div>
            <input type="number" inputMode="decimal" value={p.weight} onChange={e => set("weight", e.target.value)} placeholder="70" style={numInput} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: "#888", fontSize: 11, letterSpacing: 1, fontWeight: 800, marginBottom: 8 }}>{t.pHeight}</div>
            <input type="number" inputMode="numeric" value={p.height} onChange={e => set("height", e.target.value)} placeholder="175" style={numInput} />
          </div>
        </div>
        {bmi && <div style={{ color: "#666", fontSize: 11.5, marginTop: 8, textAlign: "center" }}>{t.bmiLabel}: <span style={{ color: GOLD, fontWeight: 800 }}>{bmi}</span></div>}

        <Label>{t.pFitness}</Label>
        <Chips field="fitness" options={[{ id: "fitLow", label: t.fitLow }, { id: "fitMid", label: t.fitMid }, { id: "fitHigh", label: t.fitHigh }, { id: "fitElite", label: t.fitElite }]} />

        <Label>{t.pExperience}</Label>
        <Chips field="experience" options={[{ id: "none", label: t.expNone }, { id: "beginner", label: t.expBeg }, { id: "intermediate", label: t.expInt }, { id: "advanced", label: t.expAdv }, { id: "pro", label: t.expPro }]} />

// ─── Program Kurucu (ekipman + mod + hareket seçimi) ──────────────────────────
// ─── Round (set) yardımcıları ─────────────────────────────────────────────────
// Hareketin sets metnindeki "5x3 dk" → 5 round'u varsayılan kabul eder.
function defaultRounds(ex) {
  const s = ex.sets || "";
  // Azalan tekrar formatı "15-12-10-8": set sayısı = parça sayısı, round stepper kilitli
  if (/^\d+(-\d+)+$/.test(s)) return s.split("-").length;
  const m = s.match(/^(\d+)x/);
  const n = m ? parseInt(m[1]) : 1;
  return Math.min(12, Math.max(1, n));
}
// Hareketin varsayılan round süresi (dakika). "3 dk"→3, "45 sn"→1 (yuvarlanır), yoksa 3.
function defaultRoundMin(ex) {
  const d = ex.duration || "";
  let m = d.match(/(\d+)\s*dk/); if (m) return parseInt(m[1]);
  m = d.match(/(\d+)\s*sn/); if (m) return Math.max(1, Math.round(parseInt(m[1]) / 60));
  return 3;
}
// Azalan tekrar formatı mı? ("15-12-10-8") — bu hareketlerde round değiştirilemez
function isDescendingReps(setsStr) { return /^\d+(-\d+)+$/.test(setsStr || ""); }
// Program içindeki bir hareketin GEÇERLİ round sayısını sets metninden okur ("8x" / "5x3 dk" → N).
// "15-12-10-8" (azalan tekrar) veya "1 set" / "4 set · MAX" gibi standart olmayan formatlarda null döner (kilitli).
function roundsFromSets(setsStr) {
  const m = (setsStr || "").match(/^(\d+)x/);
  return m ? parseInt(m[1]) : null;
}
// Kullanıcının seçtiği round sayısını sets metnine yansıtır: "5x3 dk" + 8 → "8x3 dk"
function applyRounds(setsStr, rounds) {
  if (!setsStr) return rounds > 1 ? `${rounds} round` : setsStr;
  if (isDescendingReps(setsStr)) return setsStr; // azalan tekrarı olduğu gibi koru
  if (/^\d+x/.test(setsStr)) return setsStr.replace(/^\d+x/, `${rounds}x`);
  if (/^\d+\s/.test(setsStr)) return setsStr.replace(/^\d+/, `${rounds}`); // "4 set · MAX"
  return `${rounds}x · ${setsStr}`;
}
// Round'u DURATION alanına yansıtır — buildPlaylist round sayısını duration'dan okur.
// "3 dk" + 8 round → "8x3 dk" · "45 sn" + 5 → "5x45 sn" · zaten "NxM" ise N'i değiştirir.
function applyRoundsToDuration(durStr, rounds) {
  if (!durStr) return durStr;
  let m = durStr.match(/^(\d+)x(\d+)\s*(dk|sn)/); if (m) return `${rounds}x${m[2]} ${m[3]}`;
  m = durStr.match(/^(\d+)\s*(dk|sn)/);            if (m) return `${rounds}x${m[1]} ${m[2]}`;
  return durStr;
}

// Round sayısına göre tahmini süre (dk) — round × süre + dinlenmeler
function estimateMinutes(ex, rounds) {
  const d = ex.duration || "";
  let perSetSec = 180; // varsayılan 3 dk
  let m = d.match(/(\d+)\s*dk/); if (m) perSetSec = parseInt(m[1]) * 60;
  else { m = d.match(/(\d+)\s*sn/); if (m) perSetSec = parseInt(m[1]); }
  const restSec = 45; // round arası ortalama dinlenme
  const totalSec = rounds * perSetSec + Math.max(0, rounds - 1) * restSec;
  return Math.max(1, Math.round(totalSec / 60));
}

// ─── Otomatik Program Üretici ─────────────────────────────────────────────────
// Toplam süreyi alır, maksimum gelişim için dengeli bir program kurar.
// Mantık: gölge boksu HER gün sabit (teknik temeli), diğer kategoriler güne göre
// rotasyonlu ağırlıkla (bir gün torba yoğun, ertesi gün kondisyon/kuvvet öne çıkar).
function buildAutoProgram(totalMin, level, equipment, lang, daySeed, goal, focusCats) {
  const t = T[lang];
  // 1. Isınma & soğuma: toplamın ~%20'si, ikiye bölünür [min 6, max 16 toplam]
  const wcTotal = Math.min(16, Math.max(6, Math.round(totalMin * 0.2)));
  const warmMin = Math.ceil(wcTotal / 2);
  const coolMin = wcTotal - warmMin;
  const mainBlock = Math.max(8, totalMin - wcTotal);
  const restBudgetRatio = 0.28;
  const mainMin = Math.max(6, Math.round(mainBlock * (1 - restBudgetRatio)));

  // 2. Kategori ağırlıkları
  const theme = daySeed % 3; // gün teması (subtitle'da da kullanılır)
  const focusIds = focusCats ? Object.keys(focusCats) : [];
  let weights;
  if (focusIds.length > 0) {
    // KULLANICI KATEGORİ SEÇTİ: yoğunluğa göre ağırlık (az=1, orta=2, yoğun=3)
    const intensityVal = { low: 1, mid: 2, high: 3 };
    const raw = {};
    let sum = 0;
    focusIds.forEach(id => { const v = intensityVal[focusCats[id]] || 2; raw[id] = v; sum += v; });
    weights = {};
    focusIds.forEach(id => { weights[id] = raw[id] / sum; }); // normalize: toplam 1
  } else {
    // Otomatik denge — gün tohumuna göre 3 tema
    if (theme === 0) {
      weights = { shadow: 0.28, bag: 0.30, footwork: 0.14, cardio: 0.14, strength: 0.14 };
    } else if (theme === 1) {
      weights = { shadow: 0.24, cardio: 0.30, footwork: 0.18, bag: 0.16, strength: 0.12 };
    } else {
      weights = { shadow: 0.24, strength: 0.28, footwork: 0.22, bag: 0.14, cardio: 0.12 };
    }
    // HEDEFE göre ince ayar (sadece otomatik dengede)
    if (goal === "goalFit") { weights.cardio += 0.08; weights.strength += 0.02; weights.bag -= 0.05; weights.footwork -= 0.05; }
    else if (goal === "goalSkill") { weights.shadow += 0.06; weights.footwork += 0.06; weights.strength -= 0.06; weights.cardio -= 0.06; }
    else if (goal === "goalCompete") { weights.bag += 0.06; weights.shadow += 0.04; weights.strength -= 0.05; weights.cardio -= 0.05; }
    else if (goal === "goalStress") { weights.bag += 0.07; weights.cardio += 0.04; weights.strength -= 0.06; weights.footwork -= 0.05; }
    Object.keys(weights).forEach(k => { if (weights[k] < 0.05) weights[k] = 0.05; });
  }

  // 3. Her kategoriye süre ata
  const order = ["footwork", "shadow", "bag", "strength", "cardio"];
  const phases = [];
  // Bir hareketin "kapanış/pekiştirme" hareketi olup olmadığı (sona gelmeli)
  const isClosingMove = (nm) => /serbest|teknik gölge|karışık|kombinasyon akış|free|technical shadow|flow|freestyle/i.test(nm || "");
  order.forEach(catId => {
    const w = weights[catId]; if (!w) return;
    const catMin = Math.max(2, Math.round(mainMin * w));
    const pool = poolForCategory(catId, equipment, level);
    if (pool.length === 0) return;
    const c = CATEGORIES.find(x => x.id === catId);
    // Hareket sayısı: süreye göre çeşitlilik. ~her 5-6 dk için 1 hareket, min 1, en çok havuz kadar.
    // Tek harekete max ~6 dk binsin diye: exCount = ceil(catMin / 6), ama en az 2 (süre uygunsa).
    let exCount = Math.max(1, Math.ceil(catMin / 6));
    if (catMin >= 8) exCount = Math.max(2, exCount); // 8 dk+ ise en az 2 farklı hareket
    exCount = Math.min(exCount, pool.length); // havuzdan fazla olamaz

    // Hareket seç: havuzun veri sırasını KORU (temelden zora dizili), rastgele karıştırma.
    // Kapanış hareketlerini (serbest/teknik) ayır, sona ekle.
    let base = pool.filter(ex => !isClosingMove(lang === "en" ? ex.nameEn : ex.name));
    const closers = pool.filter(ex => isClosingMove(lang === "en" ? ex.nameEn : ex.name));
    // ÇAYLAK öğretici sıralama: önce duruş/guard, sonra tek jab, sonra jab-cross (1-2), sonra gerisi.
    if (level === "beginner") {
      const teachPri = (nm) => {
        const n = (nm || "").toLowerCase();
        if (/duruş|guard|stance/.test(n)) return 0;
        if (/jab/.test(n) && !/cross/.test(n) && !/1-2/.test(n) && !/1-1/.test(n)) return 1;
        if (/1-2|jab-cross|jab cross/.test(n)) return 2;
        return 3;
      };
      base = [...base].sort((a, b) => teachPri(lang === "en" ? a.nameEn : a.name) - teachPri(lang === "en" ? b.nameEn : b.name));
    }
    // Gün tohumuna göre başlangıç noktası kaydır (çaylakta sıra bozulmasın diye 0'dan başla)
    const startIdx = (level !== "beginner" && base.length > exCount) ? (daySeed % (base.length - exCount + 1)) : 0;
    const chosen = [];
    // En temel hareketi (ilk eleman) çaylakta her zaman başa koy
    if (level === "beginner" && base.length > 0) chosen.push(base[0]);
    for (let i = 0; i < base.length && chosen.length < exCount; i++) {
      const idx = startIdx + i;
      if (idx < base.length && !chosen.includes(base[idx])) chosen.push(base[idx]);
    }
    // Hâlâ yer varsa baştan tamamla
    for (let i = 0; i < base.length && chosen.length < exCount; i++) {
      if (!chosen.includes(base[i])) chosen.push(base[i]);
    }
    // Son hareket olarak bir kapanış hareketi ekle (süre 8dk+ ve kapanış varsa)
    if (catMin >= 8 && closers.length > 0 && chosen.length >= 1) {
      chosen.push(closers[daySeed % closers.length]);
    }

    const perExMin = Math.max(2, Math.round(catMin / chosen.length));
    const exercises = chosen.map(ex => {
      const dm = (ex.duration || "3 dk").match(/(\d+)\s*dk/);
      const sm = (ex.duration || "").match(/(\d+)\s*sn/);
      const perRound = dm ? parseInt(dm[1]) : (sm ? parseInt(sm[1]) / 60 : 3);
      const rounds = Math.max(1, Math.min(8, Math.round(perExMin / Math.max(0.5, perRound))));
      return {
        name: lang === "en" ? ex.nameEn : ex.name,
        nameEn: ex.nameEn,
        video: ex.video,
        sets: applyRounds(ex.sets, rounds),
        duration: applyRoundsToDuration(ex.duration, rounds),
        desc: lang === "en" ? ex.descEn : ex.desc,
        met: ex.met, hedefKas: ex.hedefKas, rest: ex.rest,
      };
    });
    phases.push({ name: `${c.icon} ${catLabel(c, lang)}`, color: c.color, _catId: catId, duration: `${catMin} dk`, exercises });
  });

  // 4. Isınma & soğuma bloklarını ekle [toplam tam tutar]
  const warm = { name: "Isınma", color: "#3b82f6", duration: `${warmMin} dk`, exercises: [
    { name: lang==="en"?"Jump rope / shadow warm-up":"İp / gölge ısınma", sets: null, duration: `${Math.max(1, warmMin-Math.floor(warmMin/2))} dk`, desc: lang==="en"?"Gradually raise heart rate.":"Nabzı kademeli yükselt." },
    { name: lang==="en"?"Dynamic mobility":"Dinamik mobilite", sets: null, duration: `${Math.floor(warmMin/2)||1} dk`, desc: lang==="en"?"Shoulders, hips, neck.":"Omuz, kalça, boyun." },
  ]};
  const cool = { name: "Soğuma", color: "#10b981", duration: `${coolMin} dk`, exercises: [
    { name: lang==="en"?"Slow shadow & breathing":"Yavaş gölge & nefes", sets: null, duration: `${Math.max(1, coolMin-Math.floor(coolMin/2))} dk`, desc: lang==="en"?"Lower heart rate.":"Nabzı düşür." },
    { name: lang==="en"?"Full-body stretch":"Tam vücut esneme", sets: null, duration: `${Math.floor(coolMin/2)||1} dk`, desc: lang==="en"?"Hold each 30-40 s.":"Her bölgede 30-40 sn." },
  ]};

  const themeLabel = (focusIds.length > 0)
    ? focusIds.map(id => { const cc = CATEGORIES.find(x => x.id === id); return cc ? catLabel(cc, lang) : id; }).join(" + ")
    : (lang === "en" ? ["Bag/Technique","Cardio","Strength+Footwork"][theme] : ["Torba/Teknik","Kondisyon","Kuvvet+Ayak"][theme]);
  return {
    title: lang === "en" ? "Auto War Plan" : "Otomatik Savaş Planı",
    subtitle: `${totalMin} ${lang === "en" ? "min" : "dk"} · ${themeLabel}`,
    totalTime: `${totalMin} dk`,
    phases: [warm, ...phases, cool],
  };
}

// ─── Antrenman Günlüğü ────────────────────────────────────────────────────────
const MONTH_NAMES = {
  tr: ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"],
  en: ["January","February","March","April","May","June","July","August","September","October","November","December"],
};
function TrainingJournal({ lang }) {
  const t = T[lang];
  const [entries, setEntries] = useState(() => loadJournal());
  const [adding, setAdding] = useState(false);
  const [draftTitle, setDraftTitle] = useState("");
  const [draftNote, setDraftNote] = useState("");
  const now = new Date();
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);
  const [editNote, setEditNote] = useState("");
  const [showData, setShowData] = useState(false);
  const [importText, setImportText] = useState("");
  const [dataMsg, setDataMsg] = useState("");
  const [weightInput, setWeightInput] = useState("");
  const refresh = () => setEntries(loadJournal());

  const tip = dailyTip(lang, now.getDate());
  const quote = useMemo(() => LEGEND_QUOTES[now.getDate() % LEGEND_QUOTES.length], []);

  const yearEntries = entries.filter(e => new Date(e.date).getFullYear() === viewYear);
  const totalPts = entries.reduce((s, e) => s + (e.points || 0), 0);
  const totalCals = entries.reduce((s, e) => s + (e.calories || 0), 0);
  const totalKm = entries.reduce((s, e) => s + (e.distanceKm || 0), 0);
  const thisMonthCount = entries.filter(e => { const d = new Date(e.date); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); }).length;

  const byMonth = {};
  yearEntries.forEach(e => { const d = new Date(e.date); const k = d.getMonth(); (byMonth[k] = byMonth[k] || []).push(e); });
  const monthKeys = Object.keys(byMonth).map(Number).sort((a, b) => b - a);

  const entriesOnDay = (day) => entries.filter(e => { const d = new Date(e.date); return d.getFullYear() === viewYear && d.getMonth() === viewMonth && d.getDate() === day; });
  const dayHasEntry = (day) => entriesOnDay(day).length > 0;
  const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y - 1); } else setViewMonth(m => m - 1); };
  const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y + 1); } else setViewMonth(m => m + 1); };
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDow = (() => { const d = new Date(viewYear, viewMonth, 1).getDay(); return d === 0 ? 6 : d - 1; })();
  const WEEKDAY_LABELS = lang === "en" ? ["M","T","W","T","F","S","S"] : ["Pt","Sa","Ça","Pe","Cu","Ct","Pz"];
  const isToday = (day) => now.getFullYear() === viewYear && now.getMonth() === viewMonth && now.getDate() === day;

  // İlerleme verileri
  const prof = loadProfile();
  const weeklyTarget = (prof && prof.weeklyTarget) || 3;
  const weekCount = workoutsThisWeek();
  const cal7 = useMemo(() => caloriesLastDays(7), [entries]);
  const cal7Max = Math.max(1, ...cal7.map(d => d.value));
  const topCats = useMemo(() => categoryBreakdown().slice(0, 5), [entries]);
  const weightLog = useMemo(() => loadWeightLog(), [entries, dataMsg]);
  const isPremium = loadPremium();

  const handleSave = () => {
    if (!draftTitle.trim() && !draftNote.trim()) return;
    addJournalEntry({ kind: "manual", title: draftTitle.trim(), note: draftNote.trim(), points: 0 });
    setDraftTitle(""); setDraftNote(""); setAdding(false); refresh();
  };
  const handleDelete = (id) => { if (window.confirm(t.deleteConfirm)) { deleteJournalEntry(id); refresh(); setSelected(null); } };
  const handleUpdateNote = () => { if (selected) { updateJournalEntry(selected.id, { note: editNote }); refresh(); setSelected({ ...selected, note: editNote }); } };

  // ── Detay / düzenleme ekranı ──
  if (selected) {
    const d = new Date(selected.date);
    const isAuto = selected.kind === "auto";
    return (
      <div>
        <button onClick={() => setSelected(null)} aria-label={t.back} style={{ background: "none", border: "none", color: RED, fontSize: 13, cursor: "pointer", marginBottom: 16, fontWeight: 700, padding: 0 }}>‹ {t.journalTitle}</button>
        <div style={{ background: `linear-gradient(135deg, ${isAuto ? RED : "#3b82f6"}15, ${CARD})`, border: `1px solid ${isAuto ? RED : "#3b82f6"}44`, borderRadius: 16, padding: 18, marginBottom: 16 }}>
          <div style={{ color: "#666", fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 8 }}>{t.entryDetail}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div style={{ textAlign: "center", flexShrink: 0 }}>
              <div style={{ color: "#fff", fontSize: 28, fontWeight: 900, lineHeight: 1 }}>{d.getDate()}</div>
              <div style={{ color: "#888", fontSize: 10, fontWeight: 700 }}>{MONTH_NAMES[lang][d.getMonth()].slice(0, 3)} {d.getFullYear()}</div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#fff", fontSize: 16, fontWeight: 800, lineHeight: 1.3 }}>{selected.title || (lang === "en" ? "Training note" : "Antrenman notu")}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
                <span style={{ background: isAuto ? `${RED}22` : "#3b82f622", color: isAuto ? RED : "#3b82f6", fontSize: 10, fontWeight: 800, padding: "2px 8px", borderRadius: 5 }}>{isAuto ? t.autoTag : t.manualTag}</span>
                {selected.points > 0 && <span style={{ color: GOLD, fontSize: 13, fontWeight: 800 }}>+{selected.points} {t.pts}</span>}
                {selected.calories > 0 && <span style={{ color: RED, fontSize: 13, fontWeight: 800 }}>{selected.calories}🔥</span>}
                {selected.distanceKm > 0 && <span style={{ color: "#3b82f6", fontSize: 13, fontWeight: 800 }}>{selected.distanceKm} km</span>}
              </div>
            </div>
          </div>
          {selected.cats && selected.cats.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {selected.cats.map((cc, i) => <span key={i} style={{ background: "#ffffff0d", color: "#aaa", fontSize: 11, padding: "3px 9px", borderRadius: 6 }}>{cc}</span>)}
            </div>
          )}
        </div>
        <div style={{ color: "#555", fontSize: 10, letterSpacing: 3, marginBottom: 10, fontWeight: 700 }}>{lang === "en" ? "MY NOTES" : "NOTLARIM"}</div>
        <textarea value={editNote} onChange={e => setEditNote(e.target.value)} placeholder={t.addNoteHere} rows={6} aria-label={lang === "en" ? "My notes" : "Notlarım"}
          style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 12, padding: "14px", color: "#fff", fontSize: 14, lineHeight: 1.6, marginBottom: 12, resize: "vertical", fontFamily: "inherit" }} />
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => handleDelete(selected.id)} aria-label={lang === "en" ? "Delete entry" : "Kaydı sil"} style={{ padding: "13px 18px", borderRadius: 12, border: `1px solid ${LINE}`, background: "transparent", color: "#888", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>🗑</button>
          <button onClick={handleUpdateNote} style={{ flex: 1, padding: "13px", borderRadius: 12, border: "none", background: RED, color: "#fff", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>{t.updateNote}</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Günün önerisi + motivasyon */}
      <div style={{ background: `linear-gradient(135deg, ${GOLD}12, ${CARD})`, border: `1px solid ${GOLD}33`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
        <div style={{ color: GOLD, fontSize: 10, letterSpacing: 2, fontWeight: 800, marginBottom: 6 }}>💡 {t.todayTip}</div>
        <div style={{ color: "#eee", fontSize: 13, lineHeight: 1.5, marginBottom: 10 }}>{tip}</div>
        <div style={{ borderTop: `1px solid ${LINE}`, paddingTop: 10 }}>
          <div style={{ color: "#ddd", fontSize: 12.5, fontStyle: "italic", lineHeight: 1.45 }}>"{lang === "en" ? quote.en : quote.tr}"</div>
          <div style={{ color: RED, fontSize: 11, fontWeight: 800, marginTop: 4 }}>— {quote.author}</div>
        </div>
      </div>

      {/* Yıllık özet */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px", textAlign: "center" }}>
          <div style={{ color: "#3b82f6", fontSize: 22, fontWeight: 900 }}>{entries.filter(e=>e.kind==="auto").length}</div>
          <div style={{ color: "#666", fontSize: 9.5, letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{t.totalWorkouts.toUpperCase()}</div>
        </div>
        <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px", textAlign: "center" }}>
          <div style={{ color: GOLD, fontSize: 22, fontWeight: 900 }}>{totalPts}</div>
          <div style={{ color: "#666", fontSize: 9.5, letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{t.totalPoints.toUpperCase()}</div>
        </div>
        <div style={{ flex: 1, background: CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: "12px", textAlign: "center" }}>
          <div style={{ color: "#10b981", fontSize: 22, fontWeight: 900 }}>{thisMonthCount}</div>
          <div style={{ color: "#666", fontSize: 9.5, letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{t.thisMonth.toUpperCase()}</div>
        </div>
      </div>

      {/* Kalori + Mesafe özeti */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <div style={{ flex: 1, background: `${RED}0d`, border: `1px solid ${RED}33`, borderRadius: 12, padding: "12px", textAlign: "center" }}>
          <div style={{ color: RED, fontSize: 20, fontWeight: 900 }}>{totalCals.toLocaleString()} <span style={{ fontSize: 12 }}>🔥</span></div>
          <div style={{ color: "#666", fontSize: 9.5, letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{t.statKcal.toUpperCase()}</div>
        </div>
        <div style={{ flex: 1, background: "#3b82f60d", border: "1px solid #3b82f633", borderRadius: 12, padding: "12px", textAlign: "center" }}>
          <div style={{ color: "#3b82f6", fontSize: 20, fontWeight: 900 }}>{totalKm.toFixed(1)} <span style={{ fontSize: 12 }}>km</span></div>
          <div style={{ color: "#666", fontSize: 9.5, letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{t.runTotalDist.toUpperCase()}</div>
        </div>
      </div>

      {/* Haftalık hedef */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
          <span style={{ color: "#888", fontSize: 11, letterSpacing: 1.5, fontWeight: 800 }}>{t.weeklyGoal}</span>
          <span style={{ color: weekCount >= weeklyTarget ? "#10b981" : "#fff", fontSize: 13, fontWeight: 800 }}>{weekCount}/{weeklyTarget}</span>
        </div>
        <div style={{ height: 10, background: "#1a1a1f", borderRadius: 5, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${Math.min(100, (weekCount / weeklyTarget) * 100)}%`, background: weekCount >= weeklyTarget ? "#10b981" : `linear-gradient(90deg, ${RED}, ${GOLD})`, borderRadius: 5, transition: "width 0.4s" }} />
        </div>
        {weekCount >= weeklyTarget && <div style={{ color: "#10b981", fontSize: 11.5, fontWeight: 700, marginTop: 8 }}>{t.weeklyDone}</div>}
      </div>

      {/* İlerleme grafikleri (Premium) */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 16, padding: 16, marginBottom: 14, position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <span style={{ color: "#888", fontSize: 11, letterSpacing: 2, fontWeight: 800 }}>📈 {t.progressTitle}</span>
          {!isPremium && <span style={{ background: `${GOLD}22`, color: GOLD, fontSize: 9, fontWeight: 900, padding: "2px 7px", borderRadius: 5, letterSpacing: 1 }}>{t.premiumBadge}</span>}
        </div>
        {!isPremium ? (
          <div style={{ textAlign: "center", padding: "20px 12px" }}>
            <div style={{ fontSize: 30, marginBottom: 10, opacity: 0.5 }}>🔒</div>
            <div style={{ color: "#999", fontSize: 12.5, lineHeight: 1.5, marginBottom: 14 }}>{t.chartsLocked}</div>
            <div style={{ color: GOLD, fontSize: 12, fontWeight: 800 }}>{t.unlockWith}</div>
          </div>
        ) : (
        <>
        <div style={{ color: "#aaa", fontSize: 11, fontWeight: 700, marginBottom: 8 }}>{t.last7days}</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 5, height: 80, marginBottom: 18 }}>
          {cal7.map((d, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{ width: "100%", height: `${Math.max(3, (d.value / cal7Max) * 64)}px`, background: d.value > 0 ? `linear-gradient(180deg, ${RED}, #ff6b6b)` : "#1a1a1f", borderRadius: 4, transition: "height 0.4s" }} title={`${d.value} kcal`} />
              <span style={{ color: "#555", fontSize: 8.5 }}>{d.label}</span>
            </div>
          ))}
        </div>
        {topCats.length > 0 ? (
          <>
            <div style={{ color: "#aaa", fontSize: 11, fontWeight: 700, marginBottom: 8 }}>{t.topCategories}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {topCats.map((cc, i) => {
                const max = topCats[0].count;
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "#999", fontSize: 11, width: 90, flexShrink: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cc.name}</span>
                    <div style={{ flex: 1, height: 8, background: "#1a1a1f", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(cc.count / max) * 100}%`, background: GOLD, borderRadius: 4 }} />
                    </div>
                    <span style={{ color: "#666", fontSize: 10, width: 18, textAlign: "right" }}>{cc.count}</span>
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          <div style={{ color: "#555", fontSize: 11.5, textAlign: "center", padding: "8px 0" }}>{t.noChartData}</div>
        )}
        <div style={{ color: "#aaa", fontSize: 11, fontWeight: 700, margin: "18px 0 8px" }}>{t.weightTrend}</div>
        {weightLog.length > 1 && (
          <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 50, marginBottom: 10 }}>
            {weightLog.slice(-14).map((w, i, arr) => {
              const vals = arr.map(x => x.kg);
              const mn = Math.min(...vals), mx = Math.max(...vals);
              const h = mx === mn ? 50 : 8 + ((w.kg - mn) / (mx - mn)) * 38;
              return <div key={i} style={{ flex: 1, height: `${h}px`, background: "#3b82f6", borderRadius: 3 }} title={`${w.kg} kg`} />;
            })}
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          <input type="number" inputMode="decimal" value={weightInput} onChange={e => setWeightInput(e.target.value)} placeholder={t.logWeight} aria-label={t.logWeight}
            style={{ flex: 1, boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 13 }} />
          <button onClick={() => { const kg = parseFloat(weightInput); if (kg > 20 && kg < 300) { addWeightEntry(kg); setWeightInput(""); setDataMsg("w" + Date.now()); } }} aria-label={lang === "en" ? "Add weight" : "Kilo ekle"}
            style={{ padding: "10px 16px", borderRadius: 10, border: "none", background: "#3b82f6", color: "#fff", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>+</button>
        </div>
        {weightLog.length > 0 && <div style={{ color: "#666", fontSize: 11, marginTop: 8 }}>{lang === "en" ? "Latest" : "Son"}: <span style={{ color: "#3b82f6", fontWeight: 800 }}>{weightLog[weightLog.length - 1].kg} kg</span></div>}
        </>
        )}
      </div>

      {/* Veri yedekleme (Premium) */}
      <button onClick={() => setShowData(s => !s)} style={{ width: "100%", padding: "12px", borderRadius: 12, border: `1px solid ${LINE}`, background: CARD, color: "#aaa", fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: showData ? 10 : 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        💾 {t.dataTitle}{!isPremium && <span style={{ background: `${GOLD}22`, color: GOLD, fontSize: 9, fontWeight: 900, padding: "2px 7px", borderRadius: 5, letterSpacing: 1 }}>{t.premiumBadge}</span>}
      </button>
      {showData && (
        <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          {!isPremium ? (
            <div style={{ textAlign: "center", padding: "16px 12px" }}>
              <div style={{ fontSize: 28, marginBottom: 10, opacity: 0.5 }}>🔒</div>
              <div style={{ color: "#999", fontSize: 12.5, lineHeight: 1.5, marginBottom: 12 }}>{t.backupLocked}</div>
              <div style={{ color: GOLD, fontSize: 12, fontWeight: 800 }}>{t.unlockWith}</div>
            </div>
          ) : (
          <>
          <div style={{ color: "#888", fontSize: 12, lineHeight: 1.5, marginBottom: 12 }}>{t.dataDesc}</div>
          <button onClick={() => { const data = exportAllData(); try { navigator.clipboard.writeText(data); setDataMsg(t.exportCopied); } catch { setImportText(data); setDataMsg(t.exportCopied); } }}
            style={{ width: "100%", padding: "12px", borderRadius: 10, border: `1px solid ${GOLD}55`, background: `${GOLD}11`, color: GOLD, fontSize: 13, fontWeight: 800, cursor: "pointer", marginBottom: 10 }}>{t.exportData}</button>
          <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder={t.importPlaceholder} rows={3} aria-label={t.importData}
            style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 10, padding: "10px", color: "#fff", fontSize: 11, marginBottom: 8, resize: "vertical", fontFamily: "monospace" }} />
          <button onClick={() => { if (importAllData(importText)) { setDataMsg(t.importOk); refresh(); } else setDataMsg(t.importFail); }}
            style={{ width: "100%", padding: "12px", borderRadius: 10, border: "none", background: "#3b82f6", color: "#fff", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>{t.importData}</button>
          {dataMsg && <div style={{ color: "#10b981", fontSize: 12, fontWeight: 700, marginTop: 10, textAlign: "center" }}>{dataMsg}</div>}
          <div style={{ color: "#555", fontSize: 10.5, marginTop: 10, lineHeight: 1.5 }}>⚠️ {t.dataWarn}</div>
          </>
          )}
        </div>
      )}

      {/* Aylık takvim */}
      <div style={{ background: CARD, border: `1px solid ${LINE}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <button onClick={prevMonth} aria-label={lang === "en" ? "Previous month" : "Önceki ay"} style={{ background: "#1a1a1f", border: `1px solid ${LINE}`, color: "#ccc", fontSize: 16, cursor: "pointer", width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "#fff", fontSize: 15, fontWeight: 900 }}>{MONTH_NAMES[lang][viewMonth]}</div>
            <div style={{ color: "#666", fontSize: 11, fontWeight: 700 }}>{viewYear}</div>
          </div>
          <button onClick={nextMonth} aria-label={lang === "en" ? "Next month" : "Sonraki ay"} style={{ background: "#1a1a1f", border: `1px solid ${LINE}`, color: "#ccc", fontSize: 16, cursor: "pointer", width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 6 }}>
          {WEEKDAY_LABELS.map((w, i) => <div key={i} style={{ textAlign: "center", color: "#555", fontSize: 10, fontWeight: 800 }}>{w}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {Array.from({ length: firstDow }).map((_, i) => <div key={`e${i}`} />)}
          {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
            const has = dayHasEntry(day);
            const today = isToday(day);
            const de = entriesOnDay(day);
            const hasAuto = de.some(e => e.kind === "auto");
            return (
              <button key={day} onClick={() => { if (has) { setSelected(de[0]); setEditNote(de[0].note || ""); } }} aria-label={`${day} ${MONTH_NAMES[lang][viewMonth]}${has ? ", " + de.length + " " + t.dayEntries : ""}`}
                style={{ aspectRatio: "1", borderRadius: 10, border: today ? `2px solid ${RED}` : `1px solid ${has ? (hasAuto ? RED + "55" : "#3b82f655") : "transparent"}`, background: has ? (hasAuto ? `${RED}22` : "#3b82f622") : "#141418", color: has ? "#fff" : "#555", fontSize: 12.5, fontWeight: has ? 800 : 500, cursor: has ? "pointer" : "default", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 0 }}>
                {day}
                {has && <div style={{ width: 4, height: 4, borderRadius: "50%", background: hasAuto ? RED : "#3b82f6", marginTop: 2 }} />}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 12, justifyContent: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: RED }} /><span style={{ color: "#777", fontSize: 10 }}>{t.autoTag}</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#3b82f6" }} /><span style={{ color: "#777", fontSize: 10 }}>{t.manualTag}</span></div>
        </div>
      </div>

      {/* Not ekle */}
      {!adding ? (
        <button onClick={() => setAdding(true)} style={{ width: "100%", padding: "13px", borderRadius: 12, border: `1.5px dashed ${RED}66`, background: "transparent", color: RED, fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 14 }}>
          {t.addEntry}
        </button>
      ) : (
        <div style={{ background: CARD, border: `1px solid ${RED}44`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          <input value={draftTitle} onChange={e => setDraftTitle(e.target.value)} placeholder={t.entryTitlePh} aria-label={t.entryTitlePh}
            style={{ width: "100%", boxSizing: "border-box", background: "#0e0e10", border: `1px solid ${LINE}`, borderRadius: 8, padding: "10px 12px", color: "#fff", fontSize: 13, marginBottom: 8 }} />
          <textarea value={draftNote} onChange={e => setDraftNote(e.target.value)} placeholder={t.entryNotePh} rows={3} aria-label={t.entryNotePh}

          <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.6 }}>🥊</div>
          <div style={{ color: "#ccc", fontSize: 14, fontWeight: 800, marginBottom: 6 }}>{t.emptyJournalTitle}</div>
          <div style={{ color: "#666", fontSize: 12.5, lineHeight: 1.5 }}>{t.noEntries}</div>
